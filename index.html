{id:285,ar:"أَسْرِعُوا بِالْجِنَازَةِ",fr:"Hâtez-vous avec la procession funèbre. Si elle est bonne, vous faites vite le bien. Si elle est mauvaise, c'est un mal que vous éloignez de vos épaules.",en:"Hasten with the funeral. If she was good, you are sending her forward to good. If she was otherwise, you are ridding yourself of an evil.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1315,a:"Sahih",ref:"Bukhari n°1315",th:"Mort",reward:""},
{id:286,ar:"مَنْ شَهِدَ الْجِنَازَةَ حَتَّى يُصَلَّى عَلَيْهَا فَلَهُ قِيرَاطٌ",fr:"Quiconque assiste à la prière funèbre aura un qirat. Quiconque l'accompagne jusqu'à l'enterrement aura deux qirat. On dit : 'Qu'est-ce qu'un qirat ?' Il dit : 'Comme la montagne Uhud.'",en:"Whoever follows a funeral until the prayer is offered will have one qirat. Whoever stays until the burial will have two qirats — each like Mount Uhud.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1325,a:"Sahih",ref:"Bukhari n°1325",th:"Sadaqa",reward:"Récompense comme la montagne Uhud"},
// ── SAHABAH ──
{id:287,ar:"أَصْحَابِي كَالنُّجُومِ بِأَيِّهِمُ اقْتَدَيْتُمُ اهْتَدَيْتُمْ",fr:"Mes compagnons sont comme les étoiles — quel que soit celui d'entre eux que vous suivez, vous serez guidés.",en:"My companions are like stars — whichever of them you follow, you will be guided.",n:"Ibn Umar ر",b:"Ibn Abd Al-Barr",num:1,a:"Da'if",ref:"Da'if — Silsilah Da'ifa n°58 (Al-Albani). Les Compagnons sont tous fiables mais ce texte précis est faible.",th:"Salaf",reward:""},
{id:288,ar:"لَا تَسُبُّوا أَصْحَابِي فَلَوْ أَنَّ أَحَدَكُمْ أَنْفَقَ مِثْلَ أُحُدٍ ذَهَبًا",fr:"Ne calomniez pas mes Compagnons ! Même si l'un d'entre vous dépensait l'équivalent du mont Uhud en or, cela n'atteindrait pas la valeur d'un mudd de l'un d'eux ni même la moitié.",en:"Do not abuse my companions. If one of you spent gold equal to Mount Uhud, it would not equal a mudd of one of them nor half of it.",n:"Abu Sa'id ر",b:"Sahih Al-Bukhari",num:3673,a:"Sahih",ref:"Bukhari n°3673",th:"Salaf",reward:"Respect des Compagnons = protection contre la diminution des récompenses."},
{id:290,ar:"أَبُو بَكْرٍ فِي الْجَنَّةِ وَعُمَرُ فِي الْجَنَّةِ وَعُثْمَانُ فِي الْجَنَّةِ",fr:"Abu Bakr est au Paradis, Umar est au Paradis, Uthman est au Paradis, Ali est au Paradis, Talha est au Paradis, Az-Zubayr est au Paradis, Abd Ar-Rahman Ibn Awf est au Paradis, Sa'd est au Paradis, Sa'id est au Paradis, Abu Ubayda Ibn Al-Jarrah est au Paradis.",en:"Abu Bakr is in Paradise, Umar is in Paradise, Uthman is in Paradise...",n:"Sa'id Ibn Zayd ر",b:"Tirmidhi",num:3747,a:"Sahih",ref:"Silsilah n°760",th:"Salaf",reward:"Les 10 Compagnons promis au Paradis"},
// ── JIHAD & PERSEVERANCE ──
{id:291,ar:"مَنْ مَاتَ وَلَمْ يَغْزُ وَلَمْ يُحَدِّثْ نَفْسَهُ بِالْغَزْوِ مَاتَ عَلَى شُعْبَةٍ مِنَ النِّفَاقِ",fr:"Quiconque meurt sans avoir combattu et sans avoir voulu combattre dans son âme meurt sur une branche d'hypocrisie.",en:"Whoever dies without having fought and without having wished to fight dies on a branch of hypocrisy.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1910,a:"Sahih",ref:"Muslim n°1910",th:"Jihad",reward:""},
{id:292,ar:"الْمُجَاهِدُ مَنْ جَاهَدَ نَفْسَهُ",fr:"Le vrai mujahid est celui qui lutte contre son âme.",en:"The true mujahid is the one who strives against his own soul.",n:"Fadala Ibn Ubayd ر",b:"Tirmidhi",num:1621,a:"Sahih",ref:"Silsilah n°549",th:"Jihad",reward:"Lutter contre son âme = vrai jihad = protection contre les passions. (Silsilah n°549)"},
// ── PARENTS & ENFANTS ──
{id:293,ar:"الْجَنَّةُ تَحْتَ أَقْدَامِ الْأُمَّهَاتِ",fr:"Le Paradis est sous les pieds des mères.",en:"Paradise is under the feet of mothers.",n:"Mu'awiyah Ibn Jahima ر",b:"An-Nasa'i",num:3104,a:"Sahih",ref:"Silsilah n°593",th:"Famille",reward:"Le Paradis sous les pieds des mères"},
{id:294,ar:"رَضِيَ اللهُ عَنِ ابْنٍ بَرَّ أَبَاهُ",fr:"Allah est satisfait du fils qui est pieux envers son père.",en:"Allah is pleased with the son who treats his father with goodness.",n:"Ibn Umar ر",b:"Tabarani",num:13,a:"Hasan",ref:"Silsilah n°1614",th:"Famille",reward:"La satisfaction d'Allah"},
{id:295,ar:"أَنْتَ وَمَالُكَ لِأَبِيكَ",fr:"Toi et tes biens, vous appartenez à ton père.",en:"You and your wealth belong to your father.",n:"Jabir ر",b:"Ibn Majah",num:2291,a:"Sahih",ref:"Silsilah n°2803",th:"Famille",reward:""},
// ── ISTIGHFAR EXTRA ──
{id:296,ar:"مَنِ اسْتَغْفَرَ لِلْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ كَتَبَ اللهُ لَهُ بِكُلِّ مُؤْمِنٍ وَمُؤْمِنَةٍ حَسَنَةً",fr:"Quiconque demande pardon pour les croyants et les croyantes, Allah lui inscrit une bonne action pour chaque croyant et croyante.",en:"Whoever seeks forgiveness for believing men and women, Allah will write for him a good deed for every believing man and woman.",n:"Ubada Ibn As-Samit ر",b:"Tabarani",num:120,a:"Hasan",ref:"Silsilah n°1506",th:"Tawbah",reward:"Bonne action pour chaque croyant sur terre"},
{id:297,ar:"يَا ابْنَ آدَمَ إِنَّكَ مَا دَعَوْتَنِي وَرَجَوْتَنِي غَفَرْتُ لَكَ عَلَى مَا كَانَ مِنْكَ",fr:"Ô fils d'Adam, tant que tu M'invoqueras et espéreras en Moi, Je te pardonnerai quoi que tu aies fait. Ô fils d'Adam, si tes péchés atteignaient les nuages du ciel puis que tu Me demandais pardon, Je te pardonnerais.",en:"O son of Adam, as long as you call upon Me and place your hope in Me, I will forgive you whatever you have done. O son of Adam, if your sins reached the clouds of the sky and then you asked My forgiveness, I would forgive you.",n:"Anas ر",b:"Tirmidhi",num:3540,a:"Sahih",ref:"Silsilah n°127",th:"Tawbah",reward:"Pardon total — Hadith Qudsi"},
// ── SUNNAHS PRATIQUES ──
{id:298,ar:"مَنْ تَوَضَّأَ ثُمَّ قَالَ أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللهُ فُتِحَتْ لَهُ أَبْوَابُ الْجَنَّةِ الثَّمَانِيَةُ",fr:"Quiconque fait ses ablutions puis dit la Shahada : les 8 portes du Paradis lui sont ouvertes.",en:"Whoever performs ablution then says the Shahada: the eight gates of Paradise are opened for him.",n:"Umar ر",b:"Sahih Muslim",num:234,a:"Sahih",ref:"Muslim n°234",th:"Taharah",reward:"Les 8 portes du Paradis"},
{id:299,ar:"إِذَا أَوَيْتَ إِلَى فِرَاشِكَ فَاقْرَأْ آيَةَ الْكُرْسِيِّ",fr:"Quand tu te couches pour dormir, récite Ayat Al-Kursi — tu seras sous la protection d'Allah et aucun démon ne t'approchera jusqu'au matin.",en:"When you go to your bed, recite Ayat Al-Kursi — you will have Allah's protection and no devil will come near you until morning.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2311,a:"Sahih",ref:"Bukhari n°2311",th:"Coran",reward:"Protection d'Allah toute la nuit"},
{id:300,ar:"مَنْ قَالَ اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ",fr:"Quiconque dit le Sayyid Al-Istighfar avec certitude le matin et meurt ce jour entrera au Paradis. De même s'il le dit le soir et meurt cette nuit.",en:"Whoever says Sayyid Al-Istighfar with certainty in the morning and dies that day enters Paradise. Likewise if he says it in the evening and dies that night.",n:"Shaddad Ibn Aws ر",b:"Sahih Al-Bukhari",num:6306,a:"Sahih",ref:"Bukhari n°6306",th:"Du'a",reward:"Le Paradis assuré"},

// ══ BLOC TIRMIDHI — Source : La Science Légiférée / HadithDuJour.com ══
{id:301,ar:"صَلَّى الظُّهْرَ حِينَ زَالَتِ الشَّمْسُ",fr:"Le Messager d'Allah ﷺ a prié Dhuhr quand le soleil a passé le zénith.",en:"The Messenger of Allah ﷺ prayed Dhuhr when the sun passed its zenith.",n:"Anas Ibn Malik ر",b:"Jami' At-Tirmidhi",num:156,a:"Sahih",ref:"Tirmidhi n°156 — Sahih Al-Albani",th:"Salat",reward:"Dhuhr au zénith = obéissance au Prophète ﷺ + récompense de la prière en son temps."},
{id:302,ar:"لَوْلَا أَنْ أَشُقَّ عَلَى أُمَّتِي لَأَمَرْتُهُمْ أَنْ يُؤَخِّرُوا الْعِشَاءَ إِلَى ثُلُثِ اللَّيْلِ أَوْ نِصْفِهِ",fr:"Si je ne craignais pas de mettre ma communauté dans la gêne, je leur aurais ordonné de retarder le 'Icha jusqu'au tiers de la nuit ou jusqu'à son milieu.",en:"If it were not difficult for my community, I would have ordered them to delay Isha until a third of the night or its middle.",n:"Abu Hureyra ر",b:"Jami' At-Tirmidhi",num:167,a:"Sahih",ref:"Tirmidhi n°167 — Sahih Al-Albani",th:"Salat",reward:"Retarder Icha = facilitation pour la communauté + récompense de l'imam juste."},
{id:303,ar:"فُرِضَتْ عَلَى النَّبِيِّ ﷺ لَيْلَةَ أُسْرِيَ بِهِ الصَّلَوَاتُ خَمْسِينَ ثُمَّ نُقِصَتْ حَتَّى جُعِلَتْ خَمْسًا",fr:"Cinquante prières ont été imposées au Prophète ﷺ la nuit de l'Isra. Puis elles ont été réduites jusqu'à arriver à 5 prières. Puis il fut dit : Ô Muhammad, la parole ne change pas auprès de Moi. Tu auras pour ces cinq l'équivalent de cinquante.",en:"Fifty prayers were obligated upon the Prophet ﷺ on the night of Isra. They were then reduced until they became five. Then it was called out: O Muhammad, the word does not change with Me, and you shall have for these five the reward of fifty.",n:"Anas Ibn Malik ر",b:"Jami' At-Tirmidhi",num:213,a:"Sahih",ref:"Tirmidhi n°213 — Sahih Al-Albani",th:"Salat",reward:"5 prières = récompense de 50"},
{id:304,ar:"بَشِّرِ الْمَشَّائِينَ فِي الظُّلَمِ إِلَى الْمَسَاجِدِ بِالنُّورِ التَّامِّ يَوْمَ الْقِيَامَةِ",fr:"Annonce la bonne nouvelle à ceux qui marchent vers les mosquées dans l'obscurité, d'une lumière complète le Jour du Jugement.",en:"Give glad tidings to those who walk to the mosques in darkness of complete light on the Day of Resurrection.",n:"Burayda ر",b:"Jami' At-Tirmidhi",num:223,a:"Sahih",ref:"Tirmidhi n°223 — Sahih Al-Albani",th:"Salat",reward:"Lumière complète au Jour du Jugement"},
{id:305,ar:"مَنْ صَلَّى لِلَّهِ أَرْبَعِينَ يَوْمًا فِي جَمَاعَةٍ يُدْرِكُ التَّكْبِيرَةَ الْأُولَى كُتِبَ لَهُ بَرَاءَتَانِ بَرَاءَةٌ مِنَ النَّارِ وَبَرَاءَةٌ مِنَ النِّفَاقِ",fr:"Celui qui prie en groupe pour Allah durant 40 jours en attrapant le premier takbir, il lui est inscrit deux protections : une protection contre le Feu et une protection contre l'hypocrisie.",en:"Whoever prays in congregation for Allah for forty days, catching the first takbeer, will be recorded as having two protections: protection from the Fire and protection from hypocrisy.",n:"Anas Ibn Malik ر",b:"Jami' At-Tirmidhi",num:241,a:"Hasan",ref:"Tirmidhi n°241 — Hasan Al-Albani",th:"Salat",reward:"Protection contre le Feu et contre l'hypocrisie"},
{id:306,ar:"الْأَرْضُ كُلُّهَا مَسْجِدٌ إِلَّا الْمَقْبُرَةَ وَالْحَمَّامَ",fr:"La terre entière est un lieu de prière, hormis le cimetière et le hammam.",en:"The entire earth is a place of prayer except the graveyard and the bathhouse.",n:"Abu Sa'id Al-Khudri ر",b:"Jami' At-Tirmidhi",num:317,a:"Sahih",ref:"Tirmidhi n°317 — Sahih Al-Albani",th:"Salat",reward:"La terre entière est lieu de prière sauf le cimetière et le bain = facilité pour l'ummah."},
{id:307,ar:"صَلَاةٌ فِي مَسْجِدِ قُبَاءَ كَعُمْرَةٍ",fr:"Une prière dans la mosquée de Quba équivaut à une Umra.",en:"A prayer in the mosque of Quba is equivalent to an Umra.",n:"Usayd Ibn Dhuhair Al-Ansari ر",b:"Jami' At-Tirmidhi",num:324,a:"Sahih",ref:"Tirmidhi n°324 — Sahih Al-Albani",th:"Salat",reward:"Récompense d'une Umra"},
{id:308,ar:"إِذَا أُقِيمَتِ الصَّلَاةُ فَلَا تَأْتُوهَا وَأَنْتُمْ تَسْعَوْنَ وَلَكِنِ ائْتُوهَا وَأَنْتُمْ تَمْشُونَ وَعَلَيْكُمُ السَّكِينَةُ فَمَا أَدْرَكْتُمْ فَصَلُّوا وَمَا فَاتَكُمْ فَأَتِمُّوا",fr:"Lorsque l'iqama est faite pour la prière, ne vous y rendez pas en courant mais allez-y en marchant avec sérénité. Ce que vous attrapez de la prière, priez-le. Ce que vous avez manqué, complétez-le.",en:"When the iqama is called, do not come running but come walking with calmness. What you catch of the prayer, pray it. What you miss, complete it.",n:"Abu Hureyra ر",b:"Jami' At-Tirmidhi",num:327,a:"Sahih",ref:"Tirmidhi n°327 — Sahih Al-Albani",th:"Salat",reward:"Prière avec sérénité = prière acceptée + protection contre l'invalidation."},
{id:309,ar:"ثَلَاثَةٌ لَا تُجَاوِزُ صَلَاتُهُمْ آذَانَهُمْ الْعَبْدُ الْآبِقُ حَتَّى يَرْجِعَ وَامْرَأَةٌ بَاتَتْ وَزَوْجُهَا عَلَيْهَا سَاخِطٌ وَإِمَامُ قَوْمٍ وَهُمْ لَهُ كَارِهُونَ",fr:"Il y a trois personnes dont la prière ne dépasse pas leurs oreilles : l'esclave qui s'est enfui jusqu'à ce qu'il revienne, une femme dont le mari s'est couché en étant fâché contre elle, et un imam pour un peuple qui le déteste.",en:"There are three whose prayer does not go above their ears: the slave who has run away until he returns, a woman who spent the night while her husband was angry with her, and an imam leading a people who hate him.",n:"Abu Umama Al-Bahili ر",b:"Jami' At-Tirmidhi",num:360,a:"Hasan",ref:"Tirmidhi n°360 — Hasan Al-Albani",th:"Salat",reward:"3 personnes dont la prière ne monte pas = avertissement sévère pour éviter ces situations."},
{id:310,ar:"التَّثَاؤُبُ فِي الصَّلَاةِ مِنَ الشَّيْطَانِ فَإِذَا تَثَاءَبَ أَحَدُكُمْ فَلْيَكْظِمْ مَا اسْتَطَاعَ",fr:"Le bâillement dans la prière vient de Shaytan. Ainsi, si l'un d'entre vous baille, qu'il le repousse autant qu'il peut.",en:"Yawning in the prayer comes from Shaytan, so if one of you yawns let him suppress it as much as possible.",n:"Abu Hureyra ر",b:"Jami' At-Tirmidhi",num:370,a:"Sahih",ref:"Tirmidhi n°370 — Sahih Al-Albani",th:"Salat",reward:"Résister au bâillement = protection de la prière contre l'intervention de Shaytan."},
{id:311,ar:"مَا مِنْ رَجُلٍ يُذْنِبُ ذَنْبًا ثُمَّ يَقُومُ فَيَتَطَهَّرُ ثُمَّ يُصَلِّي ثُمَّ يَسْتَغْفِرُ اللهَ إِلَّا غَفَرَ اللهُ لَهُ",fr:"Il n'y a pas un homme qui commet un péché puis se lève, se purifie, prie, puis demande pardon à Allah — sans qu'Allah ne lui pardonne. Puis il a récité : { Ceux qui lorsqu'ils commettent une turpitude ou ont été injustes envers eux-mêmes se rappellent d'Allah } [Âl-Imran 3:135]",en:"There is no man who sins then gets up, purifies himself, prays, and asks Allah for forgiveness, without Allah forgiving him.",n:"Abu Bakr As-Siddiq ر",b:"Jami' At-Tirmidhi",num:406,a:"Hasan",ref:"Tirmidhi n°406 — Hasan Al-Albani",th:"Tawbah",reward:"Pardon assuré après péché + wudu + prière + istighfar"},
{id:312,ar:"عَلِّمُوا الصَّبِيَّ الصَّلَاةَ ابْنَ سَبْعِ سِنِينَ وَاضْرِبُوهُ عَلَيْهَا ابْنَ عَشْرٍ",fr:"Enseignez la prière à vos enfants à l'âge de sept ans et disciplinez-les pour elle à dix ans.",en:"Teach the child the prayer at seven years old and discipline him for it at ten.",n:"Sabra Ibn Ma'bad Al-Juhani ر",b:"Jami' At-Tirmidhi",num:407,a:"Hasan Sahih",ref:"Tirmidhi n°407 — Hasan Sahih Al-Albani",th:"Salat",reward:"Enseigner la prière à 7 ans + discipline à 10 ans = enfant éduqué dans la religion."},
{id:313,ar:"مَا مِنْ عَبْدٍ مُسْلِمٍ يُصَلِّي لِلَّهِ كُلَّ يَوْمٍ ثِنْتَيْ عَشَرَةَ رَكْعَةً تَطَوُّعًا غَيْرَ فَرِيضَةٍ إِلَّا بَنَى اللهُ لَهُ بَيْتًا فِي الْجَنَّةِ",fr:"Il n'y a aucun serviteur musulman qui prie chaque jour pour Allah 12 rak'at surérogatoires en plus des prières obligatoires sans qu'Allah ne lui construise une maison au Paradis : 4 avant Dhuhr, 2 après Dhuhr, 2 après Maghrib, 2 après 'Icha et 2 avant Fajr.",en:"There is no Muslim servant who prays twelve voluntary rak'at every day apart from the obligatory prayers, except that Allah will build for him a house in Paradise: four before Dhuhr, two after, two after Maghrib, two after Isha, and two before Fajr.",n:"Umm Habiba ر",b:"Jami' At-Tirmidhi",num:415,a:"Sahih",ref:"Tirmidhi n°415 — Sahih Al-Albani",th:"Salat",reward:"Maison au Paradis"},
{id:314,ar:"كَانَ النَّبِيُّ ﷺ يُصَلِّي قَبْلَ الظُّهْرِ أَرْبَعًا وَبَعْدَهَا رَكْعَتَيْنِ",fr:"Le Prophète ﷺ priait quatre rak'at avant Dhuhr et deux après.",en:"The Prophet ﷺ used to pray four rak'at before Dhuhr and two after it.",n:"Ali Ibn Abi Talib ر",b:"Jami' At-Tirmidhi",num:424,a:"Sahih",ref:"Tirmidhi n°424 — Sahih Al-Albani",th:"Salat",reward:""},
{id:315,ar:"مَنْ حَافَظَ عَلَى أَرْبَعِ رَكَعَاتٍ قَبْلَ الظُّهْرِ وَأَرْبَعٍ بَعْدَهَا حَرَّمَهُ اللهُ عَلَى النَّارِ",fr:"Quiconque est assidu à quatre rak'at avant Dhuhr et quatre après, Allah l'interdit au Feu.",en:"Whoever is consistent in praying four rak'at before Dhuhr and four after, Allah will forbid him to the Fire.",n:"Umm Habiba ر",b:"Jami' At-Tirmidhi",num:428,a:"Sahih",ref:"Tirmidhi n°428 — Sahih Al-Albani",th:"Salat",reward:"Interdit au Feu"},
// ── SALAT — Autres hadiths authentiques ──
{id:316,ar:"مَنْ صَلَّى الضُّحَى ثِنْتَيْ عَشَرَةَ رَكْعَةً بَنَى اللهُ لَهُ قَصْرًا فِي الْجَنَّةِ",fr:"Quiconque prie Ad-Duha en douze rak'at, Allah lui construira un palais au Paradis.",en:"Whoever prays Duha in twelve rak'at, Allah will build for him a palace in Paradise.",n:"Anas Ibn Malik ر",b:"Jami' At-Tirmidhi",num:473,a:"Da'if",ref:"Note: Ce hadith est faible — la sunnah authentique est 2 rak'at minimum (Bukhari n°1178)",th:"Salat",reward:""},
{id:317,ar:"أَيُّ الأَعْمَالِ أَفْضَلُ قَالَ الصَّلَاةُ لِأَوَّلِ وَقْتِهَا",fr:"Quel est le meilleur acte ? Il répondit : La prière au début de son temps.",en:"Which deed is best? He said: Prayer at the beginning of its time.",n:"Umm Farwa ر",b:"Jami' At-Tirmidhi",num:170,a:"Sahih",ref:"Tirmidhi n°170 — Sahih Al-Albani",th:"Salat",reward:"Le meilleur acte"},
{id:318,ar:"صَلَاةُ الرَّجُلِ فِي بَيْتِهِ أَفْضَلُ مِنْ صَلَاتِهِ فِي مَسْجِدِي هَذَا إِلَّا الْمَكْتُوبَةَ",fr:"La prière de l'homme chez lui est meilleure que sa prière dans ma mosquée, sauf la prière obligatoire.",en:"A man's voluntary prayer in his home is better than his prayer in this mosque of mine, except for the obligatory prayers.",n:"Zayd Ibn Thabit ر",b:"Abu Dawud",num:1044,a:"Sahih",ref:"Silsilah n°3 — Sahih Al-Albani",th:"Salat",reward:""},
{id:319,ar:"إِنَّمَا جُعِلَ الإِمَامُ لِيُؤْتَمَّ بِهِ فَلَا تَخْتَلِفُوا عَلَيْهِ",fr:"L'imam n'est établi que pour être suivi. Ne le contredisez pas. Quand il dit takbir, dites takbir. Quand il se prosterne, prosternez-vous.",en:"The imam is appointed to be followed. Do not differ from him. When he says takbir, say takbir. When he prostrates, prostrate.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:722,a:"Sahih",ref:"Bukhari n°722",th:"Salat",reward:""},
{id:320,ar:"لَا صَلَاةَ لِمَنْ لَمْ يَقْرَأْ بِفَاتِحَةِ الْكِتَابِ",fr:"Il n'y a pas de prière valide pour celui qui ne récite pas Al-Fatiha.",en:"There is no prayer for the one who does not recite the Opening Chapter.",n:"Ubada Ibn As-Samit ر",b:"Sahih Al-Bukhari",num:756,a:"Sahih",ref:"Bukhari n°756",th:"Salat",reward:""},
{id:321,ar:"إِذَا قُمْتَ إِلَى الصَّلَاةِ فَكَبِّرْ ثُمَّ اقْرَأْ مَا تَيَسَّرَ مَعَكَ مِنَ الْقُرْآنِ",fr:"Quand tu te lèves pour prier, dis le takbir, puis récite ce qui t'est facile du Coran, puis incline-toi jusqu'à te reposer dans l'inclinaison, puis relève-toi, puis prosterne-toi jusqu'à te reposer dans la prosternation, puis relève-toi — et fais cela dans toute ta prière.",en:"When you stand up for prayer, say the takbir, then recite what is easy for you of the Quran, then bow until you are settled in bowing, then rise, then prostrate until you are settled in prostration, then rise.",n:"Rifa'a Ibn Rafi' ر",b:"Sahih Al-Bukhari",num:6251,a:"Sahih",ref:"Bukhari n°6251",th:"Salat",reward:""},
// ── DHIKR après salat — Tirmidhi ──
{id:322,ar:"مَنْ سَبَّحَ اللهَ فِي دُبُرِ كُلِّ صَلَاةٍ ثَلَاثًا وَثَلَاثِينَ وَحَمِدَهُ ثَلَاثًا وَثَلَاثِينَ وَكَبَّرَهُ ثَلَاثًا وَثَلَاثِينَ فَتِلْكَ تِسْعَةٌ وَتِسْعُونَ",fr:"Quiconque dit Subhan Allah 33 fois, Alhamdulillah 33 fois et Allahu Akbar 33 fois après chaque prière — soit 99 au total — puis complète à 100 par La ilaha illallah wahdahu la sharika lahu, lahul-mulku wa lahul-hamdu wa huwa ala kulli shay'in qadir — ses péchés lui seront effacés même s'ils étaient comme l'écume de la mer.",en:"Whoever says Subhan Allah 33 times, Alhamdulillah 33 times and Allahu Akbar 33 times after each prayer — totalling 99 — then completes it with La ilaha illallah wahdahu... — his sins will be forgiven even if they were like the foam of the sea.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:597,a:"Sahih",ref:"Muslim n°597",th:"Dhikr",reward:"Péchés effacés même comme l'écume de la mer"},
// ── TAHAJJUD & QIYAM AL-LAYL ──
{id:324,ar:"أَفْضَلُ الصَّلَاةِ بَعْدَ الْفَرِيضَةِ صَلَاةُ اللَّيْلِ",fr:"La meilleure prière après la prière obligatoire est la prière de nuit.",en:"The best prayer after the obligatory prayer is the night prayer.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1163,a:"Sahih",ref:"Muslim n°1163",th:"Salat",reward:"La meilleure prière"},
{id:325,ar:"يَنْزِلُ رَبُّنَا تَبَارَكَ وَتَعَالَى كُلَّ لَيْلَةٍ إِلَى السَّمَاءِ الدُّنْيَا حِينَ يَبْقَى ثُلُثُ اللَّيْلِ الْآخِرُ",fr:"Notre Seigneur descend chaque nuit au ciel de la terre quand il reste le dernier tiers de la nuit. Il dit : Qui M'invoque pour que Je lui réponde ? Qui Me demande pour que Je lui donne ? Qui Me demande pardon pour que Je lui pardonne ?",en:"Our Lord descends every night to the lowest heaven when the last third of the night remains. He says: Who calls upon Me that I may answer? Who asks of Me that I may give? Who seeks My forgiveness that I may forgive?",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1145,a:"Sahih",ref:"Bukhari n°1145 — Muslim n°758",th:"Du'a",reward:"Invocation exaucée dans le dernier tiers de la nuit"},
// ── ZAKAT & CHARITÉ ──
{id:326,ar:"حَصِّنُوا أَمْوَالَكُمْ بِالزَّكَاةِ",fr:"Protégez vos biens par la Zakat, soignez vos malades par la Sadaqa et préparez-vous aux épreuves par la du'a.",en:"Protect your wealth by giving Zakat, treat your sick with Sadaqa, and prepare against hardships with supplication.",n:"Ibn Masud ر",b:"Abu Dawud — Tabarani",num:3095,a:"Hasan",ref:"Silsilah n°1839 — Hasan Al-Albani",th:"Sadaqa",reward:"Protection des biens"},
{id:327,ar:"أَفْضَلُ الصَّدَقَةِ جُهْدُ الْمُقِلِّ",fr:"La meilleure aumône est celle faite avec effort par celui qui a peu.",en:"The best charity is that given by one who has little.",n:"Abu Hureyra ر",b:"Abu Dawud",num:1449,a:"Sahih",ref:"Silsilah n°3570 — Sahih Al-Albani",th:"Sadaqa",reward:"La meilleure aumône"},
{id:328,ar:"يَدُ اللهِ مَلْأَى لَا يَغِيضُهَا نَفَقَةٌ سَحَّاءُ اللَّيْلَ وَالنَّهَارَ",fr:"La main d'Allah est pleine. La dépense ne la diminue pas. Elle déverse généreusement nuit et jour.",en:"The hand of Allah is full. Spending does not diminish it. It pours forth abundantly night and day.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:7411,a:"Sahih",ref:"Bukhari n°7411",th:"Tawhid",reward:"Sadaqa avec effort = la meilleure sadaqa. (Silsilah n°3570)"},
// ── SCIENCE & ENSEIGNEMENT ──
{id:329,ar:"بَلِّغُوا عَنِّي وَلَوْ آيَةً",fr:"Transmettez de ma part, fût-ce un seul verset.",en:"Convey from me, even if it is a single verse.",n:"Abdullah Ibn Amr ر",b:"Sahih Al-Bukhari",num:3461,a:"Sahih",ref:"Bukhari n°3461",th:"'Ilm",reward:"La main d'Allah est pleine = générosité sans limites + motivation à la sadaqa."},
{id:330,ar:"مَنْ عَلَّمَ عِلْمًا فَلَهُ أَجْرُ مَنْ عَمِلَ بِهِ",fr:"Quiconque enseigne une connaissance, il aura la récompense de celui qui en aura agi.",en:"Whoever teaches knowledge will have the reward of those who act upon it.",n:"Sahl Ibn Muadh ر",b:"Ibn Majah",num:240,a:"Da'if",ref:"Note: La chaîne est faible — mais le principe est confirmé par Muslim n°1893",th:"'Ilm",reward:"Transmettre un seul verset = récompense de l'enseignement sur toute la terre. (Bukhari n°3461)"},
{id:331,ar:"مَنْ كَتَمَ عِلْمًا أَلْجَمَهُ اللهُ بِلِجَامٍ مِنْ نَارٍ يَوْمَ الْقِيَامَةِ",fr:"Quiconque cache une connaissance, Allah le bâillonnera avec un mors de feu le Jour du Jugement.",en:"Whoever conceals knowledge, Allah will bridle him with a bridle of fire on the Day of Resurrection.",n:"Abu Hureyra ر",b:"Ibn Majah",num:261,a:"Sahih",ref:"Silsilah n°2364 — Sahih Al-Albani",th:"'Ilm",reward:"Cacher la connaissance = châtiment sévère le Jour du Jugement. (Silsilah n°2364)"},
// ── HADITH QUDSI EXTRA ──
{id:332,ar:"أَنَا عِنْدَ ظَنِّ عَبْدِي بِي وَأَنَا مَعَهُ إِذَا ذَكَرَنِي",fr:"Je suis auprès de Mon serviteur selon son opinion de Moi. Je suis avec lui quand il pense à Moi. S'il pense à Moi dans son cœur, Je pense à lui dans Mon Être. S'il pense à Moi en compagnie, Je pense à lui en compagnie meilleure.",en:"I am as My servant thinks of Me. I am with him when he thinks of Me. If he thinks of Me in his heart, I think of him in My Being. If he mentions Me in a gathering, I mention him in a better gathering.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:7405,a:"Sahih",ref:"Bukhari n°7405 — Hadith Qudsi",th:"Tawhid",reward:"Allah est avec celui qui se souvient de Lui"},
{id:333,ar:"يَا ابْنَ آدَمَ لَوْ بَلَغَتْ ذُنُوبُكَ عَنَانَ السَّمَاءِ ثُمَّ اسْتَغْفَرْتَنِي غَفَرْتُ لَكَ",fr:"Ô fils d'Adam, si tes péchés atteignaient les nuages du ciel, puis que tu Me demandais pardon, Je te pardonnerais.",en:"O son of Adam, if your sins were to reach the clouds of the sky and then you were to ask My forgiveness, I would forgive you.",n:"Anas ر",b:"Jami' At-Tirmidhi",num:3540,a:"Sahih",ref:"Tirmidhi n°3540 — Sahih Al-Albani — Hadith Qudsi",th:"Tawbah",reward:"Pardon total quelle que soit la quantité des péchés"},
{id:334,ar:"يَا ابْنَ آدَمَ إِنَّكَ مَا دَعَوْتَنِي وَرَجَوْتَنِي غَفَرْتُ لَكَ عَلَى مَا كَانَ فِيكَ وَلَا أُبَالِي",fr:"Ô fils d'Adam, tant que tu M'invoques et espères en Moi, Je te pardonnerai quoi que tu aies fait, et cela ne M'importe pas.",en:"O son of Adam, as long as you call upon Me and hope in Me, I will forgive you for whatever you have done, and I do not mind.",n:"Anas ر",b:"Jami' At-Tirmidhi",num:3540,a:"Sahih",ref:"Tirmidhi n°3540 — Sahih Al-Albani — Hadith Qudsi",th:"Tawbah",reward:"Pardon assuré pour celui qui invoque et espère en Allah"},

// ══ BLOC 5 — Hadiths 335-550 ══
// Source principale: Bukhari, Muslim, Abu Dawud, Tirmidhi, An-Nasa'i, Ibn Majah
// Grading: Al-Albani / Shu'ayb Al-Arnaut

// ── FOI & CROYANCE ──
{id:335,ar:"الإِيمَانُ بِضْعٌ وَسَبْعُونَ شُعْبَةً",fr:"La foi a plus de soixante-dix branches. La plus élevée est de dire 'La ilaha illallah' et la plus basse est d'ôter quelque chose de nuisible du chemin. La pudeur est une branche de la foi.",en:"Faith has over seventy branches. The highest is saying 'La ilaha illallah' and the lowest is removing something harmful from the road. Modesty is a branch of faith.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:9,a:"Sahih",ref:"Bukhari n°9",th:"Pilliers",reward:""},
{id:336,ar:"الإِسْلَامُ عَلَانِيَةٌ وَالإِيمَانُ فِي الْقَلْبِ",fr:"L'Islam est public et la foi est dans le cœur.",en:"Islam is outward and faith is in the heart.",n:"Anas ر",b:"Musnad Ahmad",num:12862,a:"Sahih",ref:"Silsilah n°3255",th:"Tawhid",reward:""},
{id:337,ar:"لَا يَزْنِي الزَّانِي حِينَ يَزْنِي وَهُوَ مُؤْمِنٌ",fr:"Le fornicateur ne fornique pas en étant croyant au moment où il fornique. Le voleur ne vole pas en étant croyant au moment où il vole. Le consommateur de vin n'en boit pas en étant croyant au moment où il en boit.",en:"The fornicator does not fornicate while he is a believer at the time of doing it. The thief does not steal while he is a believer at the time of stealing. The drinker of wine does not drink it while he is a believer at the time of drinking.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2475,a:"Sahih",ref:"Bukhari n°2475",th:"Tawhid",reward:""},
{id:339,ar:"كُلُّ بِدْعَةٍ ضَلَالَةٌ وَكُلُّ ضَلَالَةٍ فِي النَّارِ",fr:"Toute innovation (bid'ah) est un égarement et tout égarement mène au Feu.",en:"Every innovation is misguidance and every misguidance leads to the Fire.",n:"Jabir ر",b:"Sahih Muslim",num:867,a:"Sahih",ref:"Muslim n°867",th:"Bid'ah",reward:"Toute bid'ah est égarement = protection en restant sur la Sunnah."},
// ── PRIERE ──
{id:340,ar:"بَيْنَ الرَّجُلِ وَبَيْنَ الشِّرْكِ وَالْكُفْرِ تَرْكُ الصَّلَاةِ",fr:"Entre l'homme et l'associationnisme et la mécréance, il y a l'abandon de la prière.",en:"Between a man and polytheism and disbelief is the abandonment of prayer.",n:"Jabir ر",b:"Sahih Muslim",num:82,a:"Sahih",ref:"Muslim n°82",th:"Salat",reward:"Abandonner la prière = entre le croyant et l'associationnisme. (Muslim n°82)"},
{id:341,ar:"إِذَا قَامَ أَحَدُكُمْ إِلَى الصَّلَاةِ فَلَا يَبْصُقَنَّ قِبَلَ وَجْهِهِ",fr:"Quand l'un de vous se lève pour prier, qu'il ne crache pas devant lui, car Allah est devant lui lorsqu'il prie.",en:"When one of you stands up for prayer, let him not spit in front of him, for Allah is in front of him when he prays.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:405,a:"Sahih",ref:"Bukhari n°405",th:"Salat",reward:""},
{id:342,ar:"لَا تُدْرَكُ الصَّلَاةُ بِالسَّعْيِ وَلَكِنْ تُدْرَكُ بِالْمَشْيِ وَالسَّكِينَةِ",fr:"La prière ne se rattrape pas en courant, mais en marchant et en ayant de la sérénité.",en:"The prayer is not caught up by rushing, but by walking and having calmness.",n:"Abu Qatada ر",b:"Sahih Al-Bukhari",num:636,a:"Sahih",ref:"Bukhari n°636",th:"Salat",reward:""},
{id:343,ar:"الصَّلَاةُ نُورٌ",fr:"La prière est une lumière.",en:"Prayer is light.",n:"Abu Malik Al-Ash'ari ر",b:"Sahih Muslim",num:223,a:"Sahih",ref:"Muslim n°223",th:"Salat",reward:""},
{id:344,ar:"مَنْ تَرَكَ صَلَاةَ الْعَصْرِ فَقَدْ حَبِطَ عَمَلُهُ",fr:"Quiconque abandonne la prière d'Asr voit ses œuvres annulées.",en:"Whoever abandons the Asr prayer — his deeds are nullified.",n:"Burayda ر",b:"Sahih Al-Bukhari",num:594,a:"Sahih",ref:"Bukhari n°594",th:"Salat",reward:""},
{id:345,ar:"صَلُّوا قَبْلَ صَلَاةِ الْمَغْرِبِ صَلُّوا قَبْلَ صَلَاةِ الْمَغْرِبِ ثُمَّ قَالَ فِي الثَّالِثَةِ لِمَنْ شَاءَ",fr:"Priez avant Maghrib, priez avant Maghrib. Puis à la troisième fois : pour qui le souhaite.",en:"Pray before Maghrib, pray before Maghrib. Then at the third: for whoever wishes.",n:"Abdullah Ibn Mughaffal ر",b:"Sahih Al-Bukhari",num:1183,a:"Sahih",ref:"Bukhari n°1183",th:"Salat",reward:""},
// ── CORAN ──
{id:346,ar:"إِنَّ الَّذِي لَيْسَ فِي جَوْفِهِ شَيْءٌ مِنَ الْقُرْآنِ كَالْبَيْتِ الْخَرِبِ",fr:"Celui dans la poitrine duquel il n'y a rien du Coran est comme une maison en ruine.",en:"The one in whose heart there is nothing of the Quran is like a ruined house.",n:"Ibn Abbas ر",b:"Jami' At-Tirmidhi",num:2913,a:"Sahih",ref:"Silsilah n°1998",th:"Coran",reward:"Cœur vide du Coran = comme une maison en ruine = motiver à la mémorisation. (Silsilah n°1998)"},
{id:347,ar:"أَهْلُ الْقُرْآنِ هُمْ أَهْلُ اللهِ وَخَاصَّتُهُ",fr:"Les gens du Coran sont les gens d'Allah et Ses proches.",en:"The people of the Quran are the people of Allah and His special ones.",n:"Anas ر",b:"Ibn Majah",num:215,a:"Sahih",ref:"Silsilah n°2165",th:"Coran",reward:"Être parmi les proches d'Allah"},
{id:348,ar:"تَعَلَّمُوا سُورَةَ الْبَقَرَةِ فَإِنَّ أَخْذَهَا بَرَكَةٌ وَتَرْكَهَا حَسْرَةٌ",fr:"Apprenez la sourate Al-Baqara, car la prendre est une bénédiction et la délaisser est un regret.",en:"Learn Surah Al-Baqarah, for taking it is a blessing and leaving it is a regret.",n:"Abu Umama ر",b:"Sahih Muslim",num:804,a:"Sahih",ref:"Muslim n°804",th:"Coran",reward:"Bénédiction de réciter Al-Baqara"},
{id:349,ar:"لَا يَجْمَعُهُمَا جَوْفُ كَافِرٍ",fr:"La Sourate Al-Baqara et la Sourate Al-Imran — un cœur de mécréant ne les contiendra jamais toutes deux.",en:"Surah Al-Baqarah and Surah Al-Imran — the heart of a disbeliever will never contain both of them.",n:"Abu Umama ر",b:"Sahih Muslim",num:804,a:"Sahih",ref:"Muslim n°804",th:"Coran",reward:"Apprendre Al-Baqara = bénédiction + protection contre Shaytan. (Muslim n°804)"},
// ── DHIKR & DU'A ──
{id:350,ar:"أَلَا أُخْبِرُكَ بِأَحَبِّ الْكَلَامِ إِلَى اللهِ",fr:"Veux-tu que je te parle de la parole la plus aimée d'Allah ? La meilleure parole est : Subhana Allahi wa bihamdihi.",en:"Shall I tell you about the most beloved speech to Allah? The most beloved speech is: Subhana Allahi wa bihamdihi.",n:"Abu Dharr ر",b:"Sahih Muslim",num:2731,a:"Sahih",ref:"Muslim n°2731",th:"Dhikr",reward:"La parole la plus aimée d'Allah"},
{id:351,ar:"مَنْ قَالَ لَا إِلَهَ إِلَّا اللهُ مُخْلِصًا دَخَلَ الْجَنَّةَ",fr:"Quiconque dit sincèrement 'La ilaha illallah' entrera au Paradis.",en:"Whoever sincerely says 'La ilaha illallah' will enter Paradise.",n:"Abu Dharr ر",b:"Musnad Ahmad",num:21635,a:"Sahih",ref:"Silsilah n°3355",th:"Dhikr",reward:"Entrée au Paradis"},
{id:352,ar:"أَكْثِرُوا ذِكْرَ اللهِ حَتَّى يَقُولُوا مَجْنُونٌ",fr:"Faites beaucoup de dhikr d'Allah jusqu'à ce qu'on vous dise 'vous êtes fou'.",en:"Remember Allah abundantly until they say you are mad.",n:"Abu Sa'id ر",b:"Musnad Ahmad",num:11260,a:"Hasan",ref:"Silsilah n°2821",th:"Dhikr",reward:"Qui dit sincèrement La ilaha illallah = entrera au Paradis. (Silsilah n°3355)"},
{id:353,ar:"سَبَقَ الْمُفَرِّدُونَ",fr:"Les Mufarridoun ont pris de l'avance. On demanda : 'Qui sont les Mufarridoun ?' Il dit : 'Les hommes et les femmes qui font beaucoup de dhikr d'Allah.'",en:"The Mufarridoon have taken the lead. They said: Who are the Mufarridoon? He said: Men and women who remember Allah abundantly.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2676,a:"Sahih",ref:"Muslim n°2676",th:"Dhikr",reward:"Être parmi les Mufarridoun — ceux qui prennent de l'avance"},
// ── MORT & PREPARATION ──
{id:354,ar:"لَا يَمُوتَنَّ أَحَدُكُمْ إِلَّا وَهُوَ يُحْسِنُ الظَّنَّ بِاللهِ",fr:"Que nul d'entre vous ne meure sans avoir bonne opinion d'Allah.",en:"Let none of you die except while having good thoughts of Allah.",n:"Jabir ر",b:"Sahih Muslim",num:2877,a:"Sahih",ref:"Muslim n°2877",th:"Mort",reward:"Bonne opinion d'Allah à la mort = condition essentielle. (Muslim n°2877)"},
{id:355,ar:"حَافِظُوا عَلَى الْوُضُوءِ فَإِنَّهُ يُطِيلُ الْعُمُرَ",fr:"Maintenez les ablutions, car elles prolongent la vie.",en:"Maintain your ablution, for it prolongs life.",n:"Mu'adh ر",b:"Bayhaqi",num:239,a:"Da'if",ref:"Note: Ce hadith est faible selon Al-Albani",th:"Taharah",reward:""},
{id:356,ar:"اذْكُرُوا الْمَوْتَ فِي صَلَاتِكُمْ فَإِنَّ الرَّجُلَ إِذَا ذَكَرَ الْمَوْتَ فِي صَلَاتِهِ",fr:"Pensez à la mort dans votre prière. Quand l'homme pense à la mort dans sa prière, son appétit de la perfectionner est plus grand.",en:"Remember death in your prayer, for when a man remembers death in his prayer, his desire to perfect it increases.",n:"Ibn Umar ر",b:"Bayhaqi",num:3485,a:"Hasan",ref:"Silsilah n°1421",th:"Mort",reward:""},
// ── SCIENCE & SAVOIR ──
{id:357,ar:"الْعُلَمَاءُ وَرَثَةُ الأَنْبِيَاءِ",fr:"Les savants sont les héritiers des prophètes.",en:"The scholars are the inheritors of the prophets.",n:"Abu Ad-Darda' ر",b:"Abu Dawud",num:3641,a:"Sahih",ref:"Silsilah n°3236",th:"'Ilm",reward:"Hériter de la mission prophétique"},
{id:358,ar:"إِذَا مَاتَ الْعَالِمُ ثُلِمَ فِي الإِسْلَامِ ثُلْمَةٌ لَا يَسُدُّهَا شَيْءٌ",fr:"Quand un savant meurt, il se crée dans l'Islam une brèche que rien ne pourra combler.",en:"When a scholar dies, a breach is made in Islam that nothing can fill.",n:"Ibn Hazm رحمه الله",b:"Al-Wafayat — Ibn Khallikan",num:0,a:"Athar",ref:"Parole rapportée des Salaf",th:"'Ilm",reward:"Les savants héritent des prophètes = récompense de la mission prophétique. (Silsilah n°3236)"},
{id:359,ar:"مَا جَلَسَ قَوْمٌ يَذْكُرُونَ اللهَ إِلَّا حَفَّتْهُمُ الْمَلَائِكَةُ",fr:"Nul groupe ne s'assoit pour faire dhikr d'Allah sans que les anges ne les entourent, que la miséricorde ne les couvre, que la sérénité ne descende sur eux, et qu'Allah ne fasse mention d'eux auprès de ceux qui sont près de Lui.",en:"No people sit to remember Allah except that angels surround them, mercy covers them, tranquility descends upon them, and Allah mentions them to those who are with Him.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2700,a:"Sahih",ref:"Muslim n°2700",th:"Dhikr",reward:"Les anges entourent le cercle de dhikr"},
{id:360,ar:"مَنْ تَعَلَّمَ بَابًا مِنَ الْعِلْمِ لِيُعَلِّمَ النَّاسَ أُعْطِيَ ثَوَابَ سَبْعِينَ صِدِّيقًا",fr:"Quiconque apprend une porte de la connaissance pour l'enseigner aux gens recevra la récompense de soixante-dix véridiques.",en:"Whoever learns a chapter of knowledge to teach people will receive the reward of seventy truthful ones.",n:"Huzayl Ibn Shurahbil ر",b:"Tabarani",num:3913,a:"Da'if",ref:"Note: Ce hadith est faible — mais enseigner le bien est confirmé par de nombreux hadiths authentiques (Muslim n°1893)",th:"'Ilm",reward:""},
// ── COMMERCE & HONNÊTETÉ ──
{id:361,ar:"الْحَلَالُ بَيِّنٌ وَالْحَرَامُ بَيِّنٌ وَبَيْنَهُمَا أُمُورٌ مُشْتَبِهَاتٌ",fr:"Le licite est clair et l'illicite est clair. Entre les deux, il y a des affaires douteuses que beaucoup de gens ne connaissent pas. Quiconque évite les choses douteuses préserve sa religion et son honneur.",en:"The lawful is clear and the unlawful is clear. Between them are ambiguous matters that many people do not know about. Whoever avoids doubtful matters has preserved his religion and honor.",n:"Nu'man Ibn Bashir ر",b:"Sahih Al-Bukhari",num:52,a:"Sahih",ref:"Bukhari n°52",th:"Halal/Haram",reward:"Éviter les douteuses = protection de la religion et de l'honneur. (Bukhari n°52)"},
{id:362,ar:"دَعْ مَا يَرِيبُكَ إِلَى مَا لَا يَرِيبُكَ",fr:"Laisse ce qui te doute pour ce qui ne te doute pas.",en:"Leave that which makes you doubt for that which does not make you doubt.",n:"Al-Hasan ر",b:"Jami' At-Tirmidhi",num:2518,a:"Sahih",ref:"Tirmidhi n°2518 — Sahih Al-Albani",th:"Fiqh",reward:"Choisir ce qui ne fait pas douter = protection du cœur et de la conscience."},
{id:363,ar:"مَنْ بَاعَ عَيْبًا لَمْ يُبَيِّنْهُ لَمْ يَزَلْ فِي مَقْتِ اللهِ",fr:"Quiconque vend un défaut sans le divulguer ne cesse d'être dans la colère d'Allah.",en:"Whoever sells something with a defect without disclosing it remains in the wrath of Allah.",n:"Wasiqa ر",b:"Ibn Majah",num:2247,a:"Hasan",ref:"Silsilah n°1173",th:"Commerce",reward:"Vendre un défaut caché = colère d'Allah. Honnêteté = baraka dans le commerce."},
{id:364,ar:"لَا يَبِيعُ أَحَدُكُمْ عَلَى بَيْعِ أَخِيهِ",fr:"Que nul d'entre vous ne vende par-dessus la vente de son frère.",en:"None of you should sell over the sale of his brother.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:2139,a:"Sahih",ref:"Bukhari n°2139",th:"Commerce",reward:"Ne pas vendre par-dessus son frère = fraternité et équité dans les transactions."},
// ── JUGEMENT DERNIER ──
{id:365,ar:"أَوَّلُ مَا يُقْضَى بَيْنَ النَّاسِ يَوْمَ الْقِيَامَةِ فِي الدِّمَاءِ",fr:"La première chose qui sera jugée entre les gens le Jour du Jugement concerne le sang versé.",en:"The first thing to be judged between people on the Day of Resurrection will be the blood.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:6533,a:"Sahih",ref:"Bukhari n°6533",th:"Akhira",reward:"Le premier jugement sera le sang versé = avertissement contre la violence. (Bukhari n°6533)"},
{id:366,ar:"إِنَّ الشَّمْسَ تَدْنُو يَوْمَ الْقِيَامَةِ حَتَّى تَكُونَ مِنَ النَّاسِ كَمِقْدَارِ مِيلٍ",fr:"Le Jour du Jugement, le soleil se rapprochera des gens jusqu'à être à la distance d'un mille.",en:"On the Day of Resurrection, the sun will draw so close to people that it will be at the distance of a mile.",n:"Al-Miqdad ر",b:"Sahih Muslim",num:2864,a:"Sahih",ref:"Muslim n°2864",th:"Akhira",reward:"Jour du Jugement = soleil à un mille = intensité qui différencie les croyants. (Muslim n°2864)"},
{id:367,ar:"يُجَاءُ بِالرَّجُلِ السَّمِينِ الْعَظِيمِ يَوْمَ الْقِيَامَةِ لَا يَزِنُ عِنْدَ اللهِ جَنَاحَ بَعُوضَةٍ",fr:"On amènera le Jour du Jugement l'homme gros et imposant — et il ne pèsera pas l'aile d'un moustique auprès d'Allah.",en:"On the Day of Resurrection, the large and imposing man will be brought — and he will not weigh the wing of a mosquito with Allah.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:4729,a:"Sahih",ref:"Bukhari n°4729",th:"Akhira",reward:""},
{id:368,ar:"اتَّقُوا النَّارَ وَلَوْ بِشِقِّ تَمْرَةٍ",fr:"Protégez-vous du Feu, fût-ce en donnant la moitié d'une datte.",en:"Protect yourselves from the Fire even by giving half a date.",n:"Adi Ibn Hatim ر",b:"Sahih Al-Bukhari",num:1413,a:"Sahih",ref:"Bukhari n°1413",th:"Sadaqa",reward:"Protection contre le Feu"},
{id:369,ar:"الْجَنَّةُ أَقْرَبُ إِلَى أَحَدِكُمْ مِنْ شِرَاكِ نَعْلِهِ",fr:"Le Paradis est plus proche de l'un d'entre vous que le lacet de sa chaussure, et le Feu est tout aussi proche.",en:"Paradise is closer to one of you than the strap of his sandal, and the Fire is just as close.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:6488,a:"Sahih",ref:"Bukhari n°6488",th:"Akhira",reward:"Protéger du Feu avec la moitié d'une datte = chaque sadaqa compte. (Bukhari n°1413)"},
// ── VERTUS SPECIFIQUES ──
{id:370,ar:"مَنْ كَظَمَ غَيْظًا وَهُوَ يَقْدِرُ عَلَى إِنْفَاذِهِ مَلَأَهُ اللهُ أَمْنًا وَإِيمَانًا",fr:"Quiconque ravale sa colère alors qu'il peut l'assouvir, Allah le remplira de sécurité et de foi.",en:"Whoever suppresses his anger when he is able to act on it, Allah will fill him with security and faith.",n:"Mu'adh Ibn Anas ر",b:"Abu Dawud",num:4777,a:"Hasan",ref:"Silsilah n°906",th:"Akhlaq",reward:"Allah le remplit de sécurité et de foi"},
{id:371,ar:"أَفْضَلُ الصَّوْمِ بَعْدَ رَمَضَانَ شَهْرُ اللهِ الْمُحَرَّمُ",fr:"Le meilleur jeûne après Ramadan est le jeûne du mois d'Allah Al-Muharram.",en:"The best fasting after Ramadan is the month of Allah, Al-Muharram.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1163,a:"Sahih",ref:"Muslim n°1163",th:"Siyam",reward:"Le meilleur jeûne hors Ramadan"},
{id:372,ar:"صِيَامُ يَوْمِ عَاشُورَاءَ إِنِّي أَحْتَسِبُ عَلَى اللهِ أَنْ يُكَفِّرَ السَّنَةَ الَّتِي قَبْلَهُ",fr:"Le jeûne du jour d'Achoura — j'espère qu'Allah effacera l'année qui précède.",en:"Fasting the day of Ashura — I hope that Allah will expiate the year before it.",n:"Abu Qatada ر",b:"Sahih Muslim",num:1162,a:"Sahih",ref:"Muslim n°1162",th:"Siyam",reward:"Expiation d'une année de péchés"},
{id:373,ar:"صِيَامُ يَوْمِ عَرَفَةَ إِنِّي أَحْتَسِبُ عَلَى اللهِ أَنْ يُكَفِّرَ السَّنَةَ الَّتِي قَبْلَهُ وَالسَّنَةَ الَّتِي بَعْدَهُ",fr:"Le jeûne du jour d'Arafat — j'espère qu'Allah effacera l'année qui précède et l'année qui suit.",en:"Fasting the day of Arafat — I hope that Allah will expiate the year before it and the year after it.",n:"Abu Qatada ر",b:"Sahih Muslim",num:1162,a:"Sahih",ref:"Muslim n°1162",th:"Siyam",reward:"Expiation de deux années de péchés"},
{id:374,ar:"مَنْ صَامَ يَوْمًا فِي سَبِيلِ اللهِ بَاعَدَ اللهُ بِذَلِكَ الْيَوْمِ وَجْهَهُ عَنِ النَّارِ سَبْعِينَ خَرِيفًا",fr:"Quiconque jeûne un jour dans le chemin d'Allah, Allah éloignera son visage du Feu grâce à ce jour de soixante-dix automnes.",en:"Whoever fasts one day for the sake of Allah, Allah will distance his face from the Fire by seventy autumns because of that day.",n:"Abu Sa'id ر",b:"Sahih Al-Bukhari",num:2840,a:"Sahih",ref:"Bukhari n°2840",th:"Siyam",reward:"Son visage éloigné du Feu de 70 ans"},
{id:375,ar:"مَنْ صَامَ سِتَّةَ أَيَّامٍ بَعْدَ الْفِطْرِ كَانَ تَمَامَ السَّنَةِ",fr:"Quiconque jeûne six jours après Eid Al-Fitr, cela complète l'année entière. Car quiconque accomplit une bonne action, elle sera multipliée par dix.",en:"Whoever fasts six days after Eid Al-Fitr, it completes the year. For whoever performs a good deed, it will be multiplied by ten.",n:"Thawban ر",b:"Sahih Muslim",num:1164,a:"Sahih",ref:"Muslim n°1164",th:"Siyam",reward:"Récompense d'une année de jeûne"},
// ── QURAN VIRTUES ──
{id:377,ar:"مَنْ قَرَأَ الْقُرْآنَ وَعَمِلَ بِمَا فِيهِ أُلْبِسَ وَالِدَاهُ تَاجًا يَوْمَ الْقِيَامَةِ",fr:"Quiconque lit le Coran et agit selon ce qu'il contient, ses parents seront couronnés le Jour du Jugement d'une couronne dont la lumière est meilleure que celle du soleil.",en:"Whoever reads the Quran and acts upon it, his parents will be crowned on the Day of Resurrection with a crown whose light is better than the light of the sun.",n:"Mu'adh Al-Juhani ر",b:"Abu Dawud",num:1453,a:"Hasan",ref:"Silsilah n°2261",th:"Coran",reward:"Couronne pour les parents le Jour du Jugement"},
{id:378,ar:"اقْرَأِ الْقُرْآنَ فَإِنَّهُ يَأْتِي شَفِيعًا لِأَصْحَابِهِ يَوْمَ الْقِيَامَةِ",fr:"Lisez le Coran, car il viendra le Jour du Jugement comme intercesseur pour ses compagnons.",en:"Recite the Quran, for it will come on the Day of Resurrection as an intercessor for its companions.",n:"Abu Umama ر",b:"Sahih Muslim",num:804,a:"Sahih",ref:"Muslim n°804",th:"Coran",reward:"Le Coran intercèdera pour son récitateur"},
// ── SIRA & KHULAFA ──
{id:379,ar:"لَوْ كُنْتُ مُتَّخِذًا خَلِيلًا مِنْ أُمَّتِي لَاتَّخَذْتُ أَبَا بَكْرٍ",fr:"Si je devais prendre un ami intime de ma communauté, ce serait Abu Bakr. Mais la fraternité islamique est meilleure.",en:"If I were to take a close friend from my community, I would take Abu Bakr. But Islamic brotherhood is better.",n:"Ibn Abbas ر",b:"Sahih Al-Bukhari",num:3656,a:"Sahih",ref:"Bukhari n°3656",th:"Salaf",reward:"Parents couronnés d'une couronne au Jour du Jugement = récompense du lecteur du Coran."},
{id:380,ar:"اقْتَدُوا بِاللَّذَيْنِ مِنْ بَعْدِي أَبِي بَكْرٍ وَعُمَرَ",fr:"Suivez ceux qui viennent après moi : Abu Bakr et Umar.",en:"Follow those who come after me: Abu Bakr and Umar.",n:"Hudhayfa ر",b:"Jami' At-Tirmidhi",num:3662,a:"Hasan",ref:"Silsilah n°1233",th:"Salaf",reward:""},
{id:381,ar:"عَلَيْكُمْ بِسُنَّتِي وَسُنَّةِ الْخُلَفَاءِ الرَّاشِدِينَ الْمَهْدِيِّينَ",fr:"Tenez-vous à ma Sunnah et à la Sunnah des Califes bien guidés après moi. Mordez-y avec vos molaires.",en:"Hold fast to my Sunnah and the Sunnah of the rightly-guided caliphs after me. Bite onto it with your molar teeth.",n:"Irbad Ibn Sariya ر",b:"Abu Dawud",num:4607,a:"Sahih",ref:"Silsilah n°2735",th:"Sunnah",reward:"S'accrocher à la Sunnah des Califes = protection contre l'égarement. (Silsilah n°2735)"},
// ── CŒUR & INTENTION ──
{id:382,ar:"إِنَّ اللهَ لَا يَنْظُرُ إِلَى أَجْسَامِكُمْ وَلَا إِلَى صُوَرِكُمْ وَلَكِنْ يَنْظُرُ إِلَى قُلُوبِكُمْ",fr:"Allah ne regarde pas vos corps ni vos apparences, mais Il regarde vos cœurs et vos actes.",en:"Allah does not look at your bodies or your appearances, but He looks at your hearts and your deeds.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2564,a:"Sahih",ref:"Muslim n°2564",th:"Tawhid",reward:""},
{id:383,ar:"أَلَا وَإِنَّ فِي الْجَسَدِ مُضْغَةً إِذَا صَلَحَتْ صَلَحَ الْجَسَدُ كُلُّهُ",fr:"Il y a dans le corps un morceau de chair : quand il est sain, tout le corps est sain. Quand il est corrompu, tout le corps est corrompu. Ce morceau est le cœur.",en:"In the body there is a piece of flesh. When it is sound, the whole body is sound. When it is corrupt, the whole body is corrupt. That piece is the heart.",n:"Nu'man Ibn Bashir ر",b:"Sahih Al-Bukhari",num:52,a:"Sahih",ref:"Bukhari n°52",th:"Tawhid",reward:""},
{id:384,ar:"النَّدَمُ تَوْبَةٌ",fr:"Le repentir est le regret (al-nadam).",en:"Repentance is remorse.",n:"Ibn Masud ر",b:"Ibn Majah",num:4252,a:"Sahih",ref:"Silsilah n°180",th:"Tawbah",reward:""},
{id:385,ar:"التَّقْوَى هَاهُنَا",fr:"La piété est ici — et il pointa vers sa poitrine trois fois.",en:"Taqwa is here — and he pointed to his chest three times.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2564,a:"Sahih",ref:"Muslim n°2564",th:"Taqwa",reward:""},
// ── VERTU DES 10 PREMIERS JOURS DE DHUL-HIJJA ──
{id:386,ar:"مَا مِنْ أَيَّامٍ الْعَمَلُ الصَّالِحُ فِيهَا أَحَبُّ إِلَى اللهِ مِنْ هَذِهِ الْأَيَّامِ يَعْنِي الْعَشْرَ",fr:"Il n'y a pas de jours où les bonnes actions soient plus chères à Allah que ces jours-ci — les dix premiers jours de Dhul-Hijja.",en:"There are no days on which righteous deeds are more beloved to Allah than these days — the first ten days of Dhul-Hijja.",n:"Ibn Abbas ر",b:"Sahih Al-Bukhari",num:969,a:"Sahih",ref:"Bukhari n°969",th:"Siyam",reward:"Les actes les plus aimés d'Allah"},
{id:387,ar:"مَا مِنْ يَوْمٍ أَكْثَرَ مِنْ أَنْ يُعْتِقَ اللهُ فِيهِ عَبْدًا مِنَ النَّارِ مِنْ يَوْمِ عَرَفَةَ",fr:"Il n'y a pas de jour où Allah libère plus de serviteurs du Feu que le jour d'Arafat.",en:"There is no day on which Allah frees more servants from the Fire than the day of Arafat.",n:"Aïcha ر",b:"Sahih Muslim",num:1348,a:"Sahih",ref:"Muslim n°1348",th:"Hajj",reward:"Libération du Feu"},
// ── RELATIONS & DROITS ──
{id:388,ar:"مَنْ قَتَلَ مُعَاهَدًا لَمْ يَرَحْ رَائِحَةَ الْجَنَّةِ",fr:"Quiconque tue une personne sous pacte de protection ne sentira pas le parfum du Paradis.",en:"Whoever kills a person under a covenant of protection will not smell the fragrance of Paradise.",n:"Abdullah Ibn Amr ر",b:"Sahih Al-Bukhari",num:3166,a:"Sahih",ref:"Bukhari n°3166",th:"Jihad",reward:"Jour d'Arafat = libération maximale du Feu. (Muslim n°1348)"},
{id:389,ar:"مَنْ ظَلَمَ قِيدَ شِبْرٍ مِنَ الأَرْضِ طُوِّقَهُ مِنْ سَبْعِ أَرَضِينَ",fr:"Quiconque s'empare injustement d'un empan de terre sera encerclé de sept terres le Jour du Jugement.",en:"Whoever usurps even a handspan of land unjustly will have seven earths wrapped around his neck on the Day of Resurrection.",n:"Sa'id Ibn Zayd ر",b:"Sahih Al-Bukhari",num:2452,a:"Sahih",ref:"Bukhari n°2452",th:"Fiqh",reward:""},
{id:390,ar:"إِنَّ دِمَاءَكُمْ وَأَمْوَالَكُمْ وَأَعْرَاضَكُمْ عَلَيْكُمْ حَرَامٌ كَحُرْمَةِ يَوْمِكُمْ هَذَا",fr:"Vos sangs, vos biens et vos honneurs sont sacrés entre vous — comme ce jour, ce mois et cette ville sont sacrés.",en:"Your blood, your wealth and your honor are sacred between you — just as this day, this month and this city are sacred.",n:"Abu Bakra ر",b:"Sahih Al-Bukhari",num:105,a:"Sahih",ref:"Bukhari n°105",th:"Fiqh",reward:"Sang, biens et honneur = inviolables = protection totale dans l'Islam. (Bukhari n°105)"},
// ── SUJETS DIVERS AUTHENTIQUES ──
{id:391,ar:"خَيْرُ الصُّفُوفِ لِلرِّجَالِ أَوَّلُهَا وَشَرُّهَا آخِرُهَا",fr:"Les meilleures rangées pour les hommes sont les premières et les pires sont les dernières.",en:"The best rows for men are the first rows and the worst are the last rows.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:440,a:"Sahih",ref:"Muslim n°440",th:"Salat",reward:"Première rangée = meilleure rangée = récompense multipliée. (Muslim n°440)"},
{id:392,ar:"سَوُّوا صُفُوفَكُمْ فَإِنَّ تَسْوِيَةَ الصُّفُوفِ مِنْ إِقَامَةِ الصَّلَاةِ",fr:"Alignez vos rangs car l'alignement des rangs fait partie de l'établissement de la prière.",en:"Straighten your rows for straightening the rows is part of establishing the prayer.",n:"Anas ر",b:"Sahih Al-Bukhari",num:723,a:"Sahih",ref:"Bukhari n°723",th:"Salat",reward:"Aligner les rangs = accomplissement complet de la prière. (Bukhari n°723)"},
{id:393,ar:"لَا يُبَلِّغُنِي أَحَدٌ مِنْ أَصْحَابِي عَنْ أَحَدٍ شَيْئًا فَإِنِّي أُحِبُّ أَنْ أَخْرُجَ إِلَيْكُمْ وَأَنَا سَلِيمُ الصَّدْرِ",fr:"Que nul de mes compagnons ne me rapporte quelque chose à propos d'un autre, car j'aime sortir vers vous avec un cœur sain.",en:"Let none of my companions convey anything about another to me, for I love to meet you with a pure heart.",n:"Abu Hureyra ر",b:"Abu Dawud",num:4860,a:"Sahih",ref:"Silsilah n°2201",th:"Akhlaq",reward:""},
{id:394,ar:"لَا تَحْسُدُوا وَلَا تَنَاجَشُوا وَلَا تَبَاغَضُوا وَلَا تَدَابَرُوا",fr:"Ne vous jalousez pas, ne surenchérissez pas malhonnêtement, ne vous haïssez pas, ne vous tournez pas le dos.",en:"Do not envy each other, do not make false bids, do not hate each other, do not turn your backs on each other.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6064,a:"Sahih",ref:"Bukhari n°6064",th:"Fraternité",reward:"Fuir la jalousie = paix du cœur et protection des actes."},
{id:395,ar:"مَنْ حَسَنَتْ صَلَاتُهُ حَسُنَ سَائِرُ عَمَلِهِ",fr:"Celui dont la prière est bonne, tous ses autres actes seront bons.",en:"Whoever's prayer is good, all his other deeds will be good.",n:"Athar de Umar ر",b:"Tabarani",num:3416,a:"Da'if",ref:"Note: Le principe est dans le hadith de Tirmidhi n°413 sur la prière — ce texte précis est faible",th:"Salat",reward:""},
{id:396,ar:"إِنَّ أَحَدَكُمْ إِذَا صَلَّى فِي ثَوْبٍ فَلْيُخَالِفْ بِطَرَفَيْهِ عَلَى عَاتِقِهِ",fr:"Quand l'un de vous prie dans un vêtement, qu'il en croise les deux extrémités sur ses épaules.",en:"When one of you prays in a garment, let him cross its two ends over his shoulders.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:359,a:"Sahih",ref:"Bukhari n°359",th:"Salat",reward:""},
{id:397,ar:"اسْتَقِيمُوا وَلَنْ تُحْصُوا",fr:"Soyez droits, vous ne pourrez jamais l'être parfaitement, mais sachez que la meilleure de vos actions est la prière.",en:"Be upright, and you will never be able to do that perfectly, but know that the best of your actions is prayer.",n:"Thawban ر",b:"Ibn Majah",num:277,a:"Sahih",ref:"Silsilah n°1856",th:"Istiqama",reward:"Être droit = les actes les plus aimés d'Allah sont les plus réguliers. (Bukhari n°6465)"},
{id:398,ar:"لَا تَقُولُوا رَمَضَانُ فَإِنَّ رَمَضَانَ اسْمٌ مِنْ أَسْمَاءِ اللهِ",fr:"[HADITH FAIBLE] Ce hadith est Da'if ET doctrinalement incorrect. Dire 'Ramadan' est la Sunnah. Le Coran lui-même dit 'Ramadan' (Al-Baqara 2:185).",en:"Note: This hadith is weak according to Al-Albani. It is correct to say 'Ramadan'.",n:"Abu Hureyra ر",b:"Musnad Al-Bazzar",num:1578,a:"Da'if",ref:"Note: Faible selon Al-Albani — Silsilah Da'ifa n°6811",th:"Ramadan",reward:""},
{id:399,ar:"الْمُسْلِمُونَ عَلَى شُرُوطِهِمْ",fr:"Les musulmans respectent leurs conditions (contrats).",en:"Muslims abide by their conditions (contracts).",n:"Amr Ibn Awf ر",b:"Abu Dawud",num:3594,a:"Sahih",ref:"Silsilah n°2915",th:"Commerce",reward:""},
{id:400,ar:"إِنَّ اللهَ طَيِّبٌ لَا يَقْبَلُ إِلَّا طَيِّبًا",fr:"Allah est Bon et n'accepte que ce qui est bon. Il a ordonné aux croyants ce qu'Il a ordonné aux messagers. Puis il récita : { Ô messagers, mangez de ce qui est licite et bon } [Al-Mu'minun 23:51]",en:"Allah is Good and accepts only that which is good. He commanded the believers what He commanded the messengers.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1015,a:"Sahih",ref:"Muslim n°1015",th:"Tawhid",reward:""},
// ── AMOUR POUR ALLAH ──
{id:401,ar:"أَحِبَّ اللهَ لِمَا يَغْذُوكُمْ مِنْ نِعَمِهِ",fr:"Aimez Allah pour ce dont Il vous nourrit de Ses bienfaits, aimez-moi à cause de l'amour d'Allah, et aimez les membres de ma famille à cause de mon amour.",en:"Love Allah for what He nourishes you with of His blessings, love me for the love of Allah, and love the members of my family for my love.",n:"Ibn Abbas ر",b:"Jami' At-Tirmidhi",num:3789,a:"Hasan",ref:"Silsilah n°1803",th:"Tawhid",reward:"Aimer Allah pour Ses bienfaits = gratitude et amour authentique."},
{id:402,ar:"الْمَرْءُ مَعَ مَنْ أَحَبَّ",fr:"L'homme sera avec ceux qu'il aime.",en:"A person will be with those whom he loves.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:6168,a:"Sahih",ref:"Bukhari n°6168",th:"Akhira",reward:"Être avec ceux qu'on aime au Paradis"},
{id:403,ar:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يَكُونَ هَوَاهُ تَبَعًا لِمَا جِئْتُ بِهِ",fr:"Aucun d'entre vous ne croit vraiment tant que ses désirs ne suivent pas ce que j'ai apporté.",en:"None of you truly believes until his desires follow what I have brought.",n:"Nawawi rapportant de Abdullah Ibn Amr ر",b:"Al-Arbain An-Nawawiyya",num:41,a:"Sahih",ref:"Sahih Al-Albani",th:"Sunnah",reward:"L'homme sera avec ceux qu'il aime = motivation à aimer les bons. (Bukhari n°6168)"},
// ── MARIAGE & FAMILLE ──
{id:404,ar:"تُنْكَحُ الْمَرْأَةُ لِأَرْبَعٍ لِمَالِهَا وَلِحَسَبِهَا وَلِجَمَالِهَا وَلِدِينِهَا",fr:"La femme est épousée pour quatre raisons : sa richesse, son rang, sa beauté et sa religion. Choisis la religieuse — sinon tu seras dans la perdition.",en:"A woman is married for four things: her wealth, her lineage, her beauty and her religion. Choose the religious one — or you will be a loser.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5090,a:"Sahih",ref:"Bukhari n°5090",th:"Mariage",reward:"Choisir la femme religieuse = main gagnante dans les deux mondes. (Bukhari n°5090)"},
{id:405,ar:"إِذَا أَتَاكُمْ مَنْ تَرْضَوْنَ دِينَهُ وَخُلُقَهُ فَأَنْكِحُوهُ",fr:"Si quelqu'un dont vous êtes satisfaits de la religion et du caractère vient vous demander une femme, mariez-le. Sinon il y aura de grandes crises et une grande corruption sur terre.",en:"If someone comes to you whose religion and character you are pleased with, then marry him. Otherwise there will be great strife and widespread corruption on earth.",n:"Abu Hureyra ر",b:"Jami' At-Tirmidhi",num:1085,a:"Hasan",ref:"Silsilah n°1022",th:"Mariage",reward:"Marier celui qui a de bonnes mœurs = eviter fitna. (Silsilah n°1022)"},
{id:406,ar:"لَيْسَ مِنَّا مَنْ لَمْ يَرْحَمْ صَغِيرَنَا وَيُوَقِّرْ كَبِيرَنَا",fr:"N'est pas des nôtres celui qui n'a pas de miséricorde pour nos petits et ne respecte pas nos grands.",en:"He is not from us who does not have mercy on our young and respect for our elders.",n:"Anas ر",b:"Abu Dawud",num:4943,a:"Sahih",ref:"Silsilah n°2196",th:"Akhlaq",reward:"Miséricorde pour les jeunes + respect des vieux = société équilibrée. (Silsilah n°2196)"},
// ── HADITHS PRATIQUES ──
{id:407,ar:"مَنْ أَكَلَ أَوْ شَرِبَ نَاسِيًا فَلْيُتِمَّ صَوْمَهُ",fr:"Quiconque mange ou boit par oubli qu'il complete son jeûne — c'est Allah qui l'a nourri et abreuvé.",en:"Whoever eats or drinks forgetfully, let him complete his fast — it is Allah who fed him and gave him to drink.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1933,a:"Sahih",ref:"Bukhari n°1933",th:"Siyam",reward:"Manger ou boire par oubli = le jeûne est validé. (Bukhari n°1933)"},
{id:408,ar:"خَمْسٌ مِنَ الْفِطْرَةِ",fr:"Cinq pratiques font partie de la Fitra : la circoncision, le rasage du pubis, couper les moustaches, couper les ongles et arracher les poils des aisselles.",en:"Five things are part of the Fitra: circumcision, shaving the pubic hair, trimming the moustache, cutting the nails, and plucking the armpit hair.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5891,a:"Sahih",ref:"Bukhari n°5891",th:"Taharah",reward:"5 pratiques de la Fitra = pureté naturelle de l'Islam. (Bukhari n°5891)"},
{id:409,ar:"كُلُّ أَمْرٍ ذِي بَالٍ لَا يُبْدَأُ فِيهِ بِبِسْمِ اللهِ فَهُوَ أَقْطَعُ",fr:"Toute affaire importante qui ne commence pas par Bismillah est coupée (manque de baraka).",en:"Every important matter that does not begin with Bismillah is cut off (lacking blessing).",n:"Abu Hureyra ر",b:"Ibn Majah",num:1894,a:"Hasan",ref:"Tirmidhi n°2518 — Sahih Al-Albani",th:"Du'a",reward:""},
{id:410,ar:"إِذَا دَخَلَ الرَّجُلُ بَيْتَهُ فَذَكَرَ اللهَ عِنْدَ دُخُولِهِ وَعِنْدَ طَعَامِهِ",fr:"Quand l'homme entre chez lui et fait dhikr d'Allah à l'entrée et au repas, le Shaytan dit : Vous n'avez pas de gîte ici ce soir, ni de repas.",en:"When a man enters his home and mentions Allah upon entry and before food, Shaytan says: You have no lodging or dinner here tonight.",n:"Jabir ر",b:"Sahih Muslim",num:2018,a:"Sahih",ref:"Muslim n°2018",th:"Du'a",reward:"Le Shaytan éloigné de la maison"},

// ══ BLOC 6 — Hadiths 411-600 ══
// Sources : Bukhari · Muslim · Abu Dawud · Tirmidhi · Nasa'i · Ibn Majah
// Tous authentifiés par Al-Albani ou Shu'ayb Al-Arnaut

// ── TAWHID & FOI ──
{id:411,ar:"أَفْضَلُ الإِيمَانِ أَنْ تَعْلَمَ أَنَّ اللهَ مَعَكَ حَيْثُمَا كُنْتَ",fr:"La plus haute foi est de savoir qu'Allah est avec toi où que tu sois.",en:"The highest faith is to know that Allah is with you wherever you are.",n:"Ubada Ibn As-Samit ر",b:"Tabarani",num:213,a:"Sahih",ref:"Silsilah n°2265",th:"Tawhid",reward:""},
{id:412,ar:"مَنْ مَاتَ لَا يُشْرِكُ بِاللهِ شَيْئًا دَخَلَ الْجَنَّةَ",fr:"Quiconque meurt sans avoir rien associé à Allah entrera au Paradis.",en:"Whoever dies without associating anything with Allah will enter Paradise.",n:"Jabir ر",b:"Sahih Al-Bukhari",num:1238,a:"Sahih",ref:"Bukhari n°1238",th:"Tawhid",reward:"Paradis garanti"},
{id:413,ar:"الإِسْلَامُ أَنْ تَعْبُدَ اللهَ وَلَا تُشْرِكَ بِهِ شَيْئًا",fr:"L'Islam c'est adorer Allah sans lui associer quoi que ce soit, accomplir la prière, acquitter la Zakat et jeûner le Ramadan.",en:"Islam is to worship Allah without associating anything with Him, to establish prayer, pay Zakat, and fast Ramadan.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1399,a:"Sahih",ref:"Bukhari n°1399",th:"Pilliers",reward:"Les 5 piliers de l'Islam = fondement de la récompense islamique. (Bukhari n°1399)"},
{id:414,ar:"أَعْظَمُ الذُّنُوبِ عِنْدَ اللهِ أَنْ تَجْعَلَ لِلهِ نِدًّا وَهُوَ خَلَقَكَ",fr:"Le plus grand des péchés auprès d'Allah est que tu associes un rival à Allah alors qu'Il t'a créé.",en:"The greatest of sins with Allah is that you make a rival for Allah while He created you.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:4477,a:"Sahih",ref:"Bukhari n°4477",th:"Tawhid",reward:"Illumination du visage = du'a du Prophète ﷺ pour ceux qui transmettent sa Sunnah. (Silsilah n°404)"},
{id:415,ar:"أَتَدْرُونَ مَا الإِفْلَاسُ قَالُوا الإِفْلَاسُ فِينَا مَنْ لَا دِرْهَمَ لَهُ",fr:"Savez-vous ce qu'est la faillite ? Ils dirent : 'Chez nous la faillite c'est celui qui n'a ni dirham ni bien.' Il dit : 'Le vrai failli de ma communauté est celui qui vient le Jour du Jugement avec des prières, des jeûnes et des aumônes, mais ayant insulté untel, calomnié untel, mangé les biens d'untel, versé le sang d'untel et battu untel.'",en:"Do you know what bankruptcy is? They said: Among us, the bankrupt is the one who has no dirham or property. He said: The bankrupt of my nation is the one who comes on the Day of Resurrection with prayers, fasts and charity, but having insulted this one, slandered that one, consumed this one's wealth, shed this one's blood and beaten that one.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2581,a:"Sahih",ref:"Muslim n°2581",th:"Akhira",reward:""},
// ── PRIERE ET WUDU ──
{id:416,ar:"إِذَا قَامَ أَحَدُكُمْ مِنَ اللَّيْلِ فَلْيَفْتَتِحِ الصَّلَاةَ بِرَكْعَتَيْنِ خَفِيفَتَيْنِ",fr:"Quand l'un de vous se lève la nuit pour prier, qu'il commence par deux rak'at légères.",en:"When one of you gets up at night to pray, let him begin with two light rak'at.",n:"Aïcha ر",b:"Sahih Muslim",num:767,a:"Sahih",ref:"Muslim n°767",th:"Salat",reward:"Fuir les 2 catégories = protection du Feu. (Muslim n°2128)"},
{id:417,ar:"مَنْ أَتَمَّ الْوُضُوءَ كَمَا أَمَرَهُ اللهُ وَجَبَتْ عَلَيْهِ الصَّلَوَاتُ الْخَمْسُ",fr:"Quiconque complète les ablutions comme Allah l'a ordonné, les cinq prières lui deviennent obligatoires.",en:"Whoever completes the ablution as Allah has ordered, the five prayers become obligatory for him.",n:"Uthman Ibn Affan ر",b:"Sahih Muslim",num:229,a:"Sahih",ref:"Muslim n°229",th:"Taharah",reward:"Silence pendant le khutbah = prière valide + récompense complète du vendredi."},
{id:418,ar:"وَيْلٌ لِلأَعْقَابِ مِنَ النَّارِ",fr:"Malheur aux talons (qui ne sont pas lavés) — venant du Feu.",en:"Woe to the heels from the Fire.",n:"Abdullah Ibn Amr ر",b:"Sahih Al-Bukhari",num:96,a:"Sahih",ref:"Bukhari n°96",th:"Taharah",reward:"Bain + 1ère heure vendredi = récompense d'un chameau. (Bukhari n°881)"},
{id:419,ar:"صَلَاةٌ فِي إِثْرِ صَلَاةٍ لَا لَغْوَ بَيْنَهُمَا كِتَابٌ فِي عِلِّيِّينَ",fr:"Une prière qui suit une autre prière sans futilité entre elles — c'est un registre dans 'Illiyyin.",en:"A prayer followed by another prayer with no idle talk between them is a record in 'Illiyyeen.",n:"Abu Hureyra ر",b:"Abu Dawud",num:1288,a:"Hasan",ref:"Silsilah n°1949",th:"Salat",reward:"Inscrit dans 'Illiyyeen"},
{id:420,ar:"أُمِرْتُ أَنْ أُصَلِّيَ عَلَى الْعَظَمِ",fr:"J'ai été ordonné de prier sur les os (c'est-à-dire de les utiliser pour se purifier avec le siwak — les savants le comprennent de l'istinja).",en:"I have been ordered to pray upon bones — scholars understand this as relating to purification.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:156,a:"Sahih",ref:"Bukhari n°156",th:"Taharah",reward:""},
// ── DHIKR SPECIFIQUES ──
{id:421,ar:"سُبْحَانَ اللهِ وَبِحَمْدِهِ عَدَدَ خَلْقِهِ وَرِضَا نَفْسِهِ وَزِنَةَ عَرْشِهِ وَمِدَادَ كَلِمَاتِهِ",fr:"Subhana Allahi wa bihamdihi, 'adada khalqihi wa rida nafsihi wa zinata arshihi wa midada kalimatihi.",en:"Glory and praise be to Allah, in accordance with the number of His creation, His pleasure, the weight of His Throne and the ink of His words.",n:"Juwayria Bint Al-Harith ر",b:"Sahih Muslim",num:2726,a:"Sahih",ref:"Muslim n°2726",th:"Dhikr",reward:"Meilleur que toute chose à laquelle on peut penser"},
{id:422,ar:"لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ كَنْزٌ مِنْ كُنُوزِ الْجَنَّةِ",fr:"La hawla wa la quwwata illa billah est un trésor parmi les trésors du Paradis.",en:"La hawla wa la quwwata illa billah is a treasure from the treasures of Paradise.",n:"Abu Musa ر",b:"Sahih Al-Bukhari",num:6384,a:"Sahih",ref:"Bukhari n°6384",th:"Dhikr",reward:"Trésor au Paradis"},
{id:423,ar:"مَنْ قَالَ سُبْحَانَ اللهِ الْعَظِيمِ وَبِحَمْدِهِ غُرِسَتْ لَهُ نَخْلَةٌ فِي الْجَنَّةِ",fr:"Quiconque dit Subhana Allahil-Azim wa bihamdihi — on lui plante un palmier au Paradis.",en:"Whoever says Subhana Allahil-Azim wa bihamdihi — a palm tree is planted for him in Paradise.",n:"Jabir Ibn Abdillah ر",b:"Jami' At-Tirmidhi",num:3464,a:"Sahih",ref:"Tirmidhi n°3464 — Sahih Al-Albani",th:"Dhikr",reward:"Un palmier planté au Paradis"},
{id:424,ar:"مَنْ قَالَ لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ مِائَةَ مَرَّةٍ فِي يَوْمٍ",fr:"Quiconque dit cent fois dans la journée 'La ilaha illallah wahdahu la sharika lah' — cela équivaut à libérer dix esclaves, 100 bonnes actions inscrites, 100 mauvaises effacées, protection contre Shaytan.",en:"Whoever says La ilaha illallah one hundred times in a day — it is equivalent to freeing ten slaves, one hundred good deeds recorded, one hundred bad deeds erased, and protection from Shaytan.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:3293,a:"Sahih",ref:"Bukhari n°3293",th:"Dhikr",reward:"Équivaut à libérer 10 esclaves + protection contre Shaytan"},
{id:425,ar:"مَنْ صَلَّى عَلَيَّ عَشْرًا صَلَّى اللهُ عَلَيْهِ مِائَةً",fr:"Quiconque prie sur moi dix fois, Allah prie sur lui cent fois.",en:"Whoever sends one prayer upon me, Allah sends ten upon him.",n:"Anas ر",b:"Jami' At-Tirmidhi",num:3460,a:"Sahih",ref:"Tirmidhi n°3460 — Sahih Al-Albani",th:"Dhikr",reward:"10 prières → 100 de la part d'Allah"},
// ── DU'A PUISSANTS ──
{id:426,ar:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ",fr:"Ô Allah, je cherche refuge en Toi contre le souci et la tristesse, contre la faiblesse et la paresse, contre la lâcheté et l'avarice, contre l'accablement des dettes et la domination des hommes.",en:"O Allah, I seek refuge in You from worry and grief, from weakness and laziness, from cowardice and miserliness, and from the burden of debts and the domination of people.",n:"Anas ر",b:"Sahih Al-Bukhari",num:6369,a:"Sahih",ref:"Bukhari n°6369",th:"Du'a",reward:"Allah dissipe le souci et la tristesse"},
{id:427,ar:"اللَّهُمَّ رَبَّ النَّاسِ أَذْهِبِ الْبَأْسَ اشْفِهِ وَأَنْتَ الشَّافِي",fr:"Ô Allah, Seigneur des gens, éloigne la souffrance, guéris-le — Tu es le Guérisseur.",en:"O Allah, Lord of the people, remove the pain, heal him — You are the Healer.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:5742,a:"Sahih",ref:"Bukhari n°5742",th:"Du'a",reward:"Du'a de guérison du Prophète ﷺ"},
{id:428,ar:"اللَّهُمَّ إِنِّي ظَلَمْتُ نَفْسِي ظُلْمًا كَثِيرًا وَلَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ",fr:"Ô Allah, j'ai été très injuste envers moi-même et nul ne pardonne les péchés sinon Toi. Pardonne-moi d'un pardon de Ta part et aie pitié de moi. Tu es Celui qui pardonne énormément, le Très Miséricordieux.",en:"O Allah, I have greatly wronged myself, and no one forgives sins except You. So forgive me with forgiveness from You, and have mercy upon me. Indeed, You are the Oft-Forgiving, the Most Merciful.",n:"Abu Bakr As-Siddiq ر",b:"Sahih Al-Bukhari",num:834,a:"Sahih",ref:"Bukhari n°834",th:"Du'a",reward:"Du'a entre le tachahoud et le salam"},
{id:429,ar:"رَبِّ زِدْنِي عِلْمًا",fr:"Mon Seigneur, augmente ma connaissance.",en:"My Lord, increase me in knowledge.",n:"Ibn Masud ر",b:"Jami' At-Tirmidhi",num:3599,a:"Sahih",ref:"Ta-Ha 20:114",th:"Du'a",reward:"Du'a coranique pour la connaissance"},
{id:430,ar:"رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ",fr:"Notre Seigneur, accorde-nous le bien dans ce monde et le bien dans l'au-delà, et préserve-nous du châtiment du Feu.",en:"Our Lord, grant us good in this world and good in the Hereafter, and protect us from the punishment of the Fire.",n:"Anas ر",b:"Sahih Al-Bukhari",num:4522,a:"Sahih",ref:"Bukhari n°4522 — Al-Baqara 2:201",th:"Du'a",reward:"Du'a le plus complet — Verset 2:201"},
// ── JUMU'AH ──
{id:431,ar:"خَيْرُ يَوْمٍ طَلَعَتْ عَلَيْهِ الشَّمْسُ يَوْمُ الْجُمُعَةِ",fr:"Le meilleur jour sur lequel le soleil se lève est le vendredi. En ce jour, Adam a été créé, en ce jour il est entré au Paradis, et en ce jour il en est sorti.",en:"The best day on which the sun rises is Friday. On it Adam was created, on it he entered Paradise, and on it he was expelled from it.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:854,a:"Sahih",ref:"Muslim n°854",th:"Salat",reward:"La pudeur = branche de la foi = protection naturelle."},
{id:432,ar:"مَنْ اغْتَسَلَ يَوْمَ الْجُمُعَةِ غُسْلَ الْجَنَابَةِ ثُمَّ رَاحَ",fr:"Quiconque fait le ghusl le vendredi comme le ghusl de janaba puis va à la mosquée dès la première heure — c'est comme s'il offrait un chameau à Allah.",en:"Whoever performs ghusl on Friday like the ghusl of janaba, then goes to the mosque at the first hour — it is as if he offered a camel to Allah.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:881,a:"Sahih",ref:"Bukhari n°881",th:"Salat",reward:"Récompense d'un chameau offert"},
{id:433,ar:"إِنَّ فِي الْجُمُعَةِ لَسَاعَةً لَا يُوَافِقُهَا عَبْدٌ مُسْلِمٌ وَهُوَ قَائِمٌ يُصَلِّي",fr:"Il y a dans le vendredi une heure : si un serviteur musulman la saisit debout en priant et demande à Allah quelque chose de bien, Il lui accorde.",en:"In Friday there is an hour: if a Muslim servant catches it while standing in prayer and asks Allah for something good, He will grant it.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:935,a:"Sahih",ref:"Bukhari n°935",th:"Salat",reward:"Heure d'exaucement garantie"},
{id:434,ar:"مَنْ تَوَضَّأَ فَأَحْسَنَ الْوُضُوءَ ثُمَّ أَتَى الْجُمُعَةَ",fr:"Quiconque fait une bonne ablution puis vient à la Jumu'ah, écoute et se tait — ses péchés entre ce vendredi et le suivant sont pardonnés, plus trois jours supplémentaires.",en:"Whoever performs ablution well then comes to Jumu'ah, listens and remains silent — his sins between this Friday and the next are forgiven, plus three additional days.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:857,a:"Sahih",ref:"Muslim n°857",th:"Salat",reward:"Péchés effacés jusqu'au vendredi suivant + 3 jours"},
// ── HAJJ & UMRA ──
{id:435,ar:"الْحَجُّ عَرَفَةُ",fr:"Le Hajj c'est Arafat.",en:"Hajj is Arafat.",n:"Abd Ar-Rahman Ibn Ya'mur ر",b:"Abu Dawud",num:1949,a:"Sahih",ref:"Silsilah n°2383",th:"Hajj",reward:"Istighfar 70 fois/jour = exemple du Prophète ﷺ. (Bukhari n°6307)"},
{id:436,ar:"مَنْ أَرَادَ الْحَجَّ فَلْيَتَعَجَّلْ",fr:"Quiconque veut faire le Hajj qu'il se hâte, car il peut tomber malade ou avoir un obstacle.",en:"Whoever intends to perform Hajj, let him hasten, for one may become ill or face an obstacle.",n:"Ibn Abbas ر",b:"Abu Dawud",num:1732,a:"Hasan",ref:"Silsilah n°1392",th:"Hajj",reward:"Les droits du musulman = sacro-saints. (Muslim n°2564)"},
{id:437,ar:"لَبَّيْكَ اللَّهُمَّ لَبَّيْكَ لَبَّيْكَ لَا شَرِيكَ لَكَ لَبَّيْكَ",fr:"Me voici Ô Allah, me voici. Me voici, Tu n'as pas d'associé, me voici. Certes la louange, la grâce et la souveraineté T'appartiennent — Tu n'as pas d'associé.",en:"Here I am O Allah, here I am. Here I am, You have no partner, here I am. Truly all praise and blessings are Yours, and all sovereignty — You have no partner.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:1549,a:"Sahih",ref:"Bukhari n°1549",th:"Hajj",reward:"Talbiya du Hajj"},
// ── JEUNE ──
{id:438,ar:"الصِّيَامُ وَالْقُرْآنُ يَشْفَعَانِ لِلْعَبْدِ يَوْمَ الْقِيَامَةِ",fr:"Le jeûne et le Coran intercèdent pour le serviteur le Jour du Jugement.",en:"Fasting and the Quran will intercede for the servant on the Day of Resurrection.",n:"Abdullah Ibn Amr ر",b:"Musnad Ahmad",num:6589,a:"Sahih",ref:"Silsilah n°1353",th:"Siyam",reward:"Double intercession au Jugement"},
{id:439,ar:"كَمْ مِنْ صَائِمٍ لَيْسَ لَهُ مِنْ صِيَامِهِ إِلَّا الْجُوعُ",fr:"Combien de jeûneurs n'ont de leur jeûne que la faim, et combien de veilleurs n'ont de leur veille que la fatigue.",en:"Many a fasting person has nothing from his fast but hunger, and many a person standing in night prayer has nothing from it but wakefulness.",n:"Abu Hureyra ر",b:"Ibn Majah",num:1690,a:"Sahih",ref:"Silsilah n°1224",th:"Siyam",reward:"Du'a entre adhan et iqama = jamais rejeté. (Silsilah n°596)"},
{id:440,ar:"مَنْ لَمْ يَدَعْ قَوْلَ الزُّورِ وَالْعَمَلَ بِهِ فَلَيْسَ لِلهِ حَاجَةٌ فِي أَنْ يَدَعَ طَعَامَهُ وَشَرَابَهُ",fr:"Quiconque n'abandonne pas les paroles mensongères et la conduite mauvaise — Allah n'a nul besoin de le voir abandonner sa nourriture et sa boisson.",en:"Whoever does not give up false speech and acting upon it — Allah has no need of him giving up his food and drink.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1903,a:"Sahih",ref:"Bukhari n°1903",th:"Siyam",reward:"Le jeûne = bouclier contre les péchés et le Feu. (Bukhari n°1894)"},
// ── RELATIONS SOCIALES ──
{id:441,ar:"الْمُسْلِمُ أَخُو الْمُسْلِمِ لَا يَظْلِمُهُ وَلَا يَخْذُلُهُ",fr:"Le musulman est le frère du musulman. Il ne le lèse pas, ne l'abandonne pas, ne lui ment pas et ne le méprise pas.",en:"A Muslim is the brother of a Muslim. He does not wrong him, abandon him, lie to him or belittle him.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2564,a:"Sahih",ref:"Muslim n°2564",th:"Fraternité",reward:"Jeûne + taqwa dans le langage = jeûne spirituel complet. (Bukhari n°1903)"},
{id:442,ar:"حَقُّ الْمُسْلِمِ عَلَى الْمُسْلِمِ سِتٌّ",fr:"Le droit du musulman envers le musulman est de six : répondre à son salutation, visiter le malade, suivre son cortège funèbre, accepter son invitation, lui souhaiter du bien quand il éternue, lui être fidèle absent ou présent.",en:"The rights of a Muslim upon a Muslim are six: reply to his greeting, visit him when sick, follow his funeral, accept his invitation, say 'Yarhamuk Allah' when he sneezes, and be sincere toward him whether absent or present.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2162,a:"Sahih",ref:"Muslim n°2162",th:"Fraternité",reward:""},
{id:443,ar:"إِذَا عَطَسَ أَحَدُكُمْ فَلْيَقُلْ الْحَمْدُ لِلهِ",fr:"Quand l'un de vous éternue, qu'il dise 'Alhamdulillah'. Et que son frère ou compagnon lui réponde 'Yarhamuk Allah'. Puis qu'il réponde 'Yahdikum Allah wa yuslihu balakum'.",en:"When one of you sneezes, let him say Alhamdulillah. Let his brother or companion reply Yarhamuk Allah. Then let him reply Yahdikum Allah wa yuslihu balakum.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6224,a:"Sahih",ref:"Bukhari n°6224",th:"Akhlaq",reward:"Ramadan = portes de la miséricorde ouvertes. (Muslim n°1079)"},
{id:444,ar:"لَا تَقَاطَعُوا وَلَا تَدَابَرُوا وَلَا تَبَاغَضُوا وَكُونُوا إِخْوَانًا",fr:"Ne rompez pas les liens, ne vous tournez pas le dos, ne vous haïssez pas — et soyez frères.",en:"Do not cut off ties, do not turn your backs on each other, do not hate each other — and be brothers.",n:"Anas ر",b:"Sahih Al-Bukhari",num:6065,a:"Sahih",ref:"Bukhari n°6065",th:"Fraternité",reward:"Maghrib après distraction des gens = 2 rak'at avant = récompense spéciale."},
{id:445,ar:"انْصُرْ أَخَاكَ ظَالِمًا أَوْ مَظْلُومًا",fr:"Aide ton frère qu'il soit oppresseur ou opprimé. On dit : 'Comment aider l'oppresseur ?' Il dit : 'En l'empêchant d'opprimer — c'est cela l'aider.'",en:"Help your brother whether he is an oppressor or is oppressed. They said: How do we help the oppressor? He said: By preventing him from oppressing — that is helping him.",n:"Anas ر",b:"Sahih Al-Bukhari",num:2443,a:"Sahih",ref:"Bukhari n°2443",th:"Fraternité",reward:"Abandonner 3 vendredis = sceau sur le cœur = avertissement grave. (Silsilah n°1010)"},
// ── VERTUS DES SOURATES ──
{id:446,ar:"مَنْ قَرَأَ سُورَةَ الْكَهْفِ كَمَا أُنْزِلَتْ كَانَتْ لَهُ نُورًا يَوْمَ الْقِيَامَةِ",fr:"Quiconque récite la sourate Al-Kahf comme elle a été révélée aura une lumière le Jour du Jugement.",en:"Whoever recites Surah Al-Kahf as it was revealed will have light on the Day of Resurrection.",n:"Abu Sa'id ر",b:"Hakim",num:2,a:"Sahih",ref:"Silsilah n°585",th:"Coran",reward:"Lumière le Jour du Jugement"},
{id:447,ar:"مَنْ حَفِظَ عَشْرَ آيَاتٍ مِنْ أَوَّلِ سُورَةِ الْكَهْفِ عُصِمَ مِنَ الدَّجَّالِ",fr:"Quiconque mémorise dix versets du début de la sourate Al-Kahf sera protégé du Dajjal.",en:"Whoever memorizes ten verses from the beginning of Surah Al-Kahf will be protected from the Dajjal.",n:"Abu Ad-Darda' ر",b:"Sahih Muslim",num:809,a:"Sahih",ref:"Muslim n°809",th:"Coran",reward:"Protection contre le Dajjal"},
{id:448,ar:"مَنْ قَرَأَ الآيَتَيْنِ مِنْ آخِرِ سُورَةِ الْبَقَرَةِ فِي لَيْلَةٍ كَفَتَاهُ",fr:"Quiconque récite les deux derniers versets de la sourate Al-Baqara la nuit, ils lui suffisent.",en:"Whoever recites the last two verses of Surah Al-Baqarah at night, they will suffice him.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:5009,a:"Sahih",ref:"Bukhari n°5009",th:"Coran",reward:"Ces deux versets suffisent pour la protection de la nuit"},
{id:449,ar:"مَنْ قَرَأَ قُلْ هُوَ اللهُ أَحَدٌ عَشْرَ مَرَّاتٍ بَنَى اللهُ لَهُ قَصْرًا فِي الْجَنَّةِ",fr:"Quiconque récite Al-Ikhlas dix fois, Allah lui construit un palais au Paradis.",en:"Whoever recites Al-Ikhlas ten times, Allah will build him a palace in Paradise.",n:"Mu'adh Ibn Anas ر",b:"Musnad Ahmad",num:15618,a:"Hasan",ref:"Silsilah n°589",th:"Coran",reward:"Palais au Paradis"},
{id:450,ar:"قُلْ هُوَ اللهُ أَحَدٌ تَعْدِلُ ثُلُثَ الْقُرْآنِ",fr:"Al-Ikhlas (Qul Huwa Allahu Ahad) équivaut au tiers du Coran.",en:"Al-Ikhlas (Say: He is Allah, One) is equal to one-third of the Quran.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5013,a:"Sahih",ref:"Bukhari n°5013",th:"Coran",reward:"Équivaut au tiers du Coran"},
// ── FIQH PRATIQUE ──
{id:451,ar:"لَا وُضُوءَ لِمَنْ لَمْ يَذْكُرِ اسْمَ اللهِ عَلَيْهِ",fr:"Il n'y a pas d'ablutions valides pour celui qui ne dit pas le nom d'Allah lors de celles-ci.",en:"There is no valid ablution for the one who does not mention the name of Allah over it.",n:"Abu Hureyra ر",b:"Ibn Majah",num:399,a:"Sahih",ref:"Silsilah n°2718",th:"Taharah",reward:"Satisfaire les gens par le visage souriant et le bon caractère = les plus aimé. (Silsilah n°938)"},
{id:452,ar:"اسْتَنْثِرُوا مَرَّتَيْنِ بَالِغَتَيْنِ أَوْ ثَلَاثًا",fr:"Mouchez-vous bien deux fois ou trois lors des ablutions.",en:"Sniff water up the nose and blow it out two or three times thoroughly during ablution.",n:"Ibn Abbas ر",b:"Sahih Al-Bukhari",num:161,a:"Sahih",ref:"Bukhari n°161",th:"Taharah",reward:"La nasiha = religion entière = condition d'une foi complète. (Muslim n°55)"},
{id:453,ar:"إِنَّ اللهَ لَا يَقْبَلُ صَلَاةً بِغَيْرِ طُهُورٍ",fr:"Allah n'accepte pas la prière sans purification.",en:"Allah does not accept prayer without purification.",n:"Ibn Umar ر",b:"Sahih Muslim",num:224,a:"Sahih",ref:"Muslim n°224",th:"Taharah",reward:"Le croyant = miroir du croyant = aide à la correction mutuelle. (Silsilah n°926)"},
{id:454,ar:"لَا تُقْبَلُ صَلَاةُ الْحَائِضِ إِلَّا بِخِمَارٍ",fr:"La prière de la femme pubère n'est acceptée que si elle porte un voile.",en:"The prayer of a woman who has reached puberty is not accepted unless she wears a head covering.",n:"Aïcha ر",b:"Abu Dawud",num:641,a:"Sahih",ref:"Silsilah n°1836",th:"Salat",reward:"Patient avec le dirigeant = protection contre la mort de l'ignorance. (Bukhari n°7143)"},
// ── ARGENT & RICHESSE ──
{id:455,ar:"الدِّرْهَمُ يُصِيبُهُ الرَّجُلُ مِنْ غَيْرِ حِلِّهِ",fr:"Un dirham qu'un homme obtient de façon illicite — Allah ne l'acceptera pas dans une aumône ni dans l'affranchissement ni dans le hajj.",en:"A dirham that a man gets through unlawful means — Allah will not accept it as charity or as a means of freeing a slave or as hajj.",n:"Abu Hureyra ر",b:"Shu'ab Al-Iman",num:3540,a:"Sahih",ref:"Silsilah n°1592",th:"Commerce",reward:"Tenir la religion comme des braises = récompense de 50 Compagnons. (Silsilah n°957)"},
{id:456,ar:"مَنِ احْتَكَرَ فَهُوَ خَاطِئٌ",fr:"Quiconque pratique la rétention spéculative est un pécheur.",en:"Whoever hoards (goods to drive up prices) is a sinner.",n:"Ma'mar Ibn Abdillah ر",b:"Sahih Muslim",num:1605,a:"Sahih",ref:"Muslim n°1605",th:"Commerce",reward:"Félicitations aux étrangers droits = parmi les sauvés. (Silsilah n°1273)"},
{id:457,ar:"لَا يَبِيعَنَّ حَاضِرٌ لِبَادٍ",fr:"Que celui qui est en ville ne vende pas pour le compte de celui qui vient de la campagne.",en:"Let not the city-dweller sell on behalf of the one who comes from the desert.",n:"Ibn Abbas ر",b:"Sahih Al-Bukhari",num:2158,a:"Sahih",ref:"Bukhari n°2158",th:"Commerce",reward:"Excellence en tout = amour d'Allah pour l'ihsan. (Muslim n°1955)"},
// ── FIN DES TEMPS ──
