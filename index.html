const PNAMES = {
  fr:{Fajr:'Fajr',Dhuhr:'Dhuhr',Asr:'Asr',Maghrib:'Maghrib',Isha:"'Ishâ"},
  en:{Fajr:'Fajr',Dhuhr:'Dhuhr',Asr:'Asr',Maghrib:'Maghrib',Isha:'Isha'},
  ar:{Fajr:'الفجر',Dhuhr:'الظهر',Asr:'العصر',Maghrib:'المغرب',Isha:'العشاء'},
};
function pName(k) { return PNAMES[ST.lang]?.[k] || k; }

async function loadPrayer() {
  try {
    let url;
    if (ST.city) {
      const parts = ST.city.split(',');
      const cityName = parts[0]?.trim();
      const countryCode = parts[1]?.trim() || '';
      url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(cityName)}&country=${encodeURIComponent(countryCode)}&method=${ST.calcMethod}`;
      const d = await (await fetch(url)).json();
      if (d.code===200) {
        ST.prayerTimes = d.data.timings; // includes Midnight, Lastthird, Sunrise, Sunset
        ST.prayerCity = ST.city;
        // Cache lat/lng for Qibla
        if (d.data.meta) {
          ST.prayerTimesLat = parseFloat(d.data.meta.latitude);
          ST.prayerTimesLng = parseFloat(d.data.meta.longitude);
        }
        if (ST.tab==='home') renderHome();
        return;
      }
    }
    // Fallback to geolocation
    const pos = await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j,{timeout:7000}));
    url = `https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=${ST.calcMethod}`;
    const d2 = await (await fetch(url)).json();
    if (d2.code===200) {
      ST.prayerTimes = d2.data.timings;
      // Reverse geocode city name from coordinates
      try {
        const geo = await (await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)).json();
        ST.prayerCity = geo.address?.city || geo.address?.town || geo.address?.village || d2.data.meta?.timezone || 'Ma position';
      } catch(e) {
        ST.prayerCity = d2.data.meta?.city || d2.data.meta?.timezone || 'Ma position';
      }
      if (ST.tab==='home') renderHome();
    }
  } catch(e) {
    try {
      const d = await (await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Paris&country=France&method=${ST.calcMethod}`)).json();
      if (d.code===200) { ST.prayerTimes=d.data.timings; ST.prayerCity='Paris'; if(ST.tab==='home')renderHome(); }
    } catch(e2) {}
  }
}

function getNextPrayer() {
  if (!ST.prayerTimes) return {key:'Fajr',time:'--:--',idx:0};
  const ps = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const nm = new Date().getHours()*60+new Date().getMinutes();
  for (let i=0;i<ps.length;i++) {
    const [h,m] = ST.prayerTimes[ps[i]].split(':').map(Number);
    if (h*60+m > nm) return {key:ps[i],time:ST.prayerTimes[ps[i]],idx:i};
  }
  return {key:'Fajr',time:ST.prayerTimes['Fajr'],idx:0};
}

function go(tab) {
  if (ST.tab==='quran' && ST.qView==='list') {
    ST.qScrollPos = document.getElementById('cnt').scrollTop;
  }
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  document.getElementById('nb-'+tab).classList.add('on');
  document.getElementById('cnt').scrollTop = 0;
  ST.tab = tab;
  if (tab==='home') renderHome();
  else if (tab==='quran' && ST.qView==='list') renderQuranList();
  else if (tab==='quran' && ST.qView==='surah') renderSurah();
  else if (tab==='hadith') renderHadith();
  else if (tab==='adhkar') renderAdhkar();
  else if (tab==='more') renderMore();
}

function updateThemePanel() {
  // Update swatches without closing panel
  document.querySelectorAll('.theme-swatch-color').forEach(el=>{
    const id = el.id?.replace('tsw-','');
    if (id) el.classList.toggle('on', ST.theme===id);
  });
  document.querySelectorAll('.theme-swatch-label').forEach(el=>{
    const id = el.id?.replace('tsl-','');
    if (id) el.classList.toggle('on', ST.theme===id);
  });
}

// ═══════════════════════════════
// DRAG TO CLOSE
// ═══════════════════════════════
function setupDragClose(handleId, wrapId, onClose) {
  const handle = document.getElementById(handleId);
  const wrap = document.getElementById(wrapId);
  if (!handle && !wrap) return;
  const dragEl = wrap || handle; // drag zone is the wrap (larger area)
  let startY = 0, currentY = 0, isDragging = false;
  const sheet = (wrap||handle).closest('.modal-sheet, .theme-panel-sheet');
  if (!sheet) return;

  dragEl.addEventListener('touchstart', e=>{
    startY = e.touches[0].clientY;
    currentY = 0;
    isDragging = true;
    sheet.style.transition = 'none';
  }, {passive:true});

  document.addEventListener('touchmove', e=>{
    if (!isDragging) return;
    currentY = e.touches[0].clientY - startY;
    if (currentY > 0) sheet.style.transform = `translateY(${currentY}px)`;
  }, {passive:true});

  const endHandler = () => {
    if (!isDragging) return;
    isDragging = false;
    sheet.style.transition = 'transform .3s cubic-bezier(.32,.72,0,1)';
    if (currentY > 60) {
      sheet.style.transform = 'translateY(100%)';
      setTimeout(onClose, 280);
    } else {
      sheet.style.transform = 'translateY(0)';
    }
    currentY = 0;
  };
  document.addEventListener('touchend', endHandler);
  document.addEventListener('touchcancel', endHandler);
}

  if (sheet) sheet.addEventListener('scroll',()=>{_settingsScroll=sheet.scrollTop;},{passive:true});
}

// ─── NO-CLOSE SETTERS (update in-place without closing modal) ───
function setLangNoClose(l) {
  ST.lang=l; savePref();
  // Update html lang attribute for proper RTL/LTR
  document.documentElement.lang = l;
  document.documentElement.dir = l==='ar' ? 'rtl' : 'ltr';
  updateNav(); updateDates();
  // Re-render settings in new language (keeps scroll position)
  const sheet = document.querySelector('.modal-sheet');
  const scroll = sheet ? sheet.scrollTop : 0;
  openSettings(scroll);
  // Re-render current tab — for Quran, reload from API with new translation
  const tab = ST.tab;
  if(tab==='home') renderHome();
  else if(tab==='hadith') renderHadith();
  else if(tab==='adhkar') renderAdhkar();
  else if(tab==='more') renderMore();
  else if(tab==='quran' && ST.qView==='list') {
    ST.surahs=[]; // force reload with new language
    renderQuranList();
  }
  else if(tab==='quran' && ST.qView==='surah' && ST.currentSurah) {
    // Reload verses with new translation
    openSurah(ST.currentSurah.id);
  }
}

function setFontArNoClose(f) {
  ST.fontAr=f; savePref(); applyPrefs();
  ['scheherazade','amiri','naskh','kufi'].forEach(ff=>{
    const b=document.getElementById('font-btn-'+ff);
    if(!b)return;
    b.style.borderColor = ff===f?'var(--acc)':'var(--bdr)';
    b.style.background = ff===f?'var(--accd)':'var(--bg3)';
    // Update color of arabic preview text inside button
    b.querySelectorAll('div').forEach(d=>{ if(d.style.direction==='rtl') d.style.color=ff===f?'var(--acc)':'var(--txm)'; });
  });
  // Re-render current page to apply new font
  if(ST.tab==='quran' && ST.qView==='surah') renderSurah();
  else if(ST.tab==='hadith') renderHadith();
  else if(ST.tab==='adhkar') renderAdhkar();
  else if(ST.tab==='more') renderMoreContent();
}

function setFontSizeArLive(v) {
  document.documentElement.style.setProperty('--ar-size', v+'px');
  const d = document.getElementById('ar-size-display');
  if(d) d.textContent = v+'px';
  const p = document.getElementById('ar-preview');
  if(p) p.querySelectorAll('div').forEach(el=>el.style.fontSize=v+'px');
}

function setFontSizeArSave(v) {
  ST.fontSizeAr=parseInt(v);
  localStorage.setItem('fontSizeAr',v);
}
function setFontSizeUILive(v) {
  document.body.style.fontSize = v+'px';
  document.documentElement.style.setProperty('--fs-ui', v+'px');
  const d = document.getElementById('ui-size-display');
  if(d) d.textContent = v+'px';
  const p = document.getElementById('ui-preview');
  if(p) p.querySelectorAll('div').forEach(el=>el.style.fontSize=v+'px');
}
function setPrayerDisplayMode(m) {
  ST.prayerDisplayMode = m;
  localStorage.setItem('prayerDisplayMode', m);
  if(ST.tab==='home') renderHome();
}
function setFontSizeUISave(v) {
  ST.fontSizeUI = parseInt(v);
  localStorage.setItem('fontSizeUI',v);
  document.documentElement.style.setProperty('--fs-ui', v+'px');
}

function setPatternNoClose(p) {
  ST.pattern=p; savePref(); applyPrefs();
  ['dots','arabesque','girih','zellige','muqarnas','stars8','khatam','none'].forEach(id=>{
    const b=document.getElementById('pat-btn-'+id);
    if(!b)return;
    b.style.borderColor = id===p?'var(--acc)':'var(--bdr)';
    b.querySelector('div:last-child').style.color = id===p?'var(--acc)':'var(--txm)';
    b.querySelector('div:last-child').style.fontWeight = id===p?'700':'500';
  });
}

function setSpacingNoClose(s) {
  ST.spacing=s; savePref();
  document.documentElement.setAttribute('data-spacing', s);
  // Apply immediately to all visible Arabic text
  const lhMap = {compact:'1.5', normal:'2.0', airy:'2.6'};
  const lh = lhMap[s] || '2.0';
  document.querySelectorAll('.verse-arabic, .ar, .ar-md, .ar-xl, .ar-lg').forEach(el => {
    el.style.lineHeight = lh;
  });
  applyPrefs();
  // Re-render Quran immediately for spacing effect
  if (ST.tab==='quran' && ST.qView==='surah') {
    renderSurah();
  }
  ['compact','normal','airy'].forEach(sp=>{
    const b=document.getElementById('spc-btn-'+sp);
    if(!b)return;
    b.style.borderColor = sp===s?'var(--acc)':'var(--bdr)';
    b.style.background = sp===s?'var(--accd)':'var(--bg3)';
  });
}

function setQuranModeNoClose(m) {
  ST.quranMode=m; savePref();
  ['verse','mushaf'].forEach(mm=>{
    const b=document.getElementById('qm-btn-'+mm);
    if(!b)return;
    b.style.borderColor = mm===m?'var(--acc)':'var(--bdr)';
    b.style.background = mm===m?'var(--accd)':'var(--bg3)';
    b.style.color = mm===m?'var(--acc)':'var(--txm)';
    b.style.fontWeight = mm===m?'700':'500';
  });
}

function toggleTranslitNoClose() {
  ST.showTranslit=!ST.showTranslit; savePref();
  const btn=document.getElementById('translit-toggle');
  if(btn){
    btn.style.background = ST.showTranslit?'var(--acc)':'var(--bdr2)';
    btn.querySelector('div').style.left = ST.showTranslit?'25px':'3px';
  }
}

function toggleTranslationNoClose() {
  ST.showTranslation=!ST.showTranslation; savePref();
  const btn=document.getElementById('translation-toggle');
  if(btn){
    btn.style.background = ST.showTranslation?'var(--acc)':'var(--bdr2)';
    btn.querySelector('div').style.left = ST.showTranslation?'25px':'3px';
  }
}

function setCalcMethodNoClose(m) {
  ST.calcMethod=m; savePref(); ST.prayerTimes=null; loadPrayer();
  ['2','1','3','4','5','7','11','12','15'].forEach(id=>{
    const b=document.getElementById('cm-btn-'+id);
    if(!b)return;
    const on=id===m;
    b.style.borderColor = on?'var(--acc)':'var(--bdr)';
    b.style.background = on?'var(--accd)':'var(--bg3)';
    // Update the radio dot (first child span)
    const dot = b.querySelector('span');
    if(dot){
      dot.style.borderColor = on?'var(--acc)':'var(--bdr)';
      dot.style.background = on?'var(--acc)':'transparent';
      dot.innerHTML = on?'<svg width="11" height="11" viewBox="0 0 24 24" fill="#000"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>':'';
    }
    // Update label color/weight
    const lbl = b.querySelector('div > div:first-child');
    if(lbl){ lbl.style.color=on?'var(--acc)':'var(--tx2)'; lbl.style.fontWeight=on?'700':'400'; }
  });
  toast('✅ Méthode de calcul mise à jour');
}

function setTheme(th) {
  ST.theme=th; savePref(); applyPrefs();
  if(ST.tab==='home') renderHome();
}

function saveCity() {
  const v = document.getElementById('city-in')?.value?.trim()||'';
  ST.city=v; savePref(); ST.prayerTimes=null; loadPrayer();
  closeModal();
  toast('📍 '+(v||'Localisation auto'));
}

<script>
// ═══════════════════════════════
// TRANSLITERATIONS (Al-Fatiha + common)
// ═══════════════════════════════
const TRANSLIT = {
  '1:1':'Bismi Allahi alrrahmani alrraheemi',
  '1:2':'Alhamdu lillahi rabbi al-AAalameena',
  '1:3':'Alrrahmani alrraheemi',
  '1:4':'Maliki yawmi alddeeni',
  '1:5':"Iyyaka naAAbudu wa-iyyaka nastaAAeenu",
  '1:6':"Ihdina alssirata almustaqeema",
  '1:7':"Sirata allatheena anAAamta AAalayhim ghayri almaghdoobi AAalayhim wala alddalleena",
  '2:255':"Allahu la ilaha illa huwa alhayyu alqayyoomu la ta'khuthuhu sinatun wala nawmun...",
  '112:1':"Qul huwa Allahu ahadun",
  '112:2':"Allahu alssamadu",
  '112:3':"Lam yalid walam yooladu",
  '112:4':"Walam yakun lahu kufuwan ahadun",

}

// ═══════════════════════════════
// QURAN
// ═══════════════════════════════
async function loadSurahs() {
  if (ST.surahs.length) return;
  try {
    const d = await (await fetch('https://api.quran.com/api/v4/chapters?language=fr')).json();
    ST.surahs = d.chapters;
  } catch(e) { ST.surahs = SURAHS_LOCAL; }
}

function renderQuranList() {
  const el = document.getElementById('s-quran');
  if (!ST.surahs.length) {
    el.innerHTML = `<div class="loader"><div class="spinner"></div><br>${t('loading')}</div>`;
    loadSurahs().then(()=>renderQuranList());
    return;
  }
  const q = ST.qSearch.toLowerCase();
  const fl = q ? ST.surahs.filter(s=>
    s.name_simple.toLowerCase().includes(q) ||
    s.translated_name?.name?.toLowerCase().includes(q) ||
    String(s.id).includes(q)
  ) : ST.surahs;

  el.innerHTML = `
    <div class="searchbar">
      <span style="width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--txd)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </span>
      <input placeholder="${t('search')}" value="${ST.qSearch}"
        oninput="ST.qSearch=this.value;renderQuranList()"/>
    </div>
    <div class="slbl">${t('surahList')}</div>
    ${fl.map(s=>`
      <div onclick="openSurah(${s.id})" style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:transform .12s;box-shadow:var(--shadow2)" ontouchstart="this.style.transform='scale(.98)'" ontouchend="this.style.transform=''">
        <div style="display:flex;align-items:center;gap:13px">
          <div style="width:38px;height:38px;border-radius:10px;background:var(--accd);border:1.5px solid var(--acc3);display:flex;align-items:center;justify-content:center;color:var(--acc);font-weight:800;font-size:12px;flex-shrink:0">${s.id}</div>
          <div>
            <div style="font-size:15px;font-weight:600;margin-bottom:2px">${s.name_simple}</div>
            <div style="font-size:11px;color:var(--txd)">${s.translated_name?.name||''} · ${s.verses_count} ${t('verses')} · ${s.revelation_place==='makkah'?t('meccan'):t('medinan')}</div>
          </div>
        </div>
        <div class="ar" style="direction:rtl;font-size:21px;color:var(--acc)">${s.name_arabic}</div>
      </div>`).join('')}
  `;

const QURAN_CACHE_KEY = 'quran_cache_v2';
let _quranCache = null;

function getQuranCache() {
  if (_quranCache) return _quranCache;
  try {
    const raw = localStorage.getItem(QURAN_CACHE_KEY);
    _quranCache = raw ? JSON.parse(raw) : {};
  } catch(e) { _quranCache = {}; }
  return _quranCache;
}

function saveQuranCache(key, verses) {
  try {
    const cache = getQuranCache();
    cache[key] = { verses, ts: Date.now() };
    // Keep only last 30 surahs to avoid exceeding localStorage limits (~5MB)
    const keys = Object.keys(cache);
    if (keys.length > 30) {
      const oldest = keys.sort((a,b)=>(cache[a].ts||0)-(cache[b].ts||0))[0];
      delete cache[oldest];
    }
    localStorage.setItem(QURAN_CACHE_KEY, JSON.stringify(cache));
    _quranCache = cache;
  } catch(e) { /* localStorage full — ignore */ }
}

async function openSurah(id) {
  ST.currentSurah = ST.surahs.find(s=>s.id===id);
  ST.qView = 'surah';
  const el = document.getElementById('s-quran');
  el.innerHTML = `<div class="loader"><div class="spinner"></div><br>${t('loadingQuran')}</div>`;
  document.getElementById('cnt').scrollTop = 0;
  // Translation IDs: 136=French Hamidullah, 131=English Saheeh Int'l, 85=Arabic Tafsir Al-Jalalayn
  const TRANS_IDS = {fr:'136', en:'131', ar:'85'};
  const transId = TRANS_IDS[ST.lang] || '136';
  const apiLang = ST.lang === 'ar' ? 'ar' : ST.lang === 'en' ? 'en' : 'fr';
  if (!ST.showTranslation) { ST.showTranslation = true; savePref(); }

  const cacheKey = `${id}_${transId}`;
  const cache = getQuranCache();

  // Check cache first
  if (cache[cacheKey] && cache[cacheKey].verses) {
    ST.verses = cache[cacheKey].verses;
    renderSurah();
    // Update cache in background if older than 7 days
    if (Date.now() - (cache[cacheKey].ts||0) > 7*24*60*60*1000) {
      fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=${apiLang}&words=false&fields=text_uthmani,text_indopak&translations=${transId}&per_page=300&page=1`)
        .then(r=>r.json()).then(d=>{ if(d.verses) saveQuranCache(cacheKey, d.verses); }).catch(()=>{});
    }
    return;
  }

  // No cache — fetch from API
  try {
    const d = await (await fetch(
      `https://api.quran.com/api/v4/verses/by_chapter/${id}?language=${apiLang}&words=false&fields=text_uthmani,text_indopak&translations=${transId}&per_page=300&page=1`
    )).json();
    ST.verses = d.verses;
    saveQuranCache(cacheKey, d.verses);
    renderSurah();
  } catch(e) {
    el.innerHTML = `
      <button class="back-btn" onclick="backQ()">
        <span class="icon icon-18"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></span>
        ${t('back')}
      </button>
      <div style="text-align:center;padding:30px 20px">
        <div style="font-size:40px;margin-bottom:14px">📵</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:8px">${t('noInternet')}</div>
        <div style="font-size:12px;color:var(--txm);line-height:1.6">${ST.lang==='en'?'This surah has not been cached yet. Connect to the internet to load it for the first time.':'Cette sourate n\'a pas encore été mise en cache. Connectez-vous à internet pour la charger une première fois.'}</div>
        <button onclick="openSurah(${id})" style="margin-top:16px;background:var(--acc);color:#000;border:none;border-radius:12px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer">🔄 ${ST.lang==='en'?'Retry':'Réessayer'}</button>
      </div>`;
  }
}

function toggleFavVerse(sid, vnum, sname, e) {
  e.stopPropagation();
  const key = sid+':'+vnum;
  const idx = ST.favs.findIndex(f=>f.type==='verse'&&f.id===key);
  if (idx>=0) { ST.favs.splice(idx,1); toast(t('removedFav')); }
  else { ST.favs.push({type:'verse',id:key,surah:sname,verse:vnum}); toast(t('addedFav')); }
  saveState();
  // UPDATE IN PLACE — only update the clicked button
  const btn = e.currentTarget;
  const nowFav = ST.favs.some(f=>f.type==='verse'&&f.id===key);
  const span = btn.querySelector('span');
  if (span) {
    span.style.color = nowFav ? 'var(--acc)' : 'var(--txm)';
    const svg = span.querySelector('svg');
    if (svg) svg.setAttribute('fill', nowFav ? 'currentColor' : 'none');
  }
}

function shareVerseFromCard(sid, vnum, sname) {
  const v = ST.verses.find(x=>x.verse_number===vnum);
  if (!v) return;
  const tr = v.translations?.[0]?.text?.replace(/<[^>]*>/g,'')||'';
  openShareMenu('verse', {
    arabic: v.text_uthmani || v.text_indopak || '',
    translation: tr,
    surah: sname,
    ref: sid+':'+vnum
  });
}

function shareVerse(sid, vnum, sname) {
  const v = ST.verses.find(x=>x.verse_number===vnum);
  if (!v) return;
  const tr = v.translations?.[0]?.text?.replace(/<[^>]*>/g,'')||'';
  const txt = `${v.text_uthmani||''}\n\n« ${tr} »\n\n— ${sname} (${sid}:${vnum})\n\nIslam Authentique — Manhaj As-Salaf`;
  if (navigator.share) navigator.share({text:txt});
  else { navigator.clipboard?.writeText(txt); toast(t('copied')); }
}

  if (ST.lang !== 'en') return cat;
  const map = {
    "Pilliers":"Pillars","Tawhid":"Tawhid","Salat":"Prayer","Coran":"Quran",
    "Dhikr":"Dhikr","Du'a":"Du'a","Sunnah":"Sunnah","Bid'ah":"Bid'ah",
    "Siyam":"Fasting","Ramadan":"Ramadan","Hajj":"Hajj","Sadaqa":"Charity",
    "Zakat":"Zakat","'Ilm":"Knowledge","Akhlaq":"Character","Fraternité":"Brotherhood",
    "Famille":"Family","Mariage":"Marriage","Commerce":"Commerce",
    "Fiqh":"Jurisprudence","Akhira":"Hereafter","Tawbah":"Repentance",
    "Nasiha":"Counsel","Sabr":"Patience","Zuhd":"Asceticism",
    "Istiqama":"Steadfastness","Taqwa":"Taqwa","Taharah":"Purification",

  return map[cat] || cat;
}

function selectHadithTheme(th) {
  ST.hTheme = th;
  renderHadith();
  // If a specific theme selected (not 'all'), scroll to the hadith list
  if (th !== 'all') {
    setTimeout(() => {
      const listEl = document.getElementById('hadith-list');
      if (listEl) {
        listEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 80);
  } else {
    document.getElementById('cnt').scrollTop = 0;
  }
}
function onHadithSearch(val) {
  ST.hSearch = val;
  // Only update the cards list, not the search input (prevents keyboard closing)
  const cardsEl = document.getElementById('hadith-cards');
  if (cardsEl) {
    const q = val.toLowerCase();
    const fl = HADITHS.filter(h => {
      if (ST.hTheme !== 'all' && h.th !== ST.hTheme) return false;
      if (q && !h.fr.toLowerCase().includes(q) && !(h.en||'').toLowerCase().includes(q) && !h.th.toLowerCase().includes(q) && !h.n.toLowerCase().includes(q) && !h.ar.includes(val)) return false;
      return true;
    });
    cardsEl.innerHTML = renderHadithCards(fl);
  } else {
    renderHadith();
  }
}
function updateHadithList() { renderHadith(); }

function renderHadithCards(fl) {
  if (!fl.length) return `<div style="text-align:center;padding:40px 20px;color:var(--txd)">
    <div style="font-size:40px;margin-bottom:12px">🔍</div>
    <div style="font-size:14px;font-weight:600">${ST.lang==='en'?'No results':'Aucun résultat'}</div>
    <div style="font-size:12px;margin-top:6px">Essayez un autre terme</div>
  </div>`;

  return fl.map((h,idx)=>{
    const isFav = ST.favs.some(f=>f.type==='hadith'&&f.id===h.id);
    const displayText = ST.lang==='en'&&h.en ? h.en : h.fr;
    const isLangMissing = ST.lang==='en' && !h.en;
    const gradeColor = h.a==='Sahih'?'var(--gr)':h.a==='Hasan'?'#f59e0b':h.a.startsWith('Da')?'#ef4444':'var(--txm)';
    const isDaif = h.a.startsWith('Da');
    return `
      <div class="card" id="h${h.id}" style="margin-bottom:12px;overflow:hidden">
        <!-- Category badge + actions row -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <span style="background:var(--accd);border:1px solid var(--acc3);border-radius:7px;padding:3px 10px;font-size:10px;font-weight:800;color:var(--acc);letter-spacing:.5px">${translateHadithCat(h.th)}</span>
            <span style="background:${gradeColor}20;border:1px solid ${gradeColor}40;border-radius:7px;padding:3px 8px;font-size:10px;font-weight:700;color:${gradeColor}">✓ ${h.a}</span>
          </div>
          <div style="display:flex;gap:5px;align-items:center">
            <button onclick="shareHadith(${h.id})" style="background:var(--acc);border:none;border-radius:8px;color:#000;font-size:10px;font-weight:700;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:3px">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
              ${t('share')}
            </button>
            <button class="btn-icon" onclick="toggleFavH(${h.id},event,this)" id="fh${h.id}">
              <span class="icon icon-18" style="color:${isFav?'var(--acc)':'var(--txd)'}">
                <svg viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </span>
            </button>
          </div>
        </div>

        <!-- Arabic text -->
        <div class="ar ar-md" style="direction:rtl;text-align:right;margin-bottom:13px;color:var(--tx);padding:12px;background:var(--bg3);border-radius:12px;border-right:3px solid var(--acc)">${h.ar}</div>

        <!-- Translation -->
        ${isLangMissing ? `<div style="font-size:10px;color:#f59e0b;margin-bottom:6px;display:flex;align-items:center;gap:4px">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
          ${ST.lang==='en'?'English translation not yet available — showing French':''}
        </div>` : ''}
        <div style="font-size:var(--fs-ui,13px);color:var(--tx2);line-height:1.75;font-style:italic;margin-bottom:12px;padding-left:4px">« ${displayText} »</div>

        <!-- Da'if warning -->
        ${isDaif ? `<div style="background:#ef444420;border:1.5px solid #ef444440;border-radius:11px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px">
          <span style="font-size:14px;flex-shrink:0">⚠️</span>
          <div style="font-size:11px;color:#ef4444;line-height:1.55">${ST.lang==='en'?'<strong>Weak hadith (Da\'if)</strong> — This hadith has a weak chain of narrators according to Sheikh Al-Albani. It is not authentic and should not be acted upon. Source: Silsilah Ad-Da\'ifa.':'<strong>Hadith faible (Da\'if)</strong> — Ce hadith possède une chaîne de transmission faible selon Cheikh Al-Albani. Il n\'est pas authentique et ne doit pas être suivi. Source : Silsilah Ad-Da\'ifa.'}</div>
        </div>` : ''}

        <!-- Reward if exists -->
        ${h.reward ? `<div style="background:var(--accd);border:1px solid var(--acc3);border-radius:11px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px">
          <span style="font-size:16px;flex-shrink:0">🏆</span>
          <div style="font-size:11px;color:var(--acc2);line-height:1.55">${h.reward}</div>
        </div>` : ''}

        <!-- Source row -->
        <div style="background:var(--bg3);border-radius:10px;padding:9px 12px">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:5px">
            <span style="font-size:11px;color:var(--txm);font-weight:600">${ST.lang==='en'?'Narrated by':'Rapporté par'} ${h.n}</span>
            <span style="font-size:11px;color:var(--txd);font-weight:600">${h.b} n°${h.num}</span>
          </div>
          <div style="font-size:10px;color:var(--grs);display:flex;align-items:center;gap:4px">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
            ${h.ref}
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleFavH(id, e, btn) {
  e.stopPropagation();
  const h = HADITHS.find(x=>x.id===id);
  if (!h) return;
  const idx = ST.favs.findIndex(f=>f.type==='hadith'&&f.id===id);
  if (idx>=0) { ST.favs.splice(idx,1); toast(t('removedFav')); }
  else { ST.favs.push({type:'hadith',id,text:h.fr,theme:h.th}); toast(t('addedFav')); }
  saveState();
  // UPDATE IN PLACE
  const isFav = ST.favs.some(f=>f.type==='hadith'&&f.id===id);
  if (btn) btn.innerHTML = `<span class="icon icon-20">${isFav
    ?'<svg viewBox="0 0 24 24" fill="var(--acc)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>'
  }</span>`;
}

function shareHadith(id) {
  const h = HADITHS.find(x=>x.id===id);
  if (!h) return;
  openShareMenu('hadith', h);
}
</script>

function renderAdhkar() {
  if (ST.adhkarTab==='tasbih') { renderTasbih(); return; }
  const list = ADHKAR_DATA[ST.adhkarTab]||[];
  const done = list.filter(d=>(ST.counts[d.id]||0)>=d.r).length;
  const pct = list.length > 0 ? Math.round(done/list.length*100) : 0;

  const tabBtn = (k,label,icon) => `
    <button onclick="swAdhkar('${k}')"
      style="flex:1;min-width:0;padding:10px 4px;border-radius:13px;
        border:2px solid ${ST.adhkarTab===k?'var(--acc)':'var(--bdr)'};
        background:${ST.adhkarTab===k?'var(--accd)':'var(--bg2)'};
        color:${ST.adhkarTab===k?'var(--acc)':'var(--txm)'};
        font-size:11px;font-weight:${ST.adhkarTab===k?'700':'500'};
        cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span class="icon icon-18"><svg viewBox="0 0 24 24" fill="currentColor">${icon}</svg></span>
      <span style="font-size:10px">${label}</span>
    </button>`;

  document.getElementById('s-adhkar').innerHTML = `
    <div style="display:flex;gap:7px;margin-bottom:14px">
      ${tabBtn('matin',t('matin'),'<path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/>')}
      ${tabBtn('soir',t('soir'),'<path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/>')}
      ${tabBtn('salat',t('salat'),'<path d="M6.5 10h-2v5h2v-5zm4 0h-2v5h2v-5zm8.5 7H2v2h17v-2zm-4.5-7h-2v5h2v-5zM10.5 1L2 6v2h17V6l-8.5-5z"/>')}
      ${tabBtn('tasbih',t('tasbih'),'<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>')}
    </div>

    <!-- Progress -->
    <div class="card" style="padding:13px 16px;margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">${t('progress')}</span>
        <span id="adhkar-count-text" style="font-size:13px;font-weight:800;color:${pct===100?'var(--gr)':'var(--acc)'}">${done}/${list.length}</span>
      </div>
      <div class="progress" id="adhkar-progress">
        <div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--gr)':'var(--acc)'}"></div>

}

function renderAdhkarCard(d) {
  const c = ST.counts[d.id]||0, dn = c>=d.r;
  const pct = d.r > 1 ? Math.round(c/d.r*100) : (dn?100:0);
  const actionHTML = dn
    ? `<div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:var(--gr);font-weight:700">بارك الله فيك ✓</div>
        <button onclick="rstAdhkar('${d.id}')" style="background:none;border:1px solid var(--bdr);border-radius:9px;color:var(--txd);font-size:11px;padding:7px 12px;cursor:pointer">${t('reset')}</button>
       </div>`
    : d.r === 1
    ? `<button onclick="incAdhkar('${d.id}',1)"
         style="width:100%;background:var(--acc);color:#000;border:none;border-radius:13px;
           padding:14px;font-size:14px;font-weight:800;cursor:pointer;
           transition:transform .12s;-webkit-tap-highlight-color:transparent"
         ontouchstart="this.style.transform='scale(.96)'" ontouchend="this.style.transform=''">
         ✓ Marquer comme accompli
       </button>`
    : `<div style="display:flex;align-items:center;gap:10px">
        <button onclick="incAdhkar('${d.id}',${d.r})"
          style="background:var(--acc);color:#000;border:none;border-radius:14px;
            width:60px;height:54px;font-size:22px;font-weight:900;cursor:pointer;
            flex-shrink:0;transition:transform .1s;-webkit-tap-highlight-color:transparent"
          ontouchstart="this.style.transform='scale(.88)'" ontouchend="this.style.transform=''">+1</button>
        <div style="flex:1">
          <div id="ac-count-${d.id}" style="font-size:26px;font-weight:900;line-height:1;color:var(--acc)">
            ${c}<span style="color:var(--txd);font-size:13px;font-weight:400"> / ${d.r}</span>
          </div>
        </div>
        <button onclick="rstAdhkar('${d.id}')"
          style="background:none;border:1.5px solid var(--bdr);border-radius:10px;color:var(--txm);font-size:14px;padding:10px 14px;cursor:pointer">↺</button>
       </div>`;

  return `
    <div id="ac${d.id}"
      style="background:${dn?'linear-gradient(135deg,#052e16aa,#0a3d1eaa)':'var(--card)'};
        border:1.5px solid ${dn?'var(--gr)':'var(--bdr)'};
        border-radius:18px;padding:16px;margin-bottom:10px;
        transition:all .35s cubic-bezier(.4,0,.2,1);
        box-shadow:${dn?'0 4px 20px rgba(34,197,94,.18)':'var(--shadow2)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:8px;background:${dn?'var(--gr)':'var(--accd)'};
            display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .3s">
            ${dn?'✓':'🤲'}
          </div>
          <span style="font-size:13px;font-weight:700;color:${dn?'var(--gr)':'var(--tx)'}">${d.t}</span>
        </div>
        <span style="font-size:10px;color:${dn?'var(--gr)':'var(--acc)'};
          background:${dn?'rgba(34,197,94,.15)':'var(--accd)'};
          padding:3px 10px;border-radius:99px;font-weight:700">
          ${dn?'✓ Accompli':d.r+'×'}
        </span>
      </div>
      <div class="ar ar-lg" style="direction:rtl;text-align:right;margin-bottom:12px;
        color:${dn?'var(--grs)':'var(--tx)'}">${d.ar}</div>
      <div style="font-size:var(--fs-ui,13px);color:var(--tx2);line-height:1.65;margin-bottom:6px">${d.fr}</div>
      <div style="font-size:10px;color:var(--txd);margin-bottom:${d.reward?'0':d.r>1?'12':'14'}px">📚 ${d.ref}</div>
      ${d.reward?`<div style="background:var(--accd);border-radius:10px;padding:9px 12px;margin-bottom:${d.r>1?'12':'14'}px;font-size:11px;color:var(--acc2);line-height:1.5">🏆 ${d.reward}</div>`:''}
      ${d.r>1?`<div style="height:4px;background:var(--bdr);border-radius:99px;margin-bottom:12px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${dn?'var(--gr)':'var(--acc)'};border-radius:99px;transition:width .4s ease"></div>
      </div>`:''}
      ${actionHTML}
    </div>`;
}

function swAdhkar(tab) {
  if (ST.adhkarTab === tab) return;
  const el = document.getElementById('s-adhkar');
  // Fade out
  if (el) { el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; }
  setTimeout(() => {
    ST.adhkarTab = tab;
    renderAdhkar();
    const elNew = document.getElementById('s-adhkar');
    if (elNew) {
      elNew.style.transition = 'none';
      elNew.style.opacity = '0';
      elNew.style.transform = 'translateY(6px)';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          elNew.style.transition = 'opacity .22s ease, transform .22s ease';
          elNew.style.opacity = '1';
          elNew.style.transform = 'translateY(0)';
        });
      });
    }
  }, 90);
}

function incAdhkar(id, max) {
  const prev = ST.counts[id]||0;
  if (prev>=max) return;
  ST.counts[id] = prev+1;
  if (navigator.vibrate) navigator.vibrate(18);
  saveState(); updateStreak();
  const c = ST.counts[id];
  const done = c>=max;

  // Re-render only this card in-place
  const list2 = ADHKAR_DATA[ST.adhkarTab]||[];
  const item = list2.find(x=>x.id===id);
  if (item) {
    const card = document.getElementById('ac'+id);
    if (card) {
      const newHTML = renderAdhkarCard(item);
      const tmp = document.createElement('div');
      tmp.innerHTML = newHTML;
      const newCard = tmp.firstElementChild;
      if (newCard) {
        newCard.style.transform = 'scale(.97)';
        card.replaceWith(newCard);
        requestAnimationFrame(()=>{ const el=document.getElementById('ac'+id); if(el){el.style.transition='transform .15s';el.style.transform='';} });
      }
    }
  }

  if (done) toast('✓ '+t('done'));

  // Update progress bar
  const list = ADHKAR_DATA[ST.adhkarTab]||[];
  const doneCount = list.filter(d=>(ST.counts[d.id]||0)>=d.r).length;
  const pct = Math.round(doneCount/list.length*100);
  const pf = document.querySelector('#adhkar-progress .progress-fill');
  if (pf) { pf.style.width=pct+'%'; pf.style.background=pct===100?'var(--gr)':'var(--acc)'; }
  // Update count display
  const countSpan = document.getElementById('adhkar-count-text');
  if (countSpan) countSpan.textContent = doneCount+'/'+list.length;
}

function rstAdhkar(id) {
  ST.counts[id]=0; saveState();
  const card = document.getElementById('ac'+id);
  if (card) {
    const d = Object.values(ADHKAR_DATA).flat().find(x=>x.id===id);
    if (d) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderAdhkarCard(d);
      const newCard = tmp.firstElementChild;
      if (newCard) card.replaceWith(newCard);
    }
  }
  // Update progress bar and counter
  const list = ADHKAR_DATA[ST.adhkarTab]||[];
  const doneCount = list.filter(x=>(ST.counts[x.id]||0)>=x.r).length;
  const pct = list.length>0 ? Math.round(doneCount/list.length*100) : 0;
  const pf = document.querySelector('#adhkar-progress .progress-fill');
  if (pf) { pf.style.width=pct+'%'; pf.style.background=pct===100?'var(--gr)':'var(--acc)'; }
  const ct = document.getElementById('adhkar-count-text');
  if (ct) ct.textContent = doneCount+'/'+list.length;
}

function renderTasbih() {
  const p = TASBIH_PRESETS.find(x=>x.id===ST.tasbihId)||TASBIH_PRESETS[0];

function incTasbih(id, max) {
  const key='tb_'+id;
  if ((ST.counts[key]||0)>=max) return;
  ST.counts[key]=(ST.counts[key]||0)+1;
  if (navigator.vibrate) navigator.vibrate(12);
  saveState(); updateStreak();
  const c = ST.counts[key];
  const done = c>=max;
  // IN-PLACE
  const el = document.getElementById('tasbih-count');
  const btn = document.getElementById('tasbih-btn');
  const pb = document.querySelector('#tasbih-pb .progress-fill');
  if (el) el.textContent = c;
  if (done) {
    if (btn) { btn.classList.add('done'); }
    toast('✓ '+max+' — '+t('done'));
  }
  if (pb) { pb.style.width=Math.min(c/max*100,100)+'%'; pb.style.background=done?'var(--gr)':'var(--acc)'; }
}

function rstTasbih(id) { ST.counts['tb_'+id]=0; saveState(); renderTasbih(); }

function updateStreak() {
  const today = new Date().toDateString();
  if (ST.streak.last===today) return;
  const yesterday = new Date(Date.now()-86400000).toDateString();
  ST.streak.days = ST.streak.last===yesterday ? ST.streak.days+1 : 1;
  ST.streak.last = today;
  saveState();
}

  const nameToGlobalAyah = {
    1:3,   // Ar-Rahman — Al-Fatiha 1:3

    5:7128,// As-Salam — Al-Hashr 59:23
    6:7128,// Al-Mumin — Al-Hashr 59:23

    8:7128,// Al-Aziz — Al-Hashr 59:23
    9:7128,// Al-Jabbar — Al-Hashr 59:23
    10:7128,// Al-Mutakabbir — Al-Hashr 59:23

    12:7129,// Al-Bari — Al-Hashr 59:24
    13:7129,// Al-Musawwir — Al-Hashr 59:24
    99:3,  // As-Sabur
  };
  const globalAyah = nameToGlobalAyah[nameNum] || 3;
  const url = 'https://cdn.islamic.network/quran/audio/128/' + (_RECITER_MAP[_currentReciter]||'ar.alafasy') + '/' + globalAyah + '.mp3';

// SWIPE BETWEEN TABS
// ═══════════════════════════════
const TABS_ORDER = ['home','quran','hadith','adhkar','more'];

function initSwipe() {
  // Swipe on the BOTTOM NAV BAR to switch tabs — no accidental trigger on content
  const nav = document.querySelector('.nav');
  if (!nav) return;
  let _sx = 0, _sy = 0, _active = false;

  nav.addEventListener('touchstart', e => {
    _sx = e.touches[0].clientX;
    _sy = e.touches[0].clientY;
    _active = true;
  }, {passive:true});

  nav.addEventListener('touchmove', e => {
    if (!_active) return;
    const dy = Math.abs(e.touches[0].clientY - _sy);
    const dx = Math.abs(e.touches[0].clientX - _sx);
    if (dy > dx * 0.5 || dy > 12) _active = false;
  }, {passive:true});

  nav.addEventListener('touchend', e => {
    if (!_active) { _active = false; return; }
    _active = false;
    const dx = e.changedTouches[0].clientX - _sx;
    const dy = e.changedTouches[0].clientY - _sy;
    if (Math.abs(dx) < 50) return;
    if (Math.abs(dy) > Math.abs(dx) * 0.4) return;
    const idx = TABS_ORDER.indexOf(ST.tab);
    if (dx < 0 && idx < TABS_ORDER.length - 1) go(TABS_ORDER[idx + 1]);
    if (dx > 0 && idx > 0) go(TABS_ORDER[idx - 1]);
  }, {passive:true});
}

function openGlobalSearch() {
  document.getElementById('modal-root').innerHTML = `
    <div class="global-search-overlay">
      <div class="global-search-bar">
        <button onclick="closeModal()" style="background:none;border:none;color:var(--txm);font-size:15px;padding:4px 8px;cursor:pointer;font-weight:600">✕</button>
        <input class="global-search-input" id="gs-input" placeholder="Rechercher partout..." autofocus
          oninput="runGlobalSearch(this.value)"/>
      </div>
      <div class="global-search-results" id="gs-results">
        <div style="text-align:center;color:var(--txd);padding:40px 16px">
          <div style="font-size:32px;margin-bottom:10px">🔍</div>
          <div style="font-size:14px">Rechercher dans le Coran, les Hadiths, les Du'a...</div>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('gs-input')?.focus(), 100);
}

function runGlobalSearch(q) {
  if (!q || q.length < 2) {
    document.getElementById('gs-results').innerHTML = '';
    return;
  }
  const ql = q.toLowerCase();
  const results = [];

  // Search hadiths
  HADITHS.forEach(h => {
    if (h.fr.toLowerCase().includes(ql) || h.th.toLowerCase().includes(ql) || h.n.toLowerCase().includes(ql)) {
      results.push({
        type:'Hadith', typeKey:'hadith', icon:'📜',
        title: h.th + ' — ' + h.a,
        text: highlight(h.fr, q),
        sub: h.b + ' n°' + h.num,
        action: `closeModal();go('hadith');ST.hSearch='${q.replace(/'/g,"\\'")}';renderHadith()`
      });
    }
  });

  // Search duas
  DUA.forEach(d => {
    if (d.t.toLowerCase().includes(ql) || d.fr.toLowerCase().includes(ql) || d.cat.toLowerCase().includes(ql)) {
      results.push({
        type:"Du'a", typeKey:'dua', icon:'🤲',
        title: d.t + ' — ' + d.cat,
        text: highlight(d.fr, q),
        sub: d.ref,
        action: `closeModal();go('more');ST.moreTab='dua';ST.duaCat='${d.cat}';renderMore()`
      });
    }
  });

  // Search surahs
  if (ST.surahs.length) {
    ST.surahs.filter(s =>
      s.name_simple.toLowerCase().includes(ql) ||
      s.translated_name?.name?.toLowerCase().includes(ql) ||
      String(s.id) === ql
    ).slice(0,5).forEach(s => {
      results.push({
        type:'Coran', typeKey:'quran', icon:'📖',
        title: s.name_simple + ' — ' + (s.translated_name?.name||''),
        text: s.verses_count + ' versets · ' + (s.revelation_place==='makkah'?'Mecquoise':'Médinoise'),
        sub: 'Sourate n°' + s.id,
        action: `closeModal();go('quran');openSurah(${s.id})`
      });
    });
  }

  // Search 99 names
  ASMA_HUSNA.filter(a => a.fr.toLowerCase().includes(ql) || a.d.toLowerCase().includes(ql)).slice(0,5).forEach(a => {
    results.push({
      type:'Noms d\'Allah', typeKey:'asma', icon:'☪️',
      title: a.fr + ' — Nom n°' + a.n,
      text: highlight(a.d, q),
      sub: a.ar,
      action: `closeModal();go('more');ST.moreTab='asma';ST.asmaOpen=${a.n};renderMore()`
    });
  });

  const el = document.getElementById('gs-results');
  if (!el) return;
  if (!results.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--txd);padding:40px 16px;font-size:14px">${ST.lang==='en'?`No results for "${q}"`:`Aucun résultat pour "${q}"`}</div>`;
    return;
  }
  el.innerHTML = `
    <div style="font-size:11px;color:var(--txd);margin-bottom:12px">${results.length} résultat(s)</div>
    ${results.slice(0,30).map(r=>`
      <div class="search-result-item" onclick="${r.action}">
        <div class="search-result-type">${r.icon} ${r.type}</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">${r.title}</div>
        <div class="search-result-text">${r.text}</div>
        <div class="search-result-sub">${r.sub}</div>
      </div>`).join('')}`;
}

function highlight(text, q) {
  if (!q) return text;
  const max = 120;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  let excerpt = idx > 30 ? '...' + text.substring(idx-20, idx+80) + '...' : text.substring(0, max) + (text.length>max?'...':'');
  return excerpt.replace(new RegExp(q, 'gi'), m=>`<span class="search-highlight">${m}</span>`);
}

function nativeShare(encoded) {
  const text = decodeURIComponent(encoded);
  if (navigator.share) {
    navigator.share({ title:'Islam Authentique', text }).catch(()=>{

    });
  } else {

    toast('📋 Copié !');
  }
  closeModal();
}

function downloadShareCard(encAr, encMain, encSource) {
  const arabic = decodeURIComponent(encAr);
  const main   = decodeURIComponent(encMain);
  const source = decodeURIComponent(encSource);

  const style = getComputedStyle(document.documentElement);
  const acc  = style.getPropertyValue('--acc').trim()  || '#c9a84c';
  const bg   = style.getPropertyValue('--bg').trim()   || '#0a0d0a';
  const bg3  = style.getPropertyValue('--bg3').trim()  || '#172017';
  const tx   = style.getPropertyValue('--tx').trim()   || '#f0f4f0';
  const tx2  = style.getPropertyValue('--tx2').trim()  || '#c5d5c5';

  // Dynamic height based on content
  const arLines_est = Math.ceil(arabic.length / 35) + 1;
  const trLines_est = main ? Math.ceil(main.length / 50) + 1 : 0;
  const contentH = 280 + arLines_est * 70 + (trLines_est * 50) + 120;
  const W = 1080, H = Math.max(900, Math.min(1400, contentH));
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, bg);
  grad.addColorStop(1, bg3);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle dot pattern
  ctx.fillStyle = acc + '15';
  for (let x = 20; x < W; x += 40) for (let y = 20; y < H; y += 40) {
    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
  }

  // Card
  const pad = 55;
  const cx = pad, cy = pad, cw = W-pad*2, ch = H-pad*2;
  ctx.fillStyle = bg3+'dd';
  rrect(ctx, cx, cy, cw, ch, 36); ctx.fill();
  ctx.strokeStyle = acc; ctx.lineWidth = 3;
  rrect(ctx, cx, cy, cw, ch, 36); ctx.stroke();

  // Corner ornaments
  const os = 24, oo = 18;
  [[cx+oo,cy+oo,1,1],[cx+cw-oo,cy+oo,-1,1],[cx+oo,cy+ch-oo,1,-1],[cx+cw-oo,cy+ch-oo,-1,-1]].forEach(([x,y,sx,sy])=>{
    ctx.strokeStyle = acc+'99'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(x, y+sy*os); ctx.lineTo(x,y); ctx.lineTo(x+sx*os,y); ctx.stroke();
  });

  // App name
  ctx.fillStyle = acc; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center';
  ctx.fillText('ISLAM AUTHENTIQUE', W/2, cy+65);
  ctx.fillStyle = acc+'80'; ctx.font = '14px Arial';
  ctx.fillText('islamauthentique.vercel.app', W/2, cy+115);
  ctx.fillStyle = acc+'60'; ctx.font = '16px Arial';
  ctx.fillText('MANHAJ AS-SALAF', W/2, cy+90);

  // Divider
  div(ctx, cx+80, cy+105, cx+cw-80, cy+105, acc+'40');

  // Arabic — split into lines manually
  ctx.fillStyle = tx; ctx.textAlign = 'right'; ctx.direction = 'rtl';
  const arFontSize = arabic.length > 70 ? 36 : arabic.length > 45 ? 42 : 50;
  ctx.font = arFontSize+'px serif';
  const arLines = splitLines(ctx, arabic, cw-120);
  let arY = cy + 160;
  arLines.forEach(ln => { ctx.fillText(ln, W/2+cw/2-80, arY); arY += arFontSize*1.9; });

  // Mid divider
  const midY = arY + 20;
  div(ctx, cx+120, midY, cx+cw-120, midY, acc+'30');

  // Translation
  if (main) {
    ctx.fillStyle = tx2; ctx.textAlign = 'center'; ctx.direction = 'ltr';
    const trFS = main.length > 140 ? 21 : main.length > 90 ? 23 : 26;
    ctx.font = 'italic '+trFS+'px Arial';
    const trLines = splitLines(ctx, '\u00ab '+main+' \u00bb', cw-160);
    let trY = midY + 45;
    trLines.forEach(ln => { ctx.fillText(ln, W/2, trY); trY += trFS*1.75; });
  }

  // Source
  ctx.fillStyle = acc; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center'; ctx.direction = 'ltr';
  ctx.fillText('\u2014 '+source+' \u2014', W/2, cy+ch-50);
  ctx.fillStyle = acc+'55'; ctx.font = '15px Arial';
  ctx.fillText('Manhaj As-Salaf As-Salih', W/2, cy+ch-26);

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'islam-authentique.png'; a.click();
    URL.revokeObjectURL(url);
    toast('📸 Image téléchargée !');
  }, 'image/png');
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function div(ctx, x1, y1, x2, y2, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}
function splitLines(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    const test = cur ? cur+' '+w : w;
    if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  return lines;
}

function sharePlatform(platform, encText) {
  const text = decodeURIComponent(encText);
  // Re-encode cleanly for each platform
  const enc = encodeURIComponent(text);
  const actions = {
    'WhatsApp': ()=> window.open('https://wa.me/?text='+enc,'_blank'),
    'Telegram': ()=> window.open('https://t.me/share/url?url=https%3A%2F%2Fislamauthentique.vercel.app&text='+enc,'_blank'),
    'X':        ()=> window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text.substring(0,280)),'_blank'),
    'Facebook': ()=>{ navigator.clipboard?.writeText(text); toast('📋 Texte copié — colle-le sur Facebook'); window.open('https://www.facebook.com/','_blank'); },
    'Email':    ()=> window.open('mailto:?subject=Islam%20Authentique%20%E2%80%94%20Manhaj%20As-Salaf&body='+enc,'_blank'),
    'Copier':   ()=>{ navigator.clipboard?.writeText(text); toast('📋 '+t('copied')); closeModal(); },
  };
  (actions[platform] || (()=>{ navigator.clipboard?.writeText(text); toast('📋 Copié !'); }))();
}

            <span style="font-size:9px;background:${s.label.includes('Witr')?'#60a5fa20':'#fbbf2420'};color:${s.label.includes('Witr')?'#60a5fa':'#fbbf24'};padding:3px 8px;border-radius:99px;font-weight:700;border:1px solid ${s.label.includes('Witr')?'#60a5fa40':'#fbbf2440'}">${s.label.includes('Witr')?'WITR':'SUNNAH'}</span>

        <div style="background:var(--accd);border:1.5px solid var(--acc3);border-radius:14px;padding:14px;margin-bottom:10px">
          <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:var(--acc);margin-bottom:8px">🏆 ${ST.lang==='en'?'REWARDS — AUTHENTIC HADITHS':'RÉCOMPENSES — HADITHS AUTHENTIQUES'}</div>

        <!-- Scholars' opinions -->
        <div style="background:var(--bg3);border-radius:14px;padding:14px;margin-bottom:10px">
          <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:var(--txm);margin-bottom:8px">📚 ${ST.lang==='en'?'SCHOLARS\' OPINIONS':'AVIS DES SAVANTS'}</div>
          <div style="font-size:12px;color:var(--tx2);line-height:1.75;white-space:pre-line">${d.scholars}</div>
        </div>

        ${d.special ? `
        <div style="background:${d.special.includes('⚠️')?'#f59e0b20':'var(--bg3)'};border:1.5px solid ${d.special.includes('⚠️')?'#f59e0b40':'var(--bdr)'};border-radius:13px;padding:13px;margin-bottom:10px">
          <div style="font-size:12px;color:var(--tx2);line-height:1.65">${d.special}</div>
        </div>` : ''}

        <!-- Between adhan & iqama -->
        <div style="background:var(--bg3);border-radius:13px;padding:13px;margin-bottom:18px">
          <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:var(--txm);margin-bottom:6px">🕐 ${ST.lang==='en'?'BETWEEN ADHAN & IQAMA':'ENTRE ADHAN ET IQAMA'}</div>
          <div style="font-size:12px;color:var(--tx2);line-height:1.65">
            ${ST.lang==='en'
              ?'"Supplication is not rejected between the adhan and the iqama." (Abu Dawud n°521 — Sahih Al-Albani)\nThis is the time to make du\'a and pray the Sunnah rak\'at before the obligatory prayer.'
              :'«Le du\'a n\'est pas rejeté entre l\'adhan et l\'iqama.» (Abu Dawud n°521 — Sahih Al-Albani)\nC\'est le moment de faire du\'a et de prier les rak\'at sunnah avant la prière obligatoire.'}
          </div>
        </div>

        <button onclick="closeModal()" style="width:100%;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:13px;padding:13px;font-size:13px;font-weight:600;color:var(--txm);cursor:pointer">${t('close')}</button>
        <div style="height:env(safe-area-inset-bottom,8px)"></div>
      </div>
    </div>`;
  setupDragClose('rk-handle','rk-drag',()=>closeModal());
}

async function openPrayerCalendar() {
  if (!ST.city && !ST.prayerTimes) {
    document.getElementById('modal-root').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-sheet">
          <div style="font-size:18px;font-weight:900;margin-bottom:8px">📅 ${ST.lang==='en'?'Monthly Calendar':'Calendrier mensuel'}</div>
          <div style="font-size:12px;color:var(--txm);margin-bottom:14px">${ST.lang==='en'?'Enter your city (e.g. Paris,FR):':'Entrez votre ville (ex: Paris,FR) :'}</div>
          <div style="display:flex;gap:8px;margin-bottom:16px">
            <input id="cal-city-input" placeholder="Paris,FR"
              style="flex:1;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:13px;font-family:'Outfit',sans-serif;outline:none"/>
            <button onclick="const v=document.getElementById('cal-city-input').value.trim();if(v){ST.city=v;savePref();closeModal();setTimeout(openPrayerCalendar,100);}"
              style="background:var(--acc);color:#000;border:none;border-radius:10px;padding:10px 18px;font-weight:800;font-size:14px;cursor:pointer">→</button>
          </div>
          <button onclick="closeModal()" style="width:100%;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:13px;padding:12px;font-size:13px;font-weight:600;color:var(--txm);cursor:pointer">${t('close')}</button>
        </div>
      </div>`;
    return;
  }
  const now = new Date();
  const month = now.getMonth() + 1;
  const year = now.getFullYear();
  const today = now.getDate();
  const cityLabel = ST.prayerCity || ST.city || 'Paris';
  const monthNames = ST.lang==='en'
    ? ['January','February','March','April','May','June','July','August','September','October','November','December']
    : ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dayShort = ST.lang==='en'
    ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    : ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-sheet" style="max-height:94vh;padding:0">
        <div class="drag-handle-wrap" id="cal-drag" style="background:var(--bg2)"><div class="modal-handle" id="cal-handle"></div></div>
        <div style="padding:0 18px 8px;display:flex;align-items:center;gap:10px">
          <div style="flex:1">
            <div style="font-size:18px;font-weight:900">📅 ${ST.lang==='en'?'Monthly Prayer Calendar':'Horaires du mois'}</div>
            <div style="font-size:11px;color:var(--txm);margin-top:1px">📍 ${cityLabel} · ${monthNames[month-1]} ${year}</div>
          </div>
          <button onclick="closeModal()" style="background:var(--bg3);border:1px solid var(--bdr);border-radius:99px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--txm)">✕</button>
        </div>
        <div id="cal-body" style="padding:0 18px 18px;overflow-y:auto;max-height:80vh">
          <div class="loader" style="padding:40px 0"><div class="spinner"></div></div>
        </div>
        <div style="height:env(safe-area-inset-bottom,0px)"></div>
      </div>
    </div>`;
  setupDragClose('cal-handle','cal-drag',()=>closeModal());

  try {
    const cityRaw = ST.city || 'Paris,FR';
    const cp = cityRaw.split(',');
    const calCity = encodeURIComponent((cp[0]||'Paris').trim());
    const calCountry = encodeURIComponent((cp[1]||'').trim());
    const countryParam = calCountry ? `&country=${calCountry}` : '';
    const url = `https://api.aladhan.com/v1/calendarByCity/${year}/${month}?city=${calCity}${countryParam}&method=${ST.calcMethod||'2'}`;
    const d = await (await fetch(url)).json();
    if (d.code !== 200 || !d.data) throw new Error('API error');
    const days = d.data;
    const ps = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
    const psLabel = ['Fajr','Shurûq','Dhuhr','Asr','Maghrib','Ishâ'];

    const calBody = document.getElementById('cal-body');
    if (!calBody) return;

    // Current hijri month name
    const todayHijri = days[today-1]?.date?.hijri;
    const hijriMonthName = todayHijri?.month?.fr || todayHijri?.month?.en || '';
    const hijriYear2 = todayHijri?.year || '';

    calBody.innerHTML = `
      <!-- Hijri month badge -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--accd);border-radius:12px;padding:10px 14px">
        <div class="ar" style="direction:rtl;font-size:18px;color:var(--acc)">${todayHijri?.month?.ar||''}</div>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--acc)">${hijriMonthName} ${hijriYear2} H</div>
          <div style="font-size:11px;color:var(--txm)">${monthNames[month-1]} ${year} — ${cityLabel}</div>
        </div>
      </div>

      <!-- Column headers -->
      <div style="display:grid;grid-template-columns:42px 22px repeat(6,1fr);gap:1px;background:var(--bdr);border-radius:10px 10px 0 0;overflow:hidden;position:sticky;top:0;z-index:5">
        <div style="background:var(--accd);padding:7px 4px;font-size:9px;font-weight:800;color:var(--acc);text-align:center">Jour</div>
        <div style="background:var(--accd);padding:7px 2px;font-size:9px;font-weight:800;color:var(--acc);text-align:center">H</div>
        ${psLabel.map(p=>`<div style="background:var(--accd);padding:7px 2px;font-size:9px;font-weight:800;color:var(--acc);text-align:center;line-height:1.2">${p}</div>`).join('')}
      </div>

      <!-- Day rows -->
      <div style="border:1px solid var(--bdr);border-top:none;border-radius:0 0 10px 10px;overflow:hidden">
        ${days.map((day,i)=>{
          const dn = i+1;
          const isToday = dn===today;
          const isFriday = new Date(year,month-1,dn).getDay()===5;
          const hDay = day.date?.hijri?.day||'';
          const t = day.timings;
          const rowBg = isToday ? 'var(--accd)' : isFriday ? 'var(--bg3)' : i%2===0 ? 'var(--bg2)' : 'var(--bg)';
          const textColor = isToday ? 'var(--acc)' : isFriday ? 'var(--grs)' : 'var(--tx2)';
          const dow = dayShort[new Date(year,month-1,dn).getDay()];
          return `<div style="display:grid;grid-template-columns:42px 22px repeat(6,1fr);gap:1px;background:var(--bdr);${isToday?'border-left:3px solid var(--acc);':''}">
            <div style="background:${rowBg};padding:6px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center">
              <div style="font-size:${isToday?'13':'11'}px;font-weight:${isToday?'900':'600'};color:${textColor};line-height:1">${dn}</div>
              <div style="font-size:8px;color:${isFriday?'var(--grs)':'var(--txd)'};font-weight:${isFriday?'700':'400'}">${dow}</div>
            </div>
            <div style="background:${rowBg};padding:6px 2px;display:flex;align-items:center;justify-content:center">
              <div style="font-size:9px;color:var(--txd);line-height:1;text-align:center">${hDay}</div>
            </div>
            ${ps.map(p=>`<div style="background:${rowBg};padding:6px 1px;text-align:center;font-size:${isToday?'11':'10'}px;font-weight:${isToday?'700':'400'};color:${textColor}">${(t[p]||'--').substring(0,5)}</div>`).join('')}
          </div>`;
        }).join('')}
      </div>

      <!-- Method info -->
      <div style="margin-top:10px;font-size:10px;color:var(--txd);text-align:center">
        Méthode : ${['','ISNA','MWL','EGAS','Oumm Al-Qura','UISA','','IGT','','','','MUIS','UOIF'][parseInt(ST.calcMethod||12)]||'UOIF'} · Vert = Vendredi · Surligné = Aujourd'hui
      </div>`;
  } catch(e) {
    const calBody = document.getElementById('cal-body');
    if (calBody) calBody.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--txd)">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">${ST.lang==='en'?'Unable to load calendar':'Impossible de charger le calendrier'}</div>
      <div style="font-size:12px">Vérifiez votre connexion internet et que votre ville est bien configurée dans les paramètres.</div>
      <button onclick="closeModal();openSettings()" style="margin-top:16px;background:var(--acc);color:#000;border:none;border-radius:12px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer">⚙️ ${t('settings')}</button>
    </div>`;
  }
}

    {n:4,t:isEn?'Rinse mouth + nose 3\u00d7':'Rincer bouche + nez 3\u00d7',ar:'\u0627\u0644\u0645\u064e\u0636\u0652\u0645\u064e\u0636\u064e\u0629\u064f \u0648\u064e\u0627\u0644\u0627\u0633\u0652\u062a\u0650\u0646\u0652\u0634\u064e\u0627\u0642\u064f',

    {n:8,t:isEn?'Wipe the ears ONCE':'Essuyer les oreilles UNE FOIS',ar:'\u0645\u064e\u0633\u0652\u062d\u064f \u0627\u0644\u0623\u064f\u0630\u064f\u0646\u064e\u064a\u0652\u0646\u0650',

    {n:10,t:isEn?'Du\'a after Wudu':'Du\u2019\u00e2 apr\u00e8s le Wudu',ar:'\u0623\u064e\u0634\u0652\u0647\u064e\u062f\u064f \u0623\u064e\u0646\u0652 \u0644\u064e\u0627 \u0625\u0650\u0644\u064e\u0670\u0647\u064e \u0625\u0650\u0644\u0651\u064e\u0627 \u0627\u0644\u0644\u0647\u064f \u0648\u064e\u0623\u064e\u0634\u0652\u0647\u064e\u062f\u064f \u0623\u064e\u0646\u0652 \u0645\u064f\u062d\u064e\u0645\u064e\u0651\u062f\u064b\u0627 \u0639\u064e\u0628\u0652\u062f\u064f\u0647\u064f \u0648\u064e\u0631\u064e\u0633\u064f\u0648\u0644\u064f\u0647\u064f',

    {n:1,t:isEn?'Face the Qibla':'Faire face \u00e0 la Qibla',ar:'\u0627\u0633\u0652\u062a\u0650\u0642\u0652\u0628\u064e\u0627\u0644\u064f \u0627\u0644\u0642\u0650\u0628\u0652\u0644\u064e\u0629\u0650',d:isEn?'Face Makkah — use the Qibla tool if needed. Obligatory (Al-Baqarah 2:144).':'Se tourner vers La Mecque — utiliser l\u2019outil Qibla si besoin. Obligatoire (Al-Baqara 2:144).',s:'Al-Baqarah 2:144'},
    {n:2,t:isEn?'Takbirat Al-Ihram':'Takbirat Al-Ihram',ar:'\u0627\u0644\u0644\u0647\u064f \u0623\u064e\u0643\u0652\u0628\u064e\u0631\u064f',d:isEn?'Raise hands to shoulder/ear level and say Allahu Akbar. Opens the prayer. Ibn Uthaymeen: raise hands while saying the takbir simultaneously. (Bukhari n\u00b0702)':'Lever les mains jusqu\u2019aux \u00e9paules ou oreilles et dire Allahu Akbar. Ouvre la pri\u00e8re. Ibn Uthaymeen : lever les mains tout en disant le takbir. (Bukhari n\u00b0702)',s:'Bukhari n\u00b0702'},
    {n:3,t:isEn?'Opening Du\'a (Istiftah)':'Du\u2019\u00e2 d\u2019ouverture (Istiftah)',ar:'\u0633\u064f\u0628\u0652\u062d\u064e\u0627\u0646\u064e\u0643\u064e \u0627\u0644\u0644\u064e\u0651\u0647\u064f\u0645\u064e\u0651 \u0648\u064e\u0628\u0650\u062d\u064e\u0645\u0652\u062f\u0650\u0643\u064e \u0648\u064e\u062a\u064e\u0628\u064e\u0627\u0631\u064e\u0643\u064e \u0627\u0633\u0652\u0645\u064f\u0643\u064e \u0648\u064e\u062a\u064e\u0639\u064e\u0627\u0644\u064e\u0649 \u062c\u064e\u062f\u064e\u0651\u0643\u064e',d:isEn?'Recite silently after opening takbir. Sunnah, not obligatory. Multiple du\'as are authentic. (Tirmidhi n\u00b0243)':'R\u00e9citer silencieusement apr\u00e8s le takbir d\u2019ouverture. Sunnah, non obligatoire. (Tirmidhi n\u00b0243)',s:'Tirmidhi n\u00b0243'},
    {n:4,t:isEn?'Al-Fatiha (Obligatory in every rak\'at)':'Al-Fatiha (Obligatoire dans chaque rak\u2019at)',ar:'\u0628\u0650\u0633\u0652\u0645\u0650 \u0627\u0644\u0644\u064e\u0651\u0647\u0650 \u0627\u0644\u0631\u064e\u0651\u062d\u0652\u0645\u064e\u0670\u0646\u0650 \u0627\u0644\u0631\u064e\u0651\u062d\u0650\u064a\u0645\u0650',d:isEn?'"No prayer for one who does not recite Al-Fatiha." (Bukhari n\u00b0756) — Must be recited in every rak\'at. Say Ameen loudly after it (imam and followers).':'\u00ab Pas de pri\u00e8re pour celui qui ne r\u00e9cite pas Al-Fatiha. \u00bb (Bukhari n\u00b0756) \u2014 Dans chaque rak\u2019at. Dire Ameen \u00e0 voix haute apr\u00e8s.',s:'Bukhari n\u00b0756'},
    {n:5,t:isEn?'Extra Surah (Sunnah in 1st & 2nd rak\'at)':'Sourate suppl\u00e9mentaire (Sunnah 1er et 2\u00e8me rak\u2019at)',ar:'\u062b\u064f\u0645\u064e\u0651 \u0627\u0642\u0652\u0631\u064e\u0623\u0652 \u0645\u064e\u0627 \u062a\u064e\u064a\u064e\u0633\u064e\u0651\u0631\u064e',d:isEn?'Recite a surah after Al-Fatiha in 1st and 2nd rak\'at. Ibn Baz: obligatory in the 1st rak\'at.':'R\u00e9citer une sourate apr\u00e8s Al-Fatiha dans le 1er et 2\u00e8me rak\u2019at. Ibn Baz : obligatoire dans le 1er.',s:'Bukhari n\u00b0702'},
    {n:6,t:isEn?'Ruku\' (Bowing)':'Ruku\u2019 (Inclinaison)',ar:'\u0633\u064f\u0628\u0652\u062d\u064e\u0627\u0646\u064e \u0631\u064e\u0628\u0650\u0651\u064a\u064e \u0627\u0644\u0652\u0639\u064e\u0638\u0650\u064a\u0645\u0650',d:isEn?'Bow with back straight and horizontal, hands on knees. Say Subhana Rabbiyal-Azim at least 3 times. (Muslim n\u00b0471)':'S\u2019incliner avec le dos horizontal, les mains sur les genoux. Dire Subhana Rabbiyal-Azim au moins 3 fois. (Muslim n\u00b0471)',s:'Muslim n\u00b0471'},
    {n:7,t:isEn?'Rising from Ruku\'':'Se relever du Ruku\u2019',ar:'\u0633\u064e\u0645\u0650\u0639\u064e \u0627\u0644\u0644\u0647\u064f \u0644\u0650\u0645\u064e\u0646\u0652 \u062d\u064e\u0645\u0650\u062f\u064e\u0647\u064f \u2014 \u0631\u064e\u0628\u064e\u0651\u0646\u064e\u0627 \u0648\u064e\u0644\u064e\u0643\u064e \u0627\u0644\u062d\u064e\u0645\u0652\u062f\u064f',d:isEn?'Rise saying "Sami Allahu liman hamidah" then say "Rabbana wa lakal-hamd" while standing. Must fully straighten before Sujud. (Bukhari n\u00b0789)':'Se lever en disant "Sami Allahu liman hamidah" puis "Rabbana wa lakal-hamd" debout. Doit se redresser compl\u00e8tement. (Bukhari n\u00b0789)',s:'Bukhari n\u00b0789'},
    {n:8,t:isEn?'Sujud — Prostration (7 body parts)':'Sujud \u2014 Prosternation (7 membres)',ar:'\u0633\u064f\u0628\u0652\u062d\u064e\u0627\u0646\u064e \u0631\u064e\u0628\u0650\u0651\u064a\u064e \u0627\u0644\u0623\u064e\u0639\u0652\u0644\u064e\u0649',d:isEn?'7 body parts: forehead+nose, both hands, both knees, both feet. Say Subhana Rabbiyal-A\'la 3+ times. The NOSE must touch the ground (obligatory — Ibn Uthaymeen). (Bukhari n\u00b0812)':'7 membres : front+nez, deux mains, deux genoux, deux pieds. Dire Subhana Rabbiyal-A\u2019la 3+ fois. Le NEZ doit toucher le sol (obligatoire \u2014 Ibn Uthaymeen). (Bukhari n\u00b0812)',s:'Bukhari n\u00b0812'},
    {n:9,t:isEn?'Between 2 Sujud':'Entre les 2 Sujud',ar:'\u0631\u064e\u0628\u0650\u0651 \u0627\u063a\u0652\u0641\u0650\u0631\u0652 \u0644\u0650\u064a \u0648\u064e\u0627\u0631\u0652\u062d\u064e\u0645\u0652\u0646\u0650\u064a \u0648\u064e\u0627\u0647\u0652\u062f\u0650\u0646\u0650\u064a \u0648\u064e\u0639\u064e\u0627\u0641\u0650\u0646\u0650\u064a \u0648\u064e\u0627\u0631\u0652\u0632\u064f\u0642\u0652\u0646\u0650\u064a',d:isEn?'"My Lord, forgive me, have mercy, guide me, heal me and provide for me." Must fully sit before 2nd Sujud. (Abu Dawud n\u00b0850 — Sahih Al-Albani)':'Se rasseoir enti\u00e8rement et dire ce du\u2019\u00e2. (Abu Dawud n\u00b0850 — Sahih Al-Albani)',s:'Abu Dawud n\u00b0850'},
    {n:10,t:isEn?'Tashahhud + Salat Ibrahimiyya':'Tashahhud + Salat Ibrahimiyya',ar:'\u0627\u0644\u062a\u064e\u0651\u062d\u0650\u064a\u064e\u0651\u0627\u062a\u064f \u0644\u0644\u0647\u0650 \u0648\u064e\u0627\u0644\u0635\u064e\u0651\u0644\u064e\u0648\u064e\u0627\u062a\u064f',d:isEn?'Sit after 2nd rak\'at (and final rak\'at). Recite At-Tashahhud then As-Salat Al-Ibrahimiyya. Raise index finger for the Shahada. (Bukhari n\u00b0831)':'S\u2019asseoir apr\u00e8s le 2\u00e8me rak\u2019at. R\u00e9citer At-Tashahhud puis As-Salat Al-Ibrahimiyya. Lever l\u2019index pour la Shahada. (Bukhari n\u00b0831)',s:'Bukhari n\u00b0831'},
    {n:11,t:isEn?'Taslim — End of prayer':'Taslim \u2014 Fin de la pri\u00e8re',ar:'\u0627\u0644\u0633\u064e\u0651\u0644\u064e\u0627\u0645\u064f \u0639\u064e\u0644\u064e\u064a\u0652\u0643\u064f\u0645\u0652 \u0648\u064e\u0631\u064e\u062d\u0652\u0645\u064e\u0629\u064f \u0627\u0644\u0644\u0647\u0650',d:isEn?'Turn right: "As-Salamu alaykum wa rahmatullah" — then left. Both salams are obligatory (Ibn Baz, Ibn Uthaymeen). (Muslim n\u00b0581)':'Tourner \u00e0 droite : "As-Salamu alaykum wa rahmatullah" \u2014 puis \u00e0 gauche. Les deux salams sont obligatoires (Ibn Baz, Ibn Uthaymeen). (Muslim n\u00b0581)',s:'Muslim n\u00b0581'},
  ];

  const MISTAKES = [
    {t:isEn?'Forgetting a pillar (Rukn)':'Oublier un pilier (Rukn)',d:isEn?'If you forget a pillar (ruku\', sujud, fatiha): return to it when you remember. If you already moved to the next pillar, return and continue from there. (Ibn Uthaymeen)':'Si vous oubliez un pilier (ruku\u2019, sujud, fatiha) : y revenir quand vous vous en souvenez. Si vous \u00eates pass\u00e9 au suivant, revenez et continuez. (Ibn Uthaymeen)'},
    {t:isEn?'Forgetting an obligatory act (Wajib)':'Oublier un acte obligatoire (Wajib)',d:isEn?'If you forget the first tashahhud or a transition takbir: perform Sujud As-Sahw (2 prostrations) at the end before the final taslim. (Muslim n\u00b0570)':'Si vous oubliez le premier tashahhud : faire Sujud As-Sahw (2 prosternations) \u00e0 la fin avant le taslim. (Muslim n\u00b0570)'},
    {t:isEn?'Doubt about number of rak\'at':'Doute sur le nombre de rak\u2019at',d:isEn?'Build on the lesser number (minimum you are sure of) then perform Sujud As-Sahw at the end. (Muslim n\u00b0571)':'Se baser sur le nombre le moins \u00e9lev\u00e9 puis faire Sujud As-Sahw \u00e0 la fin. (Muslim n\u00b0571)'},
    {t:isEn?'Praying extra rak\'at by mistake':'Prier un rak\u2019at de trop par erreur',d:isEn?'If you realize after finishing: perform Sujud As-Sahw. If you realize during: sit and correct immediately. (Bukhari n\u00b01228)':'Si vous r\u00e9alisez apr\u00e8s : faire Sujud As-Sahw. Si pendant : s\u2019asseoir et corriger imm\u00e9diatement. (Bukhari n\u00b01228)'},
    {t:isEn?'Imam makes a mistake':'L\u2019imam se trompe',d:isEn?'Men say "Subhan Allah", women clap to alert the imam. The imam should correct his error. (Bukhari n\u00b0652)':'Les hommes disent "Subhan Allah", les femmes applaudissent pour alerter l\u2019imam. (Bukhari n\u00b0652)'},
  ];

  const INVALID = [
    {t:isEn?'Ritual impurity (passing gas etc.)':'Impuret\u00e9 rituelle (gaz, etc.)',d:isEn?'Any hadath (passing gas, urinating, etc.) invalidates the prayer. Leave, redo wudu, then redo the prayer. (Bukhari n\u00b06954)':'Tout hadath (gaz, urination, etc.) invalide la pri\u00e8re. Partir, refaire le wudu puis la pri\u00e8re. (Bukhari n\u00b06954)'},
    {t:isEn?'Intentional speech':'Parole intentionnelle',d:isEn?'Speaking intentionally (outside prayer words) invalidates it. Forgetting: the prayer remains valid. (Muslim n\u00b0537)':'Parler intentionnellement (hors mots de pri\u00e8re) invalide. Par oubli : la pri\u00e8re reste valide. (Muslim n\u00b0537)'},
    {t:isEn?'Excessive movement (3+)':'Mouvement excessif (3+)',d:isEn?'3 or more consecutive unnecessary movements invalidate the prayer. Small adjustments (scratching) are excused. (Ibn Uthaymeen)':'3 mouvements inutiles cons\u00e9cutifs ou plus invalident la pri\u00e8re. Les petits ajustements sont excus\u00e9s. (Ibn Uthaymeen)'},
    {t:isEn?'Chest turns away from Qibla':'La poitrine se tourne de la Qibla',d:isEn?'If the chest completely turns away from Qibla intentionally, the prayer is invalid. Turning the head only does not invalidate. (Ibn Uthaymeen)':'Si la poitrine se tourne enti\u00e8rement de la Qibla intentionnellement, la pri\u00e8re est invalide. Tourner la t\u00eate seule n\u2019invalide pas. (Ibn Uthaymeen)'},
    {t:isEn?'Laughing (with sound)':'Rire (avec son)',d:isEn?'Laughing during prayer (with sound) invalidates it. Smiling does not. (Consensus of scholars)':'Rire pendant la pri\u00e8re (avec son) l\u2019invalide. Sourire non. (Consensus des savants)'},
    {t:isEn?'Eating or drinking':'Manger ou boire',d:isEn?'Eating or drinking during prayer invalidates it (majority). (Consensus)':'Manger ou boire pendant la pri\u00e8re l\u2019invalide (majorit\u00e9). (Consensus)'},
  ];

  const tabs = [['wudu','\ud83d\udca7 Wudu'],['prayer','\ud83d\udd4c '+( isEn?'Prayer':'Pri\u00e8re')],['mistakes','\u26a0\ufe0f '+(isEn?'Errors':'Erreurs')],['invalid','\u274c '+(isEn?'Nullifiers':'Annulants')]];
  const data = ST.fiqhTab==='wudu'?WUDU:ST.fiqhTab==='prayer'?PRAYER:ST.fiqhTab==='mistakes'?MISTAKES:INVALID;

  el.innerHTML = `
    <div class="chips chips-sticky" style="margin-bottom:12px">
      ${tabs.map(([k,l])=>`<button class="chip ${ST.fiqhTab===k?'on':''}" onclick="ST.fiqhTab='${k}';renderMoreContent()">${l}</button>`).join('')}
    </div>

    <div class="card card-grad" style="margin-bottom:14px;font-size:12px;color:var(--tx2);line-height:1.7">
      ${ST.fiqhTab==='wudu'?`\u00ab${isEn?'"Shall I not tell you about something by which Allah erases sins and raises degrees? Performing ablution properly despite hardship, taking many steps to the mosque, and waiting for prayer after prayer." (Muslim n\u00b0251)':'"Voulez-vous que je vous indique ce par quoi Allah efface les p\u00e9ch\u00e9s et \u00e9l\u00e8ve les degr\u00e9s ? Accomplir les ablutions malgr\u00e9 les difficult\u00e9s, faire de nombreux pas vers la mosqu\u00e9e, et attendre la pri\u00e8re apr\u00e8s la pri\u00e8re." (Muslim n\u00b0251)'}\u00bb`:
       ST.fiqhTab==='prayer'?`\u00ab${isEn?'"Pray as you have seen me pray." (Bukhari n\u00b0631)':'\"Priez comme vous m\u2019avez vu prier.\" (Bukhari n\u00b0631)'}\u00bb`:
       ST.fiqhTab==='mistakes'?`\u00ab${isEn?'"When one of you doubts in his prayer, let him build on what he is sure of." (Muslim n\u00b0571)':'\"Quand l\u2019un de vous doute dans sa pri\u00e8re, qu\u2019il se base sur ce dont il est s\u00fbr.\" (Muslim n\u00b0571)'}\u00bb`:
       isEn?'Things that invalidate the prayer — based on authentic Sunnah and consensus of scholars (Ibn Baz, Ibn Uthaymeen).':'Ce qui invalide la pri\u00e8re \u2014 bas\u00e9 sur la Sunnah authentique et le consensus (Ibn Baz, Ibn Uthaymeen).'}
    </div>

    ${data.map(s=>`
    <div class="card" style="margin-bottom:10px">
      ${s.n!==undefined?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#000;flex-shrink:0">${s.n}</div><div style="font-size:13px;font-weight:800;color:var(--acc)">${s.t}</div></div>`:
      `<div style="font-size:13px;font-weight:800;color:${ST.fiqhTab==='invalid'?'#ef4444':'var(--acc)'};margin-bottom:8px">${ST.fiqhTab==='invalid'?'\u274c ':'\u26a0\ufe0f '}${s.t}</div>`}
      ${s.ar?`<div class="ar" style="direction:rtl;text-align:right;font-size:18px;color:var(--acc);margin-bottom:8px;line-height:2">${s.ar}</div>`:''}
      <div style="font-size:12px;color:var(--tx2);line-height:1.7;margin-bottom:${s.s?'6':'0'}px">${s.d}</div>
      ${s.s?`<div style="font-size:10px;color:var(--grs)">\ud83d\udcda ${s.s}</div>`:''}
    </div>`).join('')}
  `;
}

function renderHistory(el) {
  el.innerHTML = `
    <div class="slbl">${ST.lang==='en'?'Reading History':'Historique de lecture'}</div>
    ${_history.length === 0
      ? `<div style="text-align:center;color:var(--txd);padding:30px;font-size:13px">${ST.lang==='en'?'No history.<br>Read surahs or hadiths to see them here.':'Aucun historique.<br>Lisez des sourates ou hadiths pour les voir ici.'}</div>`
      : _history.map(h=>`
        <div class="history-item" onclick="${h.type==='surah'?`closeHistory();go('quran');openSurah(${h.id})`:`closeHistory();go('hadith')`}">
          <div class="history-icon">${h.type==='surah'?h.id:'📜'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;margin-bottom:2px">${h.title}</div>
            <div style="font-size:11px;color:var(--txd)">${h.sub}</div>
          </div>
          <div style="font-size:10px;color:var(--txd)">${timeAgo(h.ts)}</div>
        </div>`).join('')}
    ${_bookmark ? `
      <div class="slbl" style="margin-top:16px">Marque-page Coran</div>
      <div class="history-item" onclick="closeHistory();go('quran');openSurah(${_bookmark.surahId})">
        <div class="history-icon">🔖</div>
        <div>
          <div style="font-size:13px;font-weight:600">${_bookmark.surahName} — Verset ${_bookmark.verseNum}</div>
          <div style="font-size:11px;color:var(--txd)">${timeAgo(_bookmark.ts)}</div>
        </div>
      </div>` : ''}
  `;
}

function closeHistory() { closeModal(); }

function timeAgo(ts) {
  const diff = (Date.now()-ts)/1000;
  if (diff < 60) return 'À l\'instant';
  if (diff < 3600) return Math.floor(diff/60)+'min';
  if (diff < 86400) return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'j';
}

// READING PROGRESS
// ═══════════════════════════════
function updateReadingProgress() {
  const cnt = document.getElementById('cnt');
  const fill = document.getElementById('rp-fill');
  if (!cnt || !fill) return;
  const pct = cnt.scrollTop / (cnt.scrollHeight - cnt.clientHeight) * 100;
  fill.style.width = Math.min(pct, 100) + '%';
}
