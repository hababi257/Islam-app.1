{id:458,ar:"لَا تَقُومُ السَّاعَةُ حَتَّى تَضْطَرِبَ أَلَيَاتُ نِسَاءِ دَوْسٍ",fr:"L'Heure ne se lèvera pas avant que les femmes de la tribu de Daws dansent autour de Dhul-Khulasa (une idole).",en:"The Hour will not begin until the buttocks of the women of Daws tribe jiggle around Dhul-Khulasa (an idol).",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:7116,a:"Sahih",ref:"Bukhari n°7116",th:"Akhira",reward:""},
{id:459,ar:"بَيْنَ يَدَيِ السَّاعَةِ سَنَوَاتٌ خَدَّاعَاتٌ",fr:"Avant l'Heure, il y aura des années trompeuses : on croira le menteur et on démentira le véridique, on fera confiance au traître et on se méfiera du fiable.",en:"Before the Hour there will be years of deception: the liar will be believed, the truthful one will be denied, the traitor will be trusted, and the trustworthy one will be distrusted.",n:"Abu Hureyra ر",b:"Ibn Majah",num:4036,a:"Sahih",ref:"Silsilah n°1887",th:"Akhira",reward:"Niyyah = fondement de tous les actes. 1er hadith du Sahih. (Bukhari n°1)"},
{id:460,ar:"لَا تَقُومُ السَّاعَةُ وَفِي الأَرْضِ مَنْ يَقُولُ اللهُ اللهُ",fr:"L'Heure ne se lèvera pas tant qu'il y aura sur terre quelqu'un qui dit 'Allah Allah'.",en:"The Hour will not begin as long as there remains on earth someone who says 'Allah Allah'.",n:"Anas ر",b:"Sahih Muslim",num:148,a:"Sahih",ref:"Muslim n°148",th:"Akhira",reward:""},
// ── PATIENCE & EPREUVE ──
{id:461,ar:"مَا يَزَالُ الْمُسْلِمُ يُصِيبُهُ الأَذَى حَتَّى يَلْقَى اللهَ",fr:"Le musulman ne cesse d'être atteint par la peine jusqu'à ce qu'il rencontre Allah sans péché.",en:"The Muslim continues to be afflicted with harm until he meets Allah without any sin.",n:"Abu Sa'id ر",b:"Jami' At-Tirmidhi",num:2399,a:"Sahih",ref:"Silsilah n°2280",th:"Sabr",reward:"Purification des péchés par les épreuves"},
{id:462,ar:"إِذَا أَحَبَّ اللهُ قَوْمًا ابْتَلَاهُمْ",fr:"Quand Allah aime un peuple, Il l'éprouve. Qui est satisfait reçoit Sa satisfaction, qui est mécontent reçoit Son mécontentement.",en:"When Allah loves a people, He tests them. Whoever is pleased with it will receive His pleasure, and whoever is displeased will receive His displeasure.",n:"Anas ر",b:"Jami' At-Tirmidhi",num:2396,a:"Hasan",ref:"Tirmidhi n°2396",th:"Sabr",reward:"Faciliter = Sunnah du Prophète ﷺ. (Bukhari n°69)"},
{id:463,ar:"إِنَّ أَشَدَّ النَّاسِ بَلَاءً الأَنْبِيَاءُ ثُمَّ الأَمْثَلُ فَالأَمْثَلُ",fr:"Les gens les plus éprouvés sont les prophètes, puis ceux qui leur ressemblent le plus, puis ceux qui leur ressemblent le plus.",en:"The people most severely tested are the prophets, then those who resemble them most, then those who resemble them most.",n:"Sa'd Ibn Abi Waqqas ر",b:"Jami' At-Tirmidhi",num:2398,a:"Sahih",ref:"Silsilah n°143",th:"Sabr",reward:"Islam = facilité = quiconque est excessif sera surpassé. (Bukhari n°39)"},
// ── CROYANCES ──
{id:464,ar:"الإِيمَانُ يَزِيدُ وَيَنْقُصُ",fr:"La foi augmente et diminue.",en:"Faith increases and decreases.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:9,a:"Sahih",ref:"Bukhari n°9",th:"Tawhid",reward:""},
{id:465,ar:"ثَلَاثٌ مَنْ كُنَّ فِيهِ وَجَدَ بِهِنَّ حَلَاوَةَ الإِيمَانِ",fr:"Trois choses : celui chez qui elles se trouvent goûtera la douceur de la foi : qu'Allah et Son Messager soient plus aimés que tout autre, aimer quelqu'un uniquement pour Allah, détester de revenir à la mécréance comme on déteste d'être jeté au Feu.",en:"Three things: whoever has them will taste the sweetness of faith — that Allah and His Messenger be more beloved to him than anything else, to love someone only for Allah, and to hate returning to disbelief as he hates being thrown into the Fire.",n:"Anas ر",b:"Sahih Al-Bukhari",num:16,a:"Sahih",ref:"Bukhari n°16",th:"Tawhid",reward:"Goûter la douceur de la foi"},
{id:466,ar:"لَا يَكُونُ أَحَدُكُمْ مُؤْمِنًا حَتَّى أَكُونَ أَحَبَّ إِلَيْهِ مِنْ وَلَدِهِ وَوَالِدِهِ",fr:"Aucun d'entre vous n'est vraiment croyant tant que je ne lui suis pas plus cher que son enfant, son père et tous les gens.",en:"None of you is truly a believer until I am more beloved to him than his child, his parent and all people.",n:"Anas ر",b:"Sahih Al-Bukhari",num:15,a:"Sahih",ref:"Bukhari n°15",th:"Sunnah",reward:"Droiture avec repentir = protection contre l'égarement."},
// ── HADITHS PROPHÉTIQUES PRECIS ──
{id:467,ar:"نَضَّرَ اللهُ امْرَأً سَمِعَ مَقَالَتِي فَحَفِظَهَا وَوَعَاهَا",fr:"Qu'Allah illumine celui qui a entendu mes paroles, les a mémorisées et gardées, puis les a transmises.",en:"May Allah illuminate the one who heard my speech, memorized and preserved it, then conveyed it.",n:"Ibn Masud ر",b:"Jami' At-Tirmidhi",num:2656,a:"Sahih",ref:"Silsilah n°404",th:"'Ilm",reward:"Illumination du visage par Allah"},
{id:468,ar:"رُبَّ مُبَلَّغٍ أَوْعَى مِنْ سَامِعٍ",fr:"Parfois celui à qui la connaissance est transmise la comprend mieux que celui qui l'a entendue directement.",en:"Sometimes the one to whom knowledge is conveyed understands it better than the one who heard it directly.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:67,a:"Sahih",ref:"Bukhari n°67",th:"'Ilm",reward:"Aimer pour son frère = condition de la foi complète. (Bukhari n°13)"},
{id:469,ar:"كَفَى بِالْمَرْءِ إِثْمًا أَنْ يُحَدِّثَ بِكُلِّ مَا سَمِعَ",fr:"Il suffit à l'homme comme péché de rapporter tout ce qu'il entend.",en:"It is enough sin for a man to report everything he hears.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:5,a:"Sahih",ref:"Muqaddima Muslim",th:"Parole",reward:"Informer de son amour pour Allah = renforcement de la fraternité. (Silsilah n°417)"},
{id:470,ar:"عَلَيْكُمْ بِالصِّدْقِ وَإِنْ رَأَيْتُمُوهُ مُرًّا",fr:"Tenez-vous à la vérité même si vous la voyez amère.",en:"Hold fast to truthfulness even if you see it as bitter.",n:"Ibn Masud ر",b:"Tabarani",num:10118,a:"Hasan",ref:"Silsilah n°1789",th:"Akhlaq",reward:"S\'accrocher à la vérité même quand c\'est difficile = signe de la sincérité (sidq). Allah élève le sincère et lui accorde la confiance des gens. (Bukhari n°6094 — principe du sidq)"},
// ── PROPHETES ET SIRA ──
{id:471,ar:"إِنَّ مَثَلِي وَمَثَلَ الأَنْبِيَاءِ مِنْ قَبْلِي كَمَثَلِ رَجُلٍ بَنَى بَيْتًا",fr:"Mon exemple et celui des prophètes avant moi est comme celui d'un homme qui construit une maison et l'embellit — sauf qu'il y manque une brique. Les gens la contemplent et admirent, mais disent : 'Si seulement cette brique était là !' Je suis cette brique et je suis le Sceau des prophètes.",en:"My example and the example of the prophets before me is like a man who builds a house and makes it beautiful — except for one brick. People admire it and say: If only this brick were there! I am that brick and I am the Seal of the Prophets.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:3535,a:"Sahih",ref:"Bukhari n°3535",th:"Hadith",reward:"Le Prophète ﷺ est le dernier des prophètes — il complète la mission. Quiconque le suit en tous points aura son intercession au Jour du Jugement. (Bukhari n°3535)"},
{id:472,ar:"أَنَا أَوْلَى النَّاسِ بِعِيسَى ابْنِ مَرْيَمَ فِي الدُّنْيَا وَالآخِرَةِ",fr:"Je suis la personne la plus proche de 'Isa fils de Marie dans ce monde et dans l'au-delà. Les prophètes sont frères — leurs mères sont différentes mais leur religion est une.",en:"I am the closest person to Isa son of Mary in this world and in the Hereafter. The prophets are brothers — their mothers are different but their religion is one.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:3442,a:"Sahih",ref:"Bukhari n°3442",th:"Hadith",reward:"Chaque épreuve efface des péchés = purification continue. (Bukhari n°5641)"},
// ── SUNNAH PRATIQUE ──
{id:473,ar:"أَكْلُ الثُّومِ وَالْبَصَلِ وَالْكُرَّاثِ لَمَنِ ابْتُلِيَ بِهَا فَلَا يَقْرَبَنَّ مَسَاجِدَنَا",fr:"Quiconque mange de l'ail, des oignons ou du poireau — qu'il ne s'approche pas de nos mosquées.",en:"Whoever eats garlic, onions or leeks — let him not come near our mosques.",n:"Jabir ر",b:"Sahih Muslim",num:564,a:"Sahih",ref:"Muslim n°564",th:"Salat",reward:"Inna lillahi = Allah remplace par quelque chose de mieux. (Muslim n°918)"},
{id:474,ar:"إِذَا أَكَلَ أَحَدُكُمْ فَلْيَأْكُلْ بِيَمِينِهِ",fr:"Quand l'un de vous mange, qu'il mange avec sa main droite. Et quand il boit, qu'il boive avec sa droite.",en:"When one of you eats, let him eat with his right hand. And when he drinks, let him drink with his right hand.",n:"Ibn Umar ر",b:"Sahih Muslim",num:2020,a:"Sahih",ref:"Muslim n°2020",th:"Akhlaq",reward:"Le Paradis est voilé par les difficultés = persévérer = Paradis. (Bukhari n°4850)"},
{id:475,ar:"لَا يَشْرَبَنَّ أَحَدٌ مِنْكُمْ قَائِمًا",fr:"Que nul d'entre vous ne boive debout.",en:"Let none of you drink while standing.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2026,a:"Sahih",ref:"Muslim n°2026",th:"Akhlaq",reward:""},
{id:476,ar:"إِنَّ الشَّيْطَانَ يَأْكُلُ بِشِمَالِهِ وَيَشْرَبُ بِشِمَالِهِ",fr:"Shaytan mange de la main gauche et boit de la main gauche.",en:"Shaytan eats with his left hand and drinks with his left hand.",n:"Jabir ر",b:"Sahih Muslim",num:2019,a:"Sahih",ref:"Muslim n°2019",th:"Akhlaq",reward:"Modérer le rire = protection du cœur contre la mort spirituelle. (Silsilah n°506)"},
// ── NUIT DE LAYLAT AL-QADR ──
{id:477,ar:"إِنَّ هَذِهِ اللَّيْلَةَ لَيْلَةُ الْقَدْرِ خَيْرٌ مِنْ أَلْفِ شَهْرٍ",fr:"Cette nuit — Laylat Al-Qadr — est meilleure que mille mois.",en:"This night — Laylat Al-Qadr — is better than a thousand months.",n:"Anas ر",b:"Musnad Ahmad",num:11560,a:"Sahih",ref:"Al-Qadr 97:3",th:"Ramadan",reward:"Meilleure que 1000 mois de culte"},
{id:478,ar:"اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي",fr:"Ô Allah, Tu es Celui qui pardonne énormément, Tu aimes le pardon — pardonne-moi.",en:"O Allah, You are the Most Forgiving, You love forgiveness — so forgive me.",n:"Aïcha ر",b:"Jami' At-Tirmidhi",num:3513,a:"Sahih",ref:"Tirmidhi n°3513 — Sahih Al-Albani",th:"Du'a",reward:"Du'a de Laylat Al-Qadr"},
// ── SCIENCES ISLAMIQUES ──
{id:479,ar:"إِنَّ اللهَ لَا يَقْبِضُ الْعِلْمَ انْتِزَاعًا يَنْتَزِعُهُ مِنَ الْعِبَادِ",fr:"Allah n'enlève pas la connaissance en l'arrachant des gens, mais Il enlève la connaissance en faisant mourir les savants. Jusqu'à ce qu'il ne reste plus de savant, les gens prendront des ignorants comme chefs.",en:"Allah does not remove knowledge by taking it out of the servants, but He removes knowledge by taking away the scholars. Until no scholar remains, the people will take ignorant people as their leaders.",n:"Abdullah Ibn Amr ر",b:"Sahih Al-Bukhari",num:100,a:"Sahih",ref:"Bukhari n°100",th:"'Ilm",reward:""},
{id:480,ar:"خُذُوا الْعِلْمَ قَبْلَ أَنْ يَذْهَبَ",fr:"Prenez la connaissance avant qu'elle ne s'en aille.",en:"Acquire knowledge before it disappears.",n:"Ziyad Ibn Labid ر",b:"Ibn Majah",num:4048,a:"Sahih",ref:"Silsilah n°2914",th:"'Ilm",reward:"Allah aime l'excellence dans tout = motivation à l'ihsan. (Silsilah n°1113)"},
// ── CARACTERE DU PROPHETE ﷺ ──
{id:481,ar:"مَا بَعَثَنِي اللهُ مُعَنِّتًا وَلَا مُتَعَنِّتًا وَلَكِنْ بَعَثَنِي مُعَلِّمًا مُيَسِّرًا",fr:"Allah ne m'a pas envoyé pour nuire ou pour rendre difficile. Il m'a envoyé comme enseignant facilitateur.",en:"Allah did not send me to cause harm or difficulty. He sent me as a teacher who makes things easy.",n:"Jabir ر",b:"Sahih Muslim",num:1478,a:"Sahih",ref:"Muslim n°1478",th:"Hadith",reward:"Chercher la connaissance = obligation = ouverture de toutes les portes du Bien."},
{id:482,ar:"يَسِّرُوا وَلَا تُعَسِّرُوا وَسَكِّنُوا وَلَا تُنَفِّرُوا",fr:"Facilitez et ne rendez pas difficile. Tranquillisez et ne faites pas fuir.",en:"Make things easy and do not make them difficult. Calm people and do not repel them.",n:"Anas ر",b:"Sahih Al-Bukhari",num:69,a:"Sahih",ref:"Bukhari n°69",th:"Rifq",reward:""},
{id:483,ar:"مَا خُيِّرَ رَسُولُ اللهِ ﷺ بَيْنَ أَمْرَيْنِ إِلَّا أَخَذَ أَيْسَرَهُمَا",fr:"À chaque fois que le Messager d'Allah ﷺ avait le choix entre deux choses, il choisissait la plus facile — tant que ce n'était pas un péché.",en:"Whenever the Messenger of Allah ﷺ was given a choice between two matters, he would choose the easier one — as long as it was not sinful.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:3560,a:"Sahih",ref:"Bukhari n°3560",th:"Hadith",reward:""},
// ── HADITH QUDSI ──
{id:484,ar:"قَسَمْتُ الصَّلَاةَ بَيْنِي وَبَيْنَ عَبْدِي نِصْفَيْنِ",fr:"J'ai partagé la prière (Al-Fatiha) entre Moi et Mon serviteur en deux moitiés. La moitié est pour Moi et l'autre moitié est pour Mon serviteur, et Mon serviteur aura ce qu'il demande.",en:"I have divided the prayer (Al-Fatiha) between Me and My servant into two halves. Half is for Me and half is for My servant, and My servant will have what he asks for.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:395,a:"Sahih",ref:"Muslim n°395 — Hadith Qudsi",th:"Coran",reward:"Allah répond à chaque verset d'Al-Fatiha"},
{id:485,ar:"يَقُولُ اللهُ تَعَالَى أَنَا عِنْدَ ظَنِّ عَبْدِي بِي",fr:"Allah dit : Je suis auprès de Mon serviteur selon son opinion de Moi. Je suis avec lui quand il pense à Moi.",en:"Allah says: I am as My servant thinks of Me. I am with him when he thinks of Me.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:7405,a:"Sahih",ref:"Bukhari n°7405 — Hadith Qudsi",th:"Tawhid",reward:"Allah est avec celui qui pense à Lui"},
{id:486,ar:"يَا عِبَادِي إِنِّي حَرَّمْتُ الظُّلْمَ عَلَى نَفْسِي",fr:"Ô Mes serviteurs, J'ai interdit l'injustice à Moi-même et je l'ai rendue illicite entre vous — donc ne vous faites pas d'injustice.",en:"O My servants, I have forbidden injustice upon Myself and made it forbidden between you — so do not oppress one another.",n:"Abu Dharr ر",b:"Sahih Muslim",num:2577,a:"Sahih",ref:"Muslim n°2577 — Hadith Qudsi",th:"Tawhid",reward:"Transmettre la connaissance = obligation morale et religieuse. (Silsilah n°1)"},
// ── MISCELLANEOUS AUTHENTIQUES ──
{id:487,ar:"لَا تَسُبُّوا الدَّهْرَ فَإِنَّ اللهَ هُوَ الدَّهْرُ",fr:"Ne maudissez pas le temps (les jours, la destinée), car Allah est le Temps.",en:"Do not curse time, for Allah is Time.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2246,a:"Sahih",ref:"Muslim n°2246",th:"Tawhid",reward:"Chercher la connaissance = Allah facilite le chemin vers le Paradis. (Muslim n°2699)"},
{id:488,ar:"إِنَّ الله يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ",fr:"Allah aime que lorsque l'un d'entre vous fait une œuvre, il la fasse avec excellence.",en:"Allah loves that when one of you performs a deed, he does it with perfection.",n:"Aïcha ر",b:"Tabarani",num:897,a:"Sahih",ref:"Silsilah n°1113",th:"Ihsan",reward:"L'amour d'Allah"},
{id:489,ar:"مَنْ كَانَ آخِرُ كَلَامِهِ لَا إِلَهَ إِلَّا اللهُ دَخَلَ الْجَنَّةَ",fr:"Quiconque a pour dernières paroles 'La ilaha illallah' entrera au Paradis.",en:"Whoever's last words are 'La ilaha illallah' will enter Paradise.",n:"Mu'adh Ibn Jabal ر",b:"Abu Dawud",num:3116,a:"Sahih",ref:"Silsilah n°1684",th:"Tawhid",reward:"Entrée au Paradis garantie"},
{id:490,ar:"لَقِّنُوا مَوْتَاكُمْ لَا إِلَهَ إِلَّا اللهُ",fr:"Enseignez à vos mourants de dire 'La ilaha illallah'.",en:"Prompt your dying ones to say 'La ilaha illallah'.",n:"Abu Sa'id Al-Khudri ر",b:"Sahih Muslim",num:916,a:"Sahih",ref:"Muslim n°916",th:"Mort",reward:"Regard perspicace = signe de taqwa et de lumière divine. (Silsilah n°1341)"},
// ── SUJETS CLES ──
{id:491,ar:"مَا اجْتَمَعَ قَوْمٌ فِي بَيْتٍ مِنْ بُيُوتِ اللهِ يَتْلُونَ كِتَابَ اللهِ",fr:"Nul groupe ne se réunit dans une maison d'Allah pour réciter le Livre d'Allah et se l'enseigner mutuellement sans que la sérénité ne descende sur eux, que la miséricorde ne les couvre, que les anges ne les entourent.",en:"No group gathers in a house of Allah to recite the Book of Allah and teach it to each other except that tranquility descends upon them, mercy covers them, angels surround them.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2699,a:"Sahih",ref:"Muslim n°2699",th:"'Ilm",reward:"Sérénité + miséricorde + anges"},
{id:492,ar:"مَنْ نَفَّسَ عَنْ مُؤْمِنٍ كُرْبَةً مِنْ كُرَبِ الدُّنْيَا",fr:"Quiconque soulage un croyant d'une angoisse de ce monde, Allah le soulagera d'une angoisse du Jour du Jugement. Quiconque facilite les choses pour quelqu'un dans la difficulté, Allah lui facilitera les choses dans ce monde et dans l'au-delà.",en:"Whoever relieves a believer of a worldly distress, Allah will relieve him of a distress on the Day of Resurrection. Whoever makes things easy for one in hardship, Allah will make things easy for him in this world and the next.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2699,a:"Sahih",ref:"Muslim n°2699",th:"Fraternité",reward:"Allah soulage ses angoisses du Jour du Jugement"},
{id:493,ar:"وَاللهُ فِي عَوْنِ الْعَبْدِ مَا كَانَ الْعَبْدُ فِي عَوْنِ أَخِيهِ",fr:"Allah aide le serviteur tant que le serviteur aide son frère.",en:"Allah helps the servant as long as the servant helps his brother.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2699,a:"Sahih",ref:"Muslim n°2699",th:"Fraternité",reward:"L'aide d'Allah pour celui qui aide les autres"},
{id:494,ar:"مَنْ سَتَرَ مُسْلِمًا سَتَرَهُ اللهُ يَوْمَ الْقِيَامَةِ",fr:"Quiconque couvre (les fautes) d'un musulman, Allah le couvrira le Jour du Jugement.",en:"Whoever covers a Muslim's faults, Allah will cover his faults on the Day of Resurrection.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2699,a:"Sahih",ref:"Muslim n°2699",th:"Fraternité",reward:"Allah couvre ses fautes au Jour du Jugement"},
// ── SCIENCES ET JURISPRUDENCE ──
{id:495,ar:"صِنْفَانِ مِنْ أَهْلِ النَّارِ لَمْ أَرَهُمَا",fr:"Deux types de personnes du Feu que je n'ai pas vus : des hommes portant des fouets qui frappent les gens, et des femmes vêtues mais nues, s'éloignant de la droiture et séduisant. Leurs têtes sont comme des bosses de chameau inclinées.",en:"Two types of people of the Fire that I have not seen: people carrying whips who beat people, and women who are dressed but undressed, inclining toward evil and seducing others.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2128,a:"Sahih",ref:"Muslim n°2128",th:"Halal/Haram",reward:"Rattraper la prière = expiation complète. (Bukhari n°597)"},
{id:496,ar:"إِيَّاكُمْ وَالنَّامِصَةَ وَالْمُتَنَمِّصَةَ",fr:"Gardez-vous de celle qui épile les sourcils et de celle qui les fait épiler.",en:"Beware of the one who plucks eyebrows and the one who has her eyebrows plucked.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:4886,a:"Sahih",ref:"Bukhari n°4886",th:"Halal/Haram",reward:"Première communauté au Jugement = honneur de l'ummah de Muhammad ﷺ. (Bukhari n°876)"},
{id:497,ar:"لَعَنَ اللهُ الْوَاصِلَةَ وَالْمُسْتَوْصِلَةَ وَالْوَاشِمَةَ وَالْمُسْتَوْشِمَةَ",fr:"Allah a maudit celle qui coiffe les fausses tresses et celle qui les demande, celle qui tatoue et celle qui se fait tatouer.",en:"Allah has cursed the one who adds fake hair and the one who has it added, the one who tattoos and the one who is tattooed.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:5937,a:"Sahih",ref:"Bukhari n°5937",th:"Halal/Haram",reward:"Anges qui prient pour celui qui attend la prière = bénédiction continue. (Bukhari n°445)"},
{id:498,ar:"مَنْ صَامَ الدَّهْرَ ضُيِّقَتْ عَلَيْهِ جَهَنَّمُ هَكَذَا",fr:"Quiconque jeûne en permanence — le Feu lui sera resserré ainsi — et il fit signe avec ses doigts.",en:"Whoever fasts perpetually — the Fire will be narrowed for him like this — and he gestured with his fingers.",n:"Abdullah Ibn Amr ر",b:"Sahih Al-Bukhari",num:1977,a:"Sahih",ref:"Bukhari n°1977",th:"Siyam",reward:"En état de prière en attendant = récompense du ta'arrub. (Bukhari n°659)"},
{id:500,ar:"خُذُوا مِنَ الأَعْمَالِ مَا تُطِيقُونَ",fr:"Prenez des actes ceux que vous êtes capables d'accomplir.",en:"Take on as many deeds as you are able to do.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:6465,a:"Sahih",ref:"Bukhari n°6465",th:"Istiqama",reward:"5 prières + vendredi à vendredi + Ramadan à Ramadan = expiation complète. (Muslim n°233)"},

// ══ BLOC 7 — Hadiths 501-700 ══
{id:501,ar:"طَهُورُ إِنَاءِ أَحَدِكُمْ إِذَا وَلَغَ فِيهِ الْكَلْبُ أَنْ يَغْسِلَهُ سَبْعَ مَرَّاتٍ",fr:"La purification du récipient de l'un d'entre vous lorsqu'un chien y a léché est de le laver sept fois, la première avec de la terre.",en:"The purification of the vessel of one of you when a dog licks it is to wash it seven times, the first with soil.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:279,a:"Sahih",ref:"Muslim n°279",th:"Taharah",reward:"Dhikr discret = le meilleur, plus sincère et plus proche d'Allah. (Silsilah n°1788)"},
{id:502,ar:"لَا يَقُولَنَّ أَحَدُكُمْ اللَّهُمَّ اغْفِرْ لِي إِنْ شِئْتَ",fr:"Que nul d'entre vous ne dise 'Ô Allah pardonne-moi si Tu le veux' — qu'il soit déterminé dans sa demande et qu'il y aspire grandement, car Allah n'est contraint par rien.",en:"Let none of you say 'O Allah forgive me if You will' — but be firm in your request and have great hope, for nothing compels Allah.",n:"Anas ر",b:"Sahih Al-Bukhari",num:6339,a:"Sahih",ref:"Bukhari n°6339",th:"Du'a",reward:""},
{id:503,ar:"مَنْ نَسِيَ صَلَاةً فَلْيُصَلِّ إِذَا ذَكَرَهَا",fr:"Quiconque oublie une prière qu'il la prie dès qu'il s'en souvient.",en:"Whoever forgets a prayer, let him pray it when he remembers it.",n:"Anas ر",b:"Sahih Al-Bukhari",num:597,a:"Sahih",ref:"Bukhari n°597",th:"Salat",reward:"Oublier une prière = la rattraper immédiatement. (Bukhari n°597)"},
{id:504,ar:"الْجُمُعَةُ حَقٌّ وَاجِبٌ عَلَى كُلِّ مُسْلِمٍ فِي جَمَاعَةٍ",fr:"La prière du vendredi est un devoir obligatoire pour chaque musulman en congrégation, sauf quatre : un esclave, une femme, un enfant et un malade.",en:"The Friday prayer is an obligatory duty upon every Muslim in congregation, except four: a slave, a woman, a child, and the sick.",n:"Abu Dawud ر",b:"Abu Dawud",num:1067,a:"Sahih",ref:"Silsilah n°829",th:"Salat",reward:"Vendredi = obligation pour chaque Muslim libre et capable. (Silsilah n°829)"},
{id:505,ar:"مَنِ اشْتَرَى طَعَامًا فَلَا يَبِعْهُ حَتَّى يَكْتَالَهُ",fr:"Quiconque achète de la nourriture ne doit pas la revendre avant de l'avoir mesurée.",en:"Whoever buys food should not sell it before measuring it.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:2127,a:"Sahih",ref:"Bukhari n°2127",th:"Commerce",reward:"Honnêteté dans le commerce = mesure et pesée = baraka. (Bukhari n°2127)"},
{id:506,ar:"مَنِ اقْتَنَى كَلْبًا إِلَّا كَلْبَ مَاشِيَةٍ أَوْ صَيْدٍ",fr:"Quiconque acquiert un chien — sauf pour le bétail ou la chasse — perd chaque jour un qirat de récompense.",en:"Whoever acquires a dog — except for livestock or hunting — loses a qirat of reward each day.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:5480,a:"Sahih",ref:"Bukhari n°5480",th:"Halal/Haram",reward:"Chien uniquement pour besoin = protection de la récompense. (Bukhari n°5480)"},
{id:507,ar:"لَا تَقُمْ مِنَ الصَّلَاةِ حَتَّى تَقْرَأَ فَاتِحَةَ الْكِتَابِ",fr:"Ne te lève pas de la prière sans avoir récité la Fatiha du Livre.",en:"Do not stand up from prayer without reciting the Opening of the Book.",n:"Ubada Ibn As-Samit ر",b:"Sahih Al-Bukhari",num:756,a:"Sahih",ref:"Bukhari n°756",th:"Salat",reward:"Fatiha = condition de validité de la prière. (Bukhari n°756)"},
{id:508,ar:"إِذَا جَلَسَ أَحَدُكُمْ فِي الصَّلَاةِ فَلْيَقُلِ التَّحِيَّاتُ لِلهِ",fr:"Quand l'un de vous s'assoit dans la prière, qu'il dise : At-Tahiyyatu lillahi was-salawatu wat-tayyibatu...",en:"When one of you sits in prayer, let him say: At-Tahiyyatu lillahi was-salawatu wat-tayyibatu...",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:831,a:"Sahih",ref:"Bukhari n°831",th:"Salat",reward:""},
{id:509,ar:"إِذَا كَانَ يَوْمُ الْجُمُعَةِ كَانَ عَلَى كُلِّ بَابٍ مِنْ أَبْوَابِ الْمَسْجِدِ مَلَائِكَةٌ",fr:"Le jour du vendredi, à chaque porte de la mosquée se trouvent des anges qui inscrivent les gens dans l'ordre de leur arrivée.",en:"On the day of Friday, at every door of the mosque there are angels who record the people in order of their arrival.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:929,a:"Sahih",ref:"Bukhari n°929",th:"Salat",reward:"Anges inscrivent les gens du vendredi = récompense selon l'assiduité. (Bukhari n°929)"},
{id:510,ar:"مَنِ اغْتَسَلَ ثُمَّ أَتَى الْجُمُعَةَ فَصَلَّى مَا قُدِّرَ لَهُ",fr:"Quiconque fait le bain (du vendredi), vient à la prière du vendredi, prie ce qu'il peut avant l'imam — puis lorsque l'imam arrive, il se tait et écoute — ses péchés entre ce vendredi et le suivant lui seront pardonnés, avec trois jours supplémentaires.",en:"Whoever performs the bath, comes to Friday prayer and prays what he can before the imam — then when the imam comes he falls silent and listens — his sins from this Friday to the next, plus three extra days, will be forgiven.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:857,a:"Sahih",ref:"Muslim n°857",th:"Salat",reward:"Expiation des péchés entre deux vendredis + 3 jours"},
{id:511,ar:"مَنْ قَالَ أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ",fr:"Quiconque dit 'A'udhu bi kalimatillahi at-tammati min sharri ma khalaqa' trois fois le soir, aucun venin ne lui nuira cette nuit.",en:"Whoever says 'A'udhu bi kalimatillahi at-tammati min sharri ma khalaqa' three times in the evening — no venom will harm him that night.",n:"Khawla Bint Hakim ر",b:"Sahih Muslim",num:2709,a:"Sahih",ref:"Muslim n°2709",th:"Du'a",reward:"Protection contre le venin toute la nuit"},
{id:512,ar:"رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ",fr:"Notre Seigneur, accorde-nous le bien dans ce monde et le bien dans l'au-delà, et préserve-nous du châtiment du Feu. (Al-Baqara 2:201) — Le Prophète ﷺ faisait souvent ce du'a.",en:"Our Lord, give us good in this world and good in the Hereafter and protect us from the punishment of the Fire. (Al-Baqarah 2:201) — The Prophet ﷺ frequently made this du'a.",n:"Anas ر",b:"Sahih Al-Bukhari",num:6389,a:"Sahih",ref:"Bukhari n°6389",th:"Du'a",reward:"Du'a complet pour les deux mondes"},
{id:513,ar:"لَقَدْ كَانَ فِيهِمْ أُسْوَةٌ حَسَنَةٌ",fr:"Il y avait dans les prophètes et ceux qui étaient avec eux un bel exemple pour vous.",en:"There was certainly for you in the prophets and those with them a good example.",n:"Allah — Al-Mumtahana 60:6",b:"Al-Quran",num:60,a:"Coran",ref:"Sourate Al-Mumtahana 60:6",th:"Sunnah",reward:""},
{id:514,ar:"خُذِ الْعَفْوَ وَأْمُرْ بِالْعُرْفِ وَأَعْرِضْ عَنِ الْجَاهِلِينَ",fr:"Pratique l'indulgence, ordonne ce qui est convenable et éloigne-toi des ignorants.",en:"Practice forgiveness, enjoin what is right, and turn away from the ignorant.",n:"Allah — Al-A'raf 7:199",b:"Al-Quran",num:7,a:"Coran",ref:"Sourate Al-A'raf 7:199",th:"Akhlaq",reward:""},
{id:515,ar:"وَتَعَاوَنُوا عَلَى الْبِرِّ وَالتَّقْوَى وَلَا تَعَاوَنُوا عَلَى الْإِثْمِ وَالْعُدْوَانِ",fr:"Entraidez-vous dans la vertu et la piété, et ne vous entraidez pas dans le péché et l'hostilité.",en:"Cooperate in righteousness and piety, and do not cooperate in sin and aggression.",n:"Allah — Al-Ma'ida 5:2",b:"Al-Quran",num:5,a:"Coran",ref:"Sourate Al-Ma'ida 5:2",th:"Fraternité",reward:""},
{id:516,ar:"إِنَّ اللهَ مَعَ الصَّابِرِينَ",fr:"Allah est avec les patients.",en:"Allah is with the patient.",n:"Allah — Al-Baqara 2:153",b:"Al-Quran",num:2,a:"Coran",ref:"Sourate Al-Baqara 2:153",th:"Sabr",reward:""},
{id:517,ar:"وَلَنَبْلُوَنَّكُمْ بِشَيْءٍ مِّنَ الْخَوْفِ وَالْجُوعِ وَنَقْصٍ مِّنَ الْأَمْوَالِ وَالْأَنفُسِ وَالثَّمَرَاتِ",fr:"Nous vous éprouverons par un peu de crainte, de faim, de diminution des biens, des personnes et des fruits. Et annonce une bonne nouvelle aux patients — ceux qui disent quand l'épreuve les touche : 'Nous appartenons à Allah et c'est vers Lui que nous retournons.'",en:"We will surely test you with some fear, hunger, and loss of wealth, lives and fruits. And give good tidings to the patient — those who, when disaster strikes, say: Indeed we belong to Allah, and indeed to Him we will return.",n:"Allah — Al-Baqara 2:155-156",b:"Al-Quran",num:2,a:"Coran",ref:"Sourate Al-Baqara 2:155-157",th:"Sabr",reward:"Bonne nouvelle pour les patients"},
{id:518,ar:"إِنَّمَا يُوَفَّى الصَّابِرُونَ أَجْرَهُمْ بِغَيْرِ حِسَابٍ",fr:"Les patients auront leur récompense sans compte.",en:"The patient will be given their reward without account.",n:"Allah — Az-Zumar 39:10",b:"Al-Quran",num:39,a:"Coran",ref:"Sourate Az-Zumar 39:10",th:"Sabr",reward:"Récompense sans compte au Jour du Jugement"},
{id:519,ar:"وَلَا تَيْأَسُوا مِن رَّوْحِ اللَّهِ",fr:"Ne désespérez pas de la miséricorde d'Allah.",en:"Do not despair of the mercy of Allah.",n:"Allah — Yusuf 12:87",b:"Al-Quran",num:12,a:"Coran",ref:"Sourate Yusuf 12:87",th:"Tawbah",reward:""},
{id:520,ar:"قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا عَلَى أَنفُسِهِمْ لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ",fr:"Dis : Ô Mes serviteurs qui avez commis des excès contre vous-mêmes, ne désespérez pas de la miséricorde d'Allah. Allah pardonne tous les péchés. Il est le Très-Pardonnant, le Très-Miséricordieux.",en:"Say: O My servants who have transgressed against themselves, do not despair of the mercy of Allah. Indeed, Allah forgives all sins. Indeed, it is He who is the Forgiving, the Merciful.",n:"Allah — Az-Zumar 39:53",b:"Al-Quran",num:39,a:"Coran",ref:"Sourate Az-Zumar 39:53",th:"Tawbah",reward:"Allah pardonne tous les péchés"},
{id:521,ar:"يَا أَيُّهَا الَّذِينَ آمَنُوا اتَّقُوا اللَّهَ وَقُولُوا قَوْلًا سَدِيدًا",fr:"Ô vous qui croyez ! Craignez Allah et dites une parole juste.",en:"O you who have believed, fear Allah and speak words of appropriate justice.",n:"Allah — Al-Ahzab 33:70",b:"Al-Quran",num:33,a:"Coran",ref:"Sourate Al-Ahzab 33:70",th:"Parole",reward:"Vêtement de modestie + parole juste = protection et guidée. (Al-Ahzab 33:70)"},
{id:522,ar:"مَا أَصَابَكَ مِنْ حَسَنَةٍ فَمِنَ اللَّهِ وَمَا أَصَابَكَ مِن سَيِّئَةٍ فَمِن نَّفْسِكَ",fr:"Ce qui t'arrive de bien vient d'Allah, et ce qui t'arrive de mal vient de toi-même.",en:"Whatever good comes to you, it is from Allah, and whatever evil comes to you, it is from yourself.",n:"Allah — An-Nisa 4:79",b:"Al-Quran",num:4,a:"Coran",ref:"Sourate An-Nisa 4:79",th:"Qadar",reward:""},
{id:523,ar:"وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَى",fr:"L'homme n'aura que ce pour quoi il a travaillé.",en:"And that there is not for man except that for which he strives.",n:"Allah — An-Najm 53:39",b:"Al-Quran",num:53,a:"Coran",ref:"Sourate An-Najm 53:39",th:"Niyyah",reward:"L'homme n'aura que ce pour quoi il a travaillé = justice divine absolue. (An-Najm 53:39)"},
{id:524,ar:"إِنَّ الْحَسَنَاتِ يُذْهِبْنَ السَّيِّئَاتِ",fr:"Les bonnes actions effacent les mauvaises.",en:"Indeed, good deeds erase bad deeds.",n:"Allah — Hud 11:114",b:"Al-Quran",num:11,a:"Coran",ref:"Sourate Hud 11:114",th:"Tawbah",reward:"Les bonnes actions effacent les mauvaises"},
{id:525,ar:"فَاذْكُرُونِي أَذْكُرْكُمْ وَاشْكُرُوا لِي وَلَا تَكْفُرُونِ",fr:"Souvenez-vous de Moi, Je me souviendrai de vous. Soyez-Moi reconnaissants et ne soyez pas ingrats envers Moi.",en:"Remember Me; I will remember you. And be grateful to Me and do not deny Me.",n:"Allah — Al-Baqara 2:152",b:"Al-Quran",num:2,a:"Coran",ref:"Sourate Al-Baqara 2:152",th:"Dhikr",reward:"Allah se souvient de celui qui se souvient de Lui"},
{id:526,ar:"وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌ أُجِيبُ دَعْوَةَ الدَّاعِ إِذَا دَعَانِ",fr:"Quand Mes serviteurs t'interrogent à Mon sujet, dis-leur que Je suis proche. Je réponds à l'appel de celui qui M'appelle quand il M'appelle.",en:"When My servants ask you concerning Me, indeed I am near. I respond to the invocation of the supplicant when he calls upon Me.",n:"Allah — Al-Baqara 2:186",b:"Al-Quran",num:2,a:"Coran",ref:"Sourate Al-Baqara 2:186",th:"Du'a",reward:"Allah répond à chaque invocateur"},
{id:527,ar:"وَاسْتَعِينُوا بِالصَّبْرِ وَالصَّلَاةِ",fr:"Et cherchez aide dans la patience et la prière.",en:"And seek help through patience and prayer.",n:"Allah — Al-Baqara 2:45",b:"Al-Quran",num:2,a:"Coran",ref:"Sourate Al-Baqara 2:45",th:"Salat",reward:"Allah est proche et répond = encouragement à la du'a. (Al-Baqara 2:186)"},
{id:528,ar:"إِنَّ الصَّلَاةَ تَنْهَى عَنِ الْفَحْشَاءِ وَالْمُنكَرِ",fr:"La prière préserve de la turpitude et de ce qui est blâmable.",en:"Indeed, prayer prohibits immorality and wrongdoing.",n:"Allah — Al-'Ankabut 29:45",b:"Al-Quran",num:29,a:"Coran",ref:"Sourate Al-'Ankabut 29:45",th:"Salat",reward:"La prière préserve du mal"},
{id:529,ar:"وَذَكِّرْ فَإِنَّ الذِّكْرَى تَنفَعُ الْمُؤْمِنِينَ",fr:"Rappelle, car le rappel profite aux croyants.",en:"And remind, for indeed reminding benefits the believers.",n:"Allah — Adh-Dhariyat 51:55",b:"Al-Quran",num:51,a:"Coran",ref:"Sourate Adh-Dhariyat 51:55",th:"'Ilm",reward:"La prière préserve du mal = protection divine par la prière. (Al-Ankabut 29:45)"},
{id:530,ar:"وَمَنْ يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ",fr:"Quiconque craint Allah, Il lui ménagera une issue et lui accordera une subsistance de là où il ne s'y attendait pas. Et quiconque s'en remet à Allah, Il lui suffit.",en:"And whoever fears Allah — He will make for him a way out and will provide for him from where he does not expect. And whoever relies upon Allah — then He is sufficient for him.",n:"Allah — At-Talaq 65:2-3",b:"Al-Quran",num:65,a:"Coran",ref:"Sourate At-Talaq 65:2-3",th:"Tawakkul",reward:"Subsistance de l'inattendu + Allah suffit"},
{id:531,ar:"يَمْحُو اللَّهُ مَا يَشَاءُ وَيُثْبِتُ وَعِندَهُ أُمُّ الْكِتَابِ",fr:"Allah efface ce qu'Il veut et confirme ce qu'Il veut. Auprès de Lui se trouve la Mère du Livre.",en:"Allah eliminates what He wills or confirms, and with Him is the Mother of the Book.",n:"Allah — Ar-Ra'd 13:39",b:"Al-Quran",num:13,a:"Coran",ref:"Sourate Ar-Ra'd 13:39",th:"Qadar",reward:""},
{id:532,ar:"إِنَّ مَعَ الْعُسْرِ يُسْرًا",fr:"Avec la difficulté vient certes la facilité.",en:"Indeed, with hardship will be ease.",n:"Allah — Ash-Sharh 94:6",b:"Al-Quran",num:94,a:"Coran",ref:"Sourate Ash-Sharh 94:5-6",th:"Sabr",reward:"Promesse divine de la facilité après la difficulté"},
{id:533,ar:"فَإِنَّ مَعَ الْعُسْرِ يُسْرًا إِنَّ مَعَ الْعُسْرِ يُسْرًا",fr:"Avec la difficulté vient certes la facilité (deux fois). Les savants ont dit : Un seul 'usr' (difficulté) mais deux 'yusr' (facilité) — la facilité surpassera toujours la difficulté.",en:"With hardship comes ease (twice). Scholars said: One hardship but two ease — ease will always overcome hardship.",n:"Allah — Ash-Sharh 94:5-6",b:"Al-Quran",num:94,a:"Coran",ref:"Tafsir Ibn Kathir — Sourate Ash-Sharh",th:"Sabr",reward:"Avec la difficulté vient la facilité = promesse divine. (Ash-Sharh 94:6)"},
{id:534,ar:"إِنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى",fr:"Les actes ne valent que par les intentions, et chaque personne n'aura que ce qu'elle a eu l'intention d'accomplir.",en:"Actions are judged only by intentions, and each person will have only what they intended.",n:"Umar Ibn Al-Khattab ر",b:"Sahih Al-Bukhari",num:1,a:"Sahih",ref:"Bukhari n°1 — Premier hadith du Sahih Al-Bukhari",th:"Niyyah",reward:"Le fondement de toute action islamique"},
{id:535,ar:"مَنْ يُرِدِ اللهُ بِهِ خَيْرًا يُصِبْ مِنْهُ",fr:"Quand Allah veut du bien à quelqu'un, Il l'éprouve.",en:"When Allah wants good for someone, He afflicts him with trials.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5645,a:"Sahih",ref:"Bukhari n°5645",th:"Sabr",reward:"L'épreuve est signe de la bienveillance d'Allah"},
{id:537,ar:"لَيْسَ الْكَذِبُ أَنْ يُصْلِحَ الرَّجُلُ بَيْنَ النَّاسِ",fr:"Le mensonge n'est pas (répréhensible) lorsqu'un homme cherche à réconcilier entre des gens et dit du bien.",en:"Lying is not (blameworthy) when a man reconciles between people and says good things.",n:"Umm Kulthum ر",b:"Sahih Al-Bukhari",num:2692,a:"Sahih",ref:"Bukhari n°2692",th:"Akhlaq",reward:"Comprendre la religion = signe de bienveillance d'Allah. (Bukhari n°71)"},
{id:538,ar:"لَا تُصَلُّوا خَلْفَ النَّائِمِ وَلَا الْمُتَحَدِّثِ",fr:"Ne priez pas derrière quelqu'un qui dort ni derrière quelqu'un qui bavarde.",en:"Do not pray behind one who is sleeping or behind one who is chatting.",n:"Ibn Abbas ر",b:"Abu Dawud",num:913,a:"Hasan",ref:"Silsilah n°3419",th:"Salat",reward:"Ne pas prier derrière dormeur ou bavard = protection de la prière."},
{id:539,ar:"إِنَّ أَحَبَّ الصَّلَاةِ إِلَى اللهِ صَلَاةُ دَاوُدَ عَلَيْهِ السَّلَامُ",fr:"La prière la plus aimée d'Allah est celle de Dawud ﷺ — il dormait la moitié de la nuit, se levait le tiers et dormait le sixième.",en:"The most beloved prayer to Allah is that of Dawud — he slept half the night, prayed a third, and slept a sixth.",n:"Abdullah Ibn Amr ر",b:"Sahih Al-Bukhari",num:1131,a:"Sahih",ref:"Bukhari n°1131",th:"Salat",reward:"La prière la plus aimée d'Allah"},
{id:540,ar:"إِذَا مَرِضَ الْعَبْدُ أَوْ سَافَرَ كُتِبَ لَهُ مِثْلُ مَا كَانَ يَعْمَلُ",fr:"Quand le serviteur est malade ou en voyage, il lui est écrit la récompense de ce qu'il avait l'habitude d'accomplir.",en:"When the servant is sick or traveling, it is written for him the reward of what he used to do.",n:"Abu Musa ر",b:"Sahih Al-Bukhari",num:2996,a:"Sahih",ref:"Bukhari n°2996",th:"Salat",reward:"La récompense des actes habituels continue en maladie ou voyage"},
{id:541,ar:"مَنْ تَرَكَ الدُّنْيَا أَحَبَّهُ اللهُ",fr:"Quiconque abandonne ce monde, Allah l'aime. Quiconque abandonne ce que les gens possèdent, les gens l'aiment.",en:"Whoever abandons the world, Allah loves him. Whoever abandons what people have, people love him.",n:"Sahl Ibn Sa'd ر",b:"Ibn Majah",num:4102,a:"Sahih",ref:"Silsilah n°944",th:"Zuhd",reward:"L'amour d'Allah et des gens"},
{id:542,ar:"ازْهَدْ فِي الدُّنْيَا يُحِبَّكَ اللهُ",fr:"Renonce aux plaisirs de ce monde, Allah t'aimera. Renonce à ce que les gens possèdent, ils t'aimeront.",en:"Renounce the pleasures of this world, Allah will love you. Renounce what people have, they will love you.",n:"Sahl Ibn Sa'd ر",b:"Ibn Majah",num:4102,a:"Sahih",ref:"Silsilah n°944",th:"Zuhd",reward:"L'amour d'Allah"},
{id:543,ar:"لَا يَدْخُلُ أَحَدٌ الْجَنَّةَ إِلَّا بِرَحْمَةِ اللهِ",fr:"Personne n'entrera au Paradis si ce n'est par la miséricorde d'Allah. On dit: 'Même toi, ô Messager d'Allah ?' Il dit: 'Même moi — à moins qu'Allah ne me couvre de Sa miséricorde.'",en:"No one will enter Paradise except by the mercy of Allah. It was said: Not even you, O Messenger of Allah? He said: Not even me — unless Allah covers me with His mercy.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2816,a:"Sahih",ref:"Muslim n°2816",th:"Akhira",reward:"Personne n'entre au Paradis que par la miséricorde d'Allah = humilité."},
{id:544,ar:"قَارِبُوا وَسَدِّدُوا وَاعْلَمُوا أَنَّهُ لَنْ يَنْجُوَ أَحَدٌ مِنْكُمْ بِعَمَلِهِ",fr:"Faites-vous proches du but et soyez droits. Sachez qu'aucun de vous ne sera sauvé par ses œuvres.",en:"Come close and be upright. Know that none of you will be saved by his deeds alone.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6467,a:"Sahih",ref:"Bukhari n°6467",th:"Tawhid",reward:"Nul n'est sauvé par ses seules œuvres = foi + humilité + miséricorde d'Allah."},
{id:545,ar:"الْبَيِّنَةُ عَلَى الْمُدَّعِي وَالْيَمِينُ عَلَى الْمُدَّعَى عَلَيْهِ",fr:"La preuve incombe au demandeur et le serment au défendeur.",en:"The burden of proof is on the claimant and the oath is on the one who denies.",n:"Ibn Abbas ر",b:"Jami' At-Tirmidhi",num:1341,a:"Hasan",ref:"Tirmidhi n°2518 — Sahih Al-Albani",th:"Fiqh",reward:""},
{id:546,ar:"لَا ضَرَرَ وَلَا ضِرَارَ",fr:"Pas de préjudice et pas de réciprocité dans le préjudice — règle fondamentale du fiqh islamique.",en:"No harm shall be inflicted or reciprocated — a fundamental rule of Islamic jurisprudence.",n:"Ibn Abbas ر",b:"Ibn Majah",num:2341,a:"Sahih",ref:"Silsilah n°250",th:"Fiqh",reward:""},
{id:547,ar:"الْأُمُورُ بِمَقَاصِدِهَا",fr:"Les affaires sont jugées selon leurs intentions.",en:"Matters are judged by their intentions.",n:"Hadith + règle de fiqh",b:"Fiqh Islamic",num:0,a:"Qawa'id Fiqhiyya",ref:"Basé sur Bukhari n°1 — Hadith de Umar ر",th:"Fiqh",reward:"Les affaires jugées selon leurs intentions = fondement du fiqh islamique."},
{id:548,ar:"الْمَشَقَّةُ تَجْلِبُ التَّيْسِيرَ",fr:"La difficulté appelle la facilité (principe du fiqh islamique).",en:"Hardship brings ease — a principle of Islamic jurisprudence.",n:"Règle de fiqh basée sur",b:"Al-Quran",num:94,a:"Qawa'id Fiqhiyya",ref:"Al-Baqara 2:185, Ash-Sharh 94:5-6",th:"Fiqh",reward:"La difficulté appelle la facilité = principe de la facilité islamique."},
{id:549,ar:"اتَّقُوا اللهَ فِيمَا أَمَرَ وَانْتَهُوا عَمَّا نَهَى",fr:"Craignez Allah dans ce qu'Il a ordonné et abstenez-vous de ce qu'Il a interdit.",en:"Fear Allah in what He has commanded and refrain from what He has forbidden.",n:"Athar — Parole des Salaf",b:"Athar",num:0,a:"Athar",ref:"Principe constant dans le Coran et la Sunnah",th:"Taqwa",reward:"Taqwa = protection dans les deux mondes."},
{id:550,ar:"إِنَّ اللهَ يُحِبُّ التَّوَّابِينَ وَيُحِبُّ الْمُتَطَهِّرِينَ",fr:"Allah aime ceux qui reviennent vers Lui avec repentir et ceux qui se purifient.",en:"Indeed, Allah loves those who are constantly repentant and loves those who purify themselves.",n:"Allah — Al-Baqara 2:222",b:"Al-Quran",num:2,a:"Coran",ref:"Sourate Al-Baqara 2:222",th:"Tawbah",reward:"L'amour d'Allah pour le repentant et le pur"},
// ── SUNNAH PRATIQUE ──
{id:551,ar:"إِذَا أَرَادَ أَحَدُكُمْ أَنْ يَنَامَ فَلْيَنْفُضْ فِرَاشَهُ",fr:"Quand l'un d'entre vous veut dormir, qu'il secoue son matelas avec le bord intérieur de sa robe, trois fois, en disant Bismillah — car il ne sait pas ce qui l'a suivi sur son matelas.",en:"When one of you wants to sleep, let him dust his bed with the inner edge of his garment three times, saying Bismillah — for he does not know what came upon his bed after him.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6320,a:"Sahih",ref:"Bukhari n°6320",th:"Du'a",reward:"Secouer le lit + Bismillah = protection de la nuit. (Bukhari n°6320)"},
{id:552,ar:"لَا يَبُولَنَّ أَحَدُكُمْ فِي الْمَاءِ الدَّائِمِ",fr:"Que nul d'entre vous n'urine dans l'eau stagnante.",en:"None of you should urinate in standing water.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:239,a:"Sahih",ref:"Bukhari n°239",th:"Taharah",reward:"Ne pas uriner dans l'eau = protection de la pureté. (Bukhari n°239)"},
{id:553,ar:"الْبُزَاقُ فِي الْمَسْجِدِ خَطِيئَةٌ وَكَفَّارَتُهَا دَفْنُهَا",fr:"Cracher dans la mosquée est une faute, son expiation est de l'enterrer.",en:"Spitting in the mosque is a sin, and its expiation is to bury it.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:415,a:"Sahih",ref:"Bukhari n°415",th:"Taharah",reward:"Enterrer les crachats dans la mosquée = expiation. (Bukhari n°415)"},
{id:554,ar:"كُلُّ أَمْرٍ ذِي بَالٍ لَا يُبْدَأُ فِيهِ بِحَمْدِ اللهِ",fr:"Toute affaire importante qui ne commence pas par la louange d'Allah est coupée (manque de baraka).",en:"Every important matter that does not begin with praise of Allah is cut off.",n:"Abu Hureyra ر",b:"Ibn Majah",num:1894,a:"Hasan",ref:"Tirmidhi n°2518 — Sahih Al-Albani",th:"Du'a",reward:"Bismillah au début = baraka dans tout acte. (Silsilah n°1/1)"},
{id:555,ar:"أَحَبُّ الْبِلَادِ إِلَى اللهِ مَسَاجِدُهَا",fr:"Les endroits les plus aimés d'Allah sur terre sont ses mosquées, et les endroits les plus détestés d'Allah sont ses marchés.",en:"The most beloved places on earth to Allah are its mosques, and the most hated places on earth to Allah are its markets.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:671,a:"Sahih",ref:"Muslim n°671",th:"Salat",reward:"Les mosquées = endroits les plus aimés d'Allah = motivation à les fréquenter. (Muslim n°671)"},
{id:556,ar:"مَنْ أَتَى إِمَامَهُ وَهُوَ رَاكِعٌ فَقَدْ أَدْرَكَ تِلْكَ الرَّكْعَةَ",fr:"Quiconque rejoint l'imam alors qu'il est en ruku' a attrapé ce rak'at.",en:"Whoever joins the imam while he is in ruku' has caught that rak'at.",n:"Abu Bakra ر",b:"Sahih Al-Bukhari",num:783,a:"Sahih",ref:"Bukhari n°783",th:"Salat",reward:"Attraper le ruku avec l'imam = rattraper le rak'at. (Bukhari n°783)"},
{id:557,ar:"الصَّلَاةُ إِلَى الصَّلَاةِ كَفَّارَةٌ لِمَا بَيْنَهُمَا",fr:"La prière à la prière est une expiation de ce qui est entre elles.",en:"Prayer to prayer is an expiation for what is between them.",n:"Uthman ر",b:"Sahih Muslim",num:229,a:"Sahih",ref:"Muslim n°229",th:"Salat",reward:"Expiation des péchés entre les prières"},
{id:558,ar:"لَا تَجْعَلُوا بُيُوتَكُمْ قُبُورًا",fr:"Ne faites pas de vos maisons des tombes. Le Shaytan fuit la maison dans laquelle est récitée la sourate Al-Baqara.",en:"Do not make your houses into graves. Shaytan flees from the house in which Surah Al-Baqarah is recited.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:780,a:"Sahih",ref:"Muslim n°780",th:"Coran",reward:"Chaque prière = expiation de ce qui est entre elles. (Muslim n°229)"},
{id:560,ar:"مَنْ قَرَأَ آيَةَ الْكُرْسِيِّ حِينَ يَأْخُذُ مَضْجَعَهُ",fr:"Quiconque récite Ayat Al-Kursi quand il s'allonge pour dormir, Allah envoie un ange pour le garder jusqu'au matin.",en:"Whoever recites Ayat Al-Kursi when lying down to sleep, Allah sends an angel to guard him until morning.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2311,a:"Sahih",ref:"Bukhari n°2311",th:"Coran",reward:"Un ange le garde toute la nuit"},
{id:561,ar:"مَنْ قَرَأَ بِالْآيَتَيْنِ مِنْ آخِرِ سُورَةِ الْبَقَرَةِ",fr:"Les deux derniers versets d'Al-Baqara : si tu les récites, ils te suffisent (pour la protection de la nuit).",en:"The last two verses of Al-Baqarah: if you recite them, they will suffice you.",n:"Abu Masud ر",b:"Sahih Al-Bukhari",num:5009,a:"Sahih",ref:"Bukhari n°5009",th:"Coran",reward:"Ayat Al-Kursi avant dormir = ange gardien toute la nuit. (Bukhari n°2311)"},
{id:562,ar:"الظُّلْمُ ظُلُمَاتٌ يَوْمَ الْقِيَامَةِ",fr:"L'injustice est des ténèbres au Jour du Jugement.",en:"Wrongdoing is darkness on the Day of Resurrection.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:2447,a:"Sahih",ref:"Bukhari n°2447",th:"Akhira",reward:"L'injustice = ténèbres au Jour du Jugement = éviter = lumière. (Bukhari n°2447)"},
{id:563,ar:"ثَلَاثٌ دَعَوَاتُهُمْ مُسْتَجَابَةٌ",fr:"Trois personnes dont le du'a est exaucé à coup sûr : le jeûneur jusqu'à ce qu'il rompe son jeûne, l'imam juste, et le du'a de l'opprimé.",en:"Three whose du'a is certainly answered: the fasting person until he breaks his fast, the just ruler, and the du'a of the oppressed.",n:"Abu Hureyra ر",b:"Jami' At-Tirmidhi",num:3598,a:"Hasan",ref:"Silsilah n°1797",th:"Du'a",reward:"Du'a certainement exaucé"},
{id:564,ar:"دَعْوَةُ الْمَظْلُومِ لَا حِجَابَ بَيْنَهَا وَبَيْنَ اللهِ",fr:"La du'a de l'opprimé — il n'y a aucun voile entre elle et Allah.",en:"The du'a of the oppressed — there is no veil between it and Allah.",n:"Mu'adh Ibn Jabal ر",b:"Sahih Al-Bukhari",num:1496,a:"Sahih",ref:"Bukhari n°1496",th:"Du'a",reward:"Allah exauce le du'a de l'opprimé sans voile"},
{id:565,ar:"مَنْ صَامَ رَمَضَانَ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque jeûne le Ramadan avec foi et en espérant la récompense, ses péchés passés lui seront pardonnés.",en:"Whoever fasts Ramadan with faith and hoping for reward, his previous sins will be forgiven.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:38,a:"Sahih",ref:"Bukhari n°38",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:566,ar:"مَنْ قَامَ رَمَضَانَ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque prie (Tarawih) pendant Ramadan avec foi et en espérant la récompense, ses péchés passés lui seront pardonnés.",en:"Whoever prays (Tarawih) during Ramadan with faith and hoping for reward, his previous sins will be forgiven.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:37,a:"Sahih",ref:"Bukhari n°37",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:567,ar:"مَنْ أَدَّى زَكَاةَ الْفِطْرِ صَاعًا مِنْ تَمْرٍ أَوْ صَاعًا مِنْ شَعِيرٍ",fr:"Qui s'acquitte de la Zakat Al-Fitr — un sa' de dattes ou d'orge — elle purifie le jeûneur des vaines paroles et des obscénités, et est une nourriture pour les pauvres.",en:"Whoever pays Zakat Al-Fitr — a sa' of dates or barley — it purifies the fasting person from vain talk and obscenities, and is food for the poor.",n:"Ibn Abbas ر",b:"Abu Dawud",num:1609,a:"Sahih",ref:"Tirmidhi n°2518 — Sahih Al-Albani",th:"Sadaqa",reward:"Purification du jeûne + nourriture pour les pauvres"},
{id:568,ar:"كُلُّ إِنْسَانٍ تَصَدَّقَ كُلَّ يَوْمٍ بِصَدَقَةٍ عَلَى نَفْسِهِ",fr:"Chaque joint de chaque personne doit faire la charité chaque jour. Aider quelqu'un à monter sa monture est une charité. Une bonne parole est une charité. Chaque pas vers la prière est une charité.",en:"Every joint of every person must give charity every day. Helping someone onto their mount is charity. A good word is charity. Every step toward prayer is charity.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2989,a:"Sahih",ref:"Bukhari n°2989",th:"Sadaqa",reward:"360 bonnes actions pour 360 articulations"},
{id:569,ar:"لَا يُفَرَّقُ بَيْنَ مُجْتَمِعٍ وَلَا يُجْمَعُ بَيْنَ مُتَفَرِّقٍ خَشْيَةَ الزَّكَاةِ",fr:"On ne sépare pas ce qui était ensemble et on ne réunit pas ce qui était séparé par crainte de la Zakat.",en:"What is kept together is not separated, and what is separate is not combined out of fear of Zakat.",n:"Anas ر",b:"Sahih Al-Bukhari",num:1450,a:"Sahih",ref:"Bukhari n°1450",th:"Sadaqa",reward:""},
{id:570,ar:"مَنْ تَصَدَّقَ بِعِدْلِ تَمْرَةٍ مِنْ كَسْبٍ طَيِّبٍ",fr:"Quiconque donne en aumône l'équivalent d'une datte de gains licites — Allah l'accepte de Sa droite et la fait croître pour lui comme l'un d'entre vous élève son poulain.",en:"Whoever gives in charity the equivalent of a date from lawful earnings — Allah accepts it with His right hand and causes it to grow for him as one of you raises their foal.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1410,a:"Sahih",ref:"Bukhari n°1410",th:"Sadaqa",reward:"Allah fait grandir la sadaqa jusqu'à la montagne"},
{id:571,ar:"اللَّهُمَّ أَعْطِ مُنْفِقًا خَلَفًا",fr:"Ô Allah, donne à celui qui dépense un successeur (replacement). Ô Allah, donne à celui qui retient une destruction.",en:"O Allah, give the one who spends a replacement. O Allah, give the one who withholds destruction.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1442,a:"Sahih",ref:"Bukhari n°1442",th:"Sadaqa",reward:"Du'a des anges chaque matin pour le généreux"},
{id:572,ar:"الصَّدَقَةُ تَرُدُّ الْبَلَاءَ",fr:"La sadaqa repousse l'épreuve.",en:"Sadaqa repels calamity.",n:"Ibn Umar ر",b:"Tabarani",num:13633,a:"Hasan",ref:"Silsilah n°1587",th:"Sadaqa",reward:"La sadaqa protège des épreuves"},
{id:573,ar:"تَهَادَوْا تَحَابُّوا",fr:"Échangez des cadeaux et vous vous aimerez.",en:"Exchange gifts and you will love one another.",n:"Abu Hureyra ر",b:"Al-Bayhaqi",num:3809,a:"Hasan",ref:"Silsilah n°594",th:"Akhlaq",reward:"Renforcement de l'amour mutuel"},
{id:574,ar:"مَنْ كَانَ بَيْنَهُ وَبَيْنَ قَوْمٍ عَهْدٌ فَلَا يَحُلَّنَّ عُقْدَةً وَلَا يَشُدَّهَا",fr:"Quiconque a un pacte avec un peuple, qu'il ne dénoue aucun nœud et n'en resserre aucun jusqu'à l'expiration du délai.",en:"Whoever has a covenant with a people, let him not untie any knot nor tighten any until the expiry of the term.",n:"Amr Ibn Awf ر",b:"Abu Dawud",num:2759,a:"Sahih",ref:"Silsilah n°3353",th:"Fiqh",reward:"Cadeaux = amour mutuel. (Silsilah n°594)"},
{id:575,ar:"مَنْ أَحَبَّ أَنْ يُزَحْزَحَ عَنِ النَّارِ وَيُدْخَلَ الْجَنَّةَ",fr:"Quiconque veut être éloigné du Feu et faire entrer au Paradis — que la mort le trouve en croyant en Allah et au Jour Dernier, et qu'il traite les gens comme il aime qu'on le traite.",en:"Whoever wants to be saved from the Fire and enter Paradise — let death find him believing in Allah and the Last Day, and let him treat people as he loves to be treated.",n:"Abdullah Ibn Abi Awfa ر",b:"Sahih Muslim",num:1844,a:"Sahih",ref:"Muslim n°1844",th:"Akhira",reward:"Entrée au Paradis"},
{id:576,ar:"إِنَّمَا أُمِرْتُ أَنْ أُقَاتِلَ النَّاسَ حَتَّى يَشْهَدُوا أَنْ لَا إِلَهَ إِلَّا اللهُ",fr:"Il m'a été ordonné de combattre les gens jusqu'à ce qu'ils témoignent qu'il n'y a de divinité qu'Allah. Quand ils l'ont fait, leurs vies et leurs biens me sont inviolables.",en:"I have been ordered to fight people until they testify that there is no deity except Allah. When they do so, their lives and wealth are inviolable to me.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:25,a:"Sahih",ref:"Bukhari n°25",th:"Tawhid",reward:""},
{id:577,ar:"خَيْرُ الصُّفُوفِ لِلنِّسَاءِ آخِرُهَا",fr:"Les meilleures rangées pour les femmes sont les dernières et les pires sont les premières.",en:"The best rows for women are the last ones and the worst are the first ones.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:440,a:"Sahih",ref:"Muslim n°440",th:"Salat",reward:"Meilleures rangées pour les femmes = dernières. (Muslim n°440)"},
{id:578,ar:"مَا يَزَالُ الرَّجُلُ يَسْأَلُ حَتَّى يَأْتِيَ يَوْمَ الْقِيَامَةِ وَلَيْسَ فِي وَجْهِهِ مُزْعَةُ لَحْمٍ",fr:"L'homme continuera à mendier jusqu'à ce qu'il arrive le Jour du Jugement sans aucune chair sur son visage.",en:"A man will continue begging until he comes on the Day of Resurrection with no flesh on his face.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:1474,a:"Sahih",ref:"Bukhari n°1474",th:"Sadaqa",reward:"Mendier excessivement = pas de chair sur le visage le Jour du Jugement. (Bukhari n°1474)"},
{id:579,ar:"اقْرَأِ الْقُرْآنَ مَا ائْتَلَفَتْ عَلَيْهِ قُلُوبُكُمْ",fr:"Lisez le Coran tant que vos cœurs s'accordent avec lui. Quand vos cœurs se divisent à son sujet, levez-vous.",en:"Read the Quran as long as your hearts are in accord with it. When your hearts diverge regarding it, then get up.",n:"Jundub ر",b:"Sahih Al-Bukhari",num:5060,a:"Sahih",ref:"Bukhari n°5060",th:"Coran",reward:"Réciter le Coran tant que les cœurs s'accordent = protection de la Sunnah. (Bukhari n°5060)"},
{id:580,ar:"يَهِيجُ الْقُرْآنُ مَنْ يَقْرَؤُهُ",fr:"Le Coran anime celui qui le lit.",en:"The Quran invigorates those who recite it.",n:"Hasan Al-Basri رحمه الله",b:"Athar",num:0,a:"Athar",ref:"Parole de Hasan Al-Basri",th:"Coran",reward:""},

{id:581,ar:"مَنْ عَادَ مَرِيضًا أَوْ زَارَ أَخًا لَهُ فِي اللهِ",fr:"Quiconque rend visite à un malade ou visite un frère pour l'amour d'Allah — un appelant l'appelle : 'Tu t'es bien comporté et ta marche fut bonne. Tu as préparé une demeure au Paradis.'",en:"Whoever visits a sick person or visits a brother for the sake of Allah — a caller calls out: 'You have been good and your walking was good. You have prepared a dwelling in Paradise.'",n:"Abu Hureyra ر",b:"Jami' At-Tirmidhi",num:2008,a:"Hasan Sahih",ref:"Silsilah n°1609",th:"Fraternité",reward:"Une demeure au Paradis"},
{id:582,ar:"عِيَادَةُ الْمَرِيضِ مِنَ الإِيمَانِ",fr:"Visiter le malade fait partie de la foi.",en:"Visiting the sick is part of faith.",n:"Anas ر",b:"Ibn Majah",num:1442,a:"Hasan",ref:"Silsilah n°2922",th:"Fraternité",reward:""},
{id:583,ar:"إِذَا عَادَ الرَّجُلُ أَخَاهُ فِي اللهِ",fr:"Quand un homme visite son frère malade, il est dans le fruit (bénédiction) du Paradis jusqu'à ce qu'il s'assoie. Quand il s'assoit, la miséricorde l'enveloppe.",en:"When a man visits his sick brother for the sake of Allah, he walks in the fruit of Paradise until he sits down. When he sits down, mercy envelops him.",n:"Anas ر",b:"Sahih Muslim",num:2568,a:"Sahih",ref:"Muslim n°2568",th:"Fraternité",reward:"Marcher dans les fruits du Paradis"},
{id:584,ar:"حَقُّ الْمُسْلِمِ عَلَى الْمُسْلِمِ سِتٌّ",fr:"Le droit du musulman sur le musulman est de six : quand tu le rencontres, salue-le; quand il t'invite, accepte; quand il te demande conseil, conseille-le sincèrement; quand il éternue et loue Allah, réponds-lui; quand il est malade, visite-le; et quand il meurt, accompagne-le.",en:"The right of the Muslim upon the Muslim is six: when you meet him greet him; when he invites you accept; when he asks you for sincere advice give it; when he sneezes and praises Allah respond; when he is sick visit him; and when he dies follow his bier.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2162,a:"Sahih",ref:"Muslim n°2162",th:"Fraternité",reward:""},
{id:585,ar:"مَثَلُ الْجَلِيسِ الصَّالِحِ وَالسَّوْءِ كَحَامِلِ الْمِسْكِ وَنَافِخِ الْكِيرِ",fr:"L'exemple du bon compagnon et du mauvais compagnon est comme le porteur de musc et le souffleur du forgeron — le porteur de musc soit t'en donne, soit tu lui achètes, soit tu en perçois le parfum. Et le souffleur soit brûle tes habits, soit tu en perçois une mauvaise odeur.",en:"The example of a good companion and a bad companion is like a perfume seller and a blacksmith — the perfume seller either gives you some or you buy from him, or you benefit from his scent. And the blacksmith either burns your clothes or you suffer from his smell.",n:"Abu Musa ر",b:"Sahih Al-Bukhari",num:5534,a:"Sahih",ref:"Bukhari n°5534",th:"Akhlaq",reward:"Bon compagnon = parfum de musc = bénédiction partagée. (Bukhari n°5534)"},
{id:586,ar:"لَا تَصْحَبْ إِلَّا مُؤْمِنًا",fr:"Ne sois accompagné que par un croyant, et ne mange ta nourriture que le pieux.",en:"Do not be accompanied except by a believer, and let no one eat your food except the pious.",n:"Abu Sa'id Al-Khudri ر",b:"Abu Dawud",num:4832,a:"Hasan",ref:"Silsilah n°2375",th:"Akhlaq",reward:"Ne fréquenter que les croyants = protection de la foi. (Silsilah n°2375)"},
{id:587,ar:"الرَّجُلُ عَلَى دِينِ خَلِيلِهِ",fr:"L'homme suit la religion de son ami proche. Que chacun de vous fasse attention à qui il choisit comme ami proche.",en:"A man follows the religion of his close friend. So let each of you look carefully at whom he takes as a close friend.",n:"Abu Hureyra ر",b:"Abu Dawud",num:4833,a:"Hasan",ref:"Silsilah n°927",th:"Akhlaq",reward:"L'homme suit la religion de son ami = choisir ses amis avec soin. (Silsilah n°927)"},
{id:588,ar:"مَنْ تَوَضَّأَ فَأَحْسَنَ الْوُضُوءَ خَرَجَتْ خَطَايَاهُ مِنْ جَسَدِهِ",fr:"Quiconque fait bien ses ablutions, ses fautes sortent de son corps — même sous ses ongles.",en:"Whoever performs ablution well, his sins leave his body — even from under his nails.",n:"Amr Ibn Abasa ر",b:"Sahih Muslim",num:832,a:"Sahih",ref:"Muslim n°832",th:"Taharah",reward:"Purification complète des fautes"},
{id:589,ar:"صَلَاةٌ فِي الْمَسْجِدِ الْحَرَامِ بِمِئَةِ أَلْفِ صَلَاةٍ",fr:"Une prière dans la Mosquée Sacrée (La Mecque) vaut cent mille prières ailleurs.",en:"One prayer in the Sacred Mosque (Makkah) is equivalent to one hundred thousand prayers elsewhere.",n:"Ibn Abbas ر",b:"Ibn Majah",num:1406,a:"Sahih",ref:"Silsilah n°1166",th:"Salat",reward:"Récompense de 100.000 prières"},
{id:590,ar:"صَلَاةٌ فِي مَسْجِدِ الْمَدِينَةِ بِأَلْفِ صَلَاةٍ فِيمَا سِوَاهُ",fr:"Une prière dans la mosquée du Prophète ﷺ (Médine) vaut mille prières dans n'importe quelle autre mosquée.",en:"One prayer in the Prophet's mosque (Madinah) is equivalent to one thousand prayers in any other mosque.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1190,a:"Sahih",ref:"Bukhari n°1190",th:"Salat",reward:"Récompense de 1000 prières"},
{id:591,ar:"مَنْ صَلَّى فِي مَسْجِدِ قُبَاءَ رَكْعَتَيْنِ",fr:"Quiconque se purifie chez lui et prie deux rak'at dans la mosquée de Quba, il aura la récompense d'une Umra.",en:"Whoever purifies himself at home and prays two rak'at in the mosque of Quba, he will have the reward of an Umra.",n:"Sahl Ibn Hunaif ر",b:"Sahih Muslim",num:1399,a:"Sahih",ref:"Muslim n°1399",th:"Salat",reward:"Récompense d'une Umra"},
{id:592,ar:"إِنَّ اللهَ يَقْبَلُ تَوْبَةَ الْعَبْدِ مَا لَمْ يُغَرْغِرْ",fr:"Allah accepte le repentir du serviteur tant que son âme n'est pas dans sa gorge (tant qu'il n'est pas à l'agonie).",en:"Allah accepts the repentance of the servant as long as the soul has not reached the throat (as long as he is not in the throes of death).",n:"Abdullah Ibn Umar ر",b:"Jami' At-Tirmidhi",num:3537,a:"Hasan",ref:"Silsilah n°1\\/1",th:"Tawbah",reward:"Acceptation du repentir jusqu'au dernier moment"},
{id:593,ar:"لَلَّهُ أَشَدُّ فَرَحًا بِتَوْبَةِ عَبْدِهِ",fr:"Allah se réjouit davantage du repentir de Son serviteur que l'un d'entre vous qui se retrouve dans un désert avec sa monture et sa nourriture, la perd, puis la retrouve.",en:"Allah is more joyful at the repentance of His servant than one of you who finds his mount and provisions after having lost them in a desert.",n:"Anas ر",b:"Sahih Muslim",num:2747,a:"Sahih",ref:"Muslim n°2747",th:"Tawbah",reward:"Joie d'Allah pour le repentir = motivation à se repentir. (Muslim n°2747)"},
{id:594,ar:"مَنْ تَابَ قَبْلَ أَنْ تَطْلُعَ الشَّمْسُ مِنْ مَغْرِبِهَا تَابَ اللهُ عَلَيْهِ",fr:"Quiconque se repent avant que le soleil ne se lève de l'Occident, Allah se retournera vers lui.",en:"Whoever repents before the sun rises from the West, Allah will turn to him in repentance.",n:"Abu Musa ر",b:"Sahih Muslim",num:2703,a:"Sahih",ref:"Muslim n°2703",th:"Tawbah",reward:"Repentir avant le soleil de l'Occident = accepté. (Muslim n°2703)"},
{id:595,ar:"أَسْبَلَ ثَوْبَهُ مِنَ الْكِبْرِ",fr:"Quiconque laisse traîner son vêtement par orgueil — Allah ne le regardera pas le Jour du Jugement.",en:"Whoever lets his garment trail out of pride — Allah will not look at him on the Day of Resurrection.",n:"Abu Dharr ر",b:"Sahih Al-Bukhari",num:5788,a:"Sahih",ref:"Bukhari n°5788",th:"Akhlaq",reward:""},
{id:596,ar:"لَا يَنْظُرُ اللهُ إِلَى مَنْ جَرَّ ثَوْبَهُ خُيَلَاءَ",fr:"Allah ne regardera pas celui qui traîne son vêtement par vanité.",en:"Allah will not look at the one who drags his garment out of pride.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5788,a:"Sahih",ref:"Bukhari n°5788",th:"Akhlaq",reward:""},
{id:597,ar:"مَنْ رَدَّ السَّلَامَ فَقَدْ أَدَّى مَا عَلَيْهِ",fr:"Quiconque répond au salam a accompli ce qui lui incombe. Mais commencer le salam est une sunnah.",en:"Whoever returns the greeting of peace has fulfilled his obligation. But initiating the salam is a sunnah.",n:"Ibn Masud ر",b:"Al-Bayhaqi",num:8592,a:"Hasan",ref:"Silsilah n°2\\/1",th:"Akhlaq",reward:""},
{id:598,ar:"لَا يَحِلُّ لِمُسْلِمٍ أَنْ يَهْجُرَ أَخَاهُ فَوْقَ ثَلَاثِ لَيَالٍ",fr:"Il n'est pas permis à un musulman de boycotter son frère plus de trois nuits — tous deux se rencontrent et l'un détourne le regard et l'autre fait de même. Le meilleur d'eux est celui qui initie le salam.",en:"It is not lawful for a Muslim to boycott his brother for more than three nights — both meet and one turns away and the other turns away. The better of them is the one who initiates the greeting.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:6077,a:"Sahih",ref:"Bukhari n°6077",th:"Fraternité",reward:"Le meilleur est celui qui initie le salam"},
{id:599,ar:"وَاللهِ لَا يُؤْمِنُ وَاللهِ لَا يُؤْمِنُ قِيلَ مَنْ يَا رَسُولَ اللهِ قَالَ الَّذِي لَا يَأْمَنُ جَارُهُ بَوَائِقَهُ",fr:"Par Allah, il ne croit pas ! Par Allah, il ne croit pas ! Par Allah, il ne croit pas ! On dit : Qui, ô Messager d'Allah ? Il dit : Celui dont le voisin ne se sent pas à l'abri de ses méfaits.",en:"By Allah, he does not believe! By Allah, he does not believe! By Allah, he does not believe! It was said: Who, O Messenger of Allah? He said: The one whose neighbor is not safe from his harm.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6016,a:"Sahih",ref:"Bukhari n°6016",th:"Akhlaq",reward:""},
{id:600,ar:"خَيْرُ الأَصْحَابِ عِنْدَ اللهِ خَيْرُهُمْ لِصَاحِبِهِ",fr:"Le meilleur des compagnons auprès d'Allah est le meilleur d'entre eux avec son compagnon, et le meilleur des voisins auprès d'Allah est le meilleur d'entre eux avec son voisin.",en:"The best of companions with Allah is the best of them to his companion, and the best of neighbors with Allah is the best of them to his neighbor.",n:"Abdullah Ibn Amr ر",b:"Jami' At-Tirmidhi",num:1944,a:"Sahih",ref:"Silsilah n°1723",th:"Akhlaq",reward:"Meilleur compagnon/voisin = meilleur auprès d'Allah. (Silsilah n°1723)"},
];

{id:'d29',cat:'Maladie',t:'Ruqyah personnelle',ar:'بِسْمِ اللهِ أَرْقِيكَ مِنْ كُلِّ شَيْءٍ يُؤْذِيكَ مِنْ شَرِّ كُلِّ نَفْسٍ أَوْ عَيْنٍ حَاسِدٍ اللهُ يَشْفِيكَ',fr:"Au nom d'Allah, je fais ta ruqyah contre tout ce qui te nuit, contre le mal de toute âme ou de tout œil envieux. Qu'Allah te guérisse.",ref:'Muslim n°2186',reward:''},
