/* ═══════════════════════════════
   ARABIC FONTS
═══════════════════════════════ */
/* Single source of truth for Arabic font — covers every Arabic class + inline .ar */
[data-font-ar="scheherazade"] .ar,
[data-font-ar="scheherazade"] .verse-arabic,
[data-font-ar="scheherazade"] .asma-arabic,
[data-font-ar="scheherazade"] .step-arabic,
[data-font-ar="scheherazade"] .mushaf-text,
[data-font-ar="scheherazade"] .mushaf-number,
[data-font-ar="scheherazade"] .mushaf-basmala,
[data-font-ar="scheherazade"] .hdr-basmala,
[data-font-ar="scheherazade"] [data-ar] { font-family:'Scheherazade New',serif !important }
[data-font-ar="amiri"] .ar,
[data-font-ar="amiri"] .verse-arabic,
[data-font-ar="amiri"] .asma-arabic,
[data-font-ar="amiri"] .step-arabic,
[data-font-ar="amiri"] .mushaf-text,
[data-font-ar="amiri"] .mushaf-number,
[data-font-ar="amiri"] .mushaf-basmala,
[data-font-ar="amiri"] .hdr-basmala,
[data-font-ar="amiri"] [data-ar] { font-family:'Amiri',serif !important }
[data-font-ar="naskh"] .ar,
[data-font-ar="naskh"] .verse-arabic,
[data-font-ar="naskh"] .asma-arabic,
[data-font-ar="naskh"] .step-arabic,
[data-font-ar="naskh"] .mushaf-text,
[data-font-ar="naskh"] .mushaf-number,
[data-font-ar="naskh"] .mushaf-basmala,
[data-font-ar="naskh"] .hdr-basmala,
[data-font-ar="naskh"] [data-ar] { font-family:'Noto Naskh Arabic',serif !important }
[data-font-ar="kufi"] .ar,
[data-font-ar="kufi"] .verse-arabic,
[data-font-ar="kufi"] .asma-arabic,
[data-font-ar="kufi"] .step-arabic,
[data-font-ar="kufi"] .mushaf-text,
[data-font-ar="kufi"] .mushaf-number,
[data-font-ar="kufi"] .mushaf-basmala,
[data-font-ar="kufi"] .hdr-basmala,
[data-font-ar="kufi"] [data-ar] { font-family:'Noto Kufi Arabic',sans-serif !important }

/* ═══════════════════════════════
   ARABIC FONT SIZE
═══════════════════════════════ */
.ar { font-size: var(--ar-size, 26px) }
.ar-xl { font-size: calc(var(--ar-size, 26px) + 8px) }
.ar-lg { font-size: var(--ar-size, 26px) }
.ar-md { font-size: calc(var(--ar-size, 26px) - 4px) }
.ar-sm { font-size: calc(var(--ar-size, 26px) - 8px) }

/* ═══════════════════════════════
   LINE SPACING
═══════════════════════════════ */
[data-spacing="compact"] .ar, [data-spacing="compact"] .verse-playing { background: var(--accd) !important; border-left: 3px solid var(--acc) !important; border-radius: 0 12px 12px 0 !important; padding-left: 10px !important; transition: all 0.3s ease !important; }
.verse-arabic { line-height: 1.5 !important }
[data-spacing="normal"] .ar, [data-spacing="normal"] .verse-arabic { line-height: 2.0 !important }
[data-spacing="airy"] .ar, [data-spacing="airy"] .verse-arabic { line-height: 2.6 !important }

/* ═══════════════════════════════
   RESET & BASE
═══════════════════════════════ */
*,*::before,*::after { box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent }
html { -webkit-text-size-adjust:100%;font-size:16px }
body {
  background:var(--bg);color:var(--tx);
  font-family:'Outfit',sans-serif;
  height:100dvh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
html {
  overflow:hidden;
  max-width:100vw;
}
button,input { font-family:'Outfit',sans-serif;cursor:pointer }

/* ═══════════════════════════════
   SVG ICONS SYSTEM
═══════════════════════════════ */
.icon { display:inline-flex;align-items:center;justify-content:center;flex-shrink:0 }
.icon svg { width:100%;height:100%;fill:currentColor }
.icon-20 { width:20px;height:20px }
.icon-22 { width:22px;height:22px }
.icon-24 { width:24px;height:24px }
.icon-28 { width:28px;height:28px }
.icon-32 { width:32px;height:32px }

/* ═══════════════════════════════
   APP LAYOUT
═══════════════════════════════ */
#app {
  max-width:480px;margin:0 auto;
  height:100dvh;display:flex;flex-direction:column;
  overflow:hidden;position:relative;
  width:100%;
}

/* Pattern bubble glow effect on cards */

  backdrop-filter: blur(2px);
  box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
}
[data-pattern]:not([data-pattern="none"]) .card {
  backdrop-filter: blur(1px);
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.hdr {
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px 10px;
  border-bottom:1px solid var(--bdr);
  background:var(--bg);
}
.hdr-left { min-width:56px }
.hdr-hijri { font-size:10px;color:var(--acc);font-weight:700;line-height:1.5;min-width:72px;letter-spacing:0.2px }
.hdr-greg { font-size:9px;color:var(--txd);margin-top:1px }
.hdr-center { text-align:center;flex:1 }
.hdr-basmala {
  color:var(--acc);font-size:14px;direction:rtl;
  display:block;margin-bottom:2px;
}
.hdr-title {
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:700;letter-spacing:.3px;
}
.hdr-sub { font-size:8px;color:var(--txd);letter-spacing:2.5px;text-transform:uppercase;margin-top:1px }
.hdr-right { min-width:56px;display:flex;justify-content:flex-end }
.hdr-settings-btn {
  background:var(--bg3);border:1px solid var(--bdr);
  border-radius:10px;padding:7px;color:var(--txm);
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;
}

/* ═══════════════════════════════
   CONTENT
═══════════════════════════════ */
.cnt {
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 14px 10px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scroll-behavior:smooth;
  width:100%;
}
.cnt::-webkit-scrollbar { display:none }

/* ═══════════════════════════════
   BOTTOM NAV — app native style
═══════════════════════════════ */
.nav {
  display:flex;
  background:var(--nav);
  border-top:1px solid var(--bdr);
  padding:4px 0 env(safe-area-inset-bottom,6px);
  flex-shrink:0;
}
.nb {
  flex:1;background:none;border:none;
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  padding:5px 2px 6px;
  position:relative;
  min-height:52px;justify-content:center;
  color:var(--txd);transition:color .2s, transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.nb:active { transform:scale(.88); }
.nb.on { color:var(--acc) }
.nb.on::before {
  content:'';position:absolute;top:0;left:25%;right:25%;
  height:2px;background:var(--acc);border-radius:0 0 3px 3px;
}
.nb-label { font-size:10px;font-weight:500;transition:font-weight .2s }
.nb.on .nb-label { font-weight:700 }

/* ═══════════════════════════════
   SCREENS
═══════════════════════════════ */
.scr { display:none }
.scr.on { display:block;animation:fadeUp .2s ease }
@keyframes fadeUp {
  from { opacity:0.3;transform:translateY(4px) }
  to { opacity:1;transform:translateY(0) }
}

/* ═══════════════════════════════
   SECTION LABEL
═══════════════════════════════ */
.slbl {
  font-size:9px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--acc2);margin-bottom:11px;
  display:flex;align-items:center;gap:8px;
}
.slbl::after { content:'';flex:1;height:1px;background:var(--bdr) }

/* ═══════════════════════════════
   CARDS
═══════════════════════════════ */
.card {
  background:var(--card);
  border:1px solid var(--bdr);
  border-radius:18px;
  padding:16px;
  margin-bottom:11px;
  box-shadow:var(--shadow2);
  backdrop-filter:blur(1px);
}
.card-grad {
  background:linear-gradient(145deg,var(--bg2),var(--bg4));
  border-color:var(--bdr2);
}
.card-tap {
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.card-tap:active { transform:scale(.96); opacity:.9; }

/* ═══════════════════════════════
   BADGES
═══════════════════════════════ */
.badge {
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 9px;border-radius:99px;
  font-size:9px;font-weight:800;letter-spacing:.3px;
}
.badge-s { background:#052e16;color:#22c55e;border:1px solid #22c55e30 }
.badge-h { background:#1c1400;color:#fbbf24;border:1px solid #fbbf2430 }
.badge-acc { background:var(--accd);color:var(--acc2);border:1px solid var(--acc3) }

/* ═══════════════════════════════
   BUTTONS
═══════════════════════════════ */
.btn {
  border:none;border-radius:13px;
  padding:13px 20px;font-size:14px;font-weight:700;
  min-height:50px;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;
  transition:transform .12s,opacity .15s;
}
.btn:active { transform:scale(.95) }
.btn-primary { background:var(--acc);color:#000 }
.btn-secondary { background:var(--bg3);color:var(--tx);border:1.5px solid var(--bdr) }
.btn-ghost {
  background:none;color:var(--txm);
  border:1.5px solid var(--bdr);
  padding:9px 16px;font-size:12px;
  min-height:40px;border-radius:10px;
}
.btn-icon {
  background:none;border:none;
  color:var(--txm);padding:6px;
  min-height:38px;min-width:38px;
  display:flex;align-items:center;justify-content:center;
  border-radius:9px;
}
.btn-icon:active { background:var(--bg3) }
.btn-icon-filled {
  background:var(--bg3);border:1px solid var(--bdr);
  color:var(--txm);padding:8px;
  min-height:38px;min-width:38px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;
}

/* ═══════════════════════════════
   SEARCH BAR
═══════════════════════════════ */
.searchbar {
  display:flex;align-items:center;
  background:var(--bg2);
  border:1.5px solid var(--bdr);
  border-radius:14px;padding:0 14px;
  margin-bottom:13px;gap:9px;
  transition:border-color .2s;min-height:48px;
}
.searchbar:focus-within { border-color:var(--acc) }
.searchbar input {
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-size:14px;padding:12px 0;
}
.searchbar input::placeholder { color:var(--txd) }

/* ═══════════════════════════════
   CHIPS / FILTERS
═══════════════════════════════ */
.chips {
  display:flex;gap:6px;
  margin-bottom:12px;
  overflow-x:auto;padding-bottom:3px;
}
.chips::-webkit-scrollbar { display:none }
.chip {
  background:var(--bg2);color:var(--txm);
  border:1.5px solid var(--bdr);
  border-radius:99px;padding:8px 15px;
  font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;
  transition:all .15s;min-height:38px;
}
.chip.on { background:var(--acc);color:#000;border-color:var(--acc);font-weight:700 }

/* STICKY CHIPS */
.chips-sticky {
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  padding:8px 0 4px;margin:0 -14px 12px;
  padding-left:14px;padding-right:14px;
  border-bottom:1px solid var(--bdr);
}

/* ═══════════════════════════════
   PROGRESS BAR
═══════════════════════════════ */
.progress { height:5px;background:var(--bdr);border-radius:99px;overflow:hidden }
.progress-fill { height:100%;background:var(--acc);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1) }

/* ═══════════════════════════════
   DIVIDER
═══════════════════════════════ */
.divider { border:none;border-top:1px solid var(--bdr);margin:12px 0 }

/* ═══════════════════════════════
   BACK BUTTON
═══════════════════════════════ */
.back-btn {
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg2);border:1.5px solid var(--bdr);
  border-radius:11px;padding:9px 14px;
  color:var(--txm);font-size:13px;font-weight:600;
  margin-bottom:14px;min-height:42px;
}

/* ═══════════════════════════════
   ACCORDION
═══════════════════════════════ */
.accordion-item {
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:15px;margin-bottom:8px;
  overflow:hidden;transition:border-color .2s;
}
.accordion-item.open { border-color:var(--acc) }
.accordion-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 15px;cursor:pointer;
  user-select:none;
}
.accordion-body {
  display:none;padding:0 15px 15px;
  border-top:1px solid var(--bdr);
  padding-top:14px;
}
.accordion-item.open .accordion-body { display:block }
.accordion-arrow {
  width:20px;height:20px;color:var(--txd);
  transition:transform .25s;flex-shrink:0;
}
.accordion-item.open .accordion-arrow { transform:rotate(180deg);color:var(--acc) }

/* ═══════════════════════════════
   LOADING
═══════════════════════════════ */
.loader { text-align:center;padding:50px 16px;color:var(--txm) }
.spinner {
  display:inline-block;width:30px;height:30px;
  border:3px solid var(--bdr);border-top-color:var(--acc);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;
}
@keyframes spin { to { transform:rotate(360deg) } }
@keyframes pulse { 0%,100%{transform:scale(1);box-shadow:0 4px 20px rgba(0,0,0,.4)} 50%{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,.6)} }

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
#toast {
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--acc);color:#000;
  padding:11px 22px;border-radius:99px;
  font-size:13px;font-weight:700;
  z-index:1000;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 6px 24px #00000050;
}

/* ═══════════════════════════════
   MODAL SHEET
═══════════════════════════════ */
.modal-overlay {
  position:fixed;inset:0;background:var(--overlay);
  z-index:500;display:flex;align-items:flex-end;
}
.modal-sheet {
  background:var(--bg2);
  border-radius:22px 22px 0 0;
  padding:8px 18px env(safe-area-inset-bottom,24px);
  width:100%;max-height:90dvh;overflow-y:auto;
}
.modal-sheet::-webkit-scrollbar { display:none }
.modal-handle {
  width:38px;height:4px;background:var(--bdr2);
  border-radius:99px;margin:12px auto 16px;
}
.modal-title {
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;
  margin-bottom:18px;text-align:center;
}

/* ═══════════════════════════════
   CORAN — MUSHAF MODE
═══════════════════════════════ */
.mushaf-page {
  background:var(--parchment-bg, #fdf5e6);
  border:2px solid var(--parchment-border, #d4c09a);
  border-radius:16px;
  padding:28px 22px 32px;
  margin-bottom:12px;
  position:relative;
  box-shadow:0 4px 20px #0000002a;
}
.mushaf-page::before {
  content:'';
  position:absolute;inset:6px;
  border:1px solid var(--parchment-border,#d4c09a);
  border-radius:11px;
  opacity:.4;
  pointer-events:none;
}
[data-theme="dark"] .mushaf-page,
[data-theme="midnight"] .mushaf-page,
[data-theme="bordeaux"] .mushaf-page,
[data-theme="violet"] .mushaf-page,
[data-theme="cuir"] .mushaf-page,
[data-theme="ardoise"] .mushaf-page,
[data-theme="charbon"] .mushaf-page,
[data-theme="indigo"] .mushaf-page,
[data-theme="rubis"] .mushaf-page,
[data-theme="foret"] .mushaf-page,
[data-theme="emerald"] .mushaf-page,
[data-theme="gold"] .mushaf-page,
[data-theme="turquoise"] .mushaf-page,
[data-theme="corail"] .mushaf-page,
[data-theme="amethyste"] .mushaf-page,
[data-theme="ocean"] .mushaf-page,
[data-theme="cannelle"] .mushaf-page,
[data-theme="olive"] .mushaf-page,
[data-theme="topkapi"] .mushaf-page,
[data-theme="iznik"] .mushaf-page,
[data-theme="maghreb"] .mushaf-page,
[data-theme="bagdad"] .mushaf-page,
[data-theme="samarcande"] .mushaf-page,
[data-theme="rawdah"] .mushaf-page,
[data-theme="medine"] .mushaf-page,
[data-theme="mecque"] .mushaf-page,
[data-theme="andalousie"] .mushaf-page,
[data-theme="ottoman"] .mushaf-page,
[data-theme="perse"] .mushaf-page,
[data-theme="maroc"] .mushaf-page,
[data-theme="egypte"] .mushaf-page,
[data-theme="amoled"] .mushaf-page,
[data-theme="contrast"] .mushaf-page,
[data-theme="sepia"] .mushaf-page,
[data-theme="lavande"] .mushaf-page,
[data-theme="minuit"] .mushaf-page,
[data-theme="aurore"] .mushaf-page {
  --parchment-bg:#1a1408;
  --parchment-border:#5a4010;
  --mushaf-text:#e8d8b8;
}
[data-theme="light"] .mushaf-page,
[data-theme="parchment"] .mushaf-page,
[data-theme="pearl"] .mushaf-page,
[data-theme="creme"] .mushaf-page,
[data-theme="ciel"] .mushaf-page,
[data-theme="menthe"] .mushaf-page,
[data-theme="sable"] .mushaf-page,
[data-theme="rose"] .mushaf-page,
[data-theme="foret-claire"] .mushaf-page {
  --parchment-bg:#fdf5e6;
  --parchment-border:#d4c09a;
  --mushaf-text:#2a1a0a;
}
.mushaf-text {
  direction:rtl;text-align:justify;
  line-height:2.6;font-size:var(--ar-size,26px);
  color:var(--mushaf-text, #2a1a0a);
  word-spacing:4px;
}
.mushaf-number {
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  background:var(--accd);border:1px solid var(--acc3);
  color:var(--acc2);font-size:10px;font-weight:700;
  vertical-align:middle;margin:0 4px;
  flex-shrink:0;
}
.mushaf-basmala {
  text-align:center;margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid var(--parchment-border,#d4c09a);
  font-size:calc(var(--ar-size,26px) + 4px);
  color:var(--acc);direction:rtl;
  line-height:2;
}

/* ═══════════════════════════════
   VERSE DISPLAY
═══════════════════════════════ */
.verse-card {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:16px;padding:16px;margin-bottom:10px;
  transition:border-color .2s;
  backdrop-filter:blur(1px);
}
.verse-card:hover { border-color:var(--bdr2); }
.verse-arabic {
  direction:rtl;text-align:right;
  line-height:2.1;
  font-size:var(--ar-size,26px);
  color:var(--tx);margin-bottom:12px;
}
.verse-transliteration {
  font-style:italic;color:var(--txm);
  font-size:12px;line-height:1.7;
  margin-bottom:10px;
  border-left:3px solid var(--bdr2);
  padding-left:10px;
}
.verse-translation {
  color:var(--tx2);font-size:var(--fs-ui,13px);line-height:1.7;
}
/* UI font size applies everywhere */
.card, .step-card, .verse-card,
.card div, .step-card div, .verse-card div {
  font-size:inherit;
}
.verse-translation,
.step-content {
  font-size:var(--fs-ui,13px) !important;
}

/* Adhkar completion animation */
@keyframes adhkarDone {
  0% { transform:scale(1); }
  50% { transform:scale(1.03); box-shadow:0 0 30px rgba(34,197,94,.3); }
  100% { transform:scale(1); }
}
.adhkar-done-anim { animation:adhkarDone .5s ease; }

/* Button press animation */
@keyframes btnPop {
  0% { transform:scale(1); }
  40% { transform:scale(.88); }
  100% { transform:scale(1); }
}

/* ═══════════════════════════════
   PRAYER CARD — Mawaqit style
═══════════════════════════════ */
.prayer-card {
  background:linear-gradient(160deg,var(--bg3),var(--bg4));
  border:1.5px solid var(--bdr2);
  border-radius:22px;padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.prayer-card::after {
  content:'';position:absolute;
  right:-20px;top:-20px;
  width:120px;height:120px;
  border-radius:50%;
  background:radial-gradient(circle,var(--acc) 0%,transparent 70%);
  opacity:.05;pointer-events:none;
}
.prayer-grid {
  display:grid;grid-template-columns:repeat(5,1fr);gap:5px;
  margin-top:14px;
}
.prayer-item {
  text-align:center;padding:10px 3px;
  border-radius:12px;
  background:#ffffff06;
  border:1.5px solid #ffffff0a;
  transition:all .2s;
  cursor:pointer;
}
.prayer-item:active { transform:scale(.93); }
.prayer-item.active {
  background:var(--acc);
  border-color:var(--acc);
  box-shadow:0 3px 12px var(--acc)30;
}
.prayer-item-name {
  font-size:9px;font-weight:700;color:var(--txm);
  margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;
}
.prayer-item.active .prayer-item-name { color:#00000099; font-weight:800; }
.prayer-item-time {
  font-size:13px;font-weight:800;color:var(--tx2);
  font-variant-numeric:tabular-nums;
}
.prayer-item.active .prayer-item-time { color:#000; font-size:14px; }

/* ═══════════════════════════════
   ASMA GRID
═══════════════════════════════ */
.asma-grid {
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.asma-item {
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:14px;padding:12px 8px;
  cursor:pointer;transition:all .2s;
  text-align:center;
  min-height:90px;
}
.asma-item:active { transform:scale(.95) }
.asma-item.active {
  border-color:var(--acc);
  background:linear-gradient(145deg,var(--bg3),var(--bg4));
  grid-column:span 3;
  overflow:hidden;
  box-shadow:0 4px 20px var(--acc)20;
}
.asma-num { font-size:9px;color:var(--acc);font-weight:800;margin-bottom:5px }
.asma-arabic {
  direction:rtl;font-size:24px;
  color:var(--tx);text-align:center;
  line-height:1.5;margin-bottom:5px;
}
.asma-item.active .asma-arabic { font-size:30px;margin-bottom:8px }
.asma-name { font-size:10px;font-weight:600;color:var(--txm) }
.asma-item.active .asma-name { font-size:14px;font-weight:700;color:var(--tx);margin-bottom:10px }
.asma-detail {
  margin-top:12px;padding-top:12px;
  border-top:1px solid var(--bdr);
  display:none;text-align:left;
}
.asma-item.active .asma-detail { display:block }

/* ═══════════════════════════════
   TASBIH
═══════════════════════════════ */
.tasbih-circle {
  width:170px;height:170px;border-radius:50%;
  background:linear-gradient(145deg,var(--bg3),var(--bg4));
  border:3px solid var(--bdr2);
  margin:14px auto 10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  box-shadow:0 0 40px #00000030,inset 0 2px 4px #ffffff08;
  transition:transform .1s,border-color .3s;
}
.tasbih-circle:active { transform:scale(.93) }
.tasbih-circle.done { border-color:var(--gr);box-shadow:0 0 40px #22c55e15 }
.tasbih-count {
  font-size:68px;font-weight:900;
  color:var(--acc);line-height:1;
  font-variant-numeric:tabular-nums;
}
.tasbih-circle.done .tasbih-count { color:var(--gr) }

/* ═══════════════════════════════
   ONBOARDING
═══════════════════════════════ */
.onboard {
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;text-align:center;
  overflow:hidden;
}
.onboard-logo {
  width:80px;height:80px;margin-bottom:20px;
}
.onboard-title {
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;
  color:var(--acc);margin-bottom:8px;
}
.onboard-sub {
  font-size:13px;color:var(--txm);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:32px;
}

/* ═══════════════════════════════
   SETTINGS
═══════════════════════════════ */
.setting-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--bdr);
}
.setting-row:last-child { border-bottom:none }
.setting-label { font-size:14px;font-weight:500 }
.setting-sub { font-size:11px;color:var(--txm);margin-top:2px }
.theme-grid {
  display:grid;grid-template-columns:repeat(5,1fr);gap:7px;
  margin-top:10px;margin-bottom:18px;
}
.theme-btn {
  aspect-ratio:1;border-radius:12px;
  border:2.5px solid transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:transform .15s;
}
.theme-btn:active { transform:scale(.9) }
.theme-btn.on { border-color:var(--acc) }

/* ═══════════════════════════════
   SLIDER
═══════════════════════════════ */
input[type="range"] {
  -webkit-appearance:none;appearance:none;
  width:100%;height:4px;background:var(--bdr);
  border-radius:99px;outline:none;cursor:pointer;
  touch-action:none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:26px;height:26px;border-radius:50%;
  background:var(--acc);
  box-shadow:0 2px 8px #00000040;
  cursor:grab;
}

/* ═══════════════════════════════
   INSTALL BUTTON
═══════════════════════════════ */
#install-btn {
  display:none;position:fixed;
  bottom:84px;left:50%;transform:translateX(-50%);
  background:var(--acc);color:#000;
  padding:11px 24px;border-radius:99px;
  font-weight:700;font-size:13px;z-index:200;border:none;
  box-shadow:0 6px 24px #00000050;white-space:nowrap;
}

/* ═══════════════════════════════
   STREAK BANNER
═══════════════════════════════ */
.streak-banner {
  background:linear-gradient(135deg,#1c1400,#2c2000);
  border:1.5px solid #fbbf2430;
  border-radius:16px;padding:14px 16px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
}

/* ═══════════════════════════════
   GLOBAL OVERFLOW FIX
═══════════════════════════════ */
* { max-width:100%; }
img, svg { max-width:100%;height:auto; }
.scr { overflow-x:hidden;width:100%; }
.card { overflow:hidden; }
.prayer-card { overflow:hidden; }

.icon-12 { width:12px !important;height:12px !important;flex-shrink:0 }
.icon-13 { width:13px !important;height:13px !important;flex-shrink:0 }
.icon-14 { width:14px !important;height:14px !important;flex-shrink:0 }
.icon-18 { width:18px !important;height:18px !important;flex-shrink:0 }
.icon-20 { width:20px !important;height:20px !important;flex-shrink:0 }
.icon-22 { width:22px !important;height:22px !important;flex-shrink:0 }
.icon-24 { width:24px !important;height:24px !important;flex-shrink:0 }
.icon-28 { width:28px !important;height:28px !important;flex-shrink:0 }
.icon-32 { width:32px !important;height:32px !important;flex-shrink:0 }
.icon svg { width:100% !important;height:100% !important;display:block }
/* ─────────────────────────────
   DRAG HANDLE & MODAL UPGRADES
───────────────────────────── */
.modal-overlay {
  position:fixed;inset:0;background:var(--overlay,#00000085);
  z-index:500;display:flex;align-items:flex-end;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet {
  background:var(--bg2);
  border-radius:22px 22px 0 0;
  padding:0 18px env(safe-area-inset-bottom,24px);
  width:100%;
  box-sizing:border-box;
  max-height:92dvh;
  overflow-y:auto;overflow-x:hidden;
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  user-select:none;
}
.modal-sheet::-webkit-scrollbar{display:none}
.drag-handle-wrap {
  position:sticky;top:0;background:var(--bg2);
  z-index:10;display:flex;justify-content:center;align-items:center;
  padding:12px 0 8px;
  width:100%;
}
.modal-handle {
  width:40px;height:4px;background:var(--bdr2);
  border-radius:99px;cursor:grab;
  display:block;
}

/* Quick theme button */
.quick-theme-btn {
  position:fixed;bottom:80px;right:16px;
  width:44px;height:44px;border-radius:50%;
  background:var(--acc);color:#000;
  border:none;z-index:100;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px #00000050;
  cursor:pointer;transition:transform .15s;
}
.quick-theme-btn:active{transform:scale(.9)}

/* Theme panel */
.theme-panel {
  position:fixed;inset:0;z-index:600;
  background:var(--overlay,#00000085);
  display:flex;align-items:flex-end;
  animation:fadeIn .2s ease;
}
.theme-panel-sheet {
  background:var(--bg2);
  border-radius:22px 22px 0 0;
  padding:0 16px env(safe-area-inset-bottom,20px);
  width:100%;max-height:85dvh;
  overflow-y:auto;
}
.theme-panel-sheet::-webkit-scrollbar{display:none}
.theme-cat-label {
  font-size:9px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--txm);
  margin:16px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.theme-cat-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.themes-row {
  display:flex;gap:8px;margin-bottom:4px;overflow-x:auto;padding-bottom:4px;
}
.themes-row::-webkit-scrollbar{display:none}
.theme-swatch {
  flex-shrink:0;width:64px;cursor:pointer;
}
.theme-swatch-color {
  height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid transparent;
  transition:border-color .15s,transform .15s;
}
.theme-swatch-color:active{transform:scale(.93)}
.theme-swatch-color.on{border-color:var(--acc)}
.theme-swatch-dot {
  width:18px;height:18px;border-radius:50%;
  box-shadow:0 0 8px currentColor;
}
.theme-swatch-label {
  font-size:9px;text-align:center;
  margin-top:5px;font-weight:500;
  color:var(--txd);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.theme-swatch-label.on{color:var(--acc);font-weight:700}


/* ═══════════════════════════════
   SPLASH SCREEN
═══════════════════════════════ */
#splash {
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .5s ease;
}
#splash.hide { opacity:0;pointer-events:none }
.splash-logo {
  width:90px;height:90px;margin-bottom:24px;
  animation:splashPulse 1.5s ease infinite;
}
@keyframes splashPulse {
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.06);opacity:.85}
}
.splash-title {
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:700;color:var(--acc);
  margin-bottom:6px;
}
.splash-sub {
  font-size:10px;color:var(--txd);
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:32px;
}
.splash-bar {
  width:120px;height:3px;background:var(--bdr);
  border-radius:99px;overflow:hidden;
}
.splash-bar-fill {
  height:100%;background:var(--acc);
  border-radius:99px;width:0%;
  animation:splashLoad 1.8s ease forwards;
}
@keyframes splashLoad {
  0%{width:0%}
  40%{width:60%}
  80%{width:85%}
  100%{width:100%}
}

/* ═══════════════════════════════
   SHIMMER LOADING
═══════════════════════════════ */
.shimmer {
  background:linear-gradient(90deg,var(--bdr) 25%,var(--bdr2) 50%,var(--bdr) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:10px;
}
@keyframes shimmer {
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.shimmer-card {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:18px;padding:16px;margin-bottom:11px;
}
.shimmer-line { height:14px;margin-bottom:10px; }
.shimmer-line-sm { height:10px;width:60%;margin-bottom:8px; }
.shimmer-ar { height:32px;margin-bottom:14px; }

/* ═══════════════════════════════
   SWIPE BETWEEN TABS
═══════════════════════════════ */
#cnt {
  touch-action:pan-y;
}
.swipe-hint {
  position:fixed;bottom:64px;left:50%;
  transform:translateX(-50%);
  background:var(--bg4);border:1px solid var(--bdr);
  border-radius:99px;padding:6px 14px;
  font-size:11px;color:var(--txm);
  opacity:0;animation:hintFade 3s ease forwards;
  pointer-events:none;z-index:50;
  white-space:nowrap;
}
@keyframes hintFade {
  0%{opacity:0}10%{opacity:1}70%{opacity:1}100%{opacity:0}
}

/* ═══════════════════════════════
   GLOBAL SEARCH
═══════════════════════════════ */
.global-search-overlay {
  position:fixed;inset:0;z-index:800;
  background:var(--bg);
  display:flex;flex-direction:column;
  animation:slideDown .2s ease;
}
@keyframes slideDown {
  from{transform:translateY(-10px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.global-search-bar {
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--bdr);
}
.global-search-input {
  flex:1;background:var(--bg2);border:1.5px solid var(--bdr);
  border-radius:13px;padding:12px 16px;
  font-size:15px;color:var(--tx);outline:none;
  font-family:'Outfit',sans-serif;
}
.global-search-input:focus{border-color:var(--acc)}
.global-search-results {
  flex:1;overflow-y:auto;padding:12px 16px;
}
.global-search-results::-webkit-scrollbar{display:none}
.search-result-item {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:14px;padding:14px;margin-bottom:8px;
  cursor:pointer;transition:transform .12s;
}
.search-result-item:active{transform:scale(.98)}
.search-result-type {
  font-size:9px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--acc);margin-bottom:6px;
}
.search-result-text {
  font-size:13px;color:var(--tx2);line-height:1.6;
}
.search-result-sub {
  font-size:10px;color:var(--txd);margin-top:5px;
}
.search-highlight {
  background:var(--accd);color:var(--acc);
  border-radius:3px;padding:0 2px;font-weight:700;
}

/* ═══════════════════════════════
   BOOKMARK BUTTON
═══════════════════════════════ */
.bookmark-btn {
  background:none;border:none;
  font-size:20px;padding:4px;
  min-height:36px;min-width:36px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.bookmark-btn:active{transform:scale(1.3)}

/* ═══════════════════════════════
   READING PROGRESS BAR
═══════════════════════════════ */
.reading-progress {
  position:sticky;top:0;z-index:5;
  height:2px;background:var(--bdr);
  margin:-14px -14px 14px;
}
.reading-progress-fill {
  height:100%;background:var(--acc);
  transition:width .3s;
}

/* ═══════════════════════════════
   TAFSIR PANEL
═══════════════════════════════ */
.tafsir-panel {
  background:var(--bg3);border-radius:12px;
  padding:13px;margin-top:10px;
  border-left:3px solid var(--acc);
}
.tafsir-label {
  font-size:9px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--acc);margin-bottom:7px;
}
.tafsir-text {
  font-size:12px;color:var(--tx2);line-height:1.7;
}

/* ═══════════════════════════════
   JUZ BADGE
═══════════════════════════════ */
.juz-badge {
  display:inline-flex;align-items:center;gap:5px;
  background:var(--accd);border:1px solid var(--acc3);
  border-radius:8px;padding:4px 10px;
  font-size:10px;font-weight:700;color:var(--acc2);
  margin-bottom:12px;
}

/* ═══════════════════════════════
   REWARD BANNER (hadith/dua)
═══════════════════════════════ */
.reward-banner {
  background:linear-gradient(135deg,#052e16,#0a3d20);
  border:1px solid #22c55e25;
  border-radius:10px;padding:9px 12px;
  margin-top:9px;font-size:11px;
  color:var(--grs);line-height:1.5;
  display:flex;align-items:flex-start;gap:8px;
}
.reward-icon {
  width:16px;height:16px;flex-shrink:0;margin-top:1px;
}

/* ═══════════════════════════════
   SECTION TABS (Sunnah etc)
═══════════════════════════════ */
.section-tabs {
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:3px;margin-bottom:13px;
}
.section-tabs::-webkit-scrollbar{display:none}
.section-tab {
  background:var(--bg2);color:var(--txm);
  border:1.5px solid var(--bdr);border-radius:99px;
  padding:8px 15px;font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;min-height:38px;
  transition:all .15s;
}
.section-tab.on {
  background:var(--acc);color:#000;
  border-color:var(--acc);font-weight:700;
}

/* ═══════════════════════════════
   FIQH / SIRA CARDS
═══════════════════════════════ */
.step-card {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:16px;padding:16px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.step-number {
  position:absolute;right:16px;top:14px;
  width:28px;height:28px;border-radius:50%;
  background:var(--accd);border:1.5px solid var(--acc3);
  display:flex;align-items:center;justify-content:center;
  color:var(--acc);font-size:11px;font-weight:800;
}
.step-title {
  font-size:14px;font-weight:700;color:var(--acc);
  margin-bottom:7px;padding-right:36px;
}
.step-content {
  font-size:13px;color:var(--tx2);line-height:1.7;
}
.step-arabic {
  direction:rtl;text-align:right;
  font-size:var(--ar-size,26px);
  color:var(--tx);margin:10px 0;
}
.sira-date {
  display:inline-block;background:var(--accd);
  border-radius:7px;padding:2px 9px;
  font-size:10px;font-weight:700;color:var(--acc2);
  margin-bottom:8px;
}

/* ═══════════════════════════════
   BETTER SHARE
═══════════════════════════════ */
.share-menu {
  position:fixed;inset:0;z-index:700;
  background:var(--overlay,#00000085);
  display:flex;align-items:flex-end;
}
.share-sheet {
  background:var(--bg2);border-radius:22px 22px 0 0;
  padding:16px 18px env(safe-area-inset-bottom,20px);
  width:100%;
}
.share-preview {
  background:var(--bg3);border-radius:14px;
  padding:16px;margin-bottom:16px;
  border:1px solid var(--bdr);
}
.share-option {
  display:flex;align-items:center;gap:12px;
  padding:14px 0;border-bottom:1px solid var(--bdr);
  cursor:pointer;
}
.share-option:last-child{border-bottom:none}
.share-option-icon {
  width:42px;height:42px;border-radius:12px;
  background:var(--bg4);border:1px solid var(--bdr2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.share-option-label {
  font-size:14px;font-weight:500;
}

/* ═══════════════════════════════
   AUTO DARK MODE INDICATOR
═══════════════════════════════ */
.auto-mode-badge {
  display:inline-flex;align-items:center;gap:4px;
  background:var(--accd);border-radius:99px;
  padding:3px 9px;font-size:10px;font-weight:600;
  color:var(--acc);
}

/* ═══════════════════════════════
   HISTORY / LAST READ
═══════════════════════════════ */
.history-item {
  display:flex;align-items:center;gap:11px;
  background:var(--card);border:1px solid var(--bdr);
  border-radius:13px;padding:12px 14px;
  margin-bottom:7px;cursor:pointer;
  transition:transform .12s;
}
.history-item:active{transform:scale(.98)}
.history-icon {
  width:38px;height:38px;border-radius:10px;
  background:var(--accd);border:1.5px solid var(--acc3);
  display:flex;align-items:center;justify-content:center;
  color:var(--acc);font-size:11px;font-weight:800;
  flex-shrink:0;
}

/* ═══════════════════════════════
   SEARCH BUTTON IN HEADER
═══════════════════════════════ */
.hdr-search-btn {
  background:var(--bg3);border:1px solid var(--bdr);
  border-radius:10px;padding:7px;color:var(--txm);
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;cursor:pointer;border:none;
}

/* ═══════════════════════════════
   GO TO VERSE
═══════════════════════════════ */
.goto-verse-bar {
  display:flex;align-items:center;gap:8px;
  background:var(--bg2);border:1.5px solid var(--bdr);
  border-radius:13px;padding:8px 12px;
  margin-bottom:13px;
}
.goto-verse-bar input {
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-size:13px;font-family:'Outfit',sans-serif;
}
.goto-verse-bar input::placeholder{color:var(--txd)}


.settings-section-label {
  font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--txm);text-transform:uppercase;
  margin-bottom:10px;margin-top:2px;
}

/* Arabic font rules consolidated at top of stylesheet */
</style>
</head>

  <!-- SCREENS -->

</div>

<!-- TOAST -->
<div id="toast"></div>
<!-- INSTALL -->

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// HADITHS COMPLETS — 120+ tous authentiques
// Sources : Bukhari, Muslim, Abu Dawud, Tirmidhi, Ibn Majah, Nasa'i
// Vérification : Al-Albani رحمه الله
// ═══════════════════════════════════════════════════════
const HADITHS = [
// ── TAWHID & AQIDAH ──
{id:1,ar:"إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ",fr:"Les actes ne valent que par les intentions, et chaque homme n'obtiendra que ce qu'il a eu l'intention de faire.",en:"Actions are only by intentions, and every person will only have what they intended.",n:"Umar Ibn Al-Khattab ر",b:"Sahih Al-Bukhari",num:1,a:"Sahih",ref:"Bukhari n°1",th:"Niyyah",reward:"Premier hadith du Sahih Al-Bukhari — La récompense dépend entièrement de l'intention. Quiconque émigre pour Allah et Son messager, son émigration est pour Allah et Son messager."},
{id:2,ar:"أَعْظَمُ الذُّنُوبِ أَنْ تَجْعَلَ لِلَّهِ نِدًّا وَهُوَ خَلَقَكَ",fr:"Le plus grand des péchés est que tu fasses un rival à Allah alors qu'Il t'a créé.",en:"The greatest sin is that you set up a rival to Allah while He created you.",n:"Abdullah Ibn Masud ر",b:"Sahih Al-Bukhari",num:6001,a:"Sahih",ref:"Bukhari n°6001",th:"Tawhid",reward:"Cinq prières + vendredi à vendredi + Ramadan à Ramadan = expiation de tout ce qui est entre eux si les grands péchés sont évités. (Muslim n°233)"},
{id:3,ar:"مَنْ مَاتَ وَهُوَ يَعْلَمُ أَنَّهُ لَا إِلَٰهَ إِلَّا اللهُ دَخَلَ الْجَنَّةَ",fr:"Quiconque meurt en sachant qu'il n'y a de divinité qu'Allah entrera au Paradis.",en:"Whoever dies knowing that there is no deity but Allah will enter Paradise.",n:"Abu Dharr Al-Ghifari ر",b:"Sahih Muslim",num:26,a:"Sahih",ref:"Muslim n°26",th:"Tawhid",reward:"Entrée au Paradis"},
{id:4,ar:"مَنْ قَالَ لَا إِلَٰهَ إِلَّا اللهُ مُخْلِصًا دَخَلَ الْجَنَّةَ",fr:"Quiconque dit 'Lâ ilâha illallâh' avec sincérité entrera au Paradis.",en:"Whoever says \'La ilaha illallah\' sincerely will enter Paradise.",n:"Abu Hureyra ر",b:"Musnad Ahmad",num:9312,a:"Sahih",ref:"Silsilah n°3355",th:"Tawhid",reward:"Entrée au Paradis"},
{id:5,ar:"لَعَنَ اللهُ مَنِ اتَّخَذَ قَبْرَ نَبِيِّهِ مَسْجِدًا",fr:"Allah a maudit quiconque prend la tombe de son prophète comme lieu de prière.",en:"Allah has cursed whoever takes the grave of his prophet as a place of worship.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:435,a:"Sahih",ref:"Bukhari n°435",th:"Tawhid",reward:"Quiconque croit en Allah et au Jour Dernier doit honorer son hôte. (Bukhari n°6018) — Générosité récompensée dans les deux mondes."},
// ── BID'AH & SUNNAH ──
{id:6,ar:"مَنْ أَحْدَثَ فِي أَمْرِنَا هَذَا مَا لَيْسَ مِنْهُ فَهُوَ رَدٌّ",fr:"Quiconque introduit dans notre religion quelque chose qui n'en fait pas partie, cela sera rejeté.",en:"Whoever introduces into this matter of ours something that does not belong to it, it will be rejected.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:2697,a:"Sahih",ref:"Bukhari n°2697",th:"Bid'ah",reward:"Allah est Beau et aime la beauté. La beauté du caractère est des plus aimée d'Allah. (Muslim n°2564)"},
{id:7,ar:"عَلَيْكُمْ بِسُنَّتِي وَسُنَّةِ الْخُلَفَاءِ الرَّاشِدِينَ الْمَهْدِيِّينَ مِنْ بَعْدِي",fr:"Tenez-vous à ma Sunnah et à la Sunnah des califes bien guidés après moi. Mordez-y avec les molaires.",en:"Hold fast to my Sunnah and the Sunnah of the rightly-guided caliphs after me. Bite onto it with your molar teeth.",n:"Al-Irbad Ibn Sariya ر",b:"Sunan Abu Dawud",num:4607,a:"Sahih",ref:"Silsilah n°2735",th:"Sunnah",reward:"Les 5 prières effacent les péchés entre elles. (Muslim n°233) — Elles sont un pilier de l'Islam."},
{id:8,ar:"خَيْرُ الْقُرُونِ قَرْنِي ثُمَّ الَّذِينَ يَلُونَهُمْ ثُمَّ الَّذِينَ يَلُونَهُمْ",fr:"La meilleure génération est la mienne, puis celle qui suit, puis celle qui suit.",en:"The best generation is my generation, then those who follow them, then those who follow them.",n:"Abdullah Ibn Masud ر",b:"Sahih Al-Bukhari",num:3651,a:"Sahih",ref:"Bukhari n°3651",th:"Salaf",reward:"Les actes les plus aimés d'Allah sont les plus réguliers, même peu nombreux. (Bukhari n°6465)"},
{id:9,ar:"كُلُّ بِدْعَةٍ ضَلَالَةٌ وَكُلُّ ضَلَالَةٍ فِي النَّارِ",fr:"Toute innovation est un égarement et tout égarement conduit au Feu.",en:"Every innovation is misguidance, and every misguidance leads to the Fire.",n:"Jabir Ibn Abdillah ر",b:"Sahih Muslim",num:867,a:"Sahih",ref:"Muslim n°867",th:"Bid'ah",reward:"Allah aime la douceur et donne pour la douceur ce qu'Il ne donne pas pour la violence. (Bukhari n°6927)"},
{id:10,ar:"مَنْ رَغِبَ عَنْ سُنَّتِي فَلَيْسَ مِنِّي",fr:"Quiconque se détourne de ma Sunnah n'est pas des miens.",en:"Whoever turns away from my Sunnah is not of me.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:5063,a:"Sahih",ref:"Bukhari n°5063",th:"Sunnah",reward:"Le plus aimé d'Allah parmi les actes : la prière en son temps, puis la piété filiale, puis le jihad. (Bukhari n°527)"},
// ── IMAN & PILLIERS ──
{id:11,ar:"الدِّينُ النَّصِيحَةُ",fr:"La religion, c'est la sincérité (An-Nasiha). Pour Allah, pour Son Livre, pour Son Messager, pour les imams des musulmans et pour l'ensemble des musulmans.",en:"Religion is sincerity — towards Allah, His Book, His Messenger, the leaders of Muslims, and the common people.",n:"Tamim Ad-Dari ر",b:"Sahih Muslim",num:55,a:"Sahih",ref:"Muslim n°55",th:"Nasiha",reward:"L'Islam bâti sur 5 piliers = fondement de la récompense. Quiconque les accomplit reçoit la récompense complète."},
{id:12,ar:"بُنِيَ الإِسْلَامُ عَلَى خَمْسٍ شَهَادَةِ أَنْ لَا إِلَهَ إِلَّا اللهُ",fr:"L'Islam est bâti sur cinq piliers : le témoignage qu'il n'y a de divinité qu'Allah et que Muhammad est Son messager, l'accomplissement de la prière, l'acquittement de la zakat, le pèlerinage et le jeûne du Ramadan.",en:"Islam is built upon five: the testimony that there is no deity but Allah and that Muhammad is His Messenger, establishing prayer, paying Zakat, Hajj, and fasting Ramadan.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:8,a:"Sahih",ref:"Bukhari n°8",th:"Pilliers",reward:"Quiconque dit sincèrement La ilaha illallah en connaissant son sens entrera au Paradis. (Muslim n°26)"},
{id:13,ar:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ",fr:"Aucun de vous n'est (pleinement) croyant tant qu'il n'aime pas pour son frère ce qu'il aime pour lui-même.",en:"None of you truly believes until he loves for his brother what he loves for himself.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:13,a:"Sahih",ref:"Bukhari n°13",th:"Fraternité",reward:"Quiconque croit en Allah et au Jour Dernier et aime pour son frère ce qu'il aime pour lui-même est parmi les parfaits croyants."},
{id:14,ar:"الطَّهُورُ شَطْرُ الإِيمَانِ",fr:"La pureté est la moitié de la foi. Al-Hamdulillah remplit la balance. Subhan Allah et Al-Hamdulillah remplissent ensemble — ou l'un d'eux remplit — ce qui est entre les cieux et la terre.",en:"Purity is half of faith. Al-hamdulillah fills the scale. Subhan Allah and Al-hamdulillah fill — or one of them fills — what is between the heavens and the earth.",n:"Abu Malik Al-Ash'ari ر",b:"Sahih Muslim",num:223,a:"Sahih",ref:"Muslim n°223",th:"Taharah",reward:"Récompense équivalant à remplir l'espace entre les cieux et la terre"},
{id:15,ar:"أَكْمَلُ الْمُؤْمِنِينَ إِيمَانًا أَحْسَنُهُمْ خُلُقًا",fr:"Parmi les croyants, celui qui a la foi la plus parfaite est celui qui a le meilleur caractère.",en:"The most complete believer in faith is the one with the best character.",n:"Abu Hureyra ر",b:"Sunan Abu Dawud",num:4682,a:"Sahih",ref:"Silsilah n°284",th:"Akhlaq",reward:"Prière en groupe = 27× la prière individuelle. (Bukhari n°645) — Ascension des degrés auprès d'Allah."},
{id:16,ar:"مَنْ يُرِدِ اللهُ بِهِ خَيْرًا يُفَقِّهْهُ فِي الدِّينِ",fr:"Quand Allah veut du bien à quelqu'un, Il lui donne la compréhension de la religion.",en:"When Allah wants good for someone, He gives him understanding of the religion.",n:"Mu'awiya Ibn Abi Sufyan ر",b:"Sahih Al-Bukhari",num:71,a:"Sahih",ref:"Bukhari n°71",th:"'Ilm",reward:"Signe de la bienveillance d'Allah"},
// ── SCIENCE & CONNAISSANCE ──
{id:17,ar:"خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ",fr:"Le meilleur d'entre vous est celui qui apprend le Coran et l'enseigne.",en:"The best of you is the one who learns the Quran and teaches it.",n:"Uthman Ibn Affan ر",b:"Sahih Al-Bukhari",num:5027,a:"Sahih",ref:"Bukhari n°5027",th:"Coran",reward:"Être le meilleur"},
{id:18,ar:"مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ",fr:"Quiconque emprunte un chemin pour y chercher de la connaissance, Allah lui facilite un chemin vers le Paradis.",en:"Whoever takes a path in search of knowledge, Allah will make easy for him a path to Paradise.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2699,a:"Sahih",ref:"Muslim n°2699",th:"'Ilm",reward:"Facilitation du chemin vers le Paradis"},
{id:19,ar:"طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ",fr:"La recherche de la connaissance (religieuse) est une obligation pour tout musulman.",en:"The seeking of knowledge is an obligation upon every Muslim.",n:"Anas Ibn Malik ر",b:"Sunan Ibn Majah",num:224,a:"Sahih",ref:"Silsilah n°342",th:"'Ilm",reward:"Obligation dont on sera interrogé"},
{id:20,ar:"إِذَا مَاتَ الإِنْسَانُ انْقَطَعَ عَنْهُ عَمَلُهُ إِلَّا مِنْ ثَلَاثَةٍ",fr:"Quand l'être humain meurt, ses actes s'interrompent sauf trois : une aumône continue (Sadaqa Jariya), une connaissance dont on bénéficie, ou un enfant pieux qui fait du du'a pour lui.",en:"When a person dies, his deeds come to an end except for three: a continuing charity, knowledge that is benefited from, or a righteous child who prays for him.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1631,a:"Sahih",ref:"Muslim n°1631",th:"'Ilm",reward:"Récompense qui continue après la mort"},
{id:21,ar:"فَضْلُ الْعِلْمِ خَيْرٌ مِنْ فَضْلِ الْعِبَادَةِ",fr:"L'excellence de la connaissance est meilleure que l'excellence du culte voluntaire.",en:"The virtue of knowledge is better than the virtue of voluntary worship.",n:"Hudhayfah ر",b:"Sunan Al-Darimi",num:322,a:"Sahih",ref:"Silsilah n°1196",th:"'Ilm",reward:"Les 5 piliers de l'Islam — les accomplir intégralement assure la récompense d'un Muslim complet."},
// ── SALAT ──
{id:22,ar:"صَلُّوا كَمَا رَأَيْتُمُونِي أُصَلِّي",fr:"Priez comme vous m'avez vu prier.",en:"The best of you are those who learn the Quran and teach it.",n:"Malik Ibn Al-Huwayrit ر",b:"Sahih Al-Bukhari",num:631,a:"Sahih",ref:"Bukhari n°631",th:"Salat",reward:"Les ablutions parfaites effacent les péchés jusqu'aux ongles. (Muslim n°832) — Purification totale avant chaque prière."},
{id:23,ar:"أَوَّلُ مَا يُحَاسَبُ بِهِ الْعَبْدُ يَوْمَ الْقِيَامَةِ الصَّلَاةُ",fr:"La première chose dont le serviteur sera rendu compte au Jour du Jugement, c'est la prière. Si elle est bonne, tout le reste de ses actes sera bon. Si elle est mauvaise, tout le reste sera mauvais.",en:"Perform ablution and do it well, then pray two rak'at focusing fully.",n:"Abu Hureyra ر",b:"Sunan At-Tirmidhi",num:413,a:"Sahih",ref:"Silsilah n°1358",th:"Salat",reward:"Entrer à la mosquée = récompense d'une réception au Paradis pour chaque pas. (Bukhari n°477)"},
{id:24,ar:"الصَّلَاةُ عِمَادُ الدِّينِ مَنْ أَقَامَهَا فَقَدْ أَقَامَ الدِّينَ",fr:"La prière est le pilier de la religion. Quiconque l'établit a établi la religion, quiconque la détruit a détruit la religion.",en:"Prayer is light, charity is proof, patience is clarity, and the Quran is an argument for or against you.",n:"Mu'adh Ibn Jabal ر",b:"Shu'ab Al-Iman (Bayhaqi)",num:2549,a:"Sahih",ref:"Silsilah n°1574",th:"Salat",reward:"Quiconque établit la prière a établi la religion. La prière sera le premier acte dont on sera rendu compte. (Silsilah n°356 — Sahih Al-Albani)"},
{id:25,ar:"مَنْ حَافَظَ عَلَى الصَّلَوَاتِ الْخَمْسِ كَانَتْ لَهُ نُورًا وَبُرْهَانًا وَنَجَاةً",fr:"Quiconque est assidu aux cinq prières, elles seront pour lui une lumière, une preuve et un salut au Jour du Jugement.",en:"The best of you are those who are best to their families. And I am the best of you to my family.",n:"Abdullah Ibn Amr ر",b:"Musnad Ahmad",num:6576,a:"Sahih",ref:"Silsilah n°2939",th:"Salat",reward:"Lumière, preuve et salut au Jour du Jugement"},
{id:26,ar:"صَلَاةٌ فِي الْمَسْجِدِ الْحَرَامِ أَفْضَلُ مِنْ مِائَةِ أَلْفِ صَلَاةٍ",fr:"Une prière dans la Mosquée Sacrée vaut mieux que cent mille prières ailleurs.",en:"Feed the hungry, greet those you know and those you do not know, and pray at night while people sleep — you will enter Paradise in peace.",n:"Jabir ر",b:"Sunan Ibn Majah",num:1406,a:"Sahih",ref:"Silsilah n°1648",th:"Salat",reward:"100 000 fois la récompense"},
{id:27,ar:"أَفْضَلُ الصَّلَاةِ بَعْدَ الْفَرِيضَةِ صَلَاةُ اللَّيْلِ",fr:"La meilleure prière après la prière obligatoire est la prière de nuit (Qiyam Al-Layl).",en:"The best prayer after the obligatory prayers is the night prayer (Tahajjud).",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1163,a:"Sahih",ref:"Muslim n°1163",th:"Salat",reward:"L'honnêteté mène au Paradis. L'homme continue d'être sincère jusqu'à être inscrit comme Siddiq (véridique). (Bukhari n°6094)"},
// ── AKHLAQ ──
{id:28,ar:"إِنَّمَا بُعِثْتُ لِأُتَمِّمَ مَكَارِمَ الأَخْلَاقِ",fr:"Je n'ai été envoyé que pour parfaire les nobles caractères.",en:"Lying leads to wickedness and wickedness leads to the Fire. A man continues to lie until he is written with Allah as a liar.",n:"Abu Hureyra ر",b:"Muwatta' Malik",num:1614,a:"Sahih",ref:"Silsilah n°45",th:"Akhlaq",reward:"Le mensonge mène au Feu. Éviter le mensonge = protection du Feu."},
{id:29,ar:"مَنْ كَانَ يُؤْمِنُ بِاللهِ وَالْيَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ",fr:"Que celui qui croit en Allah et au Jour Dernier dise quelque chose de bien ou qu'il se taise.",en:"Do not wrong anyone and do not be wronged.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6018,a:"Sahih",ref:"Bukhari n°6018",th:"Akhlaq",reward:"Quiconque rend les droits aux autres, Allah lui accordera le Paradis. (Muslim n°2564)"},
{id:30,ar:"إِنَّ اللهَ لَا يَنْظُرُ إِلَى صُوَرِكُمْ وَأَمْوَالِكُمْ وَلَكِنْ يَنْظُرُ إِلَى قُلُوبِكُمْ وَأَعْمَالِكُمْ",fr:"Allah ne regarde pas vos apparences ni vos richesses, mais Il regarde vos cœurs et vos actes.",en:"Whoever tastes three things will taste the sweetness of faith: that Allah and His Messenger are more beloved to him than anyone else, that he loves for the sake of Allah alone, and that he hates to return to disbelief as he hates to be thrown into fire.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2564,a:"Sahih",ref:"Muslim n°2564",th:"Akhlaq",reward:"Quiconque aime Allah et Son messager plus que tout aura la douceur de la foi. (Bukhari n°16)"},
{id:31,ar:"الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ",fr:"Le musulman est celui dont les musulmans sont préservés de sa langue et de sa main. Le muhajir (émigrant) est celui qui abandonne ce qu'Allah a interdit.",en:"Whoever says La ilaha illallah sincerely will enter Paradise.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:10,a:"Sahih",ref:"Bukhari n°10",th:"Akhlaq",reward:"Quiconque croit sincèrement, Allah lui accordera le Paradis même s'il a commis des péchés."},
{id:32,ar:"لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ إِنَّمَا الشَّدِيدُ الَّذِي يَمْلِكُ نَفْسَهُ عِنْدَ الْغَضَبِ",fr:"Le fort n'est pas celui qui met les autres à terre. Le fort est celui qui se maîtrise quand il est en colère.",en:"Modesty is a branch of faith.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6114,a:"Sahih",ref:"Bukhari n°6114",th:"Akhlaq",reward:"La pudeur est une branche de la foi — elle protège dans les deux mondes."},
{id:33,ar:"لَا تَغْضَبْ وَلَكَ الْجَنَّةُ",fr:"Ne te mets pas en colère, et tu auras le Paradis.",en:"Do not get angry, and you will have Paradise.",n:"Jabir Ibn Sulaym ر",b:"Sahih Al-Targhib",num:2749,a:"Sahih",ref:"Silsilah n°1724",th:"Akhlaq",reward:"Le Paradis"},
{id:34,ar:"مَنْ حَسُنَ إِسْلَامُ الْمَرْءِ تَرْكُهُ مَا لَا يَعْنِيهِ",fr:"Parmi la beauté de l'Islam d'une personne : délaisser ce qui ne la concerne pas.",en:"The strong person is not the one who overpowers others. The strong person is the one who controls himself when angry.",n:"Abu Hureyra ر",b:"Sunan At-Tirmidhi",num:2317,a:"Hasan Sahih",ref:"Silsilah n°1228",th:"Akhlaq",reward:"La vraie force est de se maîtriser dans la colère — récompense d'être parmi les Houris au Paradis. (Abu Dawud n°4777)"},
{id:35,ar:"إِنَّ مِنْ أَحَبِّكُمْ إِلَيَّ وَأَقْرَبِكُمْ مِنِّي مَجْلِسًا أَحَاسِنَكُمْ أَخْلَاقًا",fr:"Parmi vous, les plus aimés de moi et les plus proches de moi le Jour du Jugement sont ceux qui ont le meilleur caractère.",en:"Among you, the most beloved to me and the closest to me on the Day of Resurrection are those with the best character.",n:"Jabir ر",b:"Sunan At-Tirmidhi",num:2018,a:"Sahih",ref:"Silsilah n°791",th:"Akhlaq",reward:"Être le plus proche du Prophète ﷺ au Jour du Jugement"},
// ── DHIKR ──
{id:36,ar:"سُبْحَانَ اللهِ وَبِحَمْدِهِ سُبْحَانَ اللهِ الْعَظِيمِ",fr:"Deux paroles légères sur la langue, lourdes dans la balance, chères au Miséricordieux : Subhan Allahi wa bihamdihi, Subhan Allahil Azim.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6682,a:"Sahih",ref:"Bukhari n°6682",th:"Dhikr",reward:"Légères sur la langue, lourdes dans la balance"},
{id:37,ar:"أَفْضَلُ الذِّكْرِ لَا إِلَٰهَ إِلَّا اللهُ وَأَفْضَلُ الدُّعَاءِ الْحَمْدُ لِلَّهِ",fr:"Le meilleur des dhikr est : Lâ ilâha illallâh. Et la meilleure supplication est : Al-Hamdulillah.",en:"The best remembrance is La ilaha illallah, and the best supplication is Al-hamdulillah.",n:"Jabir Ibn Abdillah ر",b:"Sunan At-Tirmidhi",num:3383,a:"Sahih",ref:"Silsilah n°1498",th:"Dhikr",reward:"La salawat sur le Prophète ﷺ = 10 bénédictions d'Allah + 10 péchés effacés + élévation de 10 degrés. (Nasa'i n°1297)"},
{id:38,ar:"مَنْ قَالَ سُبْحَانَ اللهِ وَبِحَمْدِهِ مِئَةَ مَرَّةٍ غُفِرَتْ خَطَايَاهُ",fr:"Quiconque dit 'Subhan Allahi wa bihamdihi' cent fois dans la journée, ses péchés seront effacés, même s'ils étaient aussi nombreux que l'écume de la mer.",en:"The five daily prayers, one Friday to the next, and one Ramadan to the next are expiations for what is between them, if major sins are avoided.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6405,a:"Sahih",ref:"Bukhari n°6405",th:"Dhikr",reward:"Effacement des péchés même aussi nombreux que l'écume de la mer"},
{id:39,ar:"مَنْ قَالَ لَا إِلَٰهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ مِئَةَ مَرَّةٍ",fr:"Quiconque dit 'Lâ ilâha illallâhu wahdahu lâ sharîka lahu, lahul-mulku wa lahul-hamdu wa huwa alâ kulli shay'in qadîr' cent fois dans la journée, cela équivaut à libérer dix esclaves, on lui inscrit cent bonnes actions, on efface cent de ses mauvaises actions, et c'est une protection contre le Shaytan toute la journée.",en:"Whoever performs ablution and does it well, then prays two rak\'at focusing fully — all his previous sins will be forgiven.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:3293,a:"Sahih",ref:"Bukhari n°3293",th:"Dhikr",reward:"Équivaut à libérer 10 esclaves, 100 bonnes actions, protection contre le Shaytan"},
// ── SABR & TAWAKKUL ──
{id:41,ar:"عَجَبًا لِأَمْرِ الْمُؤْمِنِ إِنَّ أَمْرَهُ كُلَّهُ خَيْرٌ",fr:"Étonnante est la situation du croyant ! Tout ce qui lui arrive est bon pour lui — et cela n'appartient qu'au croyant : s'il lui arrive quelque chose d'agréable il remercie Allah et c'est bon pour lui ; s'il lui arrive une épreuve il endure et c'est bon pour lui.",en:"There is no god but Allah alone, no partner has He; His is the sovereignty and His is the praise and He is over all things powerful. (Said 100 times = equivalent to freeing 10 slaves.)",n:"Suhaib Ibn Sinan ر",b:"Sahih Muslim",num:2999,a:"Sahih",ref:"Muslim n°2999",th:"Sabr",reward:"Quiconque dit La hawla = trésor parmi les trésors du Paradis. (Bukhari n°6384)"},
{id:42,ar:"مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ وَلَا هَمٍّ",fr:"Aucune fatigue, maladie, souci, tristesse, préjudice ni peine ne touche le musulman — même une épine qui le pique — sans qu'Allah n'expie par cela ses péchés.",en:"No fatigue, illness, worry, sadness, harm or distress befalls a Muslim, even a thorn that pricks him, except that Allah expiates some of his sins through it.",n:"Abu Sa'id et Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5641,a:"Sahih",ref:"Bukhari n°5641",th:"Sabr",reward:"Expiation des péchés pour toute affliction"},
{id:43,ar:"احْرِصْ عَلَى مَا يَنْفَعُكَ وَاسْتَعِنْ بِاللهِ وَلَا تَعْجَزْ",fr:"Sois avide de ce qui te profite, cherche l'aide d'Allah et ne sois pas impuissant. Si quelque chose te touche, ne dis pas : 'Si j'avais fait ceci...' mais dis : 'Allah a décrété et ce qu'Il a voulu Il l'a fait.'",en:"Seek forgiveness from your Lord, then repent to Him. He will let you enjoy good provision for an appointed term.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2664,a:"Sahih",ref:"Muslim n°2664",th:"Tawakkul",reward:"Quiconque cherche le pardon d'Allah sincèrement = Allah ouvre une issue de toute épreuve. (Abu Dawud n°1518)"},
{id:44,ar:"إِنَّمَا الصَّبْرُ عِنْدَ الصَّدْمَةِ الأُولَى",fr:"La vraie patience n'est qu'au premier choc.",en:"True patience is only at the first shock.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:1283,a:"Sahih",ref:"Bukhari n°1283",th:"Sabr",reward:"La patience est le don le plus vaste accordé par Allah. (Bukhari n°1469)"},
{id:45,ar:"مَا أُعْطِيَ أَحَدٌ عَطَاءً خَيْرًا وَأَوْسَعَ مِنَ الصَّبْرِ",fr:"Personne n'a reçu un don meilleur et plus vaste que la patience.",en:"Whoever is patient, Allah will make him patient. Nobody can be given a blessing better and greater than patience.",n:"Abu Sa'id Al-Khudri ر",b:"Sahih Al-Bukhari",num:1469,a:"Sahih",ref:"Bukhari n°1469",th:"Sabr",reward:"Le meilleur et le plus vaste des dons"},
// ── FAMILLE ──
{id:46,ar:"كُلُّكُمْ رَاعٍ وَكُلُّكُمْ مَسْؤُولٌ عَنْ رَعِيَّتِهِ",fr:"Vous êtes tous des bergers et chacun de vous est responsable de son troupeau. L'imam est un berger et il est responsable. L'homme est un berger pour sa famille et il est responsable. La femme est une bergère pour la maison de son mari et elle est responsable.",en:"Whoever does a righteous deed, whether male or female, while he is a believer — We will surely cause him to live a good life.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:893,a:"Sahih",ref:"Bukhari n°893",th:"Famille",reward:"Quiconque fait une bonne action aura sa récompense multipliée par 10 au minimum. (Al-An'am 6:160)"},
{id:48,ar:"خَيْرُكُمْ خَيْرُكُمْ لِأَهْلِهِ وَأَنَا خَيْرُكُمْ لِأَهْلِي",fr:"Le meilleur d'entre vous est celui qui est le meilleur avec sa famille, et je suis le meilleur d'entre vous avec ma famille.",en:"The soft and gentle manner of speech does not enter anything except it beautifies it, and it is not removed from anything except it makes it ugly.",n:"Aïcha ر",b:"Sunan At-Tirmidhi",num:3895,a:"Sahih",ref:"Silsilah n°285",th:"Famille",reward:"Quiconque parle avec sagesse et douceur = l'amour d'Allah et des créatures."},
{id:49,ar:"لَا يَجْزِي وَلَدٌ وَالِدَهُ إِلَّا أَنْ يَجِدَهُ مَمْلُوكًا فَيَشْتَرِيَهُ فَيُعْتِقَهُ",fr:"Un fils ne peut pas pleinement rendre à son père ce qu'il lui doit, sauf s'il le trouve esclave et l'achète pour l'affranchir.",en:"Whoever shows humility to someone for the sake of Allah, Allah will raise him.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1510,a:"Sahih",ref:"Muslim n°1510",th:"Famille",reward:"Quiconque s'humilie pour Allah, Allah l'élève. (Muslim n°2588)"},
{id:50,ar:"رِضَا الرَّبِّ فِي رِضَا الْوَالِدِ وَسَخَطُ الرَّبِّ فِي سَخَطِ الْوَالِدِ",fr:"La satisfaction du Seigneur est dans la satisfaction du père, et la colère du Seigneur est dans la colère du père.",en:"Good character and good treatment of people are among the heaviest things on the scale on the Day of Resurrection.",n:"Abdullah Ibn Amr ر",b:"Sunan At-Tirmidhi",num:1899,a:"Sahih",ref:"Silsilah n°516",th:"Famille",reward:"La satisfaction d'Allah"},
// ── RAMADAN & SIYAM ──
{id:51,ar:"مَنْ صَامَ رَمَضَانَ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque jeûne le Ramadan avec foi et en espérant la récompense d'Allah, ses péchés passés lui seront pardonnés.",en:"The best of you are those who are best in character.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:38,a:"Sahih",ref:"Bukhari n°38",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:52,ar:"الصَّوْمُ جُنَّةٌ فَإِذَا كَانَ يَوْمُ صَوْمِ أَحَدِكُمْ فَلَا يَرْفُثْ وَلَا يَصْخَبْ",fr:"Le jeûne est un bouclier. Lorsque l'un de vous jeûne, qu'il n'ait pas de propos obscènes et qu'il ne fasse pas de bruit. Si quelqu'un l'insulte ou l'attaque, qu'il dise : 'Je jeûne.'",en:"Allah does not look at your forms and your wealth, but He looks at your hearts and your actions.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1894,a:"Sahih",ref:"Bukhari n°1894",th:"Siyam",reward:"Bouclier contre le Feu"},
{id:53,ar:"مَنْ قَامَ رَمَضَانَ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque effectue la prière de nuit durant le Ramadan avec foi et en espérant la récompense, ses péchés passés lui seront pardonnés.",en:"The servant is closest to his Lord when he is prostrating, so increase your supplications there.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:37,a:"Sahih",ref:"Bukhari n°37",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:54,ar:"مَنْ فَطَّرَ صَائِمًا كَانَ لَهُ مِثْلُ أَجْرِهِ",fr:"Quiconque offre l'iftar à un jeûneur recevra la même récompense que lui, sans que cela ne diminue en rien la récompense du jeûneur.",en:"Whoever provides food for a fasting person to break his fast will have a reward like his, without diminishing anything from the fasting person's reward.",n:"Zayd Ibn Khalid ر",b:"Sunan At-Tirmidhi",num:807,a:"Sahih",ref:"Silsilah n°1541",th:"Ramadan",reward:"Même récompense que le jeûneur"},
// ── SADAQA ──
{id:55,ar:"الصَّدَقَةُ تُطْفِئُ الْخَطِيئَةَ كَمَا يُطْفِئُ الْمَاءُ النَّارَ",fr:"L'aumône éteint le péché comme l'eau éteint le feu.",en:"The best charity is that given when one is in need.",n:"Mu'adh Ibn Jabal ر",b:"Sunan At-Tirmidhi",num:2616,a:"Sahih",ref:"Silsilah n°928",th:"Sadaqa",reward:"Expiation des péchés"},
{id:56,ar:"مَا نَقَصَتْ صَدَقَةٌ مِنْ مَالٍ وَمَا زَادَ اللهُ عَبْدًا بِعَفْوٍ إِلَّا عِزًّا",fr:"Une aumône ne diminue jamais un patrimoine. Allah n'augmente le serviteur qui pardonne qu'en honneur. Et quiconque s'humilie pour Allah, Allah l'élève.",en:"Protect yourselves from the Fire, even if it is with half a date.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2588,a:"Sahih",ref:"Muslim n°2588",th:"Sadaqa",reward:"Accroissement de la richesse, de l'honneur et du rang"},
{id:57,ar:"اتَّقُوا النَّارَ وَلَوْ بِشِقِّ تَمْرَةٍ",fr:"Protégez-vous du Feu même en donnant la moitié d'une datte.",en:"Allah's hand is full; spending does not diminish it.",n:"Adi Ibn Hatim ر",b:"Sahih Al-Bukhari",num:1413,a:"Sahih",ref:"Bukhari n°1413",th:"Sadaqa",reward:"Protection contre le Feu"},
// ── MORT & AKHIRA ──
{id:58,ar:"أَكْثِرُوا ذِكْرَ هَاذِمِ اللَّذَّاتِ الْمَوْتِ",fr:"Évoquez souvent le destructeur des plaisirs : la mort.",en:"Remember often the destroyer of pleasures: death.",n:"Abu Hureyra ر",b:"Sunan At-Tirmidhi",num:2307,a:"Sahih",ref:"Silsilah n°1421",th:"Mort",reward:"Quiconque visite un malade pour l'amour d'Allah reçoit la récompense d'un hajj. (Tirmidhi n°2008)"},
{id:59,ar:"الْكَيِّسُ مَنْ دَانَ نَفْسَهُ وَعَمِلَ لِمَا بَعْدَ الْمَوْتِ",fr:"L'intelligent est celui qui soumet son âme (à Allah) et œuvre pour ce qui vient après la mort. Le faible est celui qui suit ses passions et espère qu'Allah lui accordera ses vœux.",en:"Whoever maintains ties with his kin, let him maintain ties with him even if he cuts him off. Whoever maintains family ties, Allah will extend his life.",n:"Shaddad Ibn Aws ر",b:"Sunan At-Tirmidhi",num:2459,a:"Sahih",ref:"Silsilah n°1368",th:"Akhira",reward:"Quiconque entretient les liens de parenté, Allah élargit sa subsistance. (Bukhari n°5985)"},
{id:60,ar:"يُؤْتَى بِالْمَوْتِ يَوْمَ الْقِيَامَةِ كَأَنَّهُ كَبْشٌ أَمْلَحُ",fr:"Le Jour du Jugement, la mort sera amenée sous la forme d'un bélier de couleur mêlée, puis il sera dit : 'Ô gens du Paradis !' Ils regarderont craintivement. On dira : 'Connaissez-vous ceci ?' Ils diront : 'Oui, c'est la mort.' Puis on l'égorgera. Puis on dira : 'Ô gens du Paradis ! Éternité sans mort.'",en:"Pardoning is not something that removes wealth. A man is not increased by forgiveness except in honor.",n:"Abu Sa'id ر",b:"Sahih Al-Bukhari",num:6548,a:"Sahih",ref:"Bukhari n°6548",th:"Akhira",reward:"Quiconque pardonne, Allah l'honore. (Muslim n°2588)"},
// ── FRATERNITÉ ISLAMIQUE ──
{id:61,ar:"لَا تَحَاسَدُوا وَلَا تَنَاجَشُوا وَلَا تَبَاغَضُوا وَلَا تَدَابَرُوا",fr:"Ne vous jalousez pas, ne vous faites pas concurrence malhonnête, ne vous haïssez pas, ne vous tournez pas le dos, et ne vendez pas par-dessus la vente de votre frère. Soyez serviteurs d'Allah, frères.",en:"Do not envy one another, do not inflate prices for one another, do not hate one another, do not turn away from one another, and do not undercut one another in trade.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6064,a:"Sahih",ref:"Bukhari n°6064",th:"Fraternité",reward:"Quiconque aide les faibles, Allah l'aidera au Jour du Jugement."},
{id:62,ar:"الْمُؤْمِنُ لِلْمُؤْمِنِ كَالْبُنْيَانِ يَشُدُّ بَعْضُهُ بَعْضًا",fr:"Le croyant est au croyant comme un édifice dont chaque partie renforce les autres.",en:"The believer to the believer is like a building, each part reinforcing the other.",n:"Abu Musa Al-Ash'ari ر",b:"Sahih Al-Bukhari",num:481,a:"Sahih",ref:"Bukhari n°481",th:"Fraternité",reward:"Quiconque retient sa langue, Allah lui accorde la sécurité. (Tirmidhi n°2407)"},
{id:63,ar:"مَثَلُ الْمُؤْمِنِينَ فِي تَوَادِّهِمْ وَتَرَاحُمِهِمْ وَتَعَاطُفِهِمْ كَمَثَلِ الْجَسَدِ",fr:"Les croyants dans leur amour mutuel, leur miséricorde mutuelle et leur compassion mutuelle ressemblent à un seul corps : si un organe souffre, tous les autres organes sont atteints d'insomnie et de fièvre.",en:"Whoever controls what is between his cheeks and what is between his legs will enter Paradise.",n:"An-Nu'man Ibn Bashir ر",b:"Sahih Muslim",num:2586,a:"Sahih",ref:"Muslim n°2586",th:"Fraternité",reward:"Quiconque contrôle ce qui est entre ses mâchoires et ses jambes = le Paradis garanti. (Bukhari n°6474)"},
// ── SCIENCES DU HADITH ──
{id:64,ar:"نَضَّرَ اللهُ امْرَأً سَمِعَ مِنَّا حَدِيثًا فَحَفِظَهُ حَتَّى يُبَلِّغَهُ غَيْرَهُ",fr:"Qu'Allah illumine celui qui a entendu un hadith de nous, l'a mémorisé et l'a transmis. Car il se peut que celui qui porte la connaissance la transmette à quelqu'un qui la comprend mieux que lui.",en:"The best of the people are those who are most beneficial to the people.",n:"Ibn Masud ر",b:"Sunan At-Tirmidhi",num:2656,a:"Sahih",ref:"Silsilah n°404",th:"Hadith",reward:"Illumination du visage par Allah"},
{id:65,ar:"مَنْ كَذَبَ عَلَيَّ مُتَعَمِّدًا فَلْيَتَبَوَّأْ مَقْعَدَهُ مِنَ النَّارِ",fr:"Quiconque ment sur moi intentionnellement, qu'il prépare sa place dans le Feu.",en:"The pleasure of Allah is in the pleasure of the parents, and the displeasure of Allah is in the displeasure of the parents.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:110,a:"Sahih",ref:"Bukhari n°110",th:"Hadith",reward:"Quiconque respecte les parents, Allah est satisfait de lui. (Tirmidhi n°1899)"},
// ── DIVERS ──
{id:66,ar:"إِنَّ اللهَ رَفِيقٌ يُحِبُّ الرِّفْقَ فِي الأَمْرِ كُلِّهِ",fr:"Allah est doux et Il aime la douceur en toute chose. Il donne pour la douceur ce qu'Il ne donne pas pour la dureté.",en:"Whoever wants to have his provision expanded and his term of life prolonged, let him maintain family ties.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:6927,a:"Sahih",ref:"Bukhari n°6927",th:"Rifq",reward:"Quiconque entretient les liens = prolongation de vie et élargissement de subsistance. (Bukhari n°5985)"},
{id:67,ar:"إِنَّ اللهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ",fr:"Allah aime que lorsque l'un d'entre vous accomplit une œuvre, il l'accomplisse parfaitement (avec ihsan).",en:"The most complete of the believers in faith are those who are best in character.",n:"Aïcha ر",b:"Mu'jam Al-Awsat",num:897,a:"Sahih",ref:"Silsilah n°1113",th:"Ihsan",reward:"L'amour d'Allah"},
{id:68,ar:"الْمُؤْمِنُ الْقَوِيُّ خَيْرٌ وَأَحَبُّ إِلَى اللهِ مِنَ الْمُؤْمِنِ الضَّعِيفِ",fr:"Le croyant fort est meilleur et plus aimé d'Allah que le croyant faible, mais en chacun d'eux il y a du bien. Sois avide de ce qui te profite, cherche l'aide d'Allah et ne sois pas impuissant.",en:"The strong believer is better and more beloved to Allah than the weak believer, though there is good in both.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2664,a:"Sahih",ref:"Muslim n°2664",th:"Force",reward:"Quiconque est généreux avec le pauvre = protégé du Feu. (Bukhari n°1413)"},
{id:69,ar:"يَسِّرُوا وَلَا تُعَسِّرُوا وَبَشِّرُوا وَلَا تُنَفِّرُوا",fr:"Facilitez et ne rendez pas difficile, annoncez une bonne nouvelle et ne faites pas fuir.",en:"Charity does not decrease wealth. No one forgives another except that Allah increases his honor.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:69,a:"Sahih",ref:"Bukhari n°69",th:"Yusr",reward:"La sadaqa éteint la colère d'Allah et protège du Feu. (Tirmidhi n°664)"},
{id:70,ar:"الْحَلَالُ بَيِّنٌ وَالْحَرَامُ بَيِّنٌ وَبَيْنَهُمَا أُمُورٌ مُشْتَبِهَاتٌ",fr:"Le licite est clair et l'illicite est clair, et entre les deux il y a des choses douteuses que beaucoup de gens ne connaissent pas. Quiconque se préserve des choses douteuses protège sa religion et son honneur.",en:"Whoever believes in Allah and the Last Day, let him not harm his neighbor.",n:"An-Nu'man Ibn Bashir ر",b:"Sahih Al-Bukhari",num:52,a:"Sahih",ref:"Bukhari n°52",th:"Halal/Haram",reward:"Protection de la religion et de l'honneur"},
{id:71,ar:"مَنْ صَلَّى عَلَيَّ صَلَاةً وَاحِدَةً صَلَّى اللهُ عَلَيْهِ عَشْرًا",fr:"Quiconque prie sur moi une fois, Allah prie sur lui dix fois.",en:"Whoever sends one prayer upon me, Allah will send ten prayers upon him.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:408,a:"Sahih",ref:"Muslim n°408",th:"Sunnah",reward:"10 bénédictions d'Allah en retour"},
{id:72,ar:"أَحَبُّ الأَعْمَالِ إِلَى اللهِ أَدْوَمُهَا وَإِنْ قَلَّ",fr:"Les actes les plus aimés d'Allah sont les plus constants, même s'ils sont peu nombreux.",en:"The most beloved deeds to Allah are the most consistent ones, even if small.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:6464,a:"Sahih",ref:"Bukhari n°6464",th:"Istiqama",reward:"L'amour d'Allah"},
{id:73,ar:"بَدَأَ الإِسْلَامُ غَرِيبًا وَسَيَعُودُ غَرِيبًا كَمَا بَدَأَ فَطُوبَى لِلْغُرَبَاءِ",fr:"L'Islam a commencé étranger et il redeviendra étranger comme il a commencé. Bienheureux les étrangers ! Ce sont ceux qui se réforment quand les gens se corrompent.",en:"Whoever spends two things in the way of Allah will be called from the gates of Paradise.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:145,a:"Sahih",ref:"Muslim n°145",th:"Ghuraba",reward:"Tuba — un arbre au Paradis"},
{id:74,ar:"مَنْ قَامَ لَيْلَةَ الْقَدْرِ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque effectue la prière de nuit lors de Laylat Al-Qadr avec foi et en espérant la récompense, ses péchés passés lui seront pardonnés.",en:"A good word is charity.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:35,a:"Sahih",ref:"Bukhari n°35",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:75,ar:"مَنْ حَجَّ لِلهِ فَلَمْ يَرْفُثْ وَلَمْ يَفْسُقْ رَجَعَ كَيَوْمِ وَلَدَتْهُ أُمُّهُ",fr:"Quiconque fait le hajj pour Allah, sans grossièreté ni acte pernicieux, revient comme au jour où sa mère l'a enfanté.",en:"Smiling in the face of your brother is charity.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1521,a:"Sahih",ref:"Bukhari n°1521",th:"Hajj",reward:"Purification totale des péchés"},
{id:76,ar:"مَنْ بَنَى لِلهِ مَسْجِدًا بَنَى اللهُ لَهُ بَيْتًا فِي الْجَنَّةِ",fr:"Quiconque construit une mosquée pour Allah — même aussi petite que le nid d'un qata — Allah lui construit une maison au Paradis.",en:"Do not belittle any act of kindness even if it is meeting your brother with a cheerful face.",n:"Uthman Ibn Affan ر",b:"Sahih Al-Bukhari",num:450,a:"Sahih",ref:"Bukhari n°450",th:"Sadaqa",reward:"Une maison au Paradis"},
{id:77,ar:"مَنْ صَلَّى الْبَرْدَيْنِ دَخَلَ الْجَنَّةَ",fr:"Quiconque prie les deux prières fraîches (Fajr et Asr) entrera au Paradis.",en:"The person who gives charity in secret extinguishes the wrath of Allah.",n:"Abu Musa ر",b:"Sahih Al-Bukhari",num:574,a:"Sahih",ref:"Bukhari n°574",th:"Salat",reward:"Entrée au Paradis"},
{id:78,ar:"مَنْ تَوَضَّأَ فَأَحْسَنَ الْوُضُوءَ خَرَجَتْ خَطَايَاهُ مِنْ جَسَدِهِ",fr:"Quiconque fait bien ses ablutions, ses péchés sortent de son corps, même de sous ses ongles.",en:"Allah loves that when any of you does a job he does it with excellence (Itqan).",n:"Uthman Ibn Affan ر",b:"Sahih Muslim",num:245,a:"Sahih",ref:"Muslim n°245",th:"Taharah",reward:"Expiation des péchés"},
{id:79,ar:"السِّوَاكُ مَطْهَرَةٌ لِلْفَمِ مَرْضَاةٌ لِلرَّبِّ",fr:"Le siwak est une purification pour la bouche et un motif de satisfaction du Seigneur.",en:"The siwak is a purification for the mouth and a pleasure for the Lord.",n:"Aïcha ر",b:"Sunan An-Nasa'i",num:5,a:"Sahih",ref:"Silsilah n°1213",th:"Sunnah",reward:"Satisfaction du Seigneur"},
{id:80,ar:"إِنَّ اللهَ يَرْفَعُ بِهَذَا الْكِتَابِ أَقْوَامًا وَيَضَعُ بِهِ آخَرِينَ",fr:"Allah élève par ce Livre (le Coran) des peuples et en abaisse d'autres.",en:"There is no disease that Allah has created except that He also created its treatment.",n:"Umar Ibn Al-Khattab ر",b:"Sahih Muslim",num:817,a:"Sahih",ref:"Muslim n°817",th:"Coran",reward:"Élévation par le Coran"},
// ── ARBA'IN AN-NAWAWI ──
{id:81,ar:"إِنَّ اللهَ كَتَبَ الإِحْسَانَ عَلَى كُلِّ شَيْءٍ",fr:"Allah a prescrit l'excellence (ihsan) en toute chose. Lorsque vous tuez, tuez avec ihsan ; lorsque vous égorgez, égorgez avec ihsan. Que l'un de vous aiguise son couteau et soulage sa bête.",n:"Shaddad Ibn Aws ر",b:"Sahih Muslim",num:1955,a:"Sahih",ref:"Muslim n°1955 — Arba'in n°17",th:"Ihsan",reward:"Allah récompense ceux qui cherchent la connaissance en leur facilitant le Paradis. (Muslim n°2699)"},
{id:82,ar:"لَا ضَرَرَ وَلَا ضِرَارَ",fr:"Pas de préjudice et pas de nuisance (réciproque) en Islam.",n:"Ibn Abbas ر",b:"Sunan Ibn Majah",num:2341,a:"Sahih",ref:"Silsilah n°250 — Arba'in n°32",th:"Fiqh",reward:"Quiconque invite à la guidance a la récompense de tous ceux qui le suivent. (Muslim n°2674)"},
{id:83,ar:"مَنْ رَأَى مِنْكُمْ مُنْكَرًا فَلْيُغَيِّرْهُ بِيَدِهِ",fr:"Quiconque parmi vous voit un acte répréhensible, qu'il le change de sa main ; s'il ne peut pas, qu'il le change de sa langue ; s'il ne peut pas, qu'il le désapprouve dans son cœur — et c'est le plus faible de la foi.",en:"Every son of Adam is a sinner, and the best of sinners are those who repent.",n:"Abu Sa'id Al-Khudri ر",b:"Sahih Muslim",num:49,a:"Sahih",ref:"Muslim n°49 — Arba'in n°34",th:"Amr bil Ma'ruf",reward:"Quiconque enseigne aura la récompense de l'étudiant sans que ça diminue."},
{id:84,ar:"إِنَّ مِنْ أَشَدِّ النَّاسِ عَذَابًا يَوْمَ الْقِيَامَةِ الْمُصَوِّرُونَ",fr:"Parmi les gens qui recevront le châtiment le plus sévère le Jour du Jugement, il y aura les faiseurs d'images.",en:"The one who repents from sin is like the one who never sinned.",n:"Abdullah Ibn Masud ر",b:"Sahih Al-Bukhari",num:5950,a:"Sahih",ref:"Bukhari n°5950",th:"Tawhid",reward:"Quiconque garde son argent et sa vie dans la licéité sera protégé au Jour du Jugement."},
{id:85,ar:"حُرِّمَتِ الْجَنَّةُ عَلَى كُلِّ جَعْظَرِيٍّ جَوَّاظٍ سَخَّابٍ فِي الأَسْوَاقِ",fr:"Le Paradis est interdit à tout orgueilleux, brutal et criant dans les marchés.",en:"Paradise is forbidden to every arrogant, harsh, rude person.",n:"Al-Harith Ibn Wahb ر",b:"Sunan At-Tirmidhi",num:2525,a:"Sahih",ref:"Silsilah n°548",th:"Akhlaq",reward:"Quiconque répand le salam entrera au Paradis. (Tirmidhi n°2485)"},
{id:86,ar:"اتَّقِ اللَّهَ حَيْثُمَا كُنْتَ وَأَتْبِعِ السَّيِّئَةَ الْحَسَنَةَ تَمْحُهَا",fr:"Crains Allah où que tu sois, fais suivre une mauvaise action d'une bonne qui l'effacera, et traite les gens avec un bon comportement.",en:"The superiority of the scholar over the worshipper is like the superiority of the moon over the other stars.",n:"Abu Dharr et Mu'adh ر",b:"Sunan At-Tirmidhi",num:1987,a:"Hasan Sahih",ref:"Silsilah n°1373 — Arba'in n°18",th:"Taqwa",reward:"Les bonnes actions effacent les mauvaises"},
{id:87,ar:"قُلْ آمَنْتُ بِاللهِ ثُمَّ اسْتَقِمْ",fr:"Dis : 'Je crois en Allah' puis sois droit.",en:"When Allah intends good for someone, He gives him understanding of the religion.",n:"Sufyan Ibn Abdillah ر",b:"Sahih Muslim",num:38,a:"Sahih",ref:"Muslim n°38 — Arba'in n°21",th:"Istiqama",reward:"Quiconque dit 'La ilaha illallah' sincèrement entrera au Paradis. (Muslim n°26)"},
{id:88,ar:"الْبِرُّ حُسْنُ الْخُلُقِ وَالإِثْمُ مَا حَاكَ فِي نَفْسِكَ",fr:"La vertu, c'est le bon caractère. Le péché, c'est ce qui remue dans ton âme et tu n'aimerais pas que les gens le sachent.",en:"The best of characters is the good character.",n:"An-Nawwas Ibn Sam'an ر",b:"Sahih Muslim",num:2553,a:"Sahih",ref:"Muslim n°2553 — Arba'in n°27",th:"Akhlaq",reward:"La vertu c'est le bon caractère = la chose la plus lourde dans la balance. (Tirmidhi n°2002)"},
{id:89,ar:"إِنَّ اللهَ تَجَاوَزَ عَنْ أُمَّتِي الْخَطَأَ وَالنِّسْيَانَ",fr:"Allah a pardonné à ma communauté l'erreur, l'oubli et ce à quoi on est contraint.",en:"You will never abandon something for the sake of Allah except that Allah will give you something better in return.",n:"Ibn Abbas ر",b:"Sunan Ibn Majah",num:2045,a:"Sahih",ref:"Silsilah n°137 — Arba'in n°39",th:"Fiqh",reward:"Quiconque abandonne une chose pour Allah, Allah lui donne mieux. (Silsilah n°1911)"},
{id:90,ar:"لَا يَحِلُّ مَالُ امْرِئٍ مُسْلِمٍ إِلَّا بِطِيبِ نَفْسٍ مِنْهُ",fr:"Le bien d'un musulman n'est licite qu'avec le consentement sincère de son âme.",en:"The property of a Muslim is not lawful except with his consent.",n:"Abu Humayd ر",b:"Musnad Ahmad",num:22970,a:"Sahih",ref:"Silsilah n°1719 — Arba'in n°29",th:"Fiqh",reward:"Quiconque respecte les biens d'autrui = protégé au Jour du Jugement."},
// ── DHIKR & DU'A ──
