{id:'d31',cat:'Angoisse',t:'Du\'a de Yunus ﷺ',ar:'لَا إِلَٰهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الظَّالِمِينَ',fr:"Il n'y a de divinité que Toi, gloire à Toi, j'ai été parmi les injustes.",ref:'Tirmidhi n°3505 — Sahih',reward:'Yunus ﷺ a été sauvé du ventre de la baleine par ce du\'a. Allah répond à tout croyant qui le dit. (Al-Anbiya 21:88, Tirmidhi n°3505 — Sahih)',reward:"Allah répond à cette du'a et dissipe l'angoisse"},
{id:'d32',cat:'Angoisse',t:'En période de détresse',ar:'لَا إِلَٰهَ إِلَّا اللهُ الْعَظِيمُ الْحَلِيمُ لَا إِلَٰهَ إِلَّا اللهُ رَبُّ الْعَرْشِ الْعَظِيمِ',fr:"Il n'y a de divinité qu'Allah le Grand le Clément. Il n'y a de divinité qu'Allah le Seigneur du Trône immense. Il n'y a de divinité qu'Allah le Seigneur des cieux, de la terre et du Trône noble.",ref:'Bukhari n°6346',reward:''},
{id:'d33',cat:'Angoisse',t:'Du\'a contre la tristesse',ar:'اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ وَالْعَجْزِ وَالْكَسَلِ',fr:"Ô Allah, je cherche refuge en Toi contre le souci, la tristesse, la faiblesse, la paresse, la lâcheté, l'avarice, l'écrasement des dettes et la domination des hommes.",ref:'Bukhari n°6369',reward:'Allah dissipe la tristesse et le souci. (Bukhari n°6369 — Sahih)',reward:"Allah dissipe le souci et la tristesse"},
// ── DETTES & SOUCIS ──
{id:'d34',cat:'Soucis',t:'Contre les dettes',ar:'اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ وَأَغْنِنِي بِفَضْلِكَ عَمَّنْ سِوَاكَ',fr:"Ô Allah, rends-moi indépendant par Ton licite de Ton illicite, et enrichis-moi par Ta grâce de tout autre que Toi.",ref:'Tirmidhi n°3563 — Hasan',reward:'Allah allège les dettes même si elles étaient aussi grandes que la montagne Uhud. (Tirmidhi n°3563 — Hasan)',reward:"Allah allège les dettes même si elles sont aussi grandes que la montagne Uhud"},
// ── FAMILLE & PARENTS ──
{id:'d35',cat:'Famille',t:'Pour les parents',ar:'رَبِّ ارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا',fr:"Ô mon Seigneur, aie pitié d'eux comme ils m'ont élevé dans ma petite enfance.",ref:'Al-Isra 17:24',reward:''},
{id:'d36',cat:'Famille',t:'Pour sa famille',ar:'رَبَّنَا هَبْ لَنَا مِنْ أَزْوَاجِنَا وَذُرِّيَّاتِنَا قُرَّةَ أَعْيُنٍ وَاجْعَلْنَا لِلْمُتَّقِينَ إِمَامًا',fr:"Notre Seigneur, accorde-nous, de nos épouses et de nos descendants, la joie des yeux, et fais de nous un modèle pour les pieux.",ref:'Al-Furqan 25:74',reward:''},
// ── REPENTIR ──
{id:'d37',cat:'Repentir',t:'Istighfar général',ar:'أَسْتَغْفِرُ اللهَ وَأَتُوبُ إِلَيْهِ',fr:"Je demande pardon à Allah et je me repens à Lui.",ref:'Bukhari n°6307',reward:"Le Prophète ﷺ le disait 70 à 100 fois par jour"},
{id:'d38',cat:'Repentir',t:'Du\'a du repentir',ar:'رَبِّ اغْفِرْ لِي وَتُبْ عَلَيَّ إِنَّكَ أَنْتَ التَّوَّابُ الْغَفُورُ',fr:"Mon Seigneur, pardonne-moi et accepte mon repentir, Tu es Celui qui accepte le repentir, le Pardonneur.",ref:'Abu Dawud n°1516 — Sahih',reward:''},
// ── ÉTUDES & MÉMOIRE ──
{id:'d39',cat:'Études',t:'Pour la mémoire et la compréhension',ar:'رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي وَاحْلُلْ عُقْدَةً مِنْ لِسَانِي يَفْقَهُوا قَوْلِي',fr:"Mon Seigneur, dilate ma poitrine, facilite ma tâche, et dénoue le nœud de ma langue afin qu'ils comprennent mes paroles.",ref:'Ta-Ha 20:25-28',reward:''},
{id:'d40',cat:'Études',t:'Avant d\'étudier',ar:'اللَّهُمَّ انْفَعْنِي بِمَا عَلَّمْتَنِي وَعَلِّمْنِي مَا يَنْفَعُنِي وَزِدْنِي عِلْمًا',fr:"Ô Allah, fais-moi profiter de ce que Tu m'as enseigné, enseigne-moi ce qui m'est bénéfique, et augmente ma connaissance.",ref:'Ibn Majah n°251 — Sahih',reward:''},
// ── MARIAGE ──
{id:'d41',cat:'Mariage',t:'Pour le futur conjoint',ar:'اللَّهُمَّ يَسِّرْ لِي مَنْ يُعِينُنِي عَلَى دِينِي وَدُنْيَايَ',fr:"Ô Allah, facilite-moi quelqu'un qui m'aidera dans ma religion et ma vie ici-bas.",ref:'Silsilah Sahihah — Hasan',reward:''},
{id:'d42',cat:'Mariage',t:'La nuit du mariage',ar:'اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَهَا وَخَيْرَ مَا جَبَلْتَهَا عَلَيْهِ وَأَعُوذُ بِكَ مِنْ شَرِّهَا',fr:"Ô Allah, je Te demande son bien et le bien de ce que Tu lui as instillé. Et je cherche refuge en Toi contre son mal.",ref:'Abu Dawud n°2160 — Sahih',reward:''},
// ── TRAVAIL ──
{id:'d43',cat:'Travail',t:'Pour la subsistance licite',ar:'اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا وَرِزْقًا طَيِّبًا وَعَمَلًا مُتَقَبَّلًا',fr:"Ô Allah, je Te demande une connaissance utile, une subsistance bonne et pure, et une œuvre acceptée.",ref:'Ibn Majah n°925 — Sahih',reward:''},
// ── PROTECTION ──
{id:'d44',cat:'Protection',t:'Ayat Al-Kursi le soir',ar:'اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ',fr:"Allah ! Point de divinité en dehors de Lui, le Vivant, Celui qui subsiste par Lui-même. Ni somnolence ni sommeil ne Le saisissent...",ref:'Al-Baqara 255',reward:"Quiconque la récite le soir est protégé jusqu'au matin"},
{id:'d45',cat:'Protection',t:'Mu\'awwidhatayn 3×',ar:'قُلْ هُوَ اللَّهُ أَحَدٌ / قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ / قُلْ أَعُوذُ بِرَبِّ النَّاسِ',fr:"Réciter Al-Ikhlas, Al-Falaq et An-Nas 3 fois le matin et le soir.",ref:'Abu Dawud n°5082 — Sahih',reward:"Suffit contre tout"},
{id:'d46',cat:'Protection',t:'Contre le mauvais œil',ar:'بِسْمِ اللهِ أَرْقِيكَ مِنْ كُلِّ شَيْءٍ يُؤْذِيكَ',fr:"Au nom d'Allah je fais ta ruqyah contre tout ce qui te nuit.",ref:'Muslim n°2186',reward:''},
// ── HAJJ & UMRA ──
{id:'d47',cat:'Hajj',t:'Du\'a du talbiyah',ar:'لَبَّيْكَ اللَّهُمَّ لَبَّيْكَ لَبَّيْكَ لَا شَرِيكَ لَكَ لَبَّيْكَ إِنَّ الْحَمْدَ وَالنِّعْمَةَ لَكَ وَالْمُلْكَ لَا شَرِيكَ لَكَ',fr:"Me voici, Ô Allah, me voici. Me voici, Tu n'as pas d'associé, me voici. Certes la louange, la grâce et la royauté T'appartiennent. Tu n'as pas d'associé.",ref:'Bukhari n°1549',reward:''},
// ── VENDREDI ──
{id:'d48',cat:'Vendredi',t:'Du\'a de la dernière heure du vendredi',ar:'اللَّهُمَّ إِنَّكَ عَفُوٌّ كَرِيمٌ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي',fr:"Ô Allah, Tu es le Pardonneur Généreux, Tu aimes le pardon, pardonne-moi.",ref:'Tirmidhi n°3513 — Sahih',reward:"Exaucée lors de la dernière heure du vendredi"},
// ── ISTIKHARAH ──
{id:'d49',cat:'Prière',t:'Du\'a Al-Istikharah',ar:'اللَّهُمَّ إِنِّي أَسْتَخِيرُكَ بِعِلْمِكَ وَأَسْتَقْدِرُكَ بِقُدْرَتِكَ وَأَسْأَلُكَ مِنْ فَضْلِكَ الْعَظِيمِ',fr:"Ô Allah, je Te consulte par Ta Science, je Te demande de la puissance par Ta Puissance, et je Te sollicite de Ta grande Grâce.",ref:'Bukhari n°1162',reward:''},
// ── DU'A GÉNÉRAL ──

// ══ HISNUL MUSLIM — Du'as authentiques ══
// Source : Hisnul Muslim (Forteresse du Musulman) — Sheikh Sa'id Al-Qahtani
// Toutes vérifiées : Bukhari, Muslim, Abu Dawud, Tirmidhi, An-Nasa'i

// ── RÉVEIL & COUCHER ──
{id:'d51',cat:'Réveil / Sommeil',t:"Du'a au réveil",ar:"الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ",fr:"Louange à Allah qui nous a redonné la vie après nous avoir fait mourir, et c'est vers Lui que sera la résurrection.",en:"All praise is for Allah who gave us life after having taken it from us and unto Him is the resurrection.",ref:'Bukhari n°6312',reward:"Du'a à dire dès le réveil"},
{id:'d52',cat:'Réveil / Sommeil',t:"Du'a avant de dormir",ar:"بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا",fr:"En Ton nom, ô Allah, je meurs et je vis.",en:"In Your name, O Allah, I die and I live.",ref:'Bukhari n°6324',reward:"Sunnah confirmée du Prophète ﷺ"},
{id:'d53',cat:'Réveil / Sommeil',t:"Ayat avant de dormir",ar:"اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ",fr:"Ô Allah, préserve-moi de Ton châtiment le jour où Tu ressusciteras Tes serviteurs.",en:"O Allah, protect me from Your punishment on the day You resurrect Your servants.",ref:'Abu Dawud n°5045 — Sahih Al-Albani',reward:"À dire trois fois avant de dormir"},
{id:'d54',cat:'Réveil / Sommeil',t:"Tasbih avant de dormir",ar:"سُبْحَانَ اللهِ ، وَالْحَمْدُ لِلَّهِ ، وَاللهُ أَكْبَرُ",fr:"Gloire à Allah (33 fois), Louange à Allah (33 fois), Allah est le plus Grand (34 fois) — avant le sommeil.",en:"Subhana Allah (33×), Alhamdulillah (33×), Allahu Akbar (34×) — before sleeping.",ref:'Bukhari n°3705 — Ali ر',reward:"Meilleur que d'avoir un serviteur — aide à supporter les épreuves"},
{id:'d55',cat:'Réveil / Sommeil',t:"Position de sommeil",ar:"اللَّهُمَّ بِاسْمِكَ أَمُوتُ وَأَحْيَا",fr:"Lorsque le Prophète ﷺ se couchait, il posait sa main droite sous sa joue droite et disait : 'Ô Allah, en Ton nom je meurs et je vis.'",en:"When the Prophet ﷺ lay down, he placed his right hand under his right cheek and said: 'O Allah, in Your name I die and I live.'",ref:'Abu Dawud n°5045 — Sahih',reward:"Sunnah du Prophète ﷺ"},

// ── MATIN & SOIR ──
{id:'d56',cat:'Matin / Soir',t:"Maître du repentir — matin et soir",ar:"رَبِّ اغْفِرْ لِي وَتُبْ عَلَيَّ إِنَّكَ أَنْتَ التَّوَّابُ الرَّحِيمُ",fr:"Mon Seigneur, pardonne-moi et accepte mon repentir. Tu es Celui qui accepte le repentir, le Très-Miséricordieux.",en:"My Lord, forgive me and accept my repentance. You are the Accepting of repentance, the Most Merciful.",ref:'Ibn Majah n°3814 — Sahih Al-Albani',reward:"Le Prophète ﷺ le disait 100 fois dans une assemblée"},
{id:'d57',cat:'Matin / Soir',t:"Protection le matin",ar:"اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُورُ",fr:"Ô Allah, c'est grâce à Toi que nous entrons dans le matin, grâce à Toi que nous entrons dans le soir, grâce à Toi que nous vivons, grâce à Toi que nous mourons, et c'est vers Toi la résurrection.",en:"O Allah, by You we enter the morning, by You we enter the evening, by You we live, by You we die, and to You is the resurrection.",ref:'Abu Dawud n°5068 — Hasan Al-Albani',reward:"Du'a du matin sunnah"},
{id:'d58',cat:'Matin / Soir',t:"Protection le soir",ar:"اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ الْمَصِيرُ",fr:"Ô Allah, c'est grâce à Toi que nous entrons dans le soir, grâce à Toi que nous entrons dans le matin, grâce à Toi que nous vivons, grâce à Toi que nous mourons, et c'est vers Toi la destinée.",en:"O Allah, by You we enter the evening, by You we enter the morning, by You we live, by You we die, and to You is the return.",ref:'Abu Dawud n°5068 — Hasan',reward:"Du'a du soir sunnah"},
{id:'d59',cat:'Matin / Soir',t:"Triple protection du matin",ar:"بِسْمِ اللهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ",fr:"Au nom d'Allah avec Qui rien ne peut nuire sur terre ni dans le ciel, et Il est l'Audient, le Savant.",en:"In the name of Allah with Whose name nothing can cause harm on earth or in the heavens, and He is the All-Hearing, All-Knowing.",ref:'Abu Dawud n°5088 — Sahih Al-Albani',reward:"Quiconque le dit 3× matin et soir : rien ne lui nuit (Tirmidhi n°3388)"},
{id:'d60',cat:'Matin / Soir',t:"Satisfaction d'Allah",ar:"رَضِيتُ بِاللهِ رَبًّا، وَبِالإِسْلَامِ دِيناً، وَبِمُحَمَّدٍ نَبِيًّا",fr:"Je suis satisfait d'Allah comme Seigneur, de l'Islam comme religion et de Muhammad ﷺ comme prophète.",en:"I am satisfied with Allah as my Lord, with Islam as my religion, and with Muhammad ﷺ as my Prophet.",ref:'Abu Dawud n°1529 — Sahih Al-Albani',reward:"Quiconque le dit 3× matin et soir : le Paradis lui est obligatoire (Tirmidhi n°3389 — Sahih)"},
{id:'d61',cat:'Matin / Soir',t:"Sourate Al-Ikhlas + Al-Falaq + An-Nas",ar:"قُلْ هُوَ اللَّهُ أَحَدٌ ، قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ، قُلْ أَعُوذُ بِرَبِّ النَّاسِ",fr:"Lire Al-Ikhlas, Al-Falaq et An-Nas trois fois chaque matin et soir.",en:"Read Al-Ikhlas, Al-Falaq and An-Nas three times each morning and evening.",ref:'Abu Dawud n°5082 — Sahih Al-Albani',reward:"Ces trois sourates suffisent pour tout (Tirmidhi n°3575 — Sahih)"},

// ── ENTRÉE / SORTIE MAISON ──
{id:'d62',cat:'Maison',t:"En entrant dans la maison",ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ الْمَوْلَجِ وَخَيْرَ الْمَخْرَجِ",fr:"Ô Allah, je Te demande le bien de l'entrée et le bien de la sortie. Bismillah, nous entrons et nous sortons, et nous nous en remettons à Allah notre Seigneur.",en:"O Allah, I ask You for the good of entering and the good of leaving. In the name of Allah we enter and in the name of Allah we leave, and upon Allah our Lord we rely.",ref:'Abu Dawud n°5096 — Hasan Al-Albani',reward:"Protection au foyer"},
{id:'d63',cat:'Maison',t:"En sortant de la maison",ar:"بِسْمِ اللهِ تَوَكَّلْتُ عَلَى اللهِ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ",fr:"Au nom d'Allah, je me confie à Allah. Il n'y a de force et de puissance qu'en Allah.",en:"In the name of Allah, I trust in Allah. There is no power nor strength except with Allah.",ref:'Abu Dawud n°5095 — Sahih Al-Albani',reward:"Il suffit, il est protégé et les démons s'éloignent de lui (Tirmidhi n°3426)"},

// ── MOSQUÉE ──
{id:'d64',cat:'Mosquée',t:"En entrant à la mosquée",ar:"اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ",fr:"Ô Allah, ouvre-moi les portes de Ta miséricorde.",en:"O Allah, open the gates of Your mercy for me.",ref:'Muslim n°713',reward:"Sunnah confirmée en entrant à la mosquée"},
{id:'d65',cat:'Mosquée',t:"En sortant de la mosquée",ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ مِنْ فَضْلِكَ",fr:"Ô Allah, je Te demande de Ta grâce.",en:"O Allah, I ask You of Your favor.",ref:'Muslim n°713',reward:"Sunnah en sortant de la mosquée"},
{id:'d66',cat:'Mosquée',t:"Du'a entre adhan et iqama",ar:"اللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ، وَالصَّلَاةِ الْقَائِمَةِ، آتِ مُحَمَّدًا الْوَسِيلَةَ وَالْفَضِيلَةَ",fr:"Ô Allah, Seigneur de cet appel parfait et de cette prière qui va s'établir, accorde à Muhammad la Wasila et la grâce.",en:"O Allah, Lord of this perfect call and established prayer, grant Muhammad the Wasila and eminence.",ref:'Bukhari n°614',reward:"L'intercession du Prophète ﷺ lui est assurée"},

// ── REPAS ──
{id:'d67',cat:'Repas',t:"Avant le repas",ar:"بِسْمِ اللهِ",fr:"Au nom d'Allah.",en:"In the name of Allah.",ref:'Abu Dawud n°3767 — Sahih',reward:"Shaytan ne mange pas avec lui"},
{id:'d68',cat:'Repas',t:"Oubli du Bismillah",ar:"بِسْمِ اللهِ أَوَّلَهُ وَآخِرَهُ",fr:"Au nom d'Allah au début et à la fin.",en:"In the name of Allah at its beginning and at its end.",ref:'Abu Dawud n°3767 — Sahih',reward:"À dire si on oublie le Bismillah en début de repas"},
{id:'d69',cat:'Repas',t:"Après le repas",ar:"الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنِي هَذَا وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلَا قُوَّةٍ",fr:"Louange à Allah qui m'a nourri de cela et me l'a accordé sans force ni puissance de ma part.",en:"All praise is for Allah who fed me this and provided it for me without any strength or power on my part.",ref:'Abu Dawud n°4023 — Hasan Al-Albani',reward:"Ses péchés passés lui sont pardonnés (Tirmidhi n°3458 — Hasan)"},
{id:'d70',cat:'Repas',t:"Invité : du'a pour l'hôte",ar:"اللَّهُمَّ بَارِكْ لَهُمْ فِيمَا رَزَقْتَهُمْ، وَاغْفِرْ لَهُمْ وَارْحَمْهُمْ",fr:"Ô Allah, bénis-les dans ce que Tu leur as accordé, pardonne-leur et fais-leur miséricorde.",en:"O Allah, bless them in what You have provided for them, forgive them and have mercy upon them.",ref:'Muslim n°2042',reward:"Du'a du Prophète ﷺ chez ses hôtes"},

// ── ABLUTIONS & PRIÈRE ──
{id:'d71',cat:'Ablutions',t:"Du'a après les ablutions",ar:"أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ",fr:"Je témoigne qu'il n'y a de divinité qu'Allah seul, sans associé, et je témoigne que Muhammad est Son serviteur et Son messager.",en:"I testify that none has the right to be worshipped but Allah alone, with no partner, and I testify that Muhammad is His slave and messenger.",ref:'Muslim n°234',reward:"Les 8 portes du Paradis s'ouvrent pour lui"},
{id:'d72',cat:'Ablutions',t:"Au début des ablutions",ar:"أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ ، بِسْمِ اللهِ",fr:"Je cherche refuge auprès d'Allah contre le Shaytan maudit. Au nom d'Allah.",en:"I seek refuge in Allah from the accursed Shaytan. In the name of Allah.",ref:'Abu Dawud n°101 — Sahih Al-Albani',reward:"Bismillah avant l'ablution est obligatoire selon l'opinion la plus solide"},

// ── VOYAGE ──
{id:'d73',cat:'Voyage',t:"Du'a pour le voyage",ar:"اللَّهُمَّ إِنَّا نَسْأَلُكَ فِي سَفَرِنَا هَذَا الْبِرَّ وَالتَّقْوَى، وَمِنَ الْعَمَلِ مَا تَرْضَى",fr:"Ô Allah, nous Te demandons dans ce voyage la vertu, la piété et un acte qui Te satisfait.",en:"O Allah, we ask You on this journey of ours for righteousness, piety, and deeds that please You.",ref:'Muslim n°1342',reward:"Du'a du Prophète ﷺ au début de tout voyage"},
{id:'d74',cat:'Voyage',t:"En montant dans un véhicule",ar:"سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُونَ",fr:"Gloire à Celui qui nous a soumis cela, car nous n'en étions pas capables, et c'est vers notre Seigneur que nous retournerons.",en:"Glory be to Him Who has subjected this to us, and we were not able to do it. And to our Lord we shall return.",ref:'Abu Dawud n°2602 — Sahih',reward:"Puis il dit 3× Alhamdulillah, 3× Subhanallah, La ilaha illallah (Tirmidhi n°3447)"},
{id:'d75',cat:'Voyage',t:"Du'a de retour de voyage",ar:"آيِبُونَ تَائِبُونَ عَابِدُونَ لِرَبِّنَا حَامِدُونَ",fr:"Nous revenons, nous nous repentons, nous adorons et nous louons notre Seigneur.",en:"We are returning, repenting, worshipping and praising our Lord.",ref:'Muslim n°1342',reward:"Du'a sunnah au retour de voyage"},

// ── ISTIKHARA ──
{id:'d76',cat:'Istikhara',t:"Du'a de l'Istikhara",ar:"اللَّهُمَّ إِنِّي أَسْتَخِيرُكَ بِعِلْمِكَ، وَأَسْتَقْدِرُكَ بِقُدْرَتِكَ، وَأَسْأَلُكَ مِنْ فَضْلِكَ الْعَظِيمِ",fr:"Ô Allah, je Te demande le bien par Ta science, je Te demande la capacité par Ta puissance et je Te supplie de Ta grande faveur. Tu es capable et je ne le suis pas, Tu sais et je ne sais pas, Tu connais les choses cachées.",en:"O Allah, I seek Your counsel by Your knowledge and by Your power I seek strength, and I ask You from Your immense favor. You are capable and I am not. You know and I do not, and You are the Knower of the unseen.",ref:'Bukhari n°1166',reward:"Du'a complet de l'Istikhara — 2 rak'at puis ce du'a"},

// ── ANXIÉTÉ & TRISTESSE ──
{id:'d77',cat:'Anxiété / Tristesse',t:"Du'a de l'anxiété et de la tristesse",ar:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَالْعَجْزِ وَالْكَسَلِ، وَالْبُخْلِ وَالْجُبْنِ، وَضَلَعِ الدَّيْنِ وَغَلَبَةِ الرِّجَالِ",fr:"Ô Allah, je cherche refuge auprès de Toi contre l'anxiété et la tristesse, l'impuissance et la paresse, l'avarice et la lâcheté, le fardeau des dettes et la domination des hommes.",en:"O Allah, I seek refuge in You from anxiety and sorrow, from weakness and laziness, from miserliness and cowardice, from the burden of debts and from being overpowered by men.",ref:'Bukhari n°2893',reward:"Dépression, anxiété et tristesse soulagées"},
{id:'d78',cat:'Anxiété / Tristesse',t:"Du'a de l'épreuve",ar:"لَا إِلَهَ إِلَّا اللهُ الْعَظِيمُ الْحَلِيمُ، لَا إِلَهَ إِلَّا اللهُ رَبُّ الْعَرْشِ الْعَظِيمِ، لَا إِلَهَ إِلَّا اللهُ رَبُّ السَّمَاوَاتِ وَرَبُّ الْأَرْضِ وَرَبُّ الْعَرْشِ الْكَرِيمِ",fr:"Il n'y a de divinité qu'Allah le Puissant, le Doux. Il n'y a de divinité qu'Allah Seigneur du Trône immense. Il n'y a de divinité qu'Allah Seigneur des cieux, Seigneur de la terre et Seigneur du Trône généreux.",en:"There is no deity but Allah, the Most Great, the Forbearing. There is no deity but Allah, Lord of the Magnificent Throne. There is no deity but Allah, Lord of the heavens, Lord of the earth, and Lord of the Noble Throne.",ref:'Bukhari n°6345',reward:"Le Prophète ﷺ disait ce du'a dans les moments difficiles"},
{id:'d79',cat:'Anxiété / Tristesse',t:"Du'a de Yunus ﷺ",ar:"لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الْظَّالِمِينَ",fr:"Il n'y a de divinité que Toi. Gloire à Toi ! J'ai été parmi les injustes.",en:"There is no deity but You. Glory be to You! Indeed I have been of the wrongdoers.",ref:'Al-Anbiya 21:87 — Tirmidhi n°3505 — Sahih',reward:"Nul n'en fait la du'a avec sincérité sans qu'Allah ne lui réponde (Tirmidhi n°3505)"},
{id:'d80',cat:'Anxiété / Tristesse',t:"Du'a Hasbi-Allah",ar:"حَسْبِيَ اللهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ",fr:"Allah me suffit. Il n'y a de divinité que Lui. En Lui je me confie. Il est le Seigneur du Trône immense.",en:"Allah is sufficient for me. There is no deity except Him. In Him I have put my trust, and He is the Lord of the Great Throne.",ref:'Abu Dawud n°5081 — Sahih Al-Albani',reward:"Quiconque le dit 7× matin et soir : Allah lui suffit pour tout (Silsilah n°2765)"},

// ── MALADE & MALADIE ──
{id:'d81',cat:'Maladie',t:"Du'a pour la guérison",ar:"اللَّهُمَّ رَبَّ النَّاسِ، أَذْهِبِ الْبَأْسَ، وَاشْفِ أَنْتَ الشَّافِي، لَا شِفَاءَ إِلَّا شِفَاؤُكَ، شِفَاءً لَا يُغَادِرُ سَقَمًا",fr:"Ô Allah, Seigneur des gens, supprime la maladie et guéris. Tu es le Guérisseur. Il n'y a de guérison que Ta guérison, une guérison qui ne laisse aucune maladie.",en:"O Allah, Lord of the people, remove the affliction and heal. You are the Healer. There is no healing except Your healing, a healing that leaves no illness.",ref:'Bukhari n°5743',reward:"Du'a du Prophète ﷺ lors de la Ruqya"},
{id:'d82',cat:'Maladie',t:"Ruqya — main sur la douleur",ar:"بِسْمِ اللهِ (ثَلاثاً) أَعُوذُ بِاللهِ وَقُدْرَتِهِ مِنْ شَرِّ مَا أَجِدُ وَأُحَاذِرُ",fr:"Au nom d'Allah (3 fois). Je cherche refuge auprès d'Allah et de Sa puissance contre le mal de ce que je ressens et de ce dont je me méfie.",en:"In the name of Allah (3 times). I seek refuge in Allah and His power from the evil of what I feel and that which I am wary of.",ref:'Muslim n°2202',reward:"À dire 7× en posant la main sur la zone douloureuse"},
{id:'d83',cat:'Maladie',t:"Du'a au malade",ar:"لَا بَأْسَ طَهُورٌ إِنْ شَاءَ اللهُ",fr:"Ne t'inquiète pas, c'est une purification si Allah le veut.",en:"Do not worry, it is a purification, if Allah wills.",ref:'Bukhari n°3616',reward:"Du'a à dire au malade — ses péchés lui sont expiés"},
{id:'d84',cat:'Maladie',t:"Du'a lorsqu'on se regarde dans le miroir",ar:"اللَّهُمَّ أَنْتَ حَسَّنْتَ خَلْقِي فَحَسِّنْ خُلُقِي",fr:"Ô Allah, Tu as embelli ma création, embellis donc mon caractère.",en:"O Allah, You have made my form beautiful, so make my character beautiful too.",ref:'Ahmad n°3748 — Hasan',reward:"Du'a sunnah devant le miroir"},

// ── PROTECTION ──
{id:'d85',cat:'Protection',t:"Protection du soir : refuge",ar:"أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ",fr:"Je cherche refuge dans les paroles parfaites d'Allah contre le mal de ce qu'Il a créé.",en:"I seek refuge in the perfect words of Allah from the evil of what He has created.",ref:'Muslim n°2709',reward:"Quiconque le dit 3× le soir : aucun venin ne lui nuit cette nuit-là"},
{id:'d86',cat:'Protection',t:"Protection des djinns et du mal",ar:"أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ",fr:"Je cherche refuge auprès d'Allah contre le Shaytan maudit.",en:"I seek refuge in Allah from the accursed Shaytan.",ref:'Bukhari n°3281',reward:"Protection contre les suggestions de Shaytan"},
{id:'d87',cat:'Protection',t:"Avant d'entrer aux toilettes",ar:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْخُبُثِ وَالْخَبَائِثِ",fr:"Ô Allah, je cherche refuge auprès de Toi contre les démons mâles et femelles.",en:"O Allah, I seek refuge in You from male and female devils.",ref:'Bukhari n°142',reward:"Du'a sunnah avant d'entrer aux toilettes"},
{id:'d88',cat:'Protection',t:"En cas de frayeur",ar:"أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّةِ مِنْ غَضَبِهِ وَعِقَابِهِ، وَشَرِّ عِبَادِهِ، وَمِنْ هَمَزَاتِ الشَّيَاطِينِ وَأَنْ يَحْضُرُونِ",fr:"Je cherche refuge dans les paroles parfaites d'Allah, contre Sa colère et Son châtiment, contre le mal de Ses serviteurs et contre les diables et leur présence.",en:"I seek refuge in the perfect words of Allah from His anger and punishment, from the evil of His slaves and from the whispers of the devils and their presence.",ref:'Abu Dawud n°3893 — Sahih',reward:"À dire lors d'une frayeur la nuit"},

// ── ISLAM & GUIDANCE ──
{id:'d89',cat:'Guidance',t:"Du'a pour la fermeté",ar:"يَا مُقَلِّبَ الْقُلُوبِ ثَبِّتْ قَلْبِي عَلَى دِينِكَ",fr:"Ô Celui qui retourne les cœurs, affermis mon cœur sur Ta religion.",en:"O Turner of the hearts, keep my heart firm upon Your religion.",ref:'Tirmidhi n°2140 — Sahih',reward:"Du'a fréquent du Prophète ﷺ"},
{id:'d90',cat:'Guidance',t:"Du'a pour la bonne fin",ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ حُسْنَ الْخَاتِمَةِ",fr:"Ô Allah, je Te demande une bonne fin.",en:"O Allah, I ask You for a good ending.",ref:'Tabarani — Hasan',reward:"Mourir dans un état de foi complète"},
{id:'d91',cat:'Guidance',t:"Du'a pour la connaissance utile",ar:"اللَّهُمَّ انْفَعْنِي بِمَا عَلَّمْتَنِي، وَعَلِّمْنِي مَا يَنْفَعُنِي، وَزِدْنِي عِلْمًا",fr:"Ô Allah, fais-moi profiter de ce que Tu m'as enseigné, enseigne-moi ce qui me sera utile et augmente ma connaissance.",en:"O Allah, benefit me with what You have taught me, teach me what will benefit me, and increase me in knowledge.",ref:'Tirmidhi n°3599 — Hasan',reward:"Du'a pour la science bénéfique"},
{id:'d92',cat:'Guidance',t:"Du'a pour les parents",ar:"رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ رَبِّ ارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا",fr:"Seigneur, pardonne-moi ainsi qu'à mes parents. Seigneur, fais-leur miséricorde comme ils m'ont élevé étant petit.",en:"My Lord, forgive me and my parents. My Lord, have mercy upon them as they raised me when I was small.",ref:'Al-Isra 17:24 — Quran',reward:"Verset coranique — du'a pour les parents vivants et défunts"},
{id:'d93',cat:'Guidance',t:"Du'a pour un enfant pieux",ar:"رَبِّ هَبْ لِي مِنَ الصَّالِحِينَ",fr:"Seigneur, accorde-moi (un enfant) parmi les vertueux.",en:"My Lord, grant me (a child) from among the righteous.",ref:'As-Saffat 37:100 — Quran',reward:"Du'a d'Ibrahim ﷺ pour avoir un enfant pieux"},
{id:'d94',cat:'Guidance',t:"Du'a pour la protection du cœur",ar:"رَبَّنَا لَا تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا وَهَبْ لَنَا مِنْ لَدُنْكَ رَحْمَةً إِنَّكَ أَنْتَ الْوَهَّابُ",fr:"Seigneur, ne laisse pas dévier nos cœurs après que Tu nous aies guidés. Accorde-nous une miséricorde de Ta part. Tu es le Donateur par excellence.",en:"Our Lord, let not our hearts deviate after You have guided us and grant us from Yourself mercy. Indeed, You are the Bestower.",ref:'Al-Imran 3:8 — Quran',reward:"Du'a des croyants fermes — protection contre la déviance"},
{id:'d95',cat:'Guidance',t:"Subhan Allah wa bihamdihi",ar:"سُبْحَانَ اللهِ وَبِحَمْدِهِ",fr:"Gloire à Allah et Sa louange. Quiconque le dit cent fois par jour, ses péchés lui sont effacés même s'ils étaient comme l'écume de la mer.",en:"Glory be to Allah and His is the praise. Whoever says it one hundred times a day, his sins are wiped away even if they were as numerous as the foam of the sea.",ref:'Bukhari n°6405',reward:"Péchés effacés même comme l'écume de la mer"},
{id:'d96',cat:'Guidance',t:"La meilleure du'a",ar:"أَفْضَلُ الدُّعَاءِ الْحَمْدُ لِلَّهِ",fr:"La meilleure du'a est : Alhamdulillah. La meilleure invocation est : La ilaha illallah.",en:"The best du'a is: Alhamdulillah. The best remembrance is: La ilaha illallah.",ref:'Tirmidhi n°3383 — Hasan',reward:"Alhamdulillah = la meilleure du'a selon le Prophète ﷺ"},
{id:'d97',cat:'Istighfar',t:"Istighfar court — toujours",ar:"أَسْتَغْفِرُ اللهَ",fr:"Je demande pardon à Allah. (À dire en tout temps, même pendant le travail ou la marche)",en:"I seek forgiveness from Allah. (Can be said at any time, even while working or walking)",ref:'Bukhari n°6307',reward:"Le Prophète ﷺ demandait pardon 70 à 100 fois par jour"},
{id:'d98',cat:'Istighfar',t:"Du'a après le péché",ar:"أَسْتَغْفِرُ اللهَ الْعَظِيمَ الَّذِي لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ وَأَتُوبُ إِلَيْهِ",fr:"Je demande pardon à Allah l'Immense, en dehors de qui il n'y a de divinité, le Vivant, Celui qui subsiste par Lui-même, et je me repens à Lui.",en:"I seek forgiveness from Allah the Magnificent, other than Whom there is no deity, the Ever-Living, the Self-Subsisting, and I repent to Him.",ref:'Abu Dawud n°1517 — Sahih Al-Albani',reward:"Ses péchés lui sont pardonnés même s'il a fui du combat (Tirmidhi n°3577)"},
{id:'d99',cat:'Istighfar',t:"Du'a pour la tawbah sincère",ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ تَوْبَةً نَصُوحًا",fr:"Ô Allah, je Te demande un repentir sincère.",en:"O Allah, I ask You for a sincere repentance.",ref:'Ahmad n°19015 — Hasan',reward:"Repentir sincère = pardon total"},
{id:'d100',cat:'Salat',t:"Du'a de l'Istiftah (ouverture prière)",ar:"سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ وَتَبَارَكَ اسْمُكَ وَتَعَالَى جَدُّكَ وَلَا إِلَهَ غَيْرُكَ",fr:"Gloire à Toi, ô Allah, et Ta louange. Béni soit Ton nom, exalté soit Ta majesté, et il n'y a de divinité que Toi.",en:"Glory be to You, O Allah, and praise. Blessed be Your name, and exalted be Your majesty, and there is none worthy of worship besides You.",ref:'Abu Dawud n°775 — Sahih Al-Albani',reward:"Du'a d'ouverture de la prière — sunnah"},
{id:'d101',cat:'Salat',t:"Du'a du Qunut",ar:"اللَّهُمَّ اهْدِنِي فِيمَنْ هَدَيْتَ، وَعَافِنِي فِيمَنْ عَافَيْتَ، وَتَوَلَّنِي فِيمَنْ تَوَلَّيْتَ، وَبَارِكْ لِي فِيمَا أَعْطَيْتَ، وَقِنِي شَرَّ مَا قَضَيْتَ",fr:"Ô Allah, guide-moi parmi ceux que Tu as guidés, accorde-moi la santé parmi ceux à qui Tu l'as accordée, prends-moi en charge parmi ceux dont Tu t'es chargé, bénis-moi dans ce que Tu m'as donné et préserve-moi du mal de ce que Tu as décrété.",en:"O Allah, guide me among those You have guided, pardon me among those You have pardoned, befriend me among those You have befriended, bless me in what You have given me, and protect me from the evil of what You have decreed.",ref:'Abu Dawud n°1425 — Sahih Al-Albani',reward:"Du'a du Qunoot — enseigné par le Prophète ﷺ à Al-Hasan Ibn Ali"},
];

// ARBA'IN AN-NAWAWI — Les 40 hadiths fondamentaux complets
// ═══════════════════════════════════════════════════════
const ARBAIN = [
{n:1,ar:"إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ",fr:"Les actes ne valent que par les intentions.",expl:"Ce hadith est un des fondements de l'Islam. Il signifie que toute action est jugée selon l'intention qui la motive. Une même action peut être adorée ou simplement permise selon l'intention.",src:"Bukhari n°1, Muslim n°1907"},
{n:2,ar:"عَنْ عُمَرَ بْنِ الْخَطَّابِ رَضِيَ اللهُ عَنْهُ قَالَ بَيْنَمَا نَحْنُ جُلُوسٌ عِنْدَ رَسُولِ اللهِ ﷺ إِذْ طَلَعَ عَلَيْنَا رَجُلٌ شَدِيدُ بَيَاضِ الثِّيَابِ شَدِيدُ سَوَادِ الشَّعَرِ لَا يُرَى عَلَيْهِ أَثَرُ السَّفَرِ وَلَا يَعْرِفُهُ مِنَّا أَحَدٌ فَجَلَسَ إِلَى النَّبِيِّ ﷺ وَأَسْنَدَ رُكْبَتَيْهِ إِلَى رُكْبَتَيْهِ",fr:"D'après Umar Ibn Al-Khattab (que Allah l'agrée) : Un jour, alors que nous étions assis auprès du Messager d'Allah ﷺ, survint un homme aux habits d'une blancheur éclatante, aux cheveux d'un noir intense, sans trace de voyage sur lui, et qu'aucun de nous ne connaissait. Il s'assit auprès du Prophète ﷺ, posa ses genoux contre ses genoux et dit : 'O Muhammad, informe-moi sur l'Islam.' Le Prophète ﷺ répondit : 'L'Islam, c'est témoigner qu'il n'y a de divinité qu'Allah et que Muhammad est Son messager, accomplir la prière, acquitter la Zakat, jeûner le Ramadan et faire le pèlerinage de la Maison si l'on en a les moyens.' Il dit : 'Tu as dit vrai.' Puis il dit : 'Informe-moi sur l'Iman (la foi).' Il répondit : 'C'est croire en Allah, en Ses anges, en Ses Livres, en Ses messagers, au Jour dernier, et croire au Destin (Qadar) dans son bien et son mal.' Il dit : 'Tu as dit vrai.' Puis il dit : 'Informe-moi sur l'Ihsan.' Il répondit : 'C'est que tu adores Allah comme si tu Le voyais, et si tu ne Le vois pas, sache qu'Il te voit.' Il dit : 'Informe-moi sur l'Heure.' Il répondit : 'Celui qui est interrogé n'en sait pas plus que celui qui interroge.' Puis l'homme s'en alla. Le Prophète ﷺ dit : 'Ô Umar, sais-tu qui est cet homme ?' Je dis : 'Allah et Son messager le savent mieux.' Il dit : 'C'est Jibril, il est venu vous enseigner votre religion.'",expl:"Ce hadith est appelé 'la mère des hadiths' (Umm As-Sunnah). Il contient les trois niveaux de la religion : l'Islam (les actes extérieurs), l'Iman (les croyances intérieures) et l'Ihsan (l'excellence dans le culte). Imam An-Nawawi l'a placé en deuxième position dans ses 40 hadiths pour son importance capitale.",src:"Muslim n°8 — Sahih authentique"},
{n:3,ar:"بُنِيَ الإِسْلَامُ عَلَى خَمْسٍ",fr:"L'Islam est bâti sur cinq (piliers).",expl:"Les 5 piliers de l'Islam : la Shahada, la prière, la Zakat, le Hajj et le jeûne du Ramadan.",src:"Bukhari n°8, Muslim n°16"},
{n:4,ar:"إِنَّ أَحَدَكُمْ يُجْمَعُ خَلْقُهُ فِي بَطْنِ أُمِّهِ",fr:"La création de l'être humain dans le ventre de sa mère.",expl:"Le Prophète ﷺ décrit les étapes de la création humaine (40 jours nutfa, 40 jours alaqah, 40 jours mudghah) puis l'envoi de l'ange qui souffle l'âme et inscrit sa destinée.",src:"Bukhari n°3208, Muslim n°2643"},
{n:5,ar:"مَنْ أَحْدَثَ فِي أَمْرِنَا هَذَا مَا لَيْسَ مِنْهُ فَهُوَ رَدٌّ",fr:"Quiconque introduit une innovation, elle sera rejetée.",expl:"Toute innovation dans la religion, même bien intentionnée, est rejetée. La religion est complète et parfaite.",src:"Bukhari n°2697, Muslim n°1718"},
{n:6,ar:"إِنَّ الْحَلَالَ بَيِّنٌ وَإِنَّ الْحَرَامَ بَيِّنٌ",fr:"Le licite est clair, l'illicite est clair.",expl:"Il existe trois catégories : le clairement licite, le clairement illicite, et les choses douteuses. Quiconque évite le douteux protège sa religion.",src:"Bukhari n°52, Muslim n°1599"},
{n:7,ar:"الدِّينُ النَّصِيحَةُ",fr:"La religion, c'est la sincérité.",expl:"Être sincère envers Allah (en L'adorant correctement), envers Son Livre (en le récitant et le pratiquant), envers Son Messager, envers les imams des musulmans et envers l'ensemble des musulmans.",src:"Muslim n°55"},
{n:8,ar:"أُمِرْتُ أَنْ أُقَاتِلَ النَّاسَ حَتَّى يَشْهَدُوا",fr:"J'ai été ordonné de combattre les gens jusqu'à ce qu'ils témoignent.",expl:"Ce hadith concerne le contexte de la guerre et de la Jizya, non un appel général à la violence. Il signifie que la paix est accordée à quiconque entre dans l'Islam ou accepte le pacte de protection.",src:"Bukhari n°25, Muslim n°22"},
{n:9,ar:"مَا نَهَيْتُكُمْ عَنْهُ فَاجْتَنِبُوهُ",fr:"Ce que je vous ai interdit, évitez-le. Ce que je vous ai ordonné, faites-en ce que vous pouvez.",expl:"Principe fondamental : les interdictions sont absolues (tout ou rien), alors que les obligations admettent la capacité de chacun.",src:"Muslim n°1337"},
{n:10,ar:"إِنَّ اللهَ طَيِّبٌ لَا يَقْبَلُ إِلَّا طَيِّبًا",fr:"Allah est bon et n'accepte que ce qui est bon.",expl:"Allah est pur et n'accepte que les richesses pures. Il ordonne aux croyants ce qu'Il a ordonné aux messagers. Une nourriture illicite empêche l'exaucement des du'a.",src:"Muslim n°1015"},
{n:11,ar:"دَعْ مَا يَرِيبُكَ إِلَى مَا لَا يَرِيبُكَ",fr:"Laisse ce qui te doute pour ce qui ne te doute pas.",expl:"Le cœur du croyant reconnaît le mal même quand les autres le justifient. Toujours préférer la certitude et éviter le douteux est une protection pour la religion et l'âme.",src:"Tirmidhi n°2518, Nasa'i — Sahih"},
{n:12,ar:"مِنْ حُسْنِ إِسْلَامِ الْمَرْءِ تَرْكُهُ مَا لَا يَعْنِيهِ",fr:"La beauté de l'Islam d'une personne est qu'elle abandonne ce qui ne la concerne pas.",expl:"Ce hadith est un pilier dans le comportement du musulman : éviter ce qui est inutile, ce qui ne te regarde pas, et concentrer son énergie sur ce qui est utile pour la dunya et l'akhira.",src:"Tirmidhi n°2317 — Hasan"},
{n:13,ar:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ",fr:"Aucun d'entre vous ne croit vraiment tant qu'il n'aime pas pour son frère ce qu'il aime pour lui-même.",expl:"L'amour pour son frère en Islam n'est pas un sentiment optionnel mais une condition de la foi. Il englobe tout le bien : la santé, la richesse, la guidance, le Paradis.",src:"Bukhari n°13, Muslim n°45"},
{n:14,ar:"لَا يَحِلُّ دَمُ امْرِئٍ مُسْلِمٍ إِلَّا بِإِحْدَى ثَلَاثٍ",fr:"Le sang d'un musulman n'est licite que pour l'une de ces trois raisons.",expl:"Les trois cas : le marié qui commet la fornication, celui qui tue intentionnellement, celui qui abandonne sa religion et quitte la communauté. Hors de ces cas, le sang du musulman est sacré.",src:"Bukhari n°6878, Muslim n°1676"},
{n:15,ar:"مَنْ كَانَ يُؤْمِنُ بِاللهِ وَالْيَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ",fr:"Que celui qui croit en Allah et au Jour dernier dise du bien ou qu'il se taise.",expl:"Ce hadith résume l'éthique de la parole en Islam. La langue est l'une des sources principales du péché et du mal. Le silence vaut mieux que la parole inutile ou nuisible.",src:"Bukhari n°6018, Muslim n°47"},
{n:16,ar:"لَا تَغْضَبْ",fr:"Ne te mets pas en colère.",expl:"Le Prophète ﷺ a répété 'Ne te mets pas en colère' trois fois quand on lui a demandé un conseil. La colère est la porte du diable. Celui qui la maîtrise maîtrise son âme.",src:"Bukhari n°6116"},
{n:17,ar:"إِنَّ اللهَ كَتَبَ الإِحْسَانَ عَلَى كُلِّ شَيْءٍ",fr:"Allah a prescrit l'excellence (ihsan) en toute chose.",expl:"L'ihsan s'applique partout : dans le sacrifice des animaux (aiguiser le couteau), dans le jugement, dans le travail. La religion de l'Islam appelle à l'excellence dans chaque acte.",src:"Muslim n°1955"},
{n:18,ar:"اتَّقِ اللهَ حَيْثُمَا كُنْتَ",fr:"Crains Allah où que tu sois.",expl:"Trois conseils condensant toute la rectitude : la piété en tout lieu et tout temps, effacer le mal par une bonne action, et traiter les gens avec un beau caractère.",src:"Tirmidhi n°1987 — Hasan"},
{n:19,ar:"احْفَظِ اللهَ يَحْفَظْكَ",fr:"Préserve (les droits d') Allah, Il te préservera.",expl:"Si tu respectes les limites d'Allah, Il te protégera dans ta vie, tes biens, ta famille. La relation avec Allah est directe : tu L'honores, Il t'honore. La dépendance totale envers Lui est la vraie liberté.",src:"Tirmidhi n°2516 — Sahih"},
{n:20,ar:"إِنَّ مِنَ الْبَيَانِ لَسِحْرًا",fr:"Une partie de l'éloquence est comme de la magie.",expl:"Les mots ont un pouvoir immense. L'éloquence mal utilisée peut tromper, séduire et égarer. Ce hadith met en garde contre l'abus de la parole et la manipulation par le discours.",src:"Bukhari n°5767"},
{n:21,ar:"قُلْ آمَنْتُ بِاللهِ ثُمَّ اسْتَقِمْ",fr:"Dis : Je crois en Allah, puis tiens-toi droit.",expl:"La droiture (istiqama) après la foi est l'essence de toute la religion. Ce n'est pas un exploit ponctuel mais une constance dans l'obéissance à Allah jusqu'à la mort.",src:"Muslim n°38"},
{n:22,ar:"الإِسْلَامُ أَنْ تَشْهَدَ أَنْ لَا إِلَٰهَ إِلَّا اللهُ",fr:"L'Islam consiste à témoigner qu'il n'y a de divinité qu'Allah.",expl:"Ce hadith de Jibril définit précisément les cinq piliers de l'Islam, les six piliers de l'iman et l'ihsan. Il est considéré comme 'la mère des hadiths' par les savants.",src:"Muslim n°8"},
{n:23,ar:"الطَّهُورُ شَطْرُ الإِيمَانِ",fr:"La pureté est la moitié de la foi.",expl:"La pureté (tahara) est à la fois extérieure (wudu, ghusl, istinja) et intérieure (pureté du cœur). Ce hadith souligne l'importance fondamentale de la pureté rituelle dans l'Islam.",src:"Muslim n°223"},
{n:24,ar:"يَا عِبَادِي إِنِّي حَرَّمْتُ الظُّلْمَ عَلَى نَفْسِي",fr:"Ô Mes serviteurs, J'ai interdit l'injustice à Moi-même.",expl:"Hadith Qudsi majeur. Allah déclare qu'Il s'est interdit l'injustice et l'a rendue illicite entre les hommes. Il appelle Ses serviteurs à Lui demander guidance, nourriture et pardon.",src:"Muslim n°2577"},
{n:25,ar:"مَنْ رَأَى مِنْكُمْ مُنْكَرًا فَلْيُغَيِّرْهُ بِيَدِهِ",fr:"Quiconque d'entre vous voit un mal, qu'il le change avec sa main.",expl:"Les trois niveaux du changement du mal : par la main (obligation de l'autorité), par la langue (obligation du capable), par le cœur (minimum absolu de la foi).",src:"Muslim n°49"},
{n:26,ar:"كُلُّ سُلَامَى مِنَ النَّاسِ عَلَيْهِ صَدَقَةٌ",fr:"Chaque articulation du corps humain doit faire l'aumône chaque jour.",expl:"L'aumône n'est pas seulement financière. Chaque bonne action est une sadaqa : dire une bonne parole, aider quelqu'un, enlever un obstacle du chemin, sourire à son frère.",src:"Bukhari n°2707, Muslim n°1009"},
{n:27,ar:"الْبِرُّ حُسْنُ الْخُلُقِ",fr:"La vertu, c'est le bon caractère.",expl:"La bonté et la vertu se résument à deux choses : un beau caractère avec les gens, et écouter son cœur quand quelque chose le met mal à l'aise même si les autres disent que c'est permis.",src:"Muslim n°2553"},
{n:28,ar:"عَلَيْكَ بِالسُّنَّةِ وَإِيَّاكَ وَالْبِدَعَ",fr:"Tiens-toi à la Sunnah et évite les innovations.",expl:"Ce hadith est un avertissement clair contre toute déviation de la voie du Prophète ﷺ. La Sunnah est une sauvegarde. Chaque innovation est un égarement même si elle semble belle.",src:"Ibn Majah n°42 — Sahih Al-Albani"},
{n:29,ar:"لَوْ تَوَكَّلْتُمْ عَلَى اللهِ حَقَّ تَوَكُّلِهِ",fr:"Si vous vous en remettiez à Allah comme il se doit, Il vous nourrirait.",expl:"La tawakkul (confiance totale en Allah) n'est pas la paresse. C'est agir comme l'oiseau qui sort le matin le ventre vide et revient le soir rassasié, en cherchant ses moyens tout en se confiant à Allah.",src:"Tirmidhi n°2344 — Sahih"},
{n:30,ar:"إِنَّ اللهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ",fr:"Allah aime que lorsque l'un d'entre vous fait un travail, il le fasse avec excellence.",expl:"L'itqan (excellence dans le travail) est une ibada. Que ce soit dans la prière, le travail professionnel, les études ou l'artisanat, Allah aime que l'acte soit accompli parfaitement.",src:"Bayhaqi — Sahih Al-Albani"},
{n:31,ar:"الزُّهْدُ فِي الدُّنْيَا يُرِيحُ الْقَلْبَ وَالْبَدَنَ",fr:"Le détachement de ce monde repose le cœur et le corps.",expl:"Le zuhd ne signifie pas se priver de tout le licite mais ne pas attacher son cœur à la dunya. Celui dont le cœur est libre des attachements mondains vit en paix même dans la pauvreté.",src:"Tabarani — Sahih Al-Albani"},
{n:32,ar:"لَا ضَرَرَ وَلَا ضِرَارَ",fr:"Pas de préjudice et pas de préjudice réciproque.",expl:"Ce hadith est l'un des cinq principes fondamentaux du fiqh islamique. Il signifie que causer un tort est interdit, et se venger en causant un tort équivalent est aussi interdit.",src:"Ibn Majah n°2341 — Sahih"},
{n:33,ar:"لَوْ كَانَتِ الدُّنْيَا تَعْدِلُ عِنْدَ اللهِ جَنَاحَ بَعُوضَةٍ",fr:"Si ce monde valait auprès d'Allah l'aile d'un moustique, Il n'en donnerait pas une gorgée d'eau à un mécréant.",expl:"Ce hadith remet la dunya à sa juste place : elle ne vaut rien face à l'akhira. Que les richesses du monde ne nous illusionnent pas. Ce qui compte, c'est ce qu'on enverra devant soi.",src:"Tirmidhi n°2320 — Sahih"},
{n:34,ar:"مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ",fr:"Quiconque prend un chemin pour chercher le savoir, Allah lui facilite un chemin vers le Paradis.",expl:"La recherche du savoir religieux est une des meilleures ibadats. Les anges abaissent leurs ailes par amour pour le chercheur de savoir. Le savant est comme la lune parmi les étoiles.",src:"Muslim n°2699"},
{n:35,ar:"كُونُوا عِبَادَ اللهِ إِخْوَانًا",fr:"Soyez, serviteurs d'Allah, des frères.",expl:"Le Prophète ﷺ définit ici le lien de fraternité islamique : pas de jalousie, pas de haine, pas de désaccord, pas de rupture. Le musulman est frère du musulman, il ne le trahit pas ni ne le délaisse.",src:"Muslim n°2564"},
{n:36,ar:"مَنْ نَفَّسَ عَنْ مُؤْمِنٍ كُرْبَةً مِنْ كُرَبِ الدُّنْيَا",fr:"Quiconque soulage un croyant d'une détresse de ce monde, Allah le soulagera d'une détresse du Jour du Jugement.",expl:"Aider les autres est une voie directe vers la miséricorde d'Allah. Ce hadith montre que la réciprocité divine dépasse infiniment l'acte humain : une détresse contre une détresse du Jour ultime.",src:"Muslim n°2699"},
{n:37,ar:"إِنَّ اللهَ كَتَبَ الذُّنُوبَ وَجَعَلَ لَهَا كَفَّارَةً",fr:"Allah a prescrit les péchés et a établi une expiation pour chacun.",expl:"Allah a prévu des expiations pour les péchés. Regretter sincèrement, demander pardon, faire de bonnes actions — tout cela efface les fautes. Nul n'est condamné tant qu'il revient vers Allah.",src:"Bukhari n°6491"},
{n:38,ar:"إِنَّ اللهَ لَا يَنْظُرُ إِلَى صُوَرِكُمْ وَأَمْوَالِكُمْ",fr:"Allah ne regarde pas vos apparences ni vos richesses, mais Il regarde vos cœurs et vos actes.",expl:"Ce hadith renverse les critères humains. La beauté, la richesse, le statut social ne comptent pas devant Allah. Ce qui compte, c'est la sincérité du cœur et la qualité des actes.",src:"Muslim n°2564"},
{n:39,ar:"إِنَّ الدِّينَ يُسْرٌ",fr:"La religion est facilité.",expl:"L'Islam n'a pas été révélé pour accabler mais pour faciliter. Quiconque veut rivaliser avec la religion la vaincra. Le juste milieu, la constance modérée et la bonne nouvelle sont la méthode prophétique.",src:"Bukhari n°39"},
{n:40,ar:"كُنْ فِي الدُّنْيَا كَأَنَّكَ غَرِيبٌ أَوْ عَابِرُ سَبِيلٍ",fr:"Sois dans ce monde comme un étranger ou un voyageur de passage.",expl:"Ibn Umar transmit ce conseil du Prophète ﷺ et ajouta : 'Si tu atteins le soir, n'attends pas le matin. Si tu atteins le matin, n'attends pas le soir. Prends de ta santé pour ta maladie et de ta vie pour ta mort.' Le détachement de la dunya commence par cette vision.",src:"Bukhari n°6416"},
];

    ref:"Basé sur : Sifat Salat An-Nabi ﷺ (Al-Albani), Al-Mulakhkhas Al-Fiqhi (Al-Fawzan)",
    steps:[
      {n:1,t:"Conditions préalables",c:"1) Être musulman, sain d'esprit et pubère. 2) Être en état de pureté (wudu ou ghusul). 3) Vêtements, corps et lieu purs. 4) Couvrir la awrah. 5) Être dans les horaires de la prière. 6) Faire face à la Qibla.",ar:"شُرُوطُ الصَّلَاةِ",dua:""},
      {n:2,t:"Takbirat Al-Ihram",c:"Lever les deux mains à la hauteur des épaules ou des lobes d'oreilles, paumes vers l'avant, et dire 'Allahu Akbar'. C'est le début officiel de la prière.",ar:"اللهُ أَكْبَرُ",dua:"Allahu Akbar"},
      {n:3,t:"Du\'a d\'ouverture (sunnah)",c:"Après le takbir, avant Al-Fatiha, réciter une du'a d'ouverture comme : 'Subhanakallahumma wa bihamdika wa tabarakasmuka wa ta'ala jadduka wa la ilaha ghayrak.'",ar:"سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ",dua:""},
      {n:4,t:"Réciter Al-Fatiha",c:"Obligatoire dans chaque rak'ah. Sans elle, la prière est nulle. Dire 'Ameen' à voix haute (imam et suiveurs) après avoir fini.",ar:"بِسْمِ اللهِ الرَّحْمَٰنِ الرَّحِيمِ الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ",dua:""},
      {n:5,t:"Réciter une autre sourate",c:"Après Al-Fatiha dans les deux premières rak'ah, réciter ce qu'on peut du Coran. Recommandé : Al-Baqara dans Fajr, sourates moyennes dans Dhuhr et Asr, sourates courtes dans Maghrib et Isha.",ar:"ثُمَّ اقْرَأْ مَا تَيَسَّرَ مِنَ الْقُرْآنِ",dua:""},
      {n:6,t:"Rukuu (la génuflexion)",c:"Se pencher avec le dos droit, les mains sur les genoux. Dire 'Subhana Rabbiyal Azim' 3 fois minimum.",ar:"سُبْحَانَ رَبِّيَ الْعَظِيمِ",dua:"Subhana Rabbiyal Azim"},
      {n:7,t:"I'tidal (redressement)",c:"Se redresser complètement en disant 'Sami'a Allahu liman hamidah'. Une fois debout, dire 'Rabbana wa lakal hamd'.",ar:"سَمِعَ اللهُ لِمَنْ حَمِدَهُ رَبَّنَا وَلَكَ الْحَمْدُ",dua:""},
      {n:8,t:"Sujud (la prosternation)",c:"Sept membres touchent le sol : le front+nez, les deux mains, les deux genoux et les deux pieds. Dire 'Subhana Rabbiyal A'la' 3 fois minimum.",ar:"سُبْحَانَ رَبِّيَ الأَعْلَى",dua:"Subhana Rabbiyal A'la"},
      {n:9,t:"Julus (assis entre les deux prosternations)",c:"Dire 'Rabb ighfir li' entre les deux prosternations.",ar:"رَبِّ اغْفِرْ لِي",dua:"Rabb ighfir li"},
      {n:10,t:"Tashahhud",c:"En position assise après 2 rak'ah (et à la fin). Réciter le tashahhud complet avec le doigt levé lors du 'illa Allah'.",ar:"التَّحِيَّاتُ لِلَّهِ وَالصَّلَوَاتُ وَالطَّيِّبَاتُ",dua:""},
      {n:11,t:"Salat Ibrahimiyya",c:"Après le tashahhud dans le dernier tashahhud, réciter la salat sur le Prophète ﷺ.",ar:"اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ",dua:""},
      {n:12,t:"Taslim (salutation finale)",c:"Tourner la tête vers la droite en disant 'Assalamu alaykum wa rahmatullah', puis vers la gauche de même.",ar:"السَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللهِ",dua:"Assalamu alaykum wa rahmatullah"},
    ]
  }
};

// SIRA DU PROPHÈTE ﷺ — Biographie chronologique
// ═══════════════════════════════════════════════════════
const SIRA = [
  {period:"Avant la naissance",year:"~571 av. H.",title:"L'Année de l'Éléphant",content:"Abraha, gouverneur yéménite, marche sur La Mecque avec une armée d'éléphants pour détruire la Ka'bah. Allah envoie des oiseaux Ababil qui les détruisent avec des pierres d'argile. C'est l'année de la naissance du Prophète ﷺ.",ref:"Sourate Al-Fil (105)"},
  {period:"Naissance & Enfance",year:"571 ap. J.-C.",title:"Naissance de Muhammad ﷺ",content:"Muhammad Ibn Abdillah Ibn Abd Al-Muttalib naît à La Mecque, dans le clan des Banu Hashim. Son père Abdallah est mort avant sa naissance. Il est confié à une nourrice saharienne, Halima As-Sa'diyya.",ref:"Ibn Hisham — As-Sira An-Nabawiyya"},
  {period:"Naissance & Enfance",year:"~576 ap. J.-C.",title:"Décès de sa mère",content:"Sa mère Amina décède alors qu'il a environ 6 ans, à Abwa. Il est recueilli par son grand-père Abd Al-Muttalib puis, à la mort de ce dernier (578), par son oncle Abu Talib.",ref:"Ibn Hisham"},
  {period:"Jeunesse",year:"~583 ap. J.-C.",title:"Premier voyage en Syrie",content:"À l'âge de 12 ans, il accompagne son oncle Abu Talib lors d'un voyage commercial en Syrie. Le moine chrétien Bahira reconnaît les signes de la prophétie et conseille à Abu Talib de le protéger.",ref:"Tirmidhi — Sahih"},
  {period:"Jeunesse",year:"~595 ap. J.-C.",title:"Mariage avec Khadija ر",content:"À 25 ans, il épouse Khadija Bint Khuwaylid, une commerçante respectée, âgée de 40 ans. Elle est la première croyante et restera sa seule épouse jusqu'à sa mort. Ils ont ensemble 4 filles et 2 fils (décédés en bas âge).",ref:"Bukhari n°3818"},
  {period:"Prophétie",year:"610 ap. J.-C.",title:"Première révélation",content:"À 40 ans, lors d'une retraite dans la grotte de Hira, l'ange Jibril ﷺ lui apparaît et lui dit 'Iqra' (Lis). Les premiers versets révélés sont Al-Alaq 96:1-5. Il rentre tremblant. Khadija le réconforte et l'enveloppe.",ref:"Bukhari n°3"},
  {period:"Prophétie",year:"610-613 ap. J.-C.",title:"Prédication secrète",content:"Pendant 3 ans, il prêche secrètement. Les premiers croyants : Khadija (épouse), Ali Ibn Abi Talib (cousin, 10 ans), Zayd Ibn Haritha (affranchi), Abu Bakr As-Siddiq (ami). Abu Bakr convertit Uthman, Az-Zubayr, Abd Ar-Rahman Ibn Awf.",ref:"Ibn Hisham"},
  {period:"La Mecque",year:"613 ap. J.-C.",title:"Prédication publique",content:"Allah révèle 'Fa-sda' bi ma tu'mar' (Al-Hijr 15:94). Le Prophète ﷺ monte sur le mont Safa et appelle les Quraysh. Abu Lahab le repousse. Les Quraysh commencent la persécution des premiers musulmans.",ref:"Bukhari n°4770"},
  {period:"La Mecque",year:"615 ap. J.-C.",title:"Première émigration en Abyssinie",content:"Devant la persécution des Quraysh, le Prophète ﷺ conseille à ses compagnons d'émigrer vers le Najashi (roi chrétien d'Abyssinie). 15 compagnons y vont d'abord, puis 83 hommes et 18 femmes.",ref:"Ibn Hisham"},
  {period:"La Mecque",year:"619 ap. J.-C.",title:"L'Année du Chagrin",content:"Abu Talib (protecteur du Prophète ﷺ) et Khadija ر décèdent la même année. Le Prophète ﷺ est désormais sans protection tribale ni soutien affectif.",ref:"Ibn Hisham"},
  {period:"La Mecque",year:"621 ap. J.-C.",title:"Al-Isra wal-Mi'raj",content:"Voyage nocturne de La Mecque à Al-Aqsa (Al-Isra), puis ascension aux cieux (Al-Mi'raj). Le Prophète ﷺ voit les autres prophètes, visite le Paradis et l'Enfer, et les 5 prières quotidiennes sont prescrites.",ref:"Bukhari n°3207, Muslim n°163"},
  {period:"Hégire",year:"622 ap. J.-C.",title:"L'Hégire — Émigration vers Médine",content:"Face aux complots des Quraysh pour l'assassiner, le Prophète ﷺ émigre vers Yathrib (Médine) avec Abu Bakr. Ils se cachent 3 jours dans la grotte de Thawr. L'année de l'Hégire marque le début du calendrier islamique.",ref:"Bukhari n°3905"},
  {period:"Médine",year:"622-632 ap. J.-C.",title:"Construction de la mosquée et fraternisation",content:"Il fait construire la Mosquée du Prophète ﷺ. Il instaure la fraternisation entre Muhajirin (émigrés) et Ansar (supporters). Il rédige la Constitution de Médine avec les différentes tribus.",ref:"Ibn Hisham"},
  {period:"Médine",year:"624 ap. J.-C.",title:"Bataille de Badr",content:"Première grande bataille. 313 musulmans contre ~1000 Qurayshites. Victoire décisive des musulmans. 70 Qurayshites tués dont Abu Jahl, 70 capturés. Les prisonniers enseigneront la lecture en échange de leur liberté.",ref:"Bukhari n°3992"},
  {period:"Médine",year:"625 ap. J.-C.",title:"Bataille d'Uhud",content:"3000 Qurayshites attaquent. D'abord victoire, puis défaite partielle quand les archers quittent leur poste. Le Prophète ﷺ est blessé. 70 Compagnons martyrs dont Hamza ر, l'oncle du Prophète ﷺ.",ref:"Bukhari n°4043"},
  {period:"Médine",year:"627 ap. J.-C.",title:"Bataille du Fossé (Al-Khandaq)",content:"10 000 coalisés assiègent Médine. Sur le conseil de Salman Al-Farisi, les Compagnons creusent un fossé. Le siège dure 27 jours puis les coalisés se retirent suite à un vent violent envoyé par Allah.",ref:"Bukhari n°4104"},
  {period:"Médine",year:"628 ap. J.-C.",title:"Traité de Hudaybiyyah",content:"Le Prophète ﷺ veut faire la Umra mais les Quraysh l'en empêchent. Un traité de 10 ans est signé. Semblant désavantageux, il permet en réalité à l'Islam de se répandre massivement. Le Coran le qualifie de 'victoire évidente'.",ref:"Bukhari n°2731"},
  {period:"Médine",year:"630 ap. J.-C.",title:"Conquête de La Mecque",content:"Les Quraysh violent le traité. Le Prophète ﷺ marche sur La Mecque avec 10 000 Compagnons. La ville se rend sans combats. Le Prophète ﷺ amnistie ses ennemis : 'Allez, vous êtes libres.' Il purifie la Ka'bah des idoles.",ref:"Bukhari n°4280"},
  {period:"Derniers temps",year:"632 ap. J.-C.",title:"Le Hajj de l'Adieu",content:"Le Prophète ﷺ accomplit son unique Hajj avec ~124 000 Compagnons. Sur le mont Arafat, il prononce son discours d'adieu : 'J'ai accompli mon message, j'ai transmis la confiance.' La révélation descend : 'Aujourd'hui, J'ai parachevé votre religion.'",ref:"Muslim n°1218"},
  {period:"Décès",year:"8 Rabi' Al-Awwal 11H / 8 Juin 632 ap. J.-C.",title:"Décès du Prophète ﷺ",content:"À 63 ans, le Prophète ﷺ décède à Médine chez Aïcha ر, la tête sur sa cuisse. Ses dernières paroles : 'Ar-Rafiq Al-A'la' (Le Compagnon Suprême — Allah). Il est enterré à l'endroit même où il est décédé. Abu Bakr est nommé premier calife.",ref:"Bukhari n°4462"},,

// ══ SIRA DES 4 CALIFES BIEN GUIDÉS ══
// Source : Sahih Al-Bukhari, Sahih Muslim, Ibn Hisham, Ibn Sa'd, Siyar A'lam An-Nubala
{period:"Abu Bakr As-Siddiq ر",year:"11-13 H / 632-634 ap. J.-C.",title:"Califat d'Abu Bakr — Le premier calife",content:"Abu Bakr As-Siddiq fut le premier calife de l'Islam après la mort du Prophète ﷺ. Le Prophète ﷺ avait dit de lui : 'Si je devais prendre un ami intime (khalil), ce serait Abu Bakr.' (Bukhari n°3656). Il dirigea 2 ans 3 mois. Il rassembla le Coran en un seul volume après la bataille de Yamama. Il combattit les apostats (Ridda) et les faux prophètes (Musaylama Al-Kadhdhab). Il envoya les armées en Syrie et en Perse.",ref:"Bukhari n°3656 — Sahih"},
{period:"Abu Bakr As-Siddiq ر",year:"12 H",title:"Rassemblement du Coran",content:"Suite à la bataille de Yamama (12 H) où 70 Huffadh (mémorisateurs du Coran) furent martyrisés, Umar Ibn Al-Khattab ر conseilla à Abu Bakr ر de rassembler le Coran par écrit. Zayd Ibn Thabit ر fut chargé de cette mission. Abu Bakr dit : 'Comment faire quelque chose que le Prophète ﷺ n'a pas fait ?' Puis Allah lui ouvrit le cœur. Ce manuscrit fut gardé par Abu Bakr, puis Umar, puis Hafsa Bint Umar ر.",ref:"Bukhari n°4986 — Sahih"},
{period:"Abu Bakr As-Siddiq ر",year:"11-12 H",title:"Guerres de Ridda (Apostasie)",content:"Après la mort du Prophète ﷺ, de nombreuses tribus refusèrent de payer la Zakat ou apostasièrent. Abu Bakr ر déclara fermement : 'Par Allah, je combattrai quiconque fait une distinction entre la prière et la Zakat, car la Zakat est un droit de la richesse.' Il envoya Khalid Ibn Al-Walid ر pour combattre les apostats. Musaylama Al-Kadhdhab (le faux prophète) fut tué par Wahshi Ibn Harb ر.",ref:"Bukhari n°1399, 7284 — Sahih"},
{period:"Umar Ibn Al-Khattab ر",year:"13-23 H / 634-644 ap. J.-C.",title:"Califat d'Umar — Le grand Faruq",content:"Umar ر dirigea l'Islam pendant 10 ans. Le Prophète ﷺ dit : 'Si un prophète devait venir après moi, ce serait Umar.' (Tirmidhi n°3686 — Hasan). Sous son califat : conquête de la Perse, de la Syrie, de l'Égypte, de l'Irak. Il établit le Diwan (registre d'État), le calendrier Hijri, les prières de Tarawih en congrégation et la police islamique (Shurta). Shahid en 23 H par Abu Lu'lu'a Al-Majusi.",ref:"Bukhari n°3686 — Hasan | Tirmidhi n°3686"},
{period:"Umar Ibn Al-Khattab ر",year:"20 H",title:"Conquête de l'Égypte et de la Perse",content:"'Amr Ibn Al-'As ر conquit l'Égypte en 20 H. Sa'd Ibn Abi Waqqas ر vainquit l'empire Perse à la bataille de Al-Qadisiyya (15-16 H). Umar ر écrivit à ses gouverneurs : 'Traitez bien les gens. Faites preuve de douceur envers les gens soumis.'",ref:"Ibn Hisham — Siyar Al-Khulafa"},
{period:"Umar Ibn Al-Khattab ر",year:"15 H",title:"Libération de Jérusalem",content:"Umar ر se rendit personnellement à Jérusalem (Al-Quds) pour recevoir les clés de la ville. Il conclut avec le Patriarche Sophronius le 'Pacte d'Umar' garantissant la sécurité des habitants et leurs biens. Il refusa de prier dans l'église Sainte-Sophie pour éviter que les musulmans ne la transforment plus tard en mosquée.",ref:"Tabaqat Ibn Sa'd"},
{period:"Uthman Ibn Affan ر",year:"23-35 H / 644-656 ap. J.-C.",title:"Califat d'Uthman — Dhul-Nurayn",content:"Uthman ر fut surnommé 'Dhul-Nurayn' (Possesseur de deux lumières) car il épousa deux filles du Prophète ﷺ : Ruqayya puis Umm Kulthum. Il dirigea 12 ans. Sous son califat : standardisation du Mushaf du Coran en une seule lecture (Qira'a) pour unifier la communauté. Il envoya des copies du Coran dans les grandes villes. Il fut martyrisé à Médine lors d'une sédition (Fitna) le 18 Dhul-Hijja 35 H.",ref:"Bukhari n°4991 — Standardisation du Coran"},
{period:"Uthman Ibn Affan ر",year:"25 H",title:"Standardisation du Coran",content:"Uthman ر convoqua Zayd Ibn Thabit ر, Abdullah Ibn Az-Zubayr ر, Sa'id Ibn Al-'As ر et Abd Ar-Rahman Ibn Al-Harith ر pour compiler le Coran selon la lecture du Quraysh. Des copies furent envoyées à La Mecque, Médine, Koufa, Bassora, Damas et Bahreïn. C'est le Mushaf que nous lisons aujourd'hui. Ibn Mas'ud ر eut initialement une réticence puis accepta la décision.",ref:"Bukhari n°4987 — Sahih"},
{period:"Ali Ibn Abi Talib ر",year:"35-40 H / 656-661 ap. J.-C.",title:"Califat d'Ali — Lion d'Allah",content:"Ali ر fut le cousin et gendre du Prophète ﷺ. Il épousa Fatima ر fille du Prophète. Le Prophète ﷺ dit de lui : 'Tu es pour moi ce qu'était Aaron pour Musa, sauf qu'il n'y a pas de prophète après moi.' (Bukhari n°4416). Son califat fut marqué par la Fitna (discorde). Bataille du Chameau (36 H) puis Siffin (37 H). Il fut martyrisé par Ibn Muljam Al-Khariji à Koufa le 17 Ramadan 40 H.",ref:"Bukhari n°4416 — Sahih"},
{period:"Ali Ibn Abi Talib ر",year:"36-37 H",title:"Période de la Fitna",content:"Après l'assassinat d'Uthman ر, des dissensions éclatèrent dans la communauté islamique. Ali ر chercha la réconciliation. La bataille de Siffin (37 H) opposa les forces d'Ali et Mu'awiya Ibn Abi Sufyan ر. L'arbitrage (Tahkim) à Adhruh ne donna pas de résultat concluant. Les Kharijites (extrémistes) quittèrent l'armée d'Ali. Il combattit les Kharijites à la bataille de Nahrawan (38 H).",ref:"Ibn Kathir — Al-Bidaya wan-Nihaya"},
{period:"Ali Ibn Abi Talib ر",year:"Héritage",title:"Science et sagesse d'Ali ر",content:"Ali ر était parmi les plus grands savants des Compagnons. Le Prophète ﷺ dit : 'Je suis la Cité de la Science et Ali en est la porte.' (Certains le classent Hasan, d'autres Da'if selon Al-Albani). Il est le 4e des califes bien guidés. Imam An-Nawawi dit : 'Les quatre califes — Abu Bakr, Umar, Uthman et Ali — sont les meilleurs de cette Oummah après son Prophète ﷺ.' Le califat des 4 bien guidés dura 29 ans environ.",ref:"Ibn Kathir — Al-Bidaya wan-Nihaya. Note : Le hadith sur la porte de la science est Da'if selon Al-Albani (Silsilah Da'ifa n°2883). La science d'Ali ر est confirmée par des voies authentiques."},
{period:"Les 4 Califes",year:"11-40 H",title:"Mérite des 4 Califes — Ordre de préférence",content:"Le Prophète ﷺ dit : 'Suivez Abu Bakr et Umar après moi.' (Tirmidhi n°3662 — Hasan). L'ordre de mérite selon les savants de la Sunnah : 1. Abu Bakr As-Siddiq, 2. Umar Ibn Al-Khattab, 3. Uthman Ibn Affan, 4. Ali Ibn Abi Talib — que la satisfaction d'Allah soit sur eux tous. Imam Ahmad Ibn Hanbal dit : 'Quiconque ne reconnaît pas la supériorité d'Abu Bakr et d'Umar, je crains que ses actes soient annulés.'",ref:"Tirmidhi n°3662 — Hasan"}
];

function getJuzForVerse(surahId, verseNum) {
  for (let i = JUZ_DATA.length - 1; i >= 0; i--) {
    const j = JUZ_DATA[i];
    if (surahId > j.start.s || (surahId === j.start.s && verseNum >= j.start.v)) {
      return j.juz;
    }
  }
  return 1;
}

  {t:"Salat",ar:"الصلاة",cat:"Ibadah",def:"La prière rituelle — deuxième pilier de l'Islam. Obligatoire 5 fois par jour. Premier acte dont le serviteur sera rendu compte au Jour du Jugement.",en:"The Islamic prayer — the second pillar of Islam. Obligatory five times daily. The first thing accounted for on the Day of Resurrection."},
  {t:"Zakat",ar:"الزكاة",cat:"Ibadah",def:"L'aumône légale — troisième pilier de l'Islam. Purification des biens par le don d'une fraction (généralement 2,5%) aux ayants droit lorsque le nisab (seuil) est atteint.",en:"Obligatory annual almsgiving — third pillar of Islam. 2.5% of wealth held above the Nisab for one lunar year."},
  {t:"Sawm",ar:"الصوم",cat:"Ibadah",def:"Le jeûne — quatrième pilier. Obligatoire pendant le mois de Ramadan. Consiste à s'abstenir de manger, boire et avoir des relations intimes de l'aube au coucher du soleil.",en:"Fasting — the fourth pillar of Islam. Abstaining from food, drink and intercourse from dawn to sunset during Ramadan."},
  {t:"Hajj",ar:"الحج",cat:"Ibadah",def:"Le pèlerinage à La Mecque — cinquième pilier de l'Islam. Obligatoire une fois dans la vie pour tout musulman qui en a les moyens physiques et financiers.",en:"Pilgrimage to Makkah — fifth pillar of Islam. Obligatory once in a lifetime for those able. Purifies all previous sins when performed properly."},
  {t:"Wudu",ar:"الوضوء",cat:"Ibadah",def:"Les ablutions mineures. Condition préalable à la prière et à la lecture du Coran. Comprend : intention, Bismillah, lavage des mains, bouche, nez, visage, bras, tête, oreilles et pieds.",en:"Ritual purification using water for prayer. Obligatory before prayer, Quran recitation while holding the Mushaf. Includes washing face, arms, wiping head and washing feet."},
  {t:"Ghusl",ar:"الغسل",cat:"Ibadah",def:"La purification majeure (grand ablution). Obligatoire après la relation conjugale, l'éjaculation, la fin des menstrues et des lochies. Recommandé le vendredi et pour l'Aïd.",en:"Full ritual bathing required after major impurity (janaba, menstruation, post-natal bleeding) and recommended for Friday prayer and Eid."},
  {t:"Tayammum",ar:"التيمم",cat:"Ibadah",def:"La purification symbolique avec la terre ou le sable en l'absence d'eau ou en cas d'impossibilité d'utiliser l'eau. Remplacement légal du wudu et du ghusl.",en:"Dry ablution using clean earth/soil when water is unavailable or its use would cause harm. A mercy from Allah."},
  {t:"Du'a",ar:"الدعاء",cat:"Ibadah",def:"La supplication à Allah. Le Prophète ﷺ a dit : 'La du'a, c'est l'adoration.' Peut être faite à tout moment, dans toute situation. Condition : sincérité et absence de consommation illicite."},
  {t:"Dhikr",ar:"الذكر",cat:"Ibadah",def:"Le rappel d'Allah par la parole. Subhan Allah, Al-Hamdulillah, Allahu Akbar, La ilaha illallah. Allah dit dans le Coran : 'Rappelez-vous de Moi, Je Me souviendrai de vous.'",en:"Remembrance of Allah — through various formulas of praise and glorification. Allah says: 'Remember Me and I will remember you.' (Al-Baqara 2:152)"},
  {t:"Qiyam Al-Layl",ar:"قيام الليل",cat:"Ibadah",def:"La prière de nuit (Tahajjud). Meilleure prière après les prières obligatoires. Le Prophète ﷺ ne l'abandonnait jamais. Se fait après Isha et avant Fajr."},
  {t:"Tarawih",ar:"التراويح",cat:"Ibadah",def:"Prières surérogatoires accomplies pendant les nuits du Ramadan. Sunnah du Prophète ﷺ. Généralement 8 ou 20 rak'ah selon les écoles. Le Prophète ﷺ les accomplit en congrégation puis les fit en privé."},
  // FIQH
  {t:"Fiqh",ar:"الفقه",cat:"Fiqh",def:"La jurisprudence islamique — la connaissance des règles pratiques déduites du Coran et de la Sunnah. Les 4 grandes écoles (madhahib) : Hanafite, Malikite, Shafi'ite et Hanbalite.",en:"Islamic jurisprudence — the understanding and application of Islamic law derived from the Quran, Sunnah, consensus and analogy."},
  {t:"Halal",ar:"الحلال",cat:"Fiqh",def:"Ce qui est légalement permis en Islam. Le principe en Islam est que tout est permis sauf ce qui est expressément interdit (textes). Contraire : Haram.",en:"Permitted and lawful in Islamic law. The default ruling for things not explicitly forbidden."},
  {t:"Haram",ar:"الحرام",cat:"Fiqh",def:"Ce qui est légalement interdit en Islam. Les grandes catégories : le shirk, le meurtre injuste, la fornication, le vol, la consommation d'alcool et de porc, l'usure (riba).",en:"Forbidden in Islamic law. Explicitly prohibited by the Quran or authentic Sunnah. Committing it incurs sin."},
  {t:"Makruh",ar:"المكروه",cat:"Fiqh",def:"Ce qui est légalement déconseillé mais pas interdit. Éviter le makruh est récompensé mais le faire n'est pas puni. Catégorie entre le halal et le haram.",en:"Disliked or discouraged in Islamic law but not forbidden. Leaving it earns reward; doing it does not incur sin."},
  {t:"Mustahabb",ar:"المستحب",cat:"Fiqh",def:"Ce qui est recommandé (aussi appelé Sunnah, Mandub ou Nafl). Faire le mustahabb est récompensé mais le délaisser n'est pas puni. Exemple : prier la Sunnah Rawatib."},
  {t:"Nisab",ar:"النصاب",cat:"Fiqh",def:"Le seuil minimum de richesse à partir duquel la zakat est obligatoire. Pour l'or : 85 grammes. Pour l'argent : 595 grammes. Pour les billets : leur équivalent en argent.",en:"The minimum threshold of wealth above which Zakat becomes obligatory. For gold: 85 grams. For silver: 595 grams (approx. 520 EUR as of 2024)."},
  {t:"Ijtihad",ar:"الاجتهاد",cat:"Fiqh",def:"L'effort intellectuel du savant pour déduire une règle islamique sur une question non explicitement traitée dans le Coran et la Sunnah. Réservé aux savants qualifiés."},
  {t:"Fatwa",ar:"الفتوى",cat:"Fiqh",def:"Avis juridique islamique rendu par un savant compétent sur une question religieuse. N'est pas une loi contraignante mais un guide. Le demandeur n'est pas obligé de la suivre si il en a une meilleure.",en:"A religious ruling or opinion issued by a qualified Islamic scholar on a specific question."},
  {t:"Ijma'",ar:"الإجماع",cat:"Fiqh",def:"Le consensus des savants musulmans sur une question. Troisième source de législation après le Coran et la Sunnah. Un consensus authentique ne peut pas être contredit."},
  // HADITH
  {t:"Sahih",ar:"الصحيح",cat:"Hadith",def:"Hadith authentique satisfaisant 5 conditions : chaîne continue, transmetteurs fiables et précis, absence de contradiction avec plus fiable, absence de défaut caché.",en:"The recorded words, actions and approvals of the Prophet ﷺ. Second source of Islamic law."},
  {t:"Hasan",ar:"الحسن",cat:"Hadith",def:"Hadith bon — légèrement inférieur au Sahih. Toutes les conditions du Sahih sont remplies sauf que certains transmetteurs sont légèrement moins précis. Applicable en jurisprudence.",en:"Good — a hadith of slightly less strength than Sahih but still actionable. Acceptable as evidence in Islamic law."},
  {t:"Da'if",ar:"الضعيف",cat:"Hadith",def:"Hadith faible — ne satisfait pas les conditions du Sahih ou du Hasan. Inapplicable en matière de législation selon les savants. Al-Albani : ne s'applique pas même dans les vertus.",en:"Weak — a hadith with deficiency in its chain or narrators. Cannot be used as evidence for rulings, though scholars differ on narrating it for encouragement."},
  {t:"Mawdu'",ar:"الموضوع",cat:"Hadith",def:"Hadith inventé — le plus bas niveau. Fabriqué par un menteur. Ces hadiths sont nombreux et dangereusement répandus. Les transmettre intentionnellement est interdit.",en:"Fabricated — a hadith invented and falsely attributed to the Prophet ﷺ. Absolutely prohibited to narrate as a hadith."},
  {t:"Isnad",ar:"الإسناد",cat:"Hadith",def:"La chaîne de transmission d'un hadith — liste des transmetteurs depuis le Prophète ﷺ jusqu'à l'auteur du recueil. L'Islam est la seule religion à avoir développé cette science.",en:"The chain of narrators transmitting a hadith from the Prophet ﷺ. Scholars verified each hadith through its isnad."},
  {t:"Mutawatir",ar:"المتواتر",cat:"Hadith",def:"Hadith transmis par un si grand nombre de transmetteurs à chaque génération qu'une fabrication collective est impossible. Donne une certitude absolue. Exemple : le Coran entier."},
  {t:"Jarh wa Ta'dil",ar:"الجرح والتعديل",cat:"Hadith",def:"La science d'évaluation des transmetteurs de hadiths — critiquer (jarh) ou approuver (ta'dil) leur fiabilité. Science fondamentale pour authentifier les hadiths."},
  // CORAN
  {t:"Tafsir",ar:"التفسير",cat:"Coran",def:"L'explication du Coran. La meilleure méthode : expliquer le Coran par le Coran, puis par la Sunnah, puis par les explications des Compagnons. Œuvres majeures : Ibn Kathir, At-Tabari, As-Sa'di."},
  {t:"Tajwid",ar:"التجويد",cat:"Coran",def:"Les règles de récitation correcte du Coran. Obligatoire de l'apprendre pour réciter correctement. Comprend : la prononciation des lettres (makhraj), les règles de prolongation (madd), etc.",en:"The rules of correct Quran recitation. Includes proper pronunciation of letters, elongations, stops and nasalizations."},
  {t:"Hifz",ar:"الحفظ",cat:"Coran",def:"La mémorisation du Coran. Celui qui mémorise le Coran est appelé Hafiz. Le Prophète ﷺ : 'Quiconque récite le Coran et mémorise ... sera avec les nobles scribes obéissants.'"},
  {t:"Juz",ar:"الجزء",cat:"Coran",def:"Une des 30 parties égales du Coran. Division pratique pour mémoriser ou réciter le Coran en un mois (un juz par jour). Le 30e juz (Juz Amma) est le plus connu."},
  {t:"Ayah",ar:"الآية",cat:"Coran",def:"Un verset du Coran. Le Coran contient 6236 versets selon un comptage, répartis en 114 sourates. Certains versets sont longs (ex: Al-Baqara 2:282), d'autres très courts."},
  {t:"Surah",ar:"السورة",cat:"Coran",def:"Un chapitre du Coran. Il y en a 114. Divisées entre Mecquoises (révélées avant l'Hégire, portant sur la croyance) et Médinoises (révélées après l'Hégire, portant sur les lois)."},
  {t:"Basmala",ar:"البسملة",cat:"Coran",def:"بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ — Au nom d'Allah le Tout Miséricordieux le Très Miséricordieux. Débute 113 sourates sur 114 (sauf At-Tawbah). Recommandé de la dire avant tout acte."},
  // SIRA
  {t:"Sahaba",ar:"الصحابة",cat:"Sira",def:"Les Compagnons du Prophète ﷺ — tout musulman qui l'a vu, cru en lui et est mort dans l'Islam. Environ 100 000 Compagnons. Leur génération est la meilleure selon le Prophète ﷺ.",en:"The Companions of the Prophet ﷺ — those who met him while believing in him and died as Muslims. The best generation."},
  {t:"Tabi'in",ar:"التابعون",cat:"Sira",def:"Les Successeurs — ceux qui ont rencontré les Compagnons mais pas le Prophète ﷺ. Deuxième meilleure génération. Parmi eux : Sa'id Ibn Al-Musayyib, Al-Hassan Al-Basri.",en:"The Followers — the generation that came after the Companions and met them while believing. The second-best generation."},
  {t:"Hijra",ar:"الهجرة",cat:"Sira",def:"L'émigration du Prophète ﷺ de La Mecque vers Médine en 622 ap. J.-C. Marque le début du calendrier islamique (calendrier hijri). Événement fondateur de la communauté musulmane.",en:"The emigration of the Prophet ﷺ from Makkah to Madinah in 622 CE. Marks the beginning of the Islamic calendar."},
  {t:"Sirah",ar:"السيرة",cat:"Sira",def:"La biographie du Prophète ﷺ. Connue en détail grâce aux travaux de Ibn Hisham, At-Tabari et d'autres. Modèle de vie pour tout musulman : 'Vous avez dans le Messager d'Allah un excellent modèle.'"},
  {t:"Khulafa Rashidun",ar:"الخلفاء الراشدون",cat:"Sira",def:"Les quatre califes bien guidés : Abu Bakr As-Siddiq, Umar Ibn Al-Khattab, Uthman Ibn Affan et Ali Ibn Abi Talib. Le Prophète ﷺ : 'Suivez ma Sunnah et celle des califes bien guidés.'"},
  // AKHLAQ
  {t:"Tawadu'",ar:"التواضع",cat:"Akhlaq",def:"L'humilité. Allah élève celui qui s'humilie pour Lui. L'orgueil (kibr) est son contraire et peut exclure du Paradis même si on en a 'l'équivalent d'un atome' dans le cœur."},
  {t:"Tawakkul",ar:"التوكل",cat:"Akhlaq",def:"La confiance en Allah. Ne pas négliger les causes tout en sachant que le résultat vient d'Allah seul. Le Prophète ﷺ : 'Si vous vous en remettiez vraiment à Allah, Il vous nourrirait comme Il nourrit les oiseaux.'",en:"Complete reliance on Allah while taking the necessary means. Not laziness, but trust that results ultimately come from Allah alone."},
  {t:"Sabr",ar:"الصبر",cat:"Akhlaq",def:"La patience face aux épreuves, à l'obéissance et à l'abstention des interdits. 'Certes Allah est avec les patients.' Trois types : patience dans l'obéissance, face aux épreuves, et contre la désobéissance."},
  {t:"Shukr",ar:"الشكر",cat:"Akhlaq",def:"La gratitude envers Allah. 'Si vous êtes reconnaissants, J'augmenterai Mes bienfaits pour vous.' La vraie gratitude passe par le cœur (reconnaître le bienfait), la langue (Al-Hamdulillah) et les membres (l'utiliser pour obéir à Allah)."},
  {t:"Ikhlas",ar:"الإخلاص",cat:"Akhlaq",def:"La sincérité — accomplir les actes uniquement pour Allah sans chercher la reconnaissance des gens. Condition d'acceptation de toute adoration avec l'ittiba' (suivi du Prophète ﷺ)."},
  {t:"Haya",ar:"الحياء",cat:"Akhlaq",def:"La pudeur et la honte. 'La haya ne produit que du bien.' L'une des branches de la foi. Protect contre les péchés visibles et cachés. 'Si tu n'as pas honte, fais ce que tu veux.'"},
  {t:"Wafa",ar:"الوفاء",cat:"Akhlaq",def:"La fidélité aux engagements, promesses et pactes. 'Ô vous qui croyez, respectez vos engagements.' Une des qualités essentielles du croyant."},
];

    const dayFmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {day:'numeric'}).format(date);
    const monthFmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {month:'numeric'}).format(date);
    const yearFmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {year:'numeric'}).format(date);
    const day = parseInt(dayFmt);
    const month = parseInt(monthFmt) - 1; // 0-based
    const yearStr = yearFmt.replace(/[^0-9]/g,'');
    const year = parseInt(yearStr);
    if (isNaN(day) || isNaN(month) || isNaN(year) || month < 0 || month > 11) return null;
    return { day, month, year };
  } catch(e) { return null; }
}

function updateDates() {
  const now = new Date();
  const h = getHijriDate(now);

  // Gregorian display depends on current language
  const locale = ST.lang === 'ar' ? 'ar-SA' : ST.lang === 'en' ? 'en-US' : 'fr-FR';
  const greg = now.toLocaleDateString(locale, {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const gregShort = now.toLocaleDateString(locale, {weekday:'short', day:'numeric', month:'short'});

  // Hijri display
  let hijriAr = '', hijriFr = '';
  if (h) {
    hijriAr = `${h.day} ${HIJRI_MONTHS_AR[h.month]} ${h.year}`;
    const monthRoman = ST.lang === 'en' ? HIJRI_MONTHS_EN[h.month] : HIJRI_MONTHS_FR[h.month];
    hijriFr = `${h.day} ${monthRoman} ${h.year} H`;
  }

  const hijriEl = document.getElementById('hijri-date');
  const gregEl = document.getElementById('greg-date');
  if (hijriEl) {
    hijriEl.innerHTML = h ? `<span style="direction:rtl">${hijriAr}</span><br><span style="font-size:9px;opacity:.8">${hijriFr}</span>` : '';
  }
  if (gregEl) gregEl.textContent = gregShort;

  // Update full date in home if visible
  const homeDate = document.getElementById('home-full-date');
  if (homeDate) homeDate.textContent = greg;

  // Update hijri in prayer card if visible
  const homeDateHijri = document.getElementById('home-hijri');
  if (homeDateHijri && h) {
    const monthRoman = ST.lang === 'en' ? HIJRI_MONTHS_EN[h.month] : HIJRI_MONTHS_FR[h.month];
    homeDateHijri.innerHTML = `<span class="ar" style="direction:rtl;font-size:13px;color:var(--acc)">${hijriAr}</span> · <span style="font-size:11px;color:var(--txm)">${hijriFr}</span>`;
  }
}

let _clockInt;
function startClock() {
  clearInterval(_clockInt);
  _clockInt = setInterval(() => {
    const n = new Date();
    const clk = document.getElementById('clk');
    const cd = document.getElementById('cd');
    if (clk) clk.textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    if (cd) cd.textContent = getCountdown();
  }, 1000);
}

function getCountdown() {
  if (!ST.prayerTimes) return '--';
  const prayers = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const now = new Date();
  const nm = now.getHours()*60+now.getMinutes();
  for (const p of prayers) {
    const [h,m] = ST.prayerTimes[p].split(':').map(Number);
    let diff = h*60+m - nm;
    if (diff > 0) {
      return diff >= 60 ? `${Math.floor(diff/60)}h ${diff%60}min` : `${diff} min`;
    }
  }
  const [h,m] = ST.prayerTimes['Fajr'].split(':').map(Number);
  const diff = (24*60 - nm) + h*60+m;
  return diff >= 60 ? `${Math.floor(diff/60)}h ${diff%60}min` : `${diff} min`;
}
