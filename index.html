function renderMore() {
  const tabs = [
    ['asma',t('asma')],
    ['dua',t('dua')],
    ['arbain','Arba\'in'],
    ['fiqh','Fiqh'],
    ['sira','Sira'],
    ['calendar',ST.lang==='en'?'📅 Calendar':'📅 Calendrier'],
    ['zakat',ST.lang==='en'?'💰 Zakat':'💰 Zakat'],
    ['lexique',ST.lang==='en'?'📖 Lexicon':'📖 Lexique'],
    ['quiz','🎯 Quiz'],
    ['aqidah',t('aqidah')],
    ['favs',t('favs')],
    ['history',ST.lang==='en'?'History':'Historique'],
    ['library',t('library')],
  ];
  document.getElementById('s-more').innerHTML = `
    <div class="chips chips-sticky" id="more-tabs">
      ${tabs.map(([k,l])=>`
        <button class="chip ${ST.moreTab===k?'on':''}" data-tab="${k}" onclick="switchMoreTab('${k}')">${l}</button>`).join('')}
    </div>
    <div id="more-content"></div>
  `;
  renderMoreContent();
}

function switchMoreTab(tab) {
  ST.moreTab = tab;
  document.querySelectorAll('#more-tabs .chip').forEach(btn=>{
    btn.classList.toggle('on', btn.dataset.tab === tab);
  });
  renderMoreContent();
  document.getElementById('cnt').scrollTop = 0;
}

function renderMoreContent() {
  const el = document.getElementById('more-content');
  if (!el) return;
  if (ST.moreTab==='asma') renderAsma(el);
  else if (ST.moreTab==='dua') renderDua(el);
  else if (ST.moreTab==='arbain') renderArbain(el);
  else if (ST.moreTab==='fiqh') renderFiqh(el);
  else if (ST.moreTab==='sira') renderSira(el);
  else if (ST.moreTab==='calendar') renderCalendar(el);
  else if (ST.moreTab==='zakat') renderZakat(el);

function calcZakat() {
  const get = id => parseFloat(document.getElementById('zakat-'+id)?.value||'0')||0;
  const total = get('cash') + get('gold') + get('business') + get('investments') + get('loans') - get('debts');
  const nisabSilver = Math.round(595 * 0.85); // approx silver nisab in EUR
  const zakat = total > 0 ? total * 0.025 : 0;
  const amountEl = document.getElementById('zakat-amount');
  const statusEl = document.getElementById('zakat-status');
  if (!amountEl) return;
  if (total <= 0) {
    amountEl.textContent = '0€';
    statusEl.textContent = ST.lang==='en'?'Enter your wealth above':'Entrez vos biens ci-dessus';
    statusEl.style.color = 'var(--txd)';
  } else if (total < nisabSilver) {
    amountEl.textContent = '0€';
    statusEl.style.color = '#fbbf24';
    statusEl.textContent = ST.lang==='en'
      ?`Below nisab threshold (${nisabSilver}€) — Zakat not obligatory`
      :`En dessous du nisab (${nisabSilver}€) — Zakat non obligatoire`;
  } else {
    amountEl.textContent = zakat.toFixed(2)+'€';
    statusEl.style.color = 'var(--gr)';
    statusEl.textContent = ST.lang==='en'
      ?`✅ Zakat is obligatory (total: ${total.toFixed(0)}€ > nisab)`
      :`✅ Zakat obligatoire (total: ${total.toFixed(0)}€ > nisab)`;
  }
}

let _audio = null;
let _currentReciter = localStorage.getItem('reciter') || 'Alafasy_128kbps';
let _isPlaying = false;
let _currentVerseAudio = null;

// Surah verse counts for global ayah calculation
const SURAH_VERSE_COUNTS = [7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,11,8,3,9,5,4,7,3,6,3,5,4,5,6];

function getGlobalAyah(surahId, verseNum) {
  let total = 0;
  for (let i = 0; i < surahId - 1; i++) total += SURAH_VERSE_COUNTS[i] || 0;
  return total + verseNum;
}

function getAudioUrl(surahId, verseNum, reciterId, useAlt) {
  const s = String(surahId).padStart(3,'0');
  const v = String(verseNum).padStart(3,'0');
  if (useAlt) {
    // cdn.islamic.network uses GLOBAL ayah number (1-6236)
    const globalAyah = getGlobalAyah(surahId, verseNum);
    const cdnReciter = _RECITER_MAP[reciterId] || 'ar.alafasy';
    return `https://cdn.islamic.network/quran/audio/128/${cdnReciter}/${globalAyah}.mp3`;
  }
  return `https://everyayah.com/data/${reciterId}/${s}${v}.mp3`;
}

// Mapping everyayah IDs to cdn.islamic.network IDs for fallback

  'Alafasy_128kbps':'ar.alafasy',

function playVerse(surahId, verseNum, btnEl) {
  const url = getAudioUrl(surahId, verseNum, _currentReciter);
  
  // If same verse playing, pause it
  if (_audio && _currentVerseAudio === `${surahId}:${verseNum}` && _isPlaying) {
    _audio.pause();
    _isPlaying = false;
    if (btnEl) updateAudioBtn(btnEl, false);
    return;
  }
  
  // Stop previous
  if (_audio) { _audio.pause(); _audio = null; }
  
  // Reset all play buttons
  document.querySelectorAll('.audio-play-btn').forEach(b => updateAudioBtn(b, false));
  
  _audio = new Audio(url);
  _currentVerseAudio = `${surahId}:${verseNum}`;
  _isPlaying = true;
  if (btnEl) updateAudioBtn(btnEl, true);
  
  _audio.play().then(() => {
    // Set MediaSession for background/lock screen control
    if ('mediaSession' in navigator) {
      const surahName = (ST.surahs||SURAHS_LOCAL).find(s=>s.id===surahId)?.name_simple || 'Quran';
      const reciterName = RECITERS.find(r=>r.id===_currentReciter)?.name || 'Récitateur';
      navigator.mediaSession.metadata = new MediaMetadata({
        title: surahName + ' — ' + surahId + ':' + verseNum,
        artist: reciterName,
        album: 'Islam Authentique — Coran',
      });
      navigator.mediaSession.playbackState = 'playing';
      navigator.mediaSession.setActionHandler('pause', () => { if (_audio) { _audio.pause(); _isPlaying=false; document.querySelectorAll('.audio-play-btn').forEach(b=>updateAudioBtn(b,false)); } });
      navigator.mediaSession.setActionHandler('play', () => { if (_audio) { _audio.play(); _isPlaying=true; } });
    }
  }).catch(e => {
    // Try alternative base URL
    const alt = getAudioUrl(surahId, verseNum, _currentReciter, true);
    const altAudio = new Audio(alt);
    altAudio.play().catch(e2 => {
      console.warn('Audio error both URLs:', e2);
      toast('⚠️ ' + (ST.lang==='en'?'Audio unavailable for this verse':'Audio indisponible pour ce verset'));
      if (btnEl) updateAudioBtn(btnEl, false);
      _isPlaying = false;
    });
    _audio = altAudio;
    _audio.onended = () => {
      _isPlaying = false;
      if (btnEl) updateAudioBtn(btnEl, false);
      const nextBtn = document.getElementById('audio-btn-'+surahId+'-'+(verseNum+1));
      document.querySelectorAll('.verse-playing').forEach(e=>e.classList.remove('verse-playing'));
      if (nextBtn && ST.autoPlayVerses) {
        playVerse(surahId, verseNum+1, nextBtn);
      } else if (!nextBtn && ST.continuousPlay) {
        // Last verse of surah — auto-play next surah
        const allSurahs = ST.surahs && ST.surahs.length ? ST.surahs : SURAHS_LOCAL;
        const curIdx = allSurahs.findIndex(s => s.id === surahId);
        if (curIdx >= 0 && curIdx < allSurahs.length - 1) {
          const nextSurah = allSurahs[curIdx + 1];
          setTimeout(() => {
            toast('📖 ' + (ST.lang==='en'?'Now: ':'Lecture : ') + nextSurah.name_simple);
            ST.currentSurah = nextSurah;
            ST.qView = 'surah';
            renderSurah();
            setTimeout(() => {
              const firstBtn = document.getElementById('audio-btn-'+nextSurah.id+'-1');
              if (firstBtn) playVerse(nextSurah.id, 1, firstBtn);
            }, 1000);
          }, 800);
        }
      }
    };
  });
  
  // Preload next verse for seamless playback
  let _nextAudio = null;
  const preloadNext = () => {
    const nextNum = verseNum + 1;
    const nextUrl = getAudioUrl(surahId, nextNum, _currentReciter);
    _nextAudio = new Audio(nextUrl);
    _nextAudio.preload = 'auto';
    _nextAudio.load();
  };
  // Start preloading after 500ms
  setTimeout(preloadNext, 500);

  _audio.onended = () => {
    _isPlaying = false;
    if (btnEl) updateAudioBtn(btnEl, false);
    // Remove verse highlight
    document.querySelectorAll('.verse-playing').forEach(el=>el.classList.remove('verse-playing'));
    // Auto-play next verse seamlessly
    const nextBtn = document.getElementById('audio-btn-'+surahId+'-'+(verseNum+1));
    // If no next verse button AND continuous play is ON → play next surah
    if (!nextBtn && ST.continuousPlay && ST.surahs && ST.surahs.length > 0) {
      const allSurahs = ST.surahs;
      const curIdx = allSurahs.findIndex(s => s.id === surahId);
      if (curIdx >= 0 && curIdx < allSurahs.length - 1) {
        const nextSurah = allSurahs[curIdx + 1];
        setTimeout(() => {
          toast('📖 ' + (ST.lang==='en'?'Now playing':'Lecture de') + ': ' + (nextSurah.name_simple || ''));
          ST.currentSurah = nextSurah;
          renderSurah();
          setTimeout(() => {
            const firstBtn = document.getElementById('audio-btn-' + nextSurah.id + '-1');
            if (firstBtn) playVerse(nextSurah.id, 1, firstBtn);
          }, 800);
        }, 600);
      }
    }
    if (nextBtn && ST.autoPlayVerses !== false) {
      // Use preloaded audio if ready
      if (_nextAudio && _nextAudio.readyState >= 2) {
        _audio = _nextAudio;
        _nextAudio = null;
        _currentVerseAudio = surahId+':'+(verseNum+1);
        _isPlaying = true;
        updateAudioBtn(nextBtn, true);
        highlightPlayingVerse(surahId, verseNum+1);
        _audio.play().catch(()=>{});
        _audio.onended = () => { _isPlaying=false; updateAudioBtn(nextBtn,false); document.querySelectorAll('.verse-playing').forEach(e=>e.classList.remove('verse-playing')); const nb=document.getElementById('audio-btn-'+surahId+'-'+(verseNum+2)); if(nb&&ST.autoPlayVerses!==false)playVerse(surahId,verseNum+2,nb); };
      } else {
        playVerse(surahId, verseNum+1, nextBtn);
      }
    }
  };

  // Highlight current verse
  highlightPlayingVerse(surahId, verseNum);
  // Show floating "jump to playing verse" button instead of auto-scrolling
  _showPlayingBtn(surahId, verseNum);
  _audioAutoScroll = false; // Don't force scroll
}

// Track manual scrolling to pause auto-scroll
let _audioAutoScroll = false;
let _audioLastManualScroll = 0;
let _audioScrollListener = null;
let _tasbihAutoScroll = false;
let _qiblaDirection = 0;
let _compassHeading = 0;
let _compassListener = null;
let _qiblaActive = false;

// Track tasbih manual scroll to stop auto-scroll at 125px
function setupTasbihScrollTracking() {
  const cnt = document.getElementById('cnt');
  if (!cnt) return;
  cnt.addEventListener('scroll', () => {
    if (!_tasbihAutoScroll) return;
    const btn = document.getElementById('tasbih-btn');
    if (!btn) { _tasbihAutoScroll = false; return; }
    const rect = btn.getBoundingClientRect();
    const mid = window.innerHeight / 2;
    if (Math.abs(rect.top - mid) > 125) _tasbihAutoScroll = false;
  }, {passive:true});
}

function setupAudioScrollTracking() {
  const cnt = document.getElementById('cnt');
  if (!cnt) return;
  if (_audioScrollListener) cnt.removeEventListener('scroll', _audioScrollListener);
  _audioScrollListener = () => {
    if (!_isPlaying) return;
    const now = Date.now();
    if (now - _audioLastManualScroll > 300) {
      // Likely user scroll — check distance from active verse
      const verseCards = document.querySelectorAll('.verse-card');
      let activeCard = null;
      verseCards.forEach(v => { if (v.querySelector('.audio-play-btn[style*="acc"]')) activeCard = v; });
      if (activeCard) {
        const rect = activeCard.getBoundingClientRect();
        const screenMid = window.innerHeight / 2;
        if (Math.abs(rect.top - screenMid) > 125) _audioAutoScroll = false;
      }
    }
    _audioLastManualScroll = now;
  };
  cnt.addEventListener('scroll', _audioScrollListener, {passive:true});
}

function updateAudioBtn(btn, playing) {
  if (!btn) return;

function stopAudio() {
  if (_audio) { _audio.pause(); _audio = null; }
  _isPlaying = false;
  document.querySelectorAll('.audio-play-btn').forEach(b => updateAudioBtn(b, false));
  // Remove floating playing button
  const fb = document.getElementById('floating-playing-btn');
  if (fb) fb.remove();
}

function _showPlayingBtn(surahId, verseNum) {
  // Remove old button
  const old = document.getElementById('floating-playing-btn');
  if (old) old.remove();

  // Only show if the playing verse is not visible
  const checkAndShow = () => {
    const verseEl = document.getElementById('v' + verseNum);
    if (!verseEl) return;
    const rect = verseEl.getBoundingClientRect();
    const inView = rect.top >= 60 && rect.bottom <= window.innerHeight - 60;
    
    let btn = document.getElementById('floating-playing-btn');
    if (!inView && _isPlaying) {
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'floating-playing-btn';
        btn.style.cssText = 'position:fixed;bottom:90px;right:16px;z-index:999;background:var(--acc);color:#000;border:none;border-radius:50px;padding:10px 16px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px;animation:pulse 1.5s infinite';
        btn.innerHTML = '▶ ' + (ST.lang==='en'?'Playing verse':'Verset en cours');
        btn.onclick = () => {
          const el = document.getElementById('v' + verseNum);
          if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
        };
        document.body.appendChild(btn);
      }
    } else if (btn) {
      btn.remove();
    }
  };
  
  // Check every second while playing
  const interval = setInterval(() => {
    if (!_isPlaying) { clearInterval(interval); const b=document.getElementById('floating-playing-btn'); if(b)b.remove(); return; }
    checkAndShow();
  }, 1000);
  checkAndShow();
}

let _quizState = {
  active: false,
  questions: [],
  current: 0,

function renderQuiz(el) {
  if (!_quizState.active) {
    el.innerHTML = `
      <div class="slbl">${ST.lang==='en'?'Islamic Quiz':'Quiz islamique'}</div>

          ['all','🎯 Toutes les questions',`${QUIZ_QUESTIONS.length} questions`],

          ['asma','☪️ 99 Noms d\'Allah',`${QUIZ_QUESTIONS.filter(q=>q.type==='asma').length} questions`],
          ['quran','📖 Coran',`${QUIZ_QUESTIONS.filter(q=>q.type==='quran').length} questions`],
        ].map(([type,label,count])=>`
          <button onclick="startQuiz('${type}')"
            style="background:var(--card);border:2px solid var(--bdr);border-radius:14px;padding:16px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:14px;font-weight:700;margin-bottom:2px">${label}</div>
              <div style="font-size:11px;color:var(--txd)">${count}</div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--txd)"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
          </button>`).join('')}
      </div>`;
    return;
  }

  const q = _quizState.questions[_quizState.current];
  if (!q) { renderQuizResults(el); return; }
  const progress = (_quizState.current / _quizState.questions.length * 100).toFixed(0);

  el.innerHTML = `
    <!-- Progress -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;color:var(--txm)">Question ${_quizState.current+1}/${_quizState.questions.length}</span>
      <span style="font-size:12px;font-weight:700;color:var(--acc)">Score: ${_quizState.score}</span>
    </div>
    <div class="progress" style="margin-bottom:18px">
      <div class="progress-fill" style="width:${progress}%"></div>
    </div>

    <!-- Question -->
    <div class="card card-grad" style="margin-bottom:16px;padding:20px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:10px">
        ${q.type==='hadith'?'📜 Hadith':q.type==='asma'?'☪️ Nom d\'Allah':'📖 Coran'}
      </div>
      <div style="font-size:15px;font-weight:600;line-height:1.6">${q.q}</div>
    </div>

    <!-- Options -->
    <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:16px">
      ${q.opts.map((opt,i)=>{
        let style = `background:var(--bg3);border:2px solid var(--bdr);`;
        let icon = '';
        if (_quizState.answered !== null) {
          if (i === q.correct) { style=`background:#052e16;border:2px solid var(--gr);`; icon='✓ '; }
          else if (i === _quizState.answered && i !== q.correct) { style=`background:#1c0000;border:2px solid #ef4444;`; icon='✗ '; }
        }
        return `<button onclick="${_quizState.answered===null?`answerQuiz(${i})`:'void(0)'}"
          style="${style}border-radius:13px;padding:14px 16px;text-align:left;cursor:${_quizState.answered===null?'pointer':'default'};font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;width:100%;display:flex;align-items:center;gap:8px">
          <span style="width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${String.fromCharCode(65+i)}</span>

    ${_quizState.answered !== null ? `
      <button onclick="nextQuizQuestion()"
        style="width:100%;background:var(--acc);color:#000;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:700;cursor:pointer">
        ${_quizState.current < _quizState.questions.length-1 ? 'Question suivante →' : 'Voir les résultats 🏆'}
      </button>` : ''}
  `;
}

function startQuiz(type) {
  let qs = type === 'all' ? [...QUIZ_QUESTIONS] : QUIZ_QUESTIONS.filter(q=>q.type===type);
  // Shuffle
  for (let i=qs.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [qs[i],qs[j]]=[qs[j],qs[i]]; }
  _quizState = {active:true, questions:qs, current:0, score:0, answered:null, type, results:[]};
  renderMoreContent();
}

function answerQuiz(idx) {
  const q = _quizState.questions[_quizState.current];
  _quizState.answered = idx;
  if (idx === q.correct) _quizState.score++;
  _quizState.results.push({q, chosen:idx});
  renderMoreContent();
}

function nextQuizQuestion() {
  _quizState.current++;
  _quizState.answered = null;
  renderMoreContent();
}

function renderQuizResults(el) {
  const total = _quizState.questions.length;
  const score = _quizState.score;
  const pct = Math.round(score/total*100);
  const emoji = pct >= 80?'🏆':pct>=60?'👍':pct>=40?'📚':'🔄';
  
  el.innerHTML = `
    <div class="card card-grad" style="text-align:center;padding:28px 16px;margin-bottom:16px">
      <div style="font-size:56px;margin-bottom:14px">${emoji}</div>
      <div style="font-size:24px;font-weight:900;color:var(--acc);margin-bottom:6px">${score} / ${total}</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:10px">${pct}% de bonnes réponses</div>
      <div class="progress" style="margin:0 auto;max-width:200px">
        <div class="progress-fill" style="width:${pct}%;background:${pct>=80?'var(--gr)':'var(--acc)'}"></div>
      </div>
      <div style="font-size:12px;color:var(--txm);margin-top:12px">
        ${pct>=80?'Excellent ! Mashallah !':pct>=60?'Bien ! Continuez à apprendre.':pct>=40?'Pas mal, mais il y a encore à apprendre !':'Révisez vos cours et réessayez !'}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button onclick="startQuiz('${_quizState.type}')"
        style="flex:1;background:var(--acc);color:#000;border:none;border-radius:13px;padding:13px;font-size:13px;font-weight:700;cursor:pointer">🔄 Recommencer</button>
      <button onclick="_quizState.active=false;renderMoreContent()"
        style="flex:1;background:var(--bg3);color:var(--tx);border:1.5px solid var(--bdr);border-radius:13px;padding:13px;font-size:13px;font-weight:600;cursor:pointer">Menu</button>
    </div>
    <div class="slbl">Détail des réponses</div>
    ${_quizState.results.map((r,i)=>`
      <div style="background:${r.chosen===r.q.correct?'#052e16':'#1c0000'};border:1px solid ${r.chosen===r.q.correct?'var(--gr)':'#ef444425'};border-radius:13px;padding:13px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:600;margin-bottom:6px">${i+1}. ${r.q.q}</div>
        <div style="font-size:12px;color:${r.chosen===r.q.correct?'var(--grs)':'#fca5a5'}">
          ${r.chosen===r.q.correct?'✓ Correct':'✗ '+ r.q.opts[r.chosen]+' → '+r.q.opts[r.q.correct]}
        </div>
      </div>`).join('')}
  `;
}

function renderCalendar(el) {
  const now = new Date();
  
  // Use shared getHijriDate helper
  const hd = getHijriDate(now);
  const hijriMonth = hd ? hd.month + 1 : 0; // 1-based for calendar events
  const hijriDay = hd ? hd.day : 0;
  const hijriYear = hd ? hd.year : 1447;

  const MONTHS_AR = HIJRI_MONTHS_AR;
  const MONTHS_FR = HIJRI_MONTHS_FR;

  // Find next events
  function daysUntilEvent(evMonth, evDay) {
    if (evMonth === 0) return null; // weekly
    let dDiff = (evMonth - hijriMonth) * 29 + (evDay - hijriDay);
    if (dDiff < 0) dDiff += 354; // next year
    return dDiff;
  }

  const upcomingEvents = CALENDAR_EVENTS
    .filter(e => e.month > 0)
    .map(e => ({...e, days: daysUntilEvent(e.month, e.day)}))
    .sort((a,b) => a.days - b.days);

  el.innerHTML = `
    <!-- Current hijri date -->
    <div class="card card-grad" style="text-align:center;padding:20px;margin-bottom:16px">
      <div style="font-size:10px;color:var(--txm);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px">Date Islamique Actuelle</div>
      <div class="ar" style="font-size:28px;color:var(--acc);margin-bottom:6px;direction:rtl">
        ${hijriDay} ${MONTHS_AR[hijriMonth-1] || ''} ${hijriYear} هـ
      </div>
      <div style="font-size:14px;color:var(--txm)">${hijriDay} ${MONTHS_FR[hijriMonth-1] || ''} ${hijriYear} H</div>
      <div style="font-size:12px;color:var(--txd);margin-top:4px">${now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>

    <!-- Weekly event -->
    <div class="card" style="background:linear-gradient(135deg,#0a1a0e,#0e2514);border-color:var(--bdr2);margin-bottom:14px">
      <div style="cursor:pointer" onclick="const d=this.nextElementSibling;d.style.display=d.style.display==='none'?'block':'none'">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="font-size:22px">🕌</span>

let _lexCat = 'all', _lexSearch = '';

function renderLexique(el) {
  const isEn = ST.lang==='en';
  const cats = ['all', ...new Set(LEXIQUE.map(l=>l.cat))];
  const q = _lexSearch.toLowerCase();
  const fl = LEXIQUE.filter(l => {
    if (_lexCat !== 'all' && l.cat !== _lexCat) return false;
    if (q && !l.t.toLowerCase().includes(q) && !l.def.toLowerCase().includes(q) && !l.ar.includes(_lexSearch)) return false;
    return true;
  });

  el.innerHTML = `

            </div>
            <div class="ar" style="font-size:18px;color:var(--acc);direction:rtl">${l.ar}</div>
          </div>
          <svg class="accordion-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
        <div class="accordion-body">
          <div style="font-size:13px;color:var(--tx2);line-height:1.7">${(ST.lang==='en'&&l.en)?l.en:l.def}</div>
        </div>
      </div>`).join('')}
  `;
}

function onLexSearch(val) {
  _lexSearch = val;
  const q = val.toLowerCase();
  const fl = LEXIQUE.filter(l => {
    if (_lexCat !== 'all' && l.cat !== _lexCat) return false;
    if (q && !l.t.toLowerCase().includes(q) && !l.def.toLowerCase().includes(q)) return false;
    return true;
  });
  const mc = document.getElementById('more-content');
  if (mc) renderLexique(mc);
}

function setLexCat(cat) {
  _lexCat = cat;
  const mc = document.getElementById('more-content');
  if (mc) renderLexique(mc);
}

  if (_immersiveMode) return; // already active — do nothing
  _immersiveMode = true;
  const app = document.getElementById('app');
  const hdr = document.querySelector('.hdr');
  const nav = document.querySelector('.nav');
  if (hdr) hdr.style.display = 'none';
  if (nav) nav.style.display = 'none';
  
  // Show exit button
  const exitBtn = document.createElement('button');
  exitBtn.id = 'immersive-exit';
  exitBtn.innerHTML = `
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H19v-2z"/></svg>
    Quitter lecture immersive`;
  exitBtn.style.cssText = `

function exitImmersiveMode() {
  _immersiveMode = false;
  const hdr = document.querySelector('.hdr');
  const nav = document.querySelector('.nav');
  const exitBtn = document.getElementById('immersive-exit');
  if (hdr) hdr.style.display = '';
  if (nav) nav.style.display = '';

  const app = document.getElementById('app');
  if (app) { app.style.maxWidth = ''; }

let _adhanEnabled = localStorage.getItem('adhanEnabled') !== 'false';

function toggleAdhan() {
  _adhanEnabled = !_adhanEnabled;
  localStorage.setItem('adhanEnabled', _adhanEnabled);
  const btn = document.getElementById('adhan-toggle');
  if (btn) {
    btn.style.background = _adhanEnabled ? 'var(--acc)' : 'var(--bdr2)';
    btn.querySelector('div').style.left = _adhanEnabled ? '25px' : '3px';
  }
  toast(_adhanEnabled ? '🔊 Adhan activé' : '🔇 Adhan désactivé');
}

function checkAdhanTime() {
  if (!_adhanEnabled || !ST.prayerTimes) return;
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  if (s > 5) return; // only check in first 5 seconds of each minute
  const prayers = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  for (const p of prayers) {
    const [ph,pm] = ST.prayerTimes[p].split(':').map(Number);
    if (ph===h && pm===m) {
      playAdhan();
      toast('🕌 ' + p + ' — Heure de la prière');
      break;
    }
  }
}

async function openQibla() {
  _qiblaActive = true;
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this){_qiblaActive=false;closeModal()}">
      <div class="modal-sheet">
        <div class="drag-handle-wrap" id="qb-drag"><div class="modal-handle" id="qb-handle"></div></div>
        <div style="text-align:center;margin-bottom:4px">
          <div style="font-size:18px;font-weight:900">🧭 ${ST.lang==='en'?'Qibla Direction':'Direction de la Qibla'}</div>
          <div style="font-size:11px;color:var(--txm);margin-top:2px">${ST.lang==='en'?'Source: api.aladhan.com':'Calculée depuis votre position — api.aladhan.com'}</div>
        </div>
        <div id="qibla-body" style="text-align:center;padding:16px 0">
          <div class="loader"><div class="spinner"></div></div>
        </div>
        <button onclick="_qiblaActive=false;closeModal()" style="width:100%;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:13px;padding:13px;font-size:13px;font-weight:600;color:var(--txm);cursor:pointer;margin-top:8px">${t('close')}</button>
        <div style="height:env(safe-area-inset-bottom,8px)"></div>
      </div>
    </div>`;
  setupDragClose('qb-handle','qb-drag',()=>{_qiblaActive=false;closeModal();});

  try {
    // Step 1: Get coordinates
    let lat, lng, cityName;
    if (ST.city) {
      const parts = ST.city.split(',');
      const city = encodeURIComponent((parts[0]||'Paris').trim());
      const country = encodeURIComponent((parts[1]||'').trim());
      const countryParam = country ? `&country=${country}` : '';
      const geoRes = await (await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}${countryParam}&method=2`)).json();
      if (geoRes.code === 200) {
        lat = parseFloat(geoRes.data.meta.latitude);
        lng = parseFloat(geoRes.data.meta.longitude);
        cityName = ST.prayerCity || ST.city;
      }
    }
    if (!lat || isNaN(lat)) {
      // Try geolocation
      try {
        const pos = await new Promise((res,rej) => navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000,enableHighAccuracy:true}));
        lat = pos.coords.latitude;
        lng = pos.coords.longitude;
        cityName = ST.lang==='en'?'My position':'Ma position';
      } catch(geoErr) {
        // Geolocation denied - use default Paris coords so compass still works
        if (!ST.city) {
          lat = 48.8566; lng = 2.3522; cityName = 'Paris (défaut)';
        } else {
          throw new Error('City not found and geolocation denied');
        }
      }
    }

    // Step 2: Get Qibla angle from API
    const qiblaRes = await (await fetch(`https://api.aladhan.com/v1/qibla/${lat}/${lng}`)).json();
    _qiblaDirection = qiblaRes.data?.direction ?? 0;
    const degrees = Math.round(_qiblaDirection);

    const compassDirs = ST.lang==='en'
      ? ['N','NE','E','SE','S','SW','W','NW','N']
      : ['N','NE','E','SE','S','SO','O','NO','N'];
    const cardinal = compassDirs[Math.round(degrees/45)%8];

    // Step 3: Render compass
    const qiblaBody = document.getElementById('qibla-body');
    if (!qiblaBody) return;
    qiblaBody.innerHTML = `
      <div style="font-size:12px;color:var(--txm);margin-bottom:12px">📍 ${cityName} — Lat: ${lat.toFixed(4)}° Lng: ${lng.toFixed(4)}°</div>

      <!-- COMPASS CONTAINER -->
      <div style="position:relative;width:220px;height:220px;margin:0 auto 16px">
        <!-- Outer ring -->
        <div id="compass-ring" style="position:absolute;inset:0;border-radius:50%;background:var(--bg3);border:3px solid var(--bdr2);transition:transform .1s ease">
          <!-- Degree marks -->
          <svg width="220" height="220" style="position:absolute;inset:0" viewBox="0 0 220 220">
            <g transform="translate(110,110)">
              ${Array.from({length:36},(_,i)=>{
                const a=i*10*(Math.PI/180);
                const r1=i%9===0?94:i%3===0?97:99;
                const r2=102;
                return `<line x1="${Math.sin(a)*r1}" y1="${-Math.cos(a)*r1}" x2="${Math.sin(a)*r2}" y2="${-Math.cos(a)*r2}" stroke="${i%9===0?'var(--acc)':'var(--bdr2)'}" stroke-width="${i%9===0?2:1}"/>`;
              }).join('')}
            </g>
          </svg>
          <!-- Cardinal labels -->
          <div style="position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:800;color:var(--acc)">N</div>
          <div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;color:var(--txm)">S</div>
          <div style="position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:var(--txm)">W</div>
          <div style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:var(--txm)">E</div>
        </div>

        <!-- QIBLA NEEDLE — always points toward Mecca -->
        <div id="qibla-needle" style="position:absolute;top:50%;left:50%;width:0;height:0">
          <!-- Arrow toward Mecca -->
          <div style="position:absolute;width:5px;height:85px;background:linear-gradient(to top,var(--acc),var(--acc)dd);border-radius:3px 3px 0 0;transform:translateX(-50%) translateY(-100%);transform-origin:bottom center;top:0;left:0"></div>
          <!-- Tail -->
          <div style="position:absolute;width:4px;height:35px;background:var(--bdr2);border-radius:0 0 3px 3px;transform:translateX(-50%);top:0;left:0"></div>
          <!-- Kaaba emoji at tip -->
          <div style="position:absolute;font-size:18px;transform:translateX(-50%) translateY(-100%);top:-85px;left:0;line-height:1">🕋</div>
        </div>

        <!-- Center circle -->
        <div style="position:absolute;top:50%;left:50%;width:16px;height:16px;background:var(--acc);border-radius:50%;transform:translate(-50%,-50%);border:3px solid var(--bg2)"></div>
      </div>

      <!-- Degrees display -->
      <div style="font-size:42px;font-weight:900;color:var(--acc);line-height:1;margin-bottom:6px">${degrees}°</div>
      <div style="font-size:15px;color:var(--txm);margin-bottom:8px">${ST.lang==='en'?'Direction':'Direction'} ${cardinal} — ${ST.lang==='en'?'toward Mecca':'vers La Mecque'}</div>

      <!-- Status indicator -->
      <div id="compass-status" style="font-size:11px;color:var(--txd);padding:8px 14px;background:var(--bg3);border-radius:10px;margin-bottom:4px">
        ${ST.lang==='en'?'⏳ Requesting compass permission...':'⏳ Activation de la boussole...'}
      </div>
      <div style="font-size:10px;color:var(--txd);margin-top:4px">
        ${ST.lang==='en'?'Rotate your phone toward the arrow to face the Qibla':'Tournez votre téléphone vers la flèche pour faire face à la Qibla'}
      </div>`;

    // Step 4: Start compass using DeviceOrientationEvent
    _startQiblaCompass();

  } catch(e) {
    const qiblaBody = document.getElementById('qibla-body');
    if (qiblaBody) qiblaBody.innerHTML = `
      <div style="padding:20px;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">${ST.lang==='en'?'Unable to calculate Qibla':'Impossible de calculer la Qibla'}</div>
        <div style="font-size:12px;color:var(--txm);line-height:1.6;margin-bottom:16px">${ST.lang==='en'?'Authorize geolocation or configure your city in settings.':'Autorisez la géolocalisation ou configurez votre ville dans les paramètres.'}</div>
        <div style="margin-bottom:12px">
          <div style="font-size:12px;color:var(--txm);margin-bottom:8px">${ST.lang==='en'?'Enter your city:':'Entrez votre ville :'}</div>
          <div style="display:flex;gap:8px">
            <input id="qibla-city-input" placeholder="Paris,FR" value="${ST.city||''}"
              style="flex:1;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 12px;color:var(--tx);font-size:13px;outline:none"/>
            <button onclick="const v=document.getElementById('qibla-city-input').value.trim();if(v){ST.city=v;savePref();_qiblaActive=false;openQibla();}"
              style="background:var(--acc);color:#000;border:none;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer">→</button>
          </div>
        </div>
        <button onclick="_qiblaActive=false;closeModal();openSettings(400)" style="background:var(--bg3);color:var(--txm);border:1.5px solid var(--bdr);border-radius:12px;padding:8px 16px;font-size:11px;cursor:pointer">⚙️ ${t('settings')}</button>
      </div>`;
  }
}

function _startQiblaCompass() {
  // Remove any previous listener
  if (_compassListener) {
    window.removeEventListener('deviceorientationabsolute', _compassListener);
    window.removeEventListener('deviceorientation', _compassListener);
  }

  const updateCompass = (heading) => {
    if (!_qiblaActive) return;
    _compassHeading = heading;
    // Qibla needle rotation: how much to rotate needle so it points at Mecca
    const needleAngle = _qiblaDirection - heading;
    // Rotate compass ring in opposite direction to simulate compass behavior
    const ring = document.getElementById('compass-ring');
    const needle = document.getElementById('qibla-needle');
    if (ring) ring.style.transform = `rotate(${-heading}deg)`;
    if (needle) needle.style.transform = `rotate(${needleAngle}deg)`;

    const status = document.getElementById('compass-status');
    if (status) {
      const diff = ((needleAngle % 360) + 360) % 360;
      const isAligned = diff < 10 || diff > 350;
      if (isAligned) {
        status.style.color = 'var(--gr)';
        status.textContent = ST.lang==='en'?'✅ You are facing the Qibla!':'✅ Vous faites face à la Qibla !';
      } else {
        status.style.color = 'var(--txm)';
        status.textContent = ST.lang==='en'?`🧭 Compass active — rotate toward the arrow`:`🧭 Boussole active — tournez vers la flèche`;
      }
    }
  };

  _compassListener = (e) => {
    let heading;
    // iOS uses webkitCompassHeading, Android uses alpha differently
    if (e.webkitCompassHeading !== undefined) {
      // iOS — webkitCompassHeading is degrees from True North clockwise
      heading = e.webkitCompassHeading;
    } else if (e.absolute && e.alpha !== null) {
      // Android with absolute orientation
      heading = 360 - e.alpha;
    } else if (e.alpha !== null) {
      // Android fallback (not absolute — may be unreliable)
      heading = 360 - e.alpha;
    } else {
      return;
    }
    updateCompass(heading);
  };

  // Request permission on iOS 13+
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') {
        window.addEventListener('deviceorientationabsolute', _compassListener, true);
        window.addEventListener('deviceorientation', _compassListener, true);
        const st = document.getElementById('compass-status');
        if (st) st.textContent = ST.lang==='en'?'🧭 Compass active':'🧭 Boussole active';
      } else {
        const st = document.getElementById('compass-status');
        if (st) st.textContent = ST.lang==='en'?'ℹ️ Compass permission denied — showing static direction':'ℹ️ Permission boussole refusée — direction statique affichée';
        _showStaticQiblaNote();
      }
    }).catch(() => {
      _showStaticQiblaNote();
    });
  } else if ('DeviceOrientationEvent' in window) {
    // Android / non-iOS
    window.addEventListener('deviceorientationabsolute', _compassListener, true);
    window.addEventListener('deviceorientation', _compassListener, true);
    // If no events fire after 2s, show static note
    setTimeout(() => {
      if (!_qiblaActive) return;
      const st = document.getElementById('compass-status');
      if (st && st.textContent.includes('Activation')) {
        _showStaticQiblaNote();
      }
    }, 2500);
  } else {
    _showStaticQiblaNote();
  }
}

function _showStaticQiblaNote() {
  const degrees = Math.round(_qiblaDirection);
  const st = document.getElementById('compass-status');
  if (st) {
    st.textContent = ST.lang==='en'
      ? `ℹ️ Compass not available — face ${degrees}° from North (clockwise) to find Qibla`
      : `ℹ️ Boussole non disponible — tournez-vous à ${degrees}° depuis le Nord (sens horaire) pour trouver la Qibla`;
  }
  // Point needle statically
  const needle = document.getElementById('qibla-needle');
  if (needle) needle.style.transform = `rotate(${degrees}deg)`;
}

// PRAYER NOTIFICATIONS
// ═══════════════════════════════════════════════════════
let _notifEnabled = localStorage.getItem('notifEnabled') === 'true';
let _notifPermission = 'default';

async function requestPrayerNotifications() {
  if (!('Notification' in window)) { toast('⚠️ Notifications non supportées'); return; }
  try {
    const perm = await Notification.requestPermission();
    _notifPermission = perm;
    if (perm === 'granted') {
      _notifEnabled = true;
      localStorage.setItem('notifEnabled', 'true');
      toast('🔔 Notifications activées !');
      schedulePrayerNotifications();
    } else {
      _notifEnabled = false;
      localStorage.setItem('notifEnabled', 'false');
      toast('❌ Permission refusée');
    }
  } catch(e) { toast('⚠️ Erreur notifications'); }
}

function togglePrayerNotifications() {
  if (!_notifEnabled) { requestPrayerNotifications(); return; }
  _notifEnabled = false;
  localStorage.setItem('notifEnabled', 'false');
  toast('🔕 Notifications désactivées');
}

function schedulePrayerNotifications() {
  if (!_notifEnabled || !ST.prayerTimes || Notification.permission !== 'granted') return;
  const ps = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const now = new Date();
  const nm = now.getHours()*60+now.getMinutes();
  ps.forEach(p => {
    const [h,m] = ST.prayerTimes[p].split(':').map(Number);
    const pMin = h*60+m;
    const diff = pMin > nm ? (pMin - nm) * 60 * 1000 : null;
    if (diff && diff < 24*60*60*1000) {
      setTimeout(() => {
        if (_notifEnabled && Notification.permission === 'granted') {
          new Notification('🕌 Islam Authentique', {
            body: `Heure de la prière : ${p} — ${ST.prayerTimes[p].substring(0,5)}`,
            icon: '/icon-192.png',
            badge: '/icon-192.png',
            tag: 'prayer-'+p,
            silent: false
          });
        }
      }, diff);
    }
  });
}

// Init notifications on load
if (_notifEnabled && 'Notification' in window) {
  _notifPermission = Notification.permission;
  if (_notifPermission === 'granted') schedulePrayerNotifications();
}

  const now = new Date();

  const [mh,mm] = maghrib.split(':').map(Number);

  document.getElementById('modal-root').innerHTML = `

              <div style="font-size:11px;color:var(--txd);margin-top:4px">Avant l'Adhan du Fajr</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--txm)">Temps restant</div>
              <div style="font-size:16px;font-weight:700;color:var(--acc)">${fmt(toFajr)}</div>
            </div>
          </div>
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);font-size:12px;color:var(--txm)">
            🤲 Du'a du Suhoor : <span class="ar" style="direction:rtl;font-size:14px;color:var(--acc)">وَبِصَوْمِ غَدٍ نَوَيْتُ مِنْ شَهْرِ رَمَضَانَ</span>
            <div style="font-size:11px;color:var(--txd);margin-top:5px;font-style:italic">
              ${ST.lang==='en' ? '"I intend to fast tomorrow in the month of Ramadan."' : '«J\'ai l\'intention de jeûner demain pendant le mois de Ramadan.»'}
              <span style="font-size:10px;color:var(--txd);display:block;margin-top:2px">📚 ${ST.lang==='en'?'An-Nasa\'i — Hasan':'An-Nasa\'i — Hasan'}</span>
            </div>
          </div>
        </div>
        <!-- Iftar -->
        <div style="background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1.5px solid var(--gr);border-radius:18px;padding:18px;margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:11px;color:var(--txm);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px">🌇 IFTAR — Rupture</div>
              <div style="font-size:30px;font-weight:900;color:var(--grs)">${maghrib.substring(0,5)}</div>
              <div style="font-size:11px;color:var(--txd);margin-top:4px">Au Maghrib</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;color:var(--txm)">Temps restant</div>
              <div style="font-size:16px;font-weight:700;color:var(--grs)">${fmt(toMaghrib)}</div>
            </div>
          </div>
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);font-size:12px;color:var(--txm)">
            🤲 Du'a de l'Iftar : <span class="ar" style="direction:rtl;font-size:14px;color:var(--grs)">اللَّهُمَّ لَكَ صُمْتُ وَعَلَى رِزْقِكَ أَفْطَرْتُ</span>
            <div style="margin-top:4px;font-style:italic;font-size:11px">
              ${ST.lang==='en' ? '"O Allah, I fasted for You and I break my fast with Your provision."' : '«Ô Allah, j\'ai jeûné pour Toi et c\'est avec Ta subsistance que je romps le jeûne.»'}
            </div>
            <div style="font-size:10px;color:var(--txd);margin-top:2px">Abu Dawud n°2358 — ${ST.lang==='en'?'Sahih Al-Albani':'Sahih Al-Albani'}</div>
          </div>
        </div>
        <div style="background:var(--bg3);border-radius:13px;padding:13px;font-size:12px;color:var(--txm);line-height:1.65;margin-bottom:18px">
          📜 <strong>Hadith :</strong> "Hâtez-vous de rompre le jeûne, car les gens resteront dans le bien tant qu'ils se hâteront de rompre le jeûne." (Bukhari n°1957, Muslim n°1098 — Sahih)
        </div>
        <button onclick="openShareMenu('dua',{ar:'اللَّهُمَّ لَكَ صُمْتُ وَعَلَى رِزْقِكَ أَفْطَرْتُ',fr:'Ô Allah, j\'ai jeûné pour Toi et je romps mon jeûne avec Ta subsistance.',en:'O Allah, I fasted for You and I break my fast with Your provision.',ref:'Abu Dawud n°2358 — Sahih'})"
          style="width:100%;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:13px;padding:11px;font-size:12px;font-weight:600;color:var(--txm);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px">
          ↗ ${t('share')} — ${ST.lang==='en'?'Iftar du\'a':'Du\'a de l\'Iftar'}
        </button>
        <button onclick="closeModal()" style="width:100%;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:13px;padding:13px;font-size:13px;font-weight:600;color:var(--txm);cursor:pointer">${t('close')}</button>
        <div style="height:env(safe-area-inset-bottom,8px)"></div>
      </div>
    </div>`;
  setupDragClose('ft-handle','ft-drag',()=>closeModal());
}

applyAccent(_accentId);
showSplash();
updateDates();
updateNav();
checkAutoDarkMode();
// Apply saved UI font size
if(ST.fontSizeUI) { document.body.style.fontSize = ST.fontSizeUI + 'px'; document.documentElement.style.setProperty('--fs-ui', ST.fontSizeUI+'px'); }
if (ST.firstOpen) showOnboarding();
else { renderHome(); setTimeout(updateDates, 100); }
loadPrayer().then(()=>{ schedulePrayerNotifications(); });
loadSurahs();
initSwipe();
setTimeout(()=>{
  const btn = document.getElementById('theme-quick-btn');
  if(btn) btn.style.display='flex';
  renderHomeHeader();
  updateDates();
}, 500);

// Update dates every minute
setInterval(updateDates, 60000);

</script>
</body>
</html>
