{id:91,ar:"مَنْ قَالَ سُبْحَانَ اللهِ وَبِحَمْدِهِ مِائَةَ مَرَّةٍ غُفِرَتْ خَطَايَاهُ",fr:"Quiconque dit 'Subhan Allahi wa bihamdihi' cent fois dans la journée, ses péchés seront effacés même s'ils étaient aussi nombreux que l'écume de la mer.",en:"Whoever says Subhan Allahi wa bihamdihi one hundred times in a day, his sins will be forgiven even if they were like the foam of the sea.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6405,a:"Sahih",ref:"Bukhari n°6405",th:"Dhikr",reward:"Effacement des péchés même aussi nombreux que l'écume de la mer"},
{id:92,ar:"مَنْ قَرَأَ آيَةَ الْكُرْسِيِّ دُبُرَ كُلِّ صَلَاةٍ مَكْتُوبَةٍ لَمْ يَمْنَعْهُ مِنْ دُخُولِ الْجَنَّةِ إِلَّا أَنْ يَمُوتَ",fr:"Quiconque récite Ayat Al-Kursi après chaque prière obligatoire, seule la mort le sépare du Paradis.",en:"Whoever recites Ayat al-Kursi after every obligatory prayer, nothing will prevent him from entering Paradise except death.",n:"Abu Umama ر",b:"An-Nasa'i",num:9928,a:"Sahih",ref:"Sahih Al-Albani — Silsilah n°972",th:"Coran",reward:"Seule la mort le sépare du Paradis"},
{id:93,ar:"مَنْ قَرَأَ الْبَقَرَةَ وَآلَ عِمْرَانَ جَاءَتَا يَوْمَ الْقِيَامَةِ كَأَنَّهُمَا غَمَامَتَانِ",fr:"Quiconque récite Al-Baqara et Al-Imran, elles viendront le Jour du Jugement comme deux nuages ou deux ombres ou deux rangées d'oiseaux plaidant pour lui.",en:"Whoever recites Al-Baqarah and Al Imran, they will come on the Day of Resurrection like two clouds or two canopies of shade pleading for their companion.",n:"Abu Umama ر",b:"Sahih Muslim",num:804,a:"Sahih",ref:"Muslim n°804",th:"Coran",reward:"Intercession au Jour du Jugement"},
{id:94,ar:"اقْرَءُوا الْقُرْآنَ فَإِنَّهُ يَأْتِي يَوْمَ الْقِيَامَةِ شَفِيعًا لِأَصْحَابِهِ",fr:"Récitez le Coran, car il viendra le Jour du Jugement comme intercesseur pour ceux qui le récitent.",en:"Recite the Quran, for it will come on the Day of Resurrection as an intercessor for its companions.",n:"Abu Umama ر",b:"Sahih Muslim",num:804,a:"Sahih",ref:"Muslim n°804",th:"Coran",reward:"Le Coran sera un intercesseur au Jour du Jugement"},
{id:95,ar:"مَنْ تَعَلَّمَ آيَةً مِنْ كِتَابِ اللهِ كَانَتْ لَهُ نُورًا يَوْمَ الْقِيَامَةِ",fr:"Quiconque apprend un verset du Livre d'Allah, il sera pour lui une lumière le Jour du Jugement.",en:"Whoever learns a verse from the Book of Allah, it will be a light for him on the Day of Resurrection.",n:"Mu'adh Al-Juhani ر",b:"Ibn Majah",num:217,a:"Hasan",ref:"Silsilah n°588",th:"Coran",reward:"Lumière au Jour du Jugement"},
{id:96,ar:"الَّذِي يَقْرَأُ الْقُرْآنَ وَهُوَ مَاهِرٌ بِهِ مَعَ السَّفَرَةِ الْكِرَامِ الْبَرَرَةِ",fr:"Celui qui récite le Coran avec maîtrise sera avec les messagers nobles et pieux. Et celui qui le récite avec difficulté, en bégayant, aura une double récompense.",en:"The one who is proficient with the Quran will be with the noble and righteous scribes (the angels). And the one who recites the Quran with difficulty, stammering through it, will have a double reward.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:4937,a:"Sahih",ref:"Bukhari n°4937",th:"Coran",reward:"Être avec les anges nobles — double récompense si difficile"},
{id:98,ar:"مَنْ قَرَأَ سُورَةَ الْكَهْفِ فِي يَوْمِ الْجُمُعَةِ أَضَاءَ لَهُ مِنَ النُّورِ",fr:"Quiconque récite la sourate Al-Kahf le jour du Vendredi aura une lumière entre ce vendredi et le suivant.",en:"Whoever recites Surah Al-Kahf on Friday will have a light between that Friday and the next.",n:"Abu Sa'id ر",b:"Hakim",num:2,a:"Sahih",ref:"Silsilah n°585 — Sahih Al-Albani",th:"Coran",reward:"Lumière entre deux vendredis"},
// ── SALAT ──
{id:99,ar:"مَنْ تَوَضَّأَ فَأَسْبَغَ الْوُضُوءَ ثُمَّ أَتَى الْمَسْجِدَ لَا يُهَجِّرُهُ إِلَّا الصَّلَاةُ",fr:"Quiconque fait une bonne ablution puis se rend à la mosquée pour la prière, Allah lui prépare une réception au Paradis à chaque pas qu'il fait.",en:"Whoever performs ablution well, then goes to the mosque for no other purpose than to pray, with every step he takes one sin is erased and he is raised one degree.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:477,a:"Sahih",ref:"Bukhari n°477",th:"Salat",reward:"Allah lui prépare une réception au Paradis pour chaque pas"},
{id:100,ar:"صَلَاةُ الْجَمَاعَةِ أَفْضَلُ مِنْ صَلَاةِ الْفَذِّ بِسَبْعٍ وَعِشْرِينَ دَرَجَةً",fr:"La prière en communauté est supérieure à la prière individuelle de vingt-sept degrés.",en:"Prayer in congregation is superior to prayer alone by twenty-seven degrees.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:645,a:"Sahih",ref:"Bukhari n°645",th:"Salat",reward:"Récompense multipliée par 27"},
{id:101,ar:"مَنْ صَلَّى الْفَجْرَ فَهُوَ فِي ذِمَّةِ اللهِ",fr:"Quiconque prie le Fajr est sous la protection d'Allah. Ne faites pas à Allah de tort concernant sa protection.",en:"Whoever prays Fajr is under the protection of Allah.",n:"Jundub ر",b:"Sahih Muslim",num:657,a:"Sahih",ref:"Muslim n°657",th:"Salat",reward:"Protection d'Allah pour la journée"},
{id:102,ar:"مَنْ صَلَّى الصُّبْحَ فِي جَمَاعَةٍ ثُمَّ قَعَدَ يَذْكُرُ اللهَ حَتَّى تَطْلُعَ الشَّمْسُ",fr:"Quiconque prie le Subh en communauté, puis reste assis à faire dhikr jusqu'au lever du soleil, puis prie deux rak'at — il a la récompense d'un Hajj et d'une Umra complets.",en:"Whoever prays Fajr in congregation, then sits remembering Allah until the sun rises, then prays two rak'at — he will have the reward of Hajj and Umra, complete, complete, complete.",n:"Anas Ibn Malik ر",b:"Tirmidhi",num:586,a:"Hasan",ref:"Tirmidhi n°586 — Hasan",th:"Salat",reward:"Récompense d'un Hajj et Umra complets"},
{id:103,ar:"مَا مِنْ عَبْدٍ مُسْلِمٍ يُصَلِّي لِلهِ كُلَّ يَوْمٍ ثِنْتَيْ عَشَرَةَ رَكْعَةً تَطَوُّعًا",fr:"Tout serviteur musulman qui accomplit 12 rak'at de sunnah par jour, Allah lui construira une maison au Paradis.",en:"There is no Muslim servant who prays for Allah twelve voluntary rak'at every day, apart from the obligatory prayers, except that Allah will build a house for him in Paradise.",n:"Umm Habiba ر",b:"Sahih Muslim",num:728,a:"Sahih",ref:"Muslim n°728",th:"Salat",reward:"Maison au Paradis"},
{id:104,ar:"مَنْ صَلَّى اثْنَتَيْ عَشَرَةَ رَكْعَةً فِي يَوْمٍ وَلَيْلَةٍ بُنِيَ لَهُ بِهَا بَيْتٌ فِي الْجَنَّةِ",fr:"Quiconque prie 12 rak'at (sunnah) dans la journée et la nuit, Allah lui construit une maison au Paradis.",en:"Whoever prays twelve rak'at of Sunnah in a day and a night, a house will be built for him in Paradise.",n:"Aïcha ر",b:"Sahih Muslim",num:730,a:"Sahih",ref:"Muslim n°730",th:"Salat",reward:"Maison au Paradis"},
{id:105,ar:"أَلَا أَدُلُّكَ عَلَى مَا يُكَفِّرُ اللهُ بِهِ الْخَطَايَا وَيَرْفَعُ بِهِ الدَّرَجَاتِ",fr:"L'ablution parfaite malgré les difficultés, les nombreux pas vers la mosquée, et attendre la prière après la prière — voilà le Ribat (la vigilance pour Allah).",en:"Shall I not tell you about something by which Allah erases sins and raises degrees? Performing ablution properly despite difficulty, taking many steps to the mosque, and waiting for prayer after prayer — that is the Ribat.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:251,a:"Sahih",ref:"Muslim n°251",th:"Salat",reward:"Expiation des péchés et élévation des degrés"},
// ── SADAQA & ZAKAT ──
{id:106,ar:"كُلُّ سُلَامَى مِنَ النَّاسِ عَلَيْهِ صَدَقَةٌ كُلَّ يَوْمٍ",fr:"Chaque articulation du corps humain doit faire la charité chaque jour que le soleil se lève. Faire la justice entre deux personnes est une charité, aider quelqu'un à monter sur sa monture est une charité, une bonne parole est une charité, et ôter un obstacle du chemin est une charité.",en:"Every joint of every person must give charity every day. Helping someone onto their mount is charity, lifting their baggage is charity. A good word is charity, every step toward prayer is charity, and removing something harmful from the road is charity.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2707,a:"Sahih",ref:"Bukhari n°2707",th:"Sadaqa",reward:"360 bonnes actions par jour"},
{id:107,ar:"السَّاعِي عَلَى الْأَرْمَلَةِ وَالْمِسْكِينِ كَالْمُجَاهِدِ فِي سَبِيلِ اللهِ",fr:"Celui qui s'occupe de la veuve et du pauvre est comme le combattant dans le chemin d'Allah, ou comme celui qui prie la nuit sans s'arrêter, ou comme celui qui jeûne sans s'arrêter.",en:"The one who is active in helping the widow and the poor is like the one who strives in the path of Allah or the one who fasts and prays all night without stopping.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5353,a:"Sahih",ref:"Bukhari n°5353",th:"Sadaqa",reward:"Récompense du mujahid"},
{id:109,ar:"إِنَّ اللهَ يَقْبَلُ الصَّدَقَةَ وَيَأْخُذُهَا بِيَمِينِهِ",fr:"Allah reçoit l'aumône et la prend de Sa droite. Il la fait ensuite fructifier pour son donateur comme l'un d'entre vous élève son poulain.",en:"Allah accepts charity with His right hand and then causes it to grow for its owner, just as one of you raises his foal.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1014,a:"Sahih",ref:"Muslim n°1014",th:"Sadaqa",reward:"Allah fait fructifier l'aumône"},
{id:110,ar:"أَفْضَلُ الصَّدَقَةِ أَنْ تُعْطِيَ وَأَنْتَ صَحِيحٌ شَحِيحٌ",fr:"La meilleure aumône est celle que tu donnes quand tu es en bonne santé, avide (de richesse), craignant la pauvreté et espérant la richesse.",en:"The best charity is what you give while you are healthy, fearful of poverty, and hoping for richness.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1419,a:"Sahih",ref:"Bukhari n°1419",th:"Sadaqa",reward:"La meilleure aumône"},
// ── HAJJ & UMRA ──
{id:111,ar:"الْعُمْرَةُ إِلَى الْعُمْرَةِ كَفَّارَةٌ لِمَا بَيْنَهُمَا",fr:"Une Umra à l'autre est expiation pour ce qui est entre les deux, et le Hajj mabrour n'a d'autre récompense que le Paradis.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1773,a:"Sahih",ref:"Bukhari n°1773",th:"Hajj",reward:"Expiation entre deux Umra — le Paradis pour le Hajj Mabrour"},
{id:112,ar:"مَنْ حَجَّ هَذَا الْبَيْتَ فَلَمْ يَرْفُثْ وَلَمْ يَفْسُقْ رَجَعَ كَيَوْمِ وَلَدَتْهُ أُمُّهُ",fr:"Quiconque fait le Hajj à cette Maison sans grossièreté ni acte pernicieux revient comme au jour où sa mère l'a enfanté.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1521,a:"Sahih",ref:"Bukhari n°1521",th:"Hajj",reward:"Purification totale des péchés"},
// ── JEUNE & RAMADAN ──
{id:113,ar:"الصِّيَامُ وَالْقُرْآنُ يَشْفَعَانِ لِلْعَبْدِ يَوْمَ الْقِيَامَةِ",fr:"Le jeûne et le Coran intercèdent pour le serviteur le Jour du Jugement. Le jeûne dit : 'Ô Seigneur, je l'ai empêché de la nourriture et des désirs le jour, intercède pour lui.' Le Coran dit : 'Je l'ai empêché du sommeil la nuit, intercède pour lui.'",n:"Abdullah Ibn Amr ر",b:"Musnad Ahmad",num:6589,a:"Sahih",ref:"Silsilah n°1358",th:"Siyam",reward:"Double intercession au Jour du Jugement"},
{id:115,ar:"إِذَا جَاءَ رَمَضَانُ فُتِّحَتْ أَبْوَابُ الْجَنَّةِ وَغُلِّقَتْ أَبْوَابُ النَّارِ",fr:"Quand arrive Ramadan, les portes du Paradis sont ouvertes, les portes du Feu sont fermées, et les démons sont enchaînés.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1899,a:"Sahih",ref:"Bukhari n°1899",th:"Ramadan",reward:"Portes du Paradis ouvertes"},
{id:116,ar:"لِلصَّائِمِ فَرْحَتَانِ يَفْرَحُهُمَا",fr:"Le jeûneur a deux joies : une à la rupture du jeûne et une lorsqu'il rencontrera son Seigneur.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1904,a:"Sahih",ref:"Bukhari n°1904",th:"Siyam",reward:"Joie à l'iftar et joie devant Allah"},
{id:117,ar:"كُلُّ عَمَلِ ابْنِ آدَمَ لَهُ إِلَّا الصِّيَامَ فَإِنَّهُ لِي وَأَنَا أَجْزِي بِهِ",fr:"Tout acte du fils d'Adam lui appartient, excepté le jeûne — il est pour Moi et c'est Moi qui en récompense. Le jeûne est un bouclier. L'haleine du jeûneur est plus agréable à Allah que l'odeur du musc.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1904,a:"Sahih",ref:"Bukhari n°1904",th:"Siyam",reward:"Récompense directe d'Allah — incalculable"},
// ── AKHLAQ ──
{id:118,ar:"إِنَّ مِنْ أَحَبِّكُمْ إِلَيَّ وَأَقْرَبِكُمْ مِنِّي مَجْلِسًا يَوْمَ الْقِيَامَةِ أَحَاسِنَكُمْ أَخْلَاقًا",fr:"Les plus aimés de moi et les plus proches de moi le Jour du Jugement sont ceux qui ont le meilleur caractère.",n:"Jabir ر",b:"Tirmidhi",num:2018,a:"Sahih",ref:"Tirmidhi n°2018 — Sahih Al-Albani",th:"Akhlaq",reward:"Être le plus proche du Prophète ﷺ au Jour du Jugement"},
{id:119,ar:"تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ لَكَ صَدَقَةٌ",fr:"Ton sourire en direction de ton frère est une charité pour toi.",n:"Abu Dharr ر",b:"Tirmidhi",num:1956,a:"Hasan",ref:"Tirmidhi n°1956 — Hasan",th:"Akhlaq",reward:"Charité"},
{id:120,ar:"إِنَّ الرِّفْقَ لَا يَكُونُ فِي شَيْءٍ إِلَّا زَانَهُ وَلَا يُنْزَعُ مِنْ شَيْءٍ إِلَّا شَانَهُ",fr:"La douceur ne se trouve dans quelque chose qu'elle ne l'embellit, et elle n'est retirée d'une chose qu'elle ne la dégradait.",n:"Aïcha ر",b:"Sahih Muslim",num:2594,a:"Sahih",ref:"Muslim n°2594",th:"Akhlaq",reward:"Le croyant fort est meilleur et plus aimé d'Allah. (Muslim n°2664)"},
{id:121,ar:"مَنْ كَانَ يُؤْمِنُ بِاللهِ وَالْيَوْمِ الآخِرِ فَلْيُكْرِمْ ضَيْفَهُ",fr:"Que celui qui croit en Allah et au Jour Dernier honore son invité.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6018,a:"Sahih",ref:"Bukhari n°6018",th:"Akhlaq",reward:"Quiconque honore l'invité = récompense d'un hadj. (Bukhari n°6018)"},
{id:122,ar:"لَيْسَ الْمُؤْمِنُ بِالطَّعَّانِ وَلَا اللَّعَّانِ وَلَا الْفَاحِشِ وَلَا الْبَذِيءِ",fr:"Le croyant n'est pas celui qui critique tout le temps, ne maudit pas, n'est pas impudique dans son langage, ni grossier.",n:"Abdullah Ibn Masud ر",b:"Tirmidhi",num:1977,a:"Sahih",ref:"Silsilah n°320",th:"Akhlaq",reward:"Quiconque évite ce qui est interdit dans le langage = Paradis garanti. (Bukhari n°6474)"},
{id:123,ar:"أَثْقَلُ شَيْءٍ فِي مِيزَانِ الْمُؤْمِنِ يَوْمَ الْقِيَامَةِ خُلُقٌ حَسَنٌ",fr:"La chose la plus lourde dans la balance du croyant le Jour du Jugement est le bon caractère.",n:"Abu Ad-Darda' ر",b:"Tirmidhi",num:2002,a:"Sahih",ref:"Tirmidhi n°2002 — Sahih Al-Albani",th:"Akhlaq",reward:"La chose la plus lourde dans la balance"},
// ── DHIKR ──
{id:124,ar:"أَلَا أُخْبِرُكَ بِخَيْرِ أَعْمَالِكَ وَأَزْكَاهَا عِنْدَ مَلِيكِكَ",fr:"Ne t'informé-je pas du meilleur de tes actes, du plus pur aux yeux de ton Roi, du plus élevé en degrés, du meilleur pour toi que de dépenser de l'or et de l'argent ? Dhikr Allah.",n:"Abu Ad-Darda' ر",b:"Ibn Majah",num:3790,a:"Sahih",ref:"Silsilah n°1507",th:"Dhikr",reward:"Le meilleur des actes"},
{id:125,ar:"رَطْبُ اللِّسَانِ بِذِكْرِ اللهِ",fr:"Que ta langue soit humide du dhikr d'Allah.",n:"Ibn Abbas ر",b:"Tirmidhi",num:3375,a:"Hasan",ref:"Tirmidhi n°3375 — Hasan",th:"Dhikr",reward:""},
{id:126,ar:"مَنْ قَالَ حِينَ يُصْبِحُ وَحِينَ يُمْسِي سُبْحَانَ اللهِ وَبِحَمْدِهِ مِائَةَ مَرَّةٍ",fr:"Quiconque dit le matin et le soir 'Subhan Allahi wa bihamdihi' cent fois, personne ne viendra le Jour du Jugement avec quelque chose de mieux que lui, excepté celui qui dit autant ou davantage.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2692,a:"Sahih",ref:"Muslim n°2692",th:"Dhikr",reward:"Personne ne le surpassera le Jour du Jugement"},
// ── MORT & AKHIRA ──
{id:127,ar:"أَكْثِرُوا ذِكْرَ هَاذِمِ اللَّذَّاتِ يَعْنِي الْمَوْتَ",fr:"Évoquez souvent le destructeur des plaisirs, c'est-à-dire la mort.",n:"Abu Hureyra ر",b:"Tirmidhi",num:2307,a:"Sahih",ref:"Silsilah n°1421",th:"Mort",reward:"Rappeler souvent la mort = aide à la préparation pour l'au-delà et amélioration des actes."},
{id:128,ar:"لَا يَتَمَنَّيَنَّ أَحَدُكُمُ الْمَوْتَ مِنْ ضُرٍّ أَصَابَهُ",fr:"Que nul d'entre vous ne souhaite la mort à cause d'une affliction qui l'a touché. S'il le faut, qu'il dise : 'Ô Allah, fais-moi vivre tant que la vie est meilleure pour moi, et fais-moi mourir quand la mort est meilleure pour moi.'",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:5671,a:"Sahih",ref:"Bukhari n°5671",th:"Mort",reward:"Ne pas souhaiter la mort = vivre dans la gratitude envers Allah."},
{id:129,ar:"يَتْبَعُ الْمَيِّتَ ثَلَاثَةٌ فَيَرْجِعُ اثْنَانِ وَيَبْقَى مَعَهُ وَاحِدٌ",fr:"Trois choses suivent le mort : sa famille, ses biens et ses actes. Deux reviennent et une reste avec lui. Sa famille et ses biens reviennent, et ses actes restent.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:6514,a:"Sahih",ref:"Bukhari n°6514",th:"Akhira",reward:"Seuls les actes restent avec le mort — sadaqa jariya, science utile, enfant pieux."},
{id:130,ar:"مَا مِنْكُمْ مِنْ أَحَدٍ إِلَّا وَقَدْ كُتِبَ مَقْعَدُهُ مِنَ النَّارِ وَمَقْعَدُهُ مِنَ الْجَنَّةِ",fr:"Nul parmi vous dont la place au Paradis et au Feu n'a été écrite. Un Compagnon dit : 'Ne nous fions-nous pas alors à notre destien ?' Le Prophète ﷺ dit : 'Agissez, car cela est facilité à chacun selon pour quoi il a été créé.'",n:"Ali Ibn Abi Talib ر",b:"Sahih Al-Bukhari",num:4949,a:"Sahih",ref:"Bukhari n°4949",th:"Qadar",reward:"La foi en le Destin = paix du cœur et confiance totale en Allah."},
// ── TAWHID & AQIDAH ──
{id:131,ar:"مَنْ مَاتَ يُشْرِكُ بِاللهِ شَيْئًا دَخَلَ النَّارَ",fr:"Quiconque meurt en associant quelque chose à Allah entrera dans le Feu. Et moi je dis : quiconque meurt sans rien associer à Allah entrera au Paradis.",n:"Abdullah Ibn Masud ر",b:"Sahih Al-Bukhari",num:1238,a:"Sahih",ref:"Bukhari n°1238",th:"Tawhid",reward:"Éviter l'associationnisme = entrée au Paradis. (Bukhari n°1238)"},
{id:132,ar:"لَا يَدْخُلُ الْجَنَّةَ مَنْ كَانَ فِي قَلْبِهِ مِثْقَالُ ذَرَّةٍ مِنْ كِبْرٍ",fr:"N'entrera pas au Paradis celui qui a dans son cœur un grain de moutarde d'orgueil.",n:"Abdullah Ibn Masud ر",b:"Sahih Muslim",num:91,a:"Sahih",ref:"Muslim n°91",th:"Tawhid",reward:"Quiconque se débarrasse de l'orgueil entrera au Paradis. (Muslim n°91)"},
{id:133,ar:"الرِّيَاءُ شِرْكٌ",fr:"L'ostentation (Riya) est une forme d'associationnisme.",n:"Abu Sa'id ر",b:"Ibn Majah",num:4204,a:"Sahih",ref:"Silsilah n°951",th:"Tawhid",reward:"Éviter le Riya (ostentation) = pureté de l'intention + récompense intégrale."},
{id:134,ar:"أَخْوَفُ مَا أَخَافُ عَلَيْكُمُ الشِّرْكَ الْأَصْغَرُ قَالُوا وَمَا الشِّرْكُ الْأَصْغَرُ قَالَ الرِّيَاءُ",fr:"Ce que je crains le plus pour vous est l'associationnisme mineur. On demanda : 'Qu'est-ce que l'associationnisme mineur ?' Il répondit : 'L'ostentation (Riya).'",n:"Mahmud Ibn Labid ر",b:"Musnad Ahmad",num:23630,a:"Sahih",ref:"Silsilah n°951",th:"Tawhid",reward:"Éviter le Riya mineur = pureté du tawhid."},
// ── TAWBAH & ISTIGHFAR ──
{id:135,ar:"إِنَّ اللهَ يَبْسُطُ يَدَهُ بِاللَّيْلِ لِيَتُوبَ مُسِيءُ النَّهَارِ",fr:"Allah étend Sa main la nuit pour que le pécheur du jour se repente, et Il étend Sa main le jour pour que le pécheur de la nuit se repente — jusqu'à ce que le soleil se lève de l'Occident.",n:"Abu Musa ر",b:"Sahih Muslim",num:2759,a:"Sahih",ref:"Muslim n°2759",th:"Tawbah",reward:"Se repentir chaque nuit = pardon d'Allah. (Muslim n°2759)"},
{id:136,ar:"لَوْ لَمْ تُذْنِبُوا لَذَهَبَ اللهُ بِكُمْ وَلَجَاءَ بِقَوْمٍ يُذْنِبُونَ فَيَسْتَغْفِرُونَ فَيَغْفِرُ لَهُمْ",fr:"Si vous ne péchiez pas, Allah vous ferait disparaître et amènerait un peuple qui pécherait, qui demanderait pardon, et Il leur pardonnerait.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2749,a:"Sahih",ref:"Muslim n°2749",th:"Tawbah",reward:"Le repentir pur attire la bienveillance d'Allah."},
{id:137,ar:"كُلُّ بَنِي آدَمَ خَطَّاءٌ وَخَيْرُ الْخَطَّائِينَ التَّوَّابُونَ",fr:"Tous les fils d'Adam sont pécheurs, et les meilleurs pécheurs sont ceux qui se repentent.",n:"Anas Ibn Malik ر",b:"Tirmidhi",num:2499,a:"Hasan",ref:"Silsilah n°360",th:"Tawbah",reward:"Être le meilleur des pécheurs"},
{id:138,ar:"التَّائِبُ مِنَ الذَّنْبِ كَمَنْ لَا ذَنْبَ لَهُ",fr:"Celui qui se repent d'un péché est comme celui qui n'a pas de péché.",n:"Ibn Abbas ر",b:"Ibn Majah",num:4250,a:"Hasan",ref:"Silsilah n°98",th:"Tawbah",reward:"Être comme si on n'avait pas péché"},
// ── SCIENCE ──
{id:139,ar:"مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ",fr:"Quiconque emprunte un chemin pour chercher de la connaissance, Allah lui facilite un chemin vers le Paradis.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2699,a:"Sahih",ref:"Muslim n°2699",th:"'Ilm",reward:"Allah facilite le chemin vers le Paradis"},
{id:140,ar:"إِنَّ الْمَلَائِكَةَ لَتَضَعُ أَجْنِحَتَهَا رِضًا لِطَالِبِ الْعِلْمِ",fr:"Les anges abaissent leurs ailes en signe de satisfaction pour celui qui cherche la connaissance.",n:"Safwan Ibn Assal ر",b:"Tirmidhi",num:3535,a:"Sahih",ref:"Silsilah n°3588",th:"'Ilm",reward:"Les anges abaissent leurs ailes"},
{id:141,ar:"فَضْلُ الْعَالِمِ عَلَى الْعَابِدِ كَفَضْلِ الْقَمَرِ عَلَى سَائِرِ الْكَوَاكِبِ",fr:"La supériorité du savant sur l'adorateur est comme la supériorité de la lune sur les autres astres.",n:"Abu Ad-Darda' ر",b:"Abu Dawud",num:3641,a:"Sahih",ref:"Silsilah n°3236",th:"'Ilm",reward:"Les anges baissent leurs ailes = bénédiction spéciale pour l'étudiant. (Tirmidhi n°3535)"},
// ── FAMILLE ──
{id:143,ar:"اسْتَوْصُوا بِالنِّسَاءِ خَيْرًا",fr:"Comportez-vous bien avec les femmes.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:3331,a:"Sahih",ref:"Bukhari n°3331",th:"Famille",reward:"Comprendre la religion = signe de la bienveillance d'Allah. (Bukhari n°71)"},
{id:145,ar:"رِضَا اللهِ فِي رِضَا الْوَالِدَيْنِ وَسَخَطُهُ فِي سَخَطِهِمَا",fr:"La satisfaction d'Allah est dans la satisfaction des parents, et la colère d'Allah est dans leur colère.",n:"Ibn Amr ر",b:"Tirmidhi",num:1899,a:"Sahih",ref:"Silsilah n°516",th:"Famille",reward:"La satisfaction d'Allah"},
{id:146,ar:"إِنَّ مِنْ أَبَرِّ الْبِرِّ صِلَةَ الرَّجُلِ أَهْلَ وُدِّ أَبِيهِ بَعْدَ أَنْ يُوَلِّيَ",fr:"La meilleure piété filiale est que l'homme entretienne des liens avec les amis de son père après sa mort.",n:"Abdullah Ibn Umar ر",b:"Sahih Muslim",num:2552,a:"Sahih",ref:"Muslim n°2552",th:"Famille",reward:"Satisfaire les parents = satisfaction d'Allah. (Silsilah n°516)"},
{id:147,ar:"مَنْ سَرَّهُ أَنْ يُبْسَطَ لَهُ فِي رِزْقِهِ وَيُنْسَأَ لَهُ فِي أَثَرِهِ فَلْيَصِلْ رَحِمَهُ",fr:"Quiconque souhaite que sa subsistance soit élargie et sa durée de vie prolongée, qu'il entretienne les liens de parenté.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:5985,a:"Sahih",ref:"Bukhari n°5985",th:"Famille",reward:"Élargissement de la subsistance et prolongation de la vie"},
// ── AMOUR ET FRATERNITE ──
{id:148,ar:"لَا تَدْخُلُوا الْجَنَّةَ حَتَّى تُؤْمِنُوا وَلَا تُؤْمِنُوا حَتَّى تَحَابُّوا",fr:"Vous n'entrerez pas au Paradis tant que vous ne croirez pas, et vous ne croirez pas vraiment tant que vous ne vous aimerez pas. Voulez-vous que je vous guide vers quelque chose qui, si vous le faites, vous aimeriez ? Répandez le salam entre vous.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:54,a:"Sahih",ref:"Muslim n°54",th:"Fraternité",reward:"Condition pour entrer au Paradis"},
{id:149,ar:"إِنَّ اللهَ يَقُولُ يَوْمَ الْقِيَامَةِ أَيْنَ الْمُتَحَابُّونَ بِجَلَالِي",fr:"Allah dira le Jour du Jugement : 'Où sont ceux qui s'aimaient pour Ma Gloire ? Aujourd'hui Je les mets à l'ombre de Mon ombre, le jour où il n'y a pas d'ombre d'autre que la Mienne.'",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2566,a:"Sahih",ref:"Muslim n°2566",th:"Fraternité",reward:"Sous l'ombre d'Allah au Jour du Jugement"},
{id:150,ar:"مَثَلُ الْمُؤْمِنِينَ فِي تَوَادِّهِمْ وَتَرَاحُمِهِمْ كَمَثَلِ الْجَسَدِ الْوَاحِدِ",fr:"Les croyants dans leur amour mutuel et leur miséricorde mutuelle ressemblent à un seul corps : si un organe souffre, tout le corps souffre d'insomnie et de fièvre.",n:"Nu'man Ibn Bashir ر",b:"Sahih Muslim",num:2586,a:"Sahih",ref:"Muslim n°2586",th:"Fraternité",reward:"Ceux qui s'aiment pour Allah = sous l'ombre d'Allah le Jour du Jugement. (Muslim n°2566)"},
// ── PAROLE ──
{id:151,ar:"مَنْ كَانَ يُؤْمِنُ بِاللهِ وَالْيَوْمِ الْآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ",fr:"Que celui qui croit en Allah et au Jour Dernier dise du bien ou qu'il se taise.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6018,a:"Sahih",ref:"Bukhari n°6018",th:"Parole",reward:"Miséricorde mutuelle entre croyants = protection comme un seul corps."},
{id:152,ar:"إِنَّ الرَّجُلَ لَيَتَكَلَّمُ بِالْكَلِمَةِ مِنْ رِضْوَانِ اللهِ لَا يُلْقِي لَهَا بَالًا يَرْفَعُهُ اللهُ بِهَا دَرَجَاتٍ",fr:"L'homme dit une parole qui plaît à Allah, sans y prêter attention, et Allah l'élève par elle de degrés. Et l'homme dit une parole qui déplaît à Allah, sans y prêter attention, et elle le précipite dans le Feu.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6478,a:"Sahih",ref:"Bukhari n°6478",th:"Parole",reward:"Élévation de degrés — ou précipitation dans le Feu"},
{id:153,ar:"إِنَّ مِنَ الْبَيَانِ لَسِحْرًا",fr:"Certains discours sont comme de la sorcellerie.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:5767,a:"Sahih",ref:"Bukhari n°5767",th:"Parole",reward:"Une parole bonne = élévation de degrés. Une parole mauvaise = précipitation dans le Feu. (Bukhari n°6478)"},
// ── HYPOCRISIE ──
{id:154,ar:"آيَةُ الْمُنَافِقِ ثَلَاثٌ",fr:"Le signe de l'hypocrite est de trois : quand il parle il ment, quand il promet il ne tient pas sa promesse, quand on lui fait confiance il trahit.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:33,a:"Sahih",ref:"Bukhari n°33",th:"Nifaq",reward:"Le discours puissant = grande influence — bien utiliser la parole."},
{id:155,ar:"مَنْ قَاتَلَ لِتَكُونَ كَلِمَةُ اللهِ هِيَ الْعُلْيَا",fr:"Celui qui combat pour que la parole d'Allah soit la plus haute — c'est lui qui est dans le chemin d'Allah.",n:"Abu Musa ر",b:"Sahih Al-Bukhari",num:2810,a:"Sahih",ref:"Bukhari n°2810",th:"Jihad",reward:"Fuir les signes de l'hypocrisie = renforcement de la foi."},
// ── VOISINAGE ──
{id:156,ar:"وَاللهِ لَا يُؤْمِنُ وَاللهِ لَا يُؤْمِنُ وَاللهِ لَا يُؤْمِنُ قِيلَ مَنْ يَا رَسُولَ اللهِ قَالَ الَّذِي لَا يَأْمَنُ جَارُهُ بَوَائِقَهُ",fr:"Par Allah, il ne croit pas ! Par Allah, il ne croit pas ! Par Allah, il ne croit pas ! On dit : 'Qui, Ô Messager d'Allah ?' Il dit : 'Celui dont le voisin n'est pas à l'abri de ses méfaits.'",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6016,a:"Sahih",ref:"Bukhari n°6016",th:"Akhlaq",reward:"Protéger son voisin = condition d'une foi réelle. (Bukhari n°6016)"},
{id:157,ar:"مَنْ كَانَ يُؤْمِنُ بِاللهِ وَالْيَوْمِ الآخِرِ فَلَا يُؤْذِي جَارَهُ",fr:"Que celui qui croit en Allah et au Jour Dernier ne fasse pas de mal à son voisin.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6018,a:"Sahih",ref:"Bukhari n°6018",th:"Akhlaq",reward:"Ne pas nuire au voisin = condition de la foi. (Bukhari n°6018)"},
// ── DU'A ──
{id:158,ar:"الدُّعَاءُ هُوَ الْعِبَادَةُ",fr:"Le du'a est l'adoration elle-même.",n:"An-Nu'man Ibn Bashir ر",b:"Tirmidhi",num:3372,a:"Sahih",ref:"Tirmidhi n°3372 — Sahih Al-Albani",th:"Du'a",reward:"La du'a est l'adoration elle-même = multiplier la du'a = multiplier l'adoration. (Tirmidhi n°3372)"},
{id:159,ar:"مَا مِنْ مُسْلِمٍ يَدْعُو اللهَ بِدَعْوَةٍ لَيْسَ فِيهَا إِثْمٌ وَلَا قَطِيعَةُ رَحِمٍ إِلَّا أَعْطَاهُ اللهُ بِهَا إِحْدَى ثَلَاثٍ",fr:"Tout musulman qui fait un du'a sans péché ni rupture de liens — Allah lui accorde une de ces trois choses : soit Il lui accorde rapidement ce qu'il demande, soit Il le remet pour l'au-delà, soit Il écarte de lui un mal équivalent.",n:"Abu Sa'id ر",b:"Musnad Ahmad",num:11133,a:"Sahih",ref:"Silsilah n°1503",th:"Du'a",reward:"La du'a est toujours exaucée — d'une manière ou d'une autre"},
{id:160,ar:"أَقْرَبُ مَا يَكُونُ الْعَبْدُ مِنْ رَبِّهِ وَهُوَ سَاجِدٌ",fr:"Le serviteur est le plus proche de son Seigneur quand il est en prostration — multipliez donc les du'a.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:482,a:"Sahih",ref:"Muslim n°482",th:"Du'a",reward:"La du'a en sajda est spécialement proche d'être exaucée"},
// ── COMMERCE ──
{id:161,ar:"التَّاجِرُ الصَّدُوقُ الْأَمِينُ مَعَ النَّبِيِّينَ وَالصِّدِّيقِينَ وَالشُّهَدَاءِ",fr:"Le commerçant sincère et honnête sera avec les prophètes, les véridiques et les martyrs.",n:"Abu Sa'id ر",b:"Tirmidhi",num:1209,a:"Hasan",ref:"Tirmidhi n°1209 — Hasan",th:"Commerce",reward:"Avec les prophètes et les martyrs"},
{id:162,ar:"إِنَّمَا الْبَيْعُ عَنْ تَرَاضٍ",fr:"La vente ne se fait que par consentement mutuel.",n:"Abu Sa'id ر",b:"Ibn Majah",num:2185,a:"Sahih",ref:"Silsilah n°3465",th:"Commerce",reward:"Le commerçant sincère = avec les prophètes et les martyrs au Paradis. (Tirmidhi n°1209)"},
// ── PAUVRETÉ & RICHESSE ──
{id:163,ar:"لَيْسَ الْغِنَى عَنْ كَثْرَةِ الْعَرَضِ وَلَكِنَّ الْغِنَى غِنَى النَّفْسِ",fr:"La véritable richesse n'est pas l'abondance des biens, mais la richesse du cœur (la contentement).",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6446,a:"Sahih",ref:"Bukhari n°6446",th:"Zuhd",reward:"Achat/vente valides = baraka dans les échanges et les relations."},
{id:164,ar:"انْظُرُوا إِلَى مَنْ هُوَ أَسْفَلَ مِنْكُمْ وَلَا تَنْظُرُوا إِلَى مَنْ هُوَ فَوْقَكُمْ",fr:"Regardez vers ceux qui sont en-dessous de vous et ne regardez pas ceux qui sont au-dessus de vous, car c'est plus approprié pour que vous ne méprisiez pas les faveurs d'Allah.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6490,a:"Sahih",ref:"Bukhari n°6490",th:"Zuhd",reward:"La vraie richesse = satisfaction du cœur. (Bukhari n°6446)"},
{id:165,ar:"الدُّنْيَا سِجْنُ الْمُؤْمِنِ وَجَنَّةُ الْكَافِرِ",fr:"Le monde est la prison du croyant et le paradis du mécréant.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2956,a:"Sahih",ref:"Muslim n°2956",th:"Zuhd",reward:"Regarder vers le bas = gratitude et contentement envers Allah. (Bukhari n°6490)"},
// ── MARTYRE ──
{id:166,ar:"مَا يَجِدُ الشَّهِيدُ مِنْ مَسِّ الْقَتْلِ إِلَّا كَمَا يَجِدُ أَحَدُكُمْ مِنْ مَسِّ الْقَرْصَةِ",fr:"Le martyr ne ressent de la douleur de la mort que comme l'un d'entre vous ressent d'une piqûre.",n:"Abu Hureyra ر",b:"Tirmidhi",num:1668,a:"Sahih",ref:"Silsilah n°1893",th:"Jihad",reward:"Le martyr bénéficie de 6 privilèges : pardon immédiat, vision de sa place au Paradis, sécurité contre le châtiment du tombeau, sécurité contre la Grande Épouvante, couronne d\'honneur, intercession pour 70 membres de sa famille. (Tirmidhi n°1663 — Hasan Sahih)"},
{id:167,ar:"لِلشَّهِيدِ عِنْدَ اللهِ سِتُّ خِصَالٍ",fr:"Le martyr a six privilèges auprès d'Allah : il est pardonné dès la première goutte de son sang, il voit sa demeure au Paradis, il est protégé du châtiment de la tombe, il est en sécurité de la grande frayeur, on lui met sur la tête la couronne de dignité dont un rubis vaut mieux que le monde, il épouse 72 houris, et il intercède pour 70 de ses proches.",n:"Miqdad ر",b:"Tirmidhi",num:1663,a:"Hasan Sahih",ref:"Tirmidhi n°1663",th:"Jihad",reward:"Six privilèges au Paradis"},
// ── DROIT DES GENS ──
{id:168,ar:"أَتَدْرُونَ مَنِ الْمُفْلِسُ",fr:"Savez-vous qui est le failli ? Le vrai failli de ma communauté est celui qui vient le Jour du Jugement avec des prières, des jeûnes et des aumônes, mais ayant insulté, diffamé, dévoré les biens, versé le sang ou battu quelqu'un.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2581,a:"Sahih",ref:"Muslim n°2581",th:"Akhlaq",reward:"Le vrai failli = celui dont les actes sont annulés par les droits des gens. (Muslim n°2581)"},
{id:169,ar:"مَنْ كَانَتْ لَهُ مَظْلَمَةٌ لِأَخِيهِ مِنْ عِرْضِهِ أَوْ شَيْءٍ فَلْيَتَحَلَّلْهُ مِنْهُ الْيَوْمَ",fr:"Quiconque a fait du tort à son frère concernant son honneur ou autre chose, qu'il se fasse pardonner aujourd'hui avant qu'il n'y ait plus ni dinar ni dirham.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2449,a:"Sahih",ref:"Bukhari n°2449",th:"Akhlaq",reward:"Se faire pardonner aujourd'hui = protection du Jour où il n'y a pas de rachat. (Bukhari n°2449)"},
// ── MARIAGE ──
{id:170,ar:"النِّكَاحُ مِنْ سُنَّتِي فَمَنْ لَمْ يَعْمَلْ بِسُنَّتِي فَلَيْسَ مِنِّي",fr:"Le mariage fait partie de ma Sunnah. Quiconque ne pratique pas ma Sunnah n'est pas des miens.",n:"Anas Ibn Malik ر",b:"Ibn Majah",num:1846,a:"Sahih",ref:"Silsilah n°2383",th:"Mariage",reward:"Le mariage = Sunnah du Prophète ﷺ. (Silsilah n°2383)"},
{id:171,ar:"تَزَوَّجُوا الْوَدُودَ الْوَلُودَ فَإِنِّي مُكَاثِرٌ بِكُمُ الْأُمَمَ",fr:"Épousez une femme aimante et féconde, car je serai fier de votre nombre devant les autres nations.",n:"Ma'qil Ibn Yasar ر",b:"Abu Dawud",num:2050,a:"Sahih",ref:"Silsilah n°2492",th:"Mariage",reward:"Épouser une femme religieuse = main gagnante dans les deux mondes. (Silsilah n°2492)"},
// ── ENFANTS ──
{id:172,ar:"مَنْ عَالَ ثَلَاثَ بَنَاتٍ فَصَبَرَ عَلَيْهِنَّ وَأَطْعَمَهُنَّ وَسَقَاهُنَّ وَكَسَاهُنَّ",fr:"Quiconque élève trois filles avec patience, les nourrit, les abreuve et les habille — elles seront pour lui une protection contre le Feu le Jour du Jugement.",n:"Ibn Abbas ر",b:"Abu Dawud",num:5149,a:"Sahih",ref:"Silsilah n°294",th:"Famille",reward:"Protection contre le Feu"},
{id:173,ar:"مَا نَحَلَ وَالِدٌ وَلَدًا مِنْ نَحْلٍ أَفْضَلَ مِنْ أَدَبٍ حَسَنٍ",fr:"Aucun père n'a offert à son enfant un don meilleur qu'une belle éducation.",n:"Amr Ibn Sa'id ر",b:"Tirmidhi",num:1952,a:"Hasan",ref:"Tirmidhi n°1952 — Hasan",th:"Famille",reward:"La meilleure transmission d\'un père à son enfant est le bon caractère et la science — capitaux pour les deux mondes. (Tirmidhi n°1952 — Hasan)"},
// ── JEUNE ──
{id:174,ar:"كُلُّ أُمَّتِي يَدْخُلُونَ الْجَنَّةَ إِلَّا مَنْ أَبَى",fr:"Toute ma communauté entrera au Paradis sauf ceux qui refusent. On dit : 'Qui refuse ?' Il répondit : 'Quiconque m'obéit entre au Paradis et quiconque me désobéit a refusé.'",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:7280,a:"Sahih",ref:"Bukhari n°7280",th:"Sunnah",reward:"La meilleure éducation = un don sans égal de père à enfant. (Tirmidhi n°1952)"},
{id:175,ar:"إِنِّي تَرَكْتُ فِيكُمْ مَا لَنْ تَضِلُّوا بَعْدَهُ إِنِ اعْتَصَمْتُمْ بِهِ كِتَابَ اللهِ وَسُنَّةَ نَبِيِّهِ",fr:"Je vous laisse ce après quoi vous ne vous égarerez jamais si vous vous y accrochez : le Livre d'Allah et la Sunnah de Son Prophète.",n:"Abu Hureyra ر",b:"Hakim",num:319,a:"Sahih",ref:"Silsilah n°2937",th:"Sunnah",reward:"Obéir au Prophète ﷺ = entrée au Paradis. (Bukhari n°7280)"},
// ── SABR ──
{id:178,ar:"إِنَّ عِظَمَ الْجَزَاءِ مَعَ عِظَمِ الْبَلَاءِ",fr:"La grandeur de la récompense est proportionnelle à la grandeur de l'épreuve. Quand Allah aime un peuple, Il l'éprouve. Qui est satisfait reçoit Sa satisfaction, et qui est mécontent reçoit Son mécontentement.",n:"Anas Ibn Malik ر",b:"Tirmidhi",num:2396,a:"Hasan",ref:"Tirmidhi n°2396 — Hasan",th:"Sabr",reward:"Plus l'épreuve est grande, plus la récompense l'est"},
{id:179,ar:"مَا يَزَالُ الْبَلَاءُ بِالْمُؤْمِنِ وَالْمُؤْمِنَةِ فِي نَفْسِهِ وَوَلَدِهِ وَمَالِهِ حَتَّى يَلْقَى اللهَ وَمَا عَلَيْهِ خَطِيئَةٌ",fr:"Les épreuves continuent d'atteindre le croyant et la croyante — dans sa personne, ses enfants et ses biens — jusqu'à ce qu'il rencontre Allah sans aucune faute.",n:"Abu Hureyra ر",b:"Tirmidhi",num:2399,a:"Sahih",ref:"Silsilah n°2280",th:"Sabr",reward:"Purification totale des péchés"},
// ── JIHAD ──
{id:180,ar:"رِبَاطُ يَوْمٍ فِي سَبِيلِ اللهِ خَيْرٌ مِنَ الدُّنْيَا وَمَا عَلَيْهَا",fr:"Monter la garde un jour dans le chemin d'Allah vaut mieux que le monde et tout ce qu'il contient.",n:"Salman ر",b:"Sahih Al-Bukhari",num:2892,a:"Sahih",ref:"Bukhari n°2892",th:"Jihad",reward:"Vaut mieux que le monde entier"},
// ── SADAQA JARIYA ──
{id:182,ar:"مَنْ بَنَى مَسْجِدًا يَبْتَغِي بِهِ وَجْهَ اللهِ",fr:"Quiconque construit une mosquée en cherchant la face d'Allah, Allah lui construit une maison semblable au Paradis.",n:"Uthman Ibn Affan ر",b:"Sahih Al-Bukhari",num:450,a:"Sahih",ref:"Bukhari n°450",th:"Sadaqa",reward:"Maison au Paradis"},
// ── PROMESSE ──
{id:183,ar:"أَدِّ الْأَمَانَةَ إِلَى مَنِ ائْتَمَنَكَ وَلَا تَخُنْ مَنْ خَانَكَ",fr:"Rends le dépôt à celui qui te l'a confié, et ne trahis pas celui qui t'a trahi.",n:"Abu Hureyra ر",b:"Abu Dawud",num:3534,a:"Sahih",ref:"Silsilah n°1905",th:"Akhlaq",reward:"Construire une mosquée = maison au Paradis. (Bukhari n°450)"},
// ── SOLEIL LEVANT DE L'OCCIDENT ──
{id:184,ar:"لَا تَقُومُ السَّاعَةُ حَتَّى تَطْلُعَ الشَّمْسُ مِنْ مَغْرِبِهَا",fr:"L'Heure ne se lèvera pas avant que le soleil ne se lève de l'Occident. Quand il se lèvera et que les gens le verront, tous croiront — mais alors, la foi d'une âme qui ne croyait pas avant ne lui profitera pas.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:4636,a:"Sahih",ref:"Bukhari n°4636",th:"Akhira",reward:"Rendre le dépôt = protection contre la trahison et ses conséquences."},
// ── HONNÊTETÉ ──
{id:185,ar:"عَلَيْكُمْ بِالصِّدْقِ فَإِنَّ الصِّدْقَ يَهْدِي إِلَى الْبِرِّ",fr:"Soyez honnêtes, car l'honnêteté mène à la vertu, et la vertu mène au Paradis. Un homme continue d'être honnête et de chercher l'honnêteté jusqu'à ce qu'il soit inscrit auprès d'Allah comme véridique.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:6094,a:"Sahih",ref:"Bukhari n°6094",th:"Akhlaq",reward:"Inscrit auprès d'Allah comme véridique — Paradis"},
{id:186,ar:"إِيَّاكُمْ وَالْكَذِبَ فَإِنَّ الْكَذِبَ يَهْدِي إِلَى الْفُجُورِ",fr:"Gardez-vous du mensonge, car il mène à la débauche, et la débauche mène au Feu. Un homme continue de mentir jusqu'à ce qu'il soit inscrit auprès d'Allah comme menteur.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:6094,a:"Sahih",ref:"Bukhari n°6094",th:"Akhlaq",reward:"Inscrit comme Siddiq (véridique) = parmi les plus proches d'Allah. (Bukhari n°6094)"},
// ── TAWAKKUL ──
{id:187,ar:"لَوْ أَنَّكُمْ تَوَكَّلْتُمْ عَلَى اللهِ حَقَّ تَوَكُّلِهِ لَرَزَقَكُمْ كَمَا يَرْزُقُ الطَّيْرَ",fr:"Si vous vous en remettiez vraiment à Allah comme Il mérite qu'on se remette à Lui, Il vous nourrirait comme Il nourrit l'oiseau qui sort le matin le ventre vide et revient le soir rassasié.",n:"Umar Ibn Al-Khattab ر",b:"Tirmidhi",num:2344,a:"Sahih",ref:"Tirmidhi n°2344 — Sahih Al-Albani",th:"Tawakkul",reward:"Tawakkul réel = être nourri comme les oiseaux — Allah suffit. (Tirmidhi n°2344)"},
// ── PREVENTION DU MAL ──
{id:188,ar:"مَنْ رَأَى مِنْكُمْ مُنْكَرًا فَلْيُغَيِّرْهُ بِيَدِهِ",fr:"Quiconque voit un mal, qu'il le change avec sa main. S'il n'en est pas capable, qu'il le (change) avec sa langue. S'il n'en est pas capable, (qu'il le désapprouve) avec son cœur — c'est le minimum de la foi.",n:"Abu Sa'id Al-Khudri ر",b:"Sahih Muslim",num:49,a:"Sahih",ref:"Muslim n°49",th:"Sunnah",reward:"Changer le mal avec la main = le niveau le plus élevé de la foi. (Muslim n°49)"},
// ── TAQWA ──
{id:190,ar:"اتَّقِ اللهَ حَيْثُمَا كُنْتَ",fr:"Crains Allah où que tu sois. Fais suivre une mauvaise action d'une bonne qui l'effacera. Et traite les gens avec un beau caractère.",n:"Abu Dharr ر",b:"Tirmidhi",num:1987,a:"Hasan Sahih",ref:"Tirmidhi n°1987 — Arba'in n°18",th:"Taqwa",reward:"Effacement des mauvaises actions"},
// ── SALAM ──
{id:191,ar:"أَيُّهَا النَّاسُ أَفْشُوا السَّلَامَ وَأَطْعِمُوا الطَّعَامَ وَصِلُوا الْأَرْحَامَ",fr:"Ô gens, répandez le salam, nourrissez les autres, entretenez les liens de parenté et priez la nuit pendant que les autres dorment — vous entrerez au Paradis en paix.",n:"Abdullah Ibn Salam ر",b:"Tirmidhi",num:2485,a:"Sahih",ref:"Silsilah n°569",th:"Fraternité",reward:"Entrée au Paradis en paix"},
{id:192,ar:"لَا تَدْخُلُوا الْجَنَّةَ حَتَّى تُؤْمِنُوا وَلَا تُؤْمِنُوا حَتَّى تَحَابُّوا أَوَلَا أَدُلُّكُمْ عَلَى شَيْءٍ",fr:"Répandez le salam entre vous — cela renforce votre amour mutuel.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:54,a:"Sahih",ref:"Muslim n°54",th:"Fraternité",reward:"Renforcement de l'amour mutuel"},
// ── SANTE ──
{id:193,ar:"نِعْمَتَانِ مَغْبُونٌ فِيهِمَا كَثِيرٌ مِنَ النَّاسِ الصِّحَّةُ وَالْفَرَاغُ",fr:"Deux bienfaits dont beaucoup de gens sont lésés : la santé et le temps libre.",n:"Ibn Abbas ر",b:"Sahih Al-Bukhari",num:6412,a:"Sahih",ref:"Bukhari n°6412",th:"Zuhd",reward:"Répandre le salam = renforcement de l'amour mutuel. (Muslim n°54)"},
{id:194,ar:"نِعَمٌ ثَلَاثٌ لَا تَقْدِرُ عَلَيْهَا أَحَدٌ بَعْدَ ذَهَابِهَا الْوَقْتُ وَالصِّحَّةُ وَالشَّبَابُ",fr:"Profite de cinq choses avant cinq : ta jeunesse avant ta vieillesse, ta santé avant ta maladie, ta richesse avant ta pauvreté, ton temps libre avant ta préoccupation, et ta vie avant ta mort.",n:"Ibn Abbas ر",b:"Hakim",num:7846,a:"Sahih",ref:"Silsilah n°747",th:"Zuhd",reward:"Profiter de la santé et du temps libre = investissement pour l'au-delà. (Bukhari n°6412)"},
// ── GRATITUDE ──
{id:195,ar:"لَا يَشْكُرُ اللهَ مَنْ لَا يَشْكُرُ النَّاسَ",fr:"Celui qui ne remercie pas les gens ne remercie pas Allah.",n:"Abu Hureyra ر",b:"Abu Dawud",num:4811,a:"Sahih",ref:"Silsilah n°416",th:"Akhlaq",reward:"Profiter des 5 avant les 5 = recette de succès dans les deux mondes. (Silsilah n°747)"},
{id:196,ar:"الطَّاعِمُ الشَّاكِرُ بِمَنْزِلَةِ الصَّائِمِ الصَّابِرِ",fr:"Celui qui mange et remercie est au même rang que celui qui jeûne avec patience.",n:"Abu Hureyra ر",b:"Tirmidhi",num:2486,a:"Hasan",ref:"Silsilah n°1948",th:"Zuhd",reward:"Récompense équivalente au jeûne"},
// ── PRIERE EN CONGREGATION ──
{id:197,ar:"إِذَا صَلَّى الرَّجُلُ مَعَ الإِمَامِ حَتَّى يَنْصَرِفَ كُتِبَ لَهُ قِيَامُ لَيْلَةٍ",fr:"Quand un homme prie avec l'imam jusqu'à la fin (Tarawih ou Qiyam), il lui est inscrit la récompense d'une nuit complète de prière.",n:"Abu Dharr ر",b:"Tirmidhi",num:806,a:"Sahih",ref:"Tirmidhi n°806 — Sahih Al-Albani",th:"Salat",reward:"Récompense d'une nuit complète de prière"},
{id:198,ar:"مَنْ تَطَهَّرَ فِي بَيْتِهِ ثُمَّ مَشَى إِلَى بَيْتٍ مِنْ بُيُوتِ اللهِ",fr:"Quiconque se purifie chez lui puis marche vers une des maisons d'Allah pour accomplir une obligation parmi les obligations d'Allah — ses pas effacent une faute et en élèvent une autre.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:666,a:"Sahih",ref:"Muslim n°666",th:"Salat",reward:"Chaque pas efface un péché et élève un degré"},
// ── 7 PERSONNES A L'OMBRE ──
{id:199,ar:"سَبْعَةٌ يُظِلُّهُمُ اللهُ فِي ظِلِّهِ",fr:"Sept personnes seront à l'ombre d'Allah le Jour où il n'y aura pas d'ombre sinon la Sienne : un dirigeant juste, un jeune homme élevé dans l'adoration d'Allah, un homme dont le cœur est attaché aux mosquées, deux hommes qui s'aiment pour Allah, un homme qu'une belle femme invite et qui dit 'Je crains Allah', un homme qui donne en charité secrètement, et un homme qui se souvient d'Allah en secret jusqu'aux larmes.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:660,a:"Sahih",ref:"Bukhari n°660",th:"Akhira",reward:"Sous l'ombre d'Allah au Jour du Jugement"},
{id:200,ar:"ثَلَاثَةٌ لَا يُكَلِّمُهُمُ اللهُ يَوْمَ الْقِيَامَةِ",fr:"Trois catégories qu'Allah ne regardera pas le Jour du Jugement, ne les purifiera pas et qui auront un châtiment douloureux : celui qui laisse traîner son vêtement par orgueil, celui qui fait des faveurs en les rappelant, et celui qui écoule sa marchandise par de faux serments.",n:"Abu Dharr ر",b:"Sahih Muslim",num:106,a:"Sahih",ref:"Muslim n°106",th:"Akhira",reward:"Fuir les 3 catégories mentionnées = protection de la colère d'Allah. (Muslim n°106)"},
// ══ BLOC 3 : HADITHS 201-350 — Salaf Islam / HadithDuJour ══
{id:201,ar:"إِنَّ الله جَمِيلٌ يُحِبُّ الْجَمَالَ",fr:"Allah est beau et Il aime la beauté.",en:"Allah is beautiful and He loves beauty.",n:"Ibn Masud ر",b:"Sahih Muslim",num:91,a:"Sahih",ref:"Muslim n°91",th:"Tawhid",reward:"Allah est Beau et aime la beauté = amour d'Allah pour celui qui soigne son apparence. (Muslim n°91)"},
{id:202,ar:"مَنْ أَحَبَّ لِقَاءَ اللهِ أَحَبَّ اللهُ لِقَاءَهُ",fr:"Quiconque aime rencontrer Allah, Allah aime le rencontrer. Et quiconque déteste rencontrer Allah, Allah déteste le rencontrer.",en:"Whoever loves to meet Allah, Allah loves to meet him.",n:"Abu Musa ر",b:"Sahih Al-Bukhari",num:6507,a:"Sahih",ref:"Bukhari n°6507",th:"Akhira",reward:"Allah aime le rencontrer"},
{id:203,ar:"لَوْ كَانَتِ الدُّنْيَا تَعْدِلُ عِنْدَ اللهِ جَنَاحَ بَعُوضَةٍ مَا سَقَى كَافِرًا مِنْهَا شَرْبَةَ مَاءٍ",fr:"Si ce monde pesait aux yeux d'Allah autant que l'aile d'un moustique, Il n'en aurait pas accordé une gorgée d'eau à un mécréant.",en:"If the world were worth a mosquito's wing to Allah, He would not give a disbeliever even a sip of water from it.",n:"Sahl Ibn Sa'd ر",b:"Tirmidhi",num:2320,a:"Sahih",ref:"Silsilah n°686",th:"Zuhd",reward:"Ce monde ne vaut rien chez Allah = ne pas s'y attacher."},
{id:204,ar:"مَا مِنْ يَوْمٍ يُصْبِحُ الْعِبَادُ فِيهِ إِلَّا مَلَكَانِ يَنْزِلَانِ",fr:"Il n'est pas un jour où les serviteurs se lèvent sans que deux anges ne descendent. L'un dit : 'Ô Allah, accorde une contrepartie à celui qui dépense.' L'autre dit : 'Ô Allah, cause la destruction du bien de celui qui retient.'",en:"Every day two angels descend. One says: O Allah compensate the one who spends. The other says: O Allah destroy the wealth of the one who withholds.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1442,a:"Sahih",ref:"Bukhari n°1442",th:"Sadaqa",reward:"Dua des anges pour celui qui dépense"},
{id:205,ar:"الْمُؤْمِنُ الْقَوِيُّ خَيْرٌ وَأَحَبُّ إِلَى اللهِ مِنَ الْمُؤْمِنِ الضَّعِيفِ",fr:"Le croyant fort est meilleur et plus aimé d'Allah que le croyant faible, bien qu'il y ait du bien en chacun des deux. Sois avide de ce qui te profite, cherche l'aide d'Allah et ne sois pas impuissant.",en:"The strong believer is better and more beloved to Allah than the weak believer, though both are good.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2664,a:"Sahih",ref:"Muslim n°2664",th:"Force",reward:""},
{id:206,ar:"إِنَّكَ لَنْ تَدَعَ شَيْئًا لِلهِ إِلَّا بَدَّلَكَ اللهُ بِهِ مَا هُوَ خَيْرٌ لَكَ مِنْهُ",fr:"Tu n'abandonneras jamais quelque chose pour Allah sans qu'Il ne te donne quelque chose de meilleur en échange.",en:"You will never leave something for the sake of Allah except that Allah will replace it with something better for you.",n:"Ahmad Ibn Hanbal رحمه الله",b:"Musnad Ahmad",num:23074,a:"Sahih",ref:"Silsilah n°1911",th:"Tawakkul",reward:"Allah remplace par quelque chose de mieux"},
{id:207,ar:"إِنَّ اللهَ يُحِبُّ أَنْ يُرَى أَثَرُ نِعْمَتِهِ عَلَى عَبْدِهِ",fr:"Allah aime voir la trace de Ses bienfaits sur Son serviteur.",en:"Allah loves to see the trace of His blessings on His servant.",n:"Abu Al-Ahwas ر",b:"Tirmidhi",num:2819,a:"Sahih",ref:"Silsilah n°1320",th:"Zuhd",reward:""},
{id:208,ar:"مَنْ لَبِسَ ثَوْبَ شُهْرَةٍ فِي الدُّنْيَا أَلْبَسَهُ اللهُ ثَوْبَ مَذَلَّةٍ يَوْمَ الْقِيَامَةِ",fr:"Quiconque porte un vêtement de renommée dans ce monde, Allah lui fera porter un vêtement d'humiliation le Jour du Jugement.",en:"Whoever wears a garment of fame in this world, Allah will clothe him with a garment of humiliation on the Day of Resurrection.",n:"Ibn Umar ر",b:"Abu Dawud",num:4029,a:"Hasan",ref:"Silsilah n°1375",th:"Akhlaq",reward:"Humilité dans le vêtement = signe de taqwa et d'humilité devant Allah."},
{id:209,ar:"مَا أَنْزَلَ اللهُ دَاءً إِلَّا أَنْزَلَ لَهُ شِفَاءً",fr:"Allah n'a pas envoyé de maladie sans envoyer le remède correspondant.",en:"Allah has not sent down a disease except that He has also sent down its cure.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5678,a:"Sahih",ref:"Bukhari n°5678",th:"Sabr",reward:"Allah envoie le remède avec chaque maladie = espoir et patience. (Bukhari n°5678)"},
{id:210,ar:"عَجِبْتُ لِأَمْرِ الْمُؤْمِنِ إِنَّ أَمْرَهُ كُلَّهُ لَهُ خَيْرٌ",fr:"Je m'étonne de l'affaire du croyant — tout ce qui lui arrive est un bien pour lui. Ce n'est le cas d'aucun autre que le croyant. S'il lui arrive du bonheur, il remercie et c'est un bien. S'il lui arrive une épreuve, il endure et c'est un bien.",en:"Amazing is the affair of the believer — all of it is good. If good comes he is grateful and that is good for him. If harm comes he is patient and that is good for him.",n:"Suhayb ر",b:"Sahih Muslim",num:2999,a:"Sahih",ref:"Muslim n°2999",th:"Sabr",reward:"Tout est bien pour le croyant = foi en le Destin + patience + gratitude. (Muslim n°2999)"},
{id:211,ar:"أَفْضَلُ الْأَعْمَالِ الصَّلَاةُ لِوَقْتِهَا",fr:"Le meilleur des actes est la prière accomplie en son temps.",en:"The best of deeds is the prayer performed at its proper time.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:527,a:"Sahih",ref:"Bukhari n°527",th:"Salat",reward:"Le meilleur des actes"},
{id:212,ar:"مَنْ صَلَّى عَلَيَّ حِينَ يُصْبِحُ عَشْرًا وَحِينَ يُمْسِي عَشْرًا أَدْرَكَتْهُ شَفَاعَتِي يَوْمَ الْقِيَامَةِ",fr:"Quiconque prie sur moi dix fois le matin et dix fois le soir, mon intercession l'atteindra le Jour du Jugement.",en:"Whoever prays upon me ten times in the morning and ten times in the evening, my intercession will reach him on the Day of Resurrection.",n:"Abu Ad-Darda' ر",b:"Tabarani",num:7315,a:"Sahih",ref:"Silsilah n°3360",th:"Salat",reward:"L'intercession du Prophète ﷺ"},
{id:213,ar:"بُنِيَ الإِسْلَامُ عَلَى خَمْسٍ",fr:"L'Islam est bâti sur cinq piliers : la Shahada, la prière, la Zakat, le Hajj et le jeûne du Ramadan.",en:"Islam is built upon five pillars: the Shahada, the prayer, Zakat, Hajj, and the fast of Ramadan.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:8,a:"Sahih",ref:"Bukhari n°8",th:"Pilliers",reward:"Les 5 piliers = fondement de la récompense islamique. (Bukhari n°8)"},
{id:214,ar:"مَنْ آتَاهُ اللهُ مَالًا فَلَمْ يُؤَدِّ زَكَاتَهُ مُثِّلَ لَهُ يَوْمَ الْقِيَامَةِ شُجَاعًا أَقْرَعَ",fr:"Quiconque à qui Allah a donné de l'argent et n'en a pas payé la Zakat — cet argent lui sera présenté le Jour du Jugement sous la forme d'un serpent chauve qui le mordra.",en:"Whoever Allah gives wealth but does not pay its Zakat — it will be shown to him as a bald snake on the Day of Resurrection.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1403,a:"Sahih",ref:"Bukhari n°1403",th:"Sadaqa",reward:""},
{id:215,ar:"مَنْ نَامَ عَنْ صَلَاةٍ أَوْ نَسِيَهَا فَلْيُصَلِّهَا إِذَا ذَكَرَهَا",fr:"Quiconque dort et rate une prière ou l'oublie, qu'il la prie quand il s'en souvient. Il n'y a pas d'autre expiation pour cela.",en:"Whoever sleeps through a prayer or forgets it, let him pray it when he remembers it. There is no expiation for it other than that.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:597,a:"Sahih",ref:"Bukhari n°597",th:"Salat",reward:"Rattraper une prière manquée = expiation complète. (Bukhari n°597)"},
{id:216,ar:"أَلَا كُلُّكُمْ رَاعٍ وَكُلُّكُمْ مَسْؤُولٌ عَنْ رَعِيَّتِهِ",fr:"Chacun de vous est un berger et chacun est responsable de son troupeau.",en:"Each of you is a shepherd and each of you is responsible for his flock.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:893,a:"Sahih",ref:"Bukhari n°893",th:"Famille",reward:"Chaque responsable = récompense selon la justice envers son troupeau. (Bukhari n°893)"},
{id:217,ar:"إِنَّ الصِّدْقَ يَهْدِي إِلَى الْبِرِّ وَإِنَّ الْبِرَّ يَهْدِي إِلَى الْجَنَّةِ",fr:"L'honnêteté guide vers la vertu et la vertu guide vers le Paradis. L'homme continue d'être sincère jusqu'à ce qu'il soit inscrit auprès d'Allah comme véridique.",en:"Truthfulness leads to righteousness and righteousness leads to Paradise. A man continues to be truthful until he is recorded with Allah as a truthful person.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:6094,a:"Sahih",ref:"Bukhari n°6094",th:"Akhlaq",reward:"Inscrit auprès d'Allah comme véridique"},
{id:218,ar:"الْغِيبَةُ ذِكْرُكَ أَخَاكَ بِمَا يَكْرَهُ",fr:"La médisance c'est parler de ton frère en ce qu'il déteste. On dit : 'Et s'il a ce défaut ?' Il répond : 'Si ce que tu dis est vrai, tu l'as calomnié. Si c'est faux, tu l'as diffamé.'",en:"Backbiting is mentioning your brother in a way he dislikes.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2589,a:"Sahih",ref:"Muslim n°2589",th:"Parole",reward:"Fuir la médisance = protection de son honneur et de celui des autres."},
{id:219,ar:"إِيَّاكُمْ وَالظَّنَّ فَإِنَّ الظَّنَّ أَكْذَبُ الْحَدِيثِ",fr:"Gardez-vous des mauvaises présomptions, car les mauvaises présomptions sont les propos les plus mensongers. N'espionnez pas, ne colportez pas, ne soyez pas jaloux, ne soyez pas malveillants.",en:"Beware of suspicion, for suspicion is the most false of speech.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6064,a:"Sahih",ref:"Bukhari n°6064",th:"Akhlaq",reward:"Fuir la mauvaise opinion = paix du cœur et des relations."},
{id:220,ar:"لَا تَحَاسَدُوا وَلَا تَنَاجَشُوا وَلَا تَبَاغَضُوا",fr:"Ne vous jalousez pas, ne vous enchérissez pas malhonnêtement, ne vous haïssez pas, ne vous tournez pas le dos et ne vendez pas par-dessus la vente d'autrui.",en:"Do not envy each other, do not artificially inflate prices, do not hate each other, do not turn away from each other.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2563,a:"Sahih",ref:"Muslim n°2563",th:"Fraternité",reward:"Fuir la jalousie = protection du cœur et des actes."},
{id:221,ar:"مَنْ يَضْمَنُ لِي مَا بَيْنَ لَحْيَيْهِ وَمَا بَيْنَ رِجْلَيْهِ أَضْمَنُ لَهُ الْجَنَّةَ",fr:"Quiconque me garantit ce qui est entre ses deux mâchoires et ce qui est entre ses deux jambes, je lui garantis le Paradis.",en:"Whoever guarantees me what is between his jaws and between his legs, I will guarantee him Paradise.",n:"Sahl Ibn Sa'd ر",b:"Sahih Al-Bukhari",num:6474,a:"Sahih",ref:"Bukhari n°6474",th:"Akhlaq",reward:"Le Paradis garanti"},
{id:222,ar:"لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ إِنَّمَا الشَّدِيدُ الَّذِي يَمْلِكُ نَفْسَهُ عِنْدَ الْغَضَبِ",fr:"Le fort n'est pas celui qui met les autres à terre. Le vrai fort est celui qui se contrôle quand il est en colère.",en:"The strong person is not the one who overpowers others, but the one who controls himself when angry.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6114,a:"Sahih",ref:"Bukhari n°6114",th:"Akhlaq",reward:"Maîtriser la colère = vraie force. (Bukhari n°6114)"},
{id:223,ar:"لَا تَغْضَبْ فَرَدَّدَ مِرَارًا قَالَ لَا تَغْضَبْ",fr:"Ne te mets pas en colère. Il répéta plusieurs fois : Ne te mets pas en colère.",en:"Do not get angry. He repeated it several times: Do not get angry.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6116,a:"Sahih",ref:"Bukhari n°6116",th:"Akhlaq",reward:"Ne pas se mettre en colère = sécurité dans les relations + baraka dans les actes."},
{id:224,ar:"مَنْ كَظَمَ غَيْظًا وَهُوَ قَادِرٌ عَلَى أَنْ يُنْفِذَهُ دَعَاهُ اللهُ يَوْمَ الْقِيَامَةِ عَلَى رُؤُوسِ الْخَلَائِقِ",fr:"Quiconque ravale sa colère alors qu'il est capable de la satisfaire, Allah l'appellera devant toutes les créatures le Jour du Jugement pour lui faire choisir parmi les Houris celle qu'il désire.",en:"Whoever suppresses his anger when able to act upon it, Allah will call him before all of creation and let him choose the houris he wishes.",n:"Mu'adh Ibn Anas ر",b:"Abu Dawud",num:4777,a:"Hasan",ref:"Silsilah n°906",th:"Akhlaq",reward:"Choisir parmi les Houris du Paradis"},
{id:225,ar:"حُجِبَتِ النَّارُ بِالشَّهَوَاتِ وَحُجِبَتِ الْجَنَّةُ بِالْمَكَارِهِ",fr:"Le Feu a été voilé par les désirs et le Paradis a été voilé par les difficultés.",en:"The Fire has been veiled with desires and Paradise has been veiled with hardships.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6487,a:"Sahih",ref:"Bukhari n°6487",th:"Akhira",reward:"Le Paradis est voilé par les difficultés = persévérer = récompense du Paradis. (Bukhari n°6487)"},
{id:226,ar:"الدُّنْيَا مَتَاعٌ وَخَيْرُ مَتَاعِ الدُّنْيَا الْمَرْأَةُ الصَّالِحَةُ",fr:"Le monde est une jouissance et le meilleur bien de ce monde est la femme pieuse.",en:"The world is a provision and the best provision of this world is a righteous wife.",n:"Abdullah Ibn Amr ر",b:"Sahih Muslim",num:1467,a:"Sahih",ref:"Muslim n°1467",th:"Mariage",reward:"La femme pieuse = le meilleur bien du monde entier. (Muslim n°1467)"},
{id:227,ar:"إِذَا أَتَى أَحَدُكُمْ أَهْلَهُ ثُمَّ أَرَادَ أَنْ يَعُودَ فَلْيَتَوَضَّأْ",fr:"Quand l'un de vous s'approche de sa femme puis veut recommencer, qu'il fasse les ablutions — cela est plus vigoureux pour la reprise.",en:"When one of you comes to his wife and wishes to return, let him perform ablution.",n:"Abu Sa'id ر",b:"Sahih Muslim",num:308,a:"Sahih",ref:"Muslim n°308",th:"Taharah",reward:""},
{id:228,ar:"إِنَّ رُوحَ الْقُدُسِ نَفَثَ فِي رُوعِي أَنَّهُ لَنْ تَمُوتَ نَفْسٌ حَتَّى تَسْتَكْمِلَ رِزْقَهَا",fr:"Jibril a soufflé dans mon cœur que nul ne mourra avant d'avoir complété sa subsistance. Soyez donc patients dans la recherche.",en:"Jibril has revealed to me that no soul will die until it has completed its provision, so seek it in the proper way.",n:"Ibn Masud ر",b:"Ibn Majah",num:2144,a:"Sahih",ref:"Silsilah n°1454",th:"Tawakkul",reward:"La subsistance est garantie = ne pas s'angoisser + chercher par les voies licites."},
{id:229,ar:"لَوْ أَنَّ ابْنَ آدَمَ هَرَبَ مِنْ رِزْقِهِ كَمَا يَهْرُبُ مِنَ الْمَوْتِ لَأَدْرَكَهُ رِزْقُهُ",fr:"Si le fils d'Adam fuyait sa subsistance comme il fuit la mort, sa subsistance l'atteindrait quand même.",en:"If the son of Adam were to flee from his sustenance as he flees from death, his sustenance would still catch up with him.",n:"Ibn Abbas ر",b:"Ibn Abi Ad-Dunya",num:1,a:"Sahih",ref:"Silsilah n°952",th:"Tawakkul",reward:"La subsistance rattrape toujours = confiance totale en Allah."},
{id:230,ar:"الطَّاعِمُ الشَّاكِرُ بِمَنْزِلَةِ الصَّائِمِ الصَّابِرِ",fr:"Celui qui mange avec gratitude a le même rang que celui qui jeûne avec patience.",en:"The one who eats with gratitude has the same rank as one who fasts with patience.",n:"Abu Hureyra ر",b:"Tirmidhi",num:2486,a:"Hasan",ref:"Silsilah n°1948",th:"Siyam",reward:"Récompense équivalente au jeûne"},
{id:231,ar:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ الْهَمِّ وَالْحَزَنِ",fr:"Ô Allah, je cherche refuge en Toi contre le souci, la tristesse, la faiblesse, la paresse, la lâcheté, l'avarice, le poids des dettes et la domination des hommes.",en:"O Allah, I seek refuge in You from worry and grief, weakness and laziness, miserliness and cowardice, the burden of debts and the overpowering of men.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:6369,a:"Sahih",ref:"Bukhari n°6369",th:"Du'a",reward:"Allah dissipe le souci et la tristesse"},
{id:233,ar:"الْحَلَالُ بَيِّنٌ وَالْحَرَامُ بَيِّنٌ وَبَيْنَهُمَا مُشَبِّهَاتٌ",fr:"Le licite est clair et l'illicite est clair. Entre les deux se trouvent des choses douteuses que peu de gens connaissent. Quiconque évite les choses douteuses préserve sa religion et son honneur.",en:"The lawful is clear and the unlawful is clear. Between them are matters that are doubtful. Whoever avoids them protects his religion and his honor.",n:"Nu'man Ibn Bashir ر",b:"Sahih Al-Bukhari",num:52,a:"Sahih",ref:"Bukhari n°52",th:"Fiqh",reward:"Protection de la religion et de l'honneur"},
{id:234,ar:"لَا ضَرَرَ وَلَا ضِرَارَ",fr:"Pas de préjudice ni de réciprocité dans le préjudice.",en:"No harm and no reciprocating harm.",n:"Ibn Abbas ر",b:"Ibn Majah",num:2341,a:"Sahih",ref:"Silsilah n°250",th:"Fiqh",reward:""},
{id:235,ar:"مَنْ أَخَذَ أَمْوَالَ النَّاسِ يُرِيدُ أَدَاءَهَا أَدَّى اللهُ عَنْهُ",fr:"Quiconque prend les biens des gens avec l'intention de les rendre, Allah l'aidera à les rendre. Quiconque les prend avec l'intention de les détruire, Allah le détruira.",en:"Whoever takes people's wealth intending to repay it, Allah will help him repay it. Whoever takes it intending to destroy it, Allah will destroy him.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2387,a:"Sahih",ref:"Bukhari n°2387",th:"Commerce",reward:"Honnêteté dans les dettes = Allah aide à rembourser. (Bukhari n°2387)"},
{id:236,ar:"إِنَّ مِنْ أَعْظَمِ الذُّنُوبِ عِنْدَ اللهِ أَنْ يَلْقَاهُ بِهَا عَبْدٌ بَعْدَ الْكَبَائِرِ أَنْ يَمُوتَ وَعَلَيْهِ دَيْنٌ لَا يَدَعُ لَهُ قَضَاءً",fr:"L'un des pires péchés aux yeux d'Allah — après les grands péchés — est qu'un homme meure en ayant une dette sans laisser de quoi la rembourser.",en:"Among the greatest sins after the major sins is that a man dies while having a debt he leaves no way to repay.",n:"Abu Musa ر",b:"Abu Dawud",num:3341,a:"Sahih",ref:"Silsilah n°558",th:"Commerce",reward:""},
{id:237,ar:"الْبَيِّعَانِ بِالْخِيَارِ مَا لَمْ يَتَفَرَّقَا",fr:"Les deux contractants ont le choix tant qu'ils ne se sont pas séparés.",en:"The two contracting parties have the choice as long as they have not parted.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:2111,a:"Sahih",ref:"Bukhari n°2111",th:"Commerce",reward:"Choix libre dans le commerce = baraka dans les transactions. (Bukhari n°2111)"},
{id:238,ar:"مَنْ غَشَّنَا فَلَيْسَ مِنَّا",fr:"Quiconque nous trompe n'est pas des nôtres.",en:"Whoever deceives us is not from us.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:101,a:"Sahih",ref:"Muslim n°101",th:"Commerce",reward:""},
{id:239,ar:"إِيَّاكُمْ وَالْجُلُوسَ عَلَى الطُّرُقَاتِ قَالُوا مَا لَنَا بُدٌّ فَقَالَ فَأَعْطُوا الطَّرِيقَ حَقَّهُ",fr:"Gardez-vous de vous asseoir sur les routes. Ils dirent : 'Nous ne pouvons nous en empêcher.' Il dit : 'Alors donnez à la route son droit : baisser le regard, ne pas nuire, répondre au salam, commander le bien et interdire le mal.'",en:"Avoid sitting on roads. They said: We cannot avoid it. He said: Then give the road its rights — lower the gaze, cause no harm, return the greeting, enjoin good and forbid evil.",n:"Abu Sa'id ر",b:"Sahih Al-Bukhari",num:2465,a:"Sahih",ref:"Bukhari n°2465",th:"Akhlaq",reward:"Donner les droits de la route = bonne réputation + récompense d'Allah."},
{id:240,ar:"إِنَّ اللهَ يُحِبُّ الرِّفْقَ فِي الْأَمْرِ كُلِّهِ",fr:"Allah aime la douceur en toute chose.",en:"Allah loves gentleness in all matters.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:6927,a:"Sahih",ref:"Bukhari n°6927",th:"Akhlaq",reward:"L'amour d'Allah"},
{id:241,ar:"مَا كَانَ الرِّفْقُ فِي شَيْءٍ إِلَّا زَانَهُ وَمَا نُزِعَ مِنْ شَيْءٍ إِلَّا شَانَهُ",fr:"La douceur n'est dans une chose qu'elle l'embellit, et elle n'est retirée d'une chose qu'elle ne la dégradait.",en:"Gentleness does not come upon a thing except that it adorns it, and it is not removed from a thing except that it blemishes it.",n:"Aïcha ر",b:"Sahih Muslim",num:2594,a:"Sahih",ref:"Muslim n°2594",th:"Rifq",reward:"Douceur en toute chose = amour d'Allah. (Bukhari n°6927)"},
{id:242,ar:"أَعْطُوا الأَجِيرَ أَجْرَهُ قَبْلَ أَنْ يَجِفَّ عَرَقُهُ",fr:"Donnez à l'ouvrier son salaire avant que sa sueur ne sèche.",en:"Give the worker his wages before his sweat dries.",n:"Ibn Umar ر",b:"Ibn Majah",num:2443,a:"Sahih",ref:"Silsilah n°1756",th:"Commerce",reward:"Payer le salaire à temps = protection de la colère d'Allah. (Silsilah n°1756)"},
{id:243,ar:"ثَلَاثَةٌ أَنَا خَصْمُهُمْ يَوْمَ الْقِيَامَةِ رَجُلٌ أَعْطَى بِي ثُمَّ غَدَرَ",fr:"Trois personnes dont je serai l'adversaire le Jour du Jugement : Celui qui promet en Mon nom puis trahit, celui qui vend un homme libre et en mange le prix, et celui qui embauche un salarié, reçoit son travail puis ne le paye pas.",en:"Three people whose adversary I will be on the Day of Resurrection: one who gave his word in My name then betrayed it, one who sold a free person and consumed his price, and one who hired a worker, took his work and did not pay him.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:2227,a:"Sahih",ref:"Bukhari n°2227",th:"Commerce",reward:""},
{id:244,ar:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى أَكُونَ أَحَبَّ إِلَيْهِ مِنْ وَالِدِهِ وَوَلَدِهِ وَالنَّاسِ أَجْمَعِينَ",fr:"Aucun d'entre vous ne croit vraiment tant que je ne lui suis pas plus cher que son père, son enfant et l'ensemble des gens.",en:"None of you truly believes until I am more beloved to him than his father, his child and all of mankind.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:15,a:"Sahih",ref:"Bukhari n°15",th:"Sunnah",reward:"Condition de la foi complète"},
{id:245,ar:"مَنْ أَحَبَّ سُنَّتِي فَقَدْ أَحَبَّنِي وَمَنْ أَحَبَّنِي كَانَ مَعِي فِي الْجَنَّةِ",fr:"Quiconque aime ma Sunnah m'aime, et quiconque m'aime sera avec moi au Paradis.",en:"Whoever loves my Sunnah loves me, and whoever loves me will be with me in Paradise.",n:"Anas ر",b:"Tirmidhi",num:2678,a:"Hasan",ref:"Silsilah n°2811",th:"Sunnah",reward:"Être avec le Prophète ﷺ au Paradis"},
{id:246,ar:"كُلُّ مُسْكِرٍ حَرَامٌ",fr:"Tout ce qui enivre est illicite.",en:"Every intoxicant is forbidden.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:242,a:"Sahih",ref:"Bukhari n°242",th:"Halal/Haram",reward:"Aimer la Sunnah = être avec le Prophète ﷺ au Paradis. (Silsilah n°2811)"},
{id:247,ar:"كُلُّ لَهْوٍ يَلْهُو بِهِ الرَّجُلُ بَاطِلٌ إِلَّا رَمْيَهُ بِقَوْسِهِ",fr:"Tout divertissement avec lequel un homme joue est futile, sauf son tir à l'arc, son entraînement avec son cheval, et ses jeux avec sa femme.",en:"Every game a man plays is idle except for shooting his bow, training his horse, and playing with his wife.",n:"Uqba Ibn Amr ر",b:"Tirmidhi",num:1637,a:"Hasan Sahih",ref:"Silsilah n°315",th:"Halal/Haram",reward:""},
{id:248,ar:"إِنَّ الله كَتَبَ عَلَى ابْنِ آدَمَ حَظَّهُ مِنَ الزِّنَا",fr:"Allah a prescrit à chaque fils d'Adam sa part de fornication. Les yeux forniquent par le regard, la langue par la parole, le cœur désire et aspire, et les parties génitales confirment ou démentent.",en:"Allah has written for the son of Adam his share of adultery. The eyes commit adultery by looking, the tongue by speaking, the heart by desiring.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6243,a:"Sahih",ref:"Bukhari n°6243",th:"Halal/Haram",reward:""},
{id:249,ar:"لَا يَحِلُّ لِامْرَأَةٍ تُؤْمِنُ بِاللهِ وَالْيَوْمِ الآخِرِ أَنْ تُسَافِرَ مَسِيرَةَ يَوْمٍ وَلَيْلَةٍ إِلَّا مَعَ ذِي مَحْرَمٍ",fr:"Il n'est pas permis à une femme qui croit en Allah et au Jour Dernier de voyager l'espace d'une journée et d'une nuit sans mahram.",en:"It is not lawful for a woman who believes in Allah and the Last Day to travel a day and a night's journey without a mahram.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1088,a:"Sahih",ref:"Bukhari n°1088",th:"Fiqh",reward:""},
{id:250,ar:"مَا بَيْنَ الْمَشْرِقِ وَالْمَغْرِبِ قِبْلَةٌ",fr:"Ce qui est entre l'est et l'ouest est la Qibla.",en:"What is between the east and the west is the Qibla.",n:"Ibn Umar ر",b:"Tirmidhi",num:342,a:"Sahih",ref:"Silsilah n°2237",th:"Salat",reward:"Connaître la Qibla = prière valide + orientation vers Allah."},
// ── SIRA DU PROPHETE ﷺ ──
{id:251,ar:"وُلِدْتُ فِي زَمَنِ الْمَلِكِ الْعَادِلِ",fr:"Je suis né à l'époque du roi juste (Anushirwan).",en:"I was born in the time of the just king.",n:"Abu Hureyra ر",b:"Hakim",num:4176,a:"Sahih",ref:"Silsilah n°1726",th:"Hadith",reward:""},
{id:252,ar:"بُعِثْتُ بِالسَّيْفِ بَيْنَ يَدَيِ السَّاعَةِ",fr:"J'ai été envoyé avec l'épée avant l'Heure pour qu'Allah seul soit adoré sans associé.",en:"I have been sent with the sword before the Hour so that Allah alone is worshipped without partners.",n:"Ibn Umar ر",b:"Musnad Ahmad",num:5114,a:"Sahih",ref:"Silsilah n°2831",th:"Hadith",reward:"Mission du Prophète ﷺ = défense du Tawhid et de l'Islam."},
{id:253,ar:"أَنَا سَيِّدُ وَلَدِ آدَمَ يَوْمَ الْقِيَامَةِ وَلَا فَخْرَ",fr:"Je suis le maître des fils d'Adam le Jour du Jugement, et ce n'est pas une vantardise.",en:"I am the master of the children of Adam on the Day of Resurrection, and this is not pride.",n:"Abu Hureyra ر",b:"Tirmidhi",num:3615,a:"Sahih",ref:"Silsilah n°1571",th:"Hadith",reward:"Le Prophète ﷺ = maître des fils d'Adam au Jour du Jugement. (Tirmidhi n°3615)"},
{id:254,ar:"لَا تُطْرُونِي كَمَا أَطْرَتِ النَّصَارَى ابْنَ مَرْيَمَ إِنَّمَا أَنَا عَبْدُهُ فَقُولُوا عَبْدُ اللهِ وَرَسُولُهُ",fr:"Ne me glorifiez pas à l'excès comme les chrétiens ont glorifié le fils de Marie. Je ne suis que Son serviteur. Dites donc : serviteur d'Allah et Son messager.",en:"Do not praise me excessively as the Christians praised the son of Mary. I am only His servant, so say: the servant of Allah and His messenger.",n:"Umar ر",b:"Sahih Al-Bukhari",num:3445,a:"Sahih",ref:"Bukhari n°3445",th:"Tawhid",reward:""},
{id:255,ar:"مَثَلِي وَمَثَلُكُمْ كَمَثَلِ رَجُلٍ أَوْقَدَ نَارًا",fr:"Mon exemple et le vôtre est comme un homme qui allume un feu : les papillons et les insectes commencent à y tomber. L'homme essaie de les en éloigner mais ils s'y jettent. Je vous retiens par vos ceintures pour vous éloigner du Feu, mais vous vous y précipitez.",en:"My example and yours is like a man who lights a fire and moths and insects fall into it. I am holding you back from the Fire, but you are slipping from my grasp.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6483,a:"Sahih",ref:"Bukhari n°6483",th:"Hadith",reward:""},
// ── CORAN ──
{id:256,ar:"مَنْ قَرَأَ حَرْفًا مِنْ كِتَابِ اللهِ فَلَهُ بِهِ حَسَنَةٌ",fr:"Quiconque récite une lettre du Livre d'Allah aura une bonne action pour cela. La bonne action est multipliée par dix. Je ne dis pas que 'Alif-Lam-Mim' est une lettre, mais que 'Alif' est une lettre, 'Lam' est une lettre et 'Mim' est une lettre.",en:"Whoever recites a letter from the Book of Allah will receive one good deed for it. That good deed is multiplied by ten.",n:"Ibn Masud ر",b:"Tirmidhi",num:2910,a:"Sahih",ref:"Silsilah n°660",th:"Coran",reward:"10 bonnes actions par lettre"},
{id:257,ar:"إِنَّ هَذَا الْقُرْآنَ مَأْدُبَةُ اللهِ فَتَعَلَّمُوا مَأْدُبَتَهُ",fr:"Ce Coran est le banquet d'Allah, apprenez-en autant que vous pouvez.",en:"This Quran is Allah's banquet, so learn from His banquet as much as you can.",n:"Abdullah Ibn Masud ر",b:"Hakim",num:1791,a:"Sahih",ref:"Silsilah n°1189",th:"Coran",reward:""},
{id:258,ar:"لَا حَسَدَ إِلَّا فِي اثْنَتَيْنِ رَجُلٌ آتَاهُ اللهُ مَالًا فَسَلَّطَهُ عَلَى هَلَكَتِهِ فِي الْحَقِّ وَرَجُلٌ آتَاهُ اللهُ حِكْمَةً فَهُوَ يَقْضِي بِهَا",fr:"Il n'y a de jalousie permise que pour deux : un homme à qui Allah a donné de la richesse et il la dépense pour le droit, et un homme à qui Allah a donné la sagesse et il juge selon elle et l'enseigne.",en:"Envy is only permissible in two cases: a man given wealth who spends it righteously, and a man given wisdom who acts upon it and teaches it.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:73,a:"Sahih",ref:"Bukhari n°73",th:"'Ilm",reward:"Jalousie permise pour 2 = motivation vers la science et la générosité. (Bukhari n°73)"},
{id:259,ar:"إِنَّ اللهَ يَرْفَعُ بِهَذَا الْكِتَابِ أَقْوَامًا وَيَضَعُ بِهِ آخَرِينَ",fr:"Allah élève des peuples par ce Livre et en abaisse d'autres.",en:"Allah elevates peoples by this Book and lowers others.",n:"Umar Ibn Al-Khattab ر",b:"Sahih Muslim",num:817,a:"Sahih",ref:"Muslim n°817",th:"Coran",reward:""},
// ── QADAR ──
{id:261,ar:"آمَنَّا بِاللهِ وَقَدَرِهِ",fr:"Nous croyons en Allah et en Son Destin.",en:"We believe in Allah and in His decree.",n:"Jabir ر",b:"Sahih Muslim",num:2655,a:"Sahih",ref:"Muslim n°2655",th:"Qadar",reward:"Foi au Destin = paix du cœur dans toutes les circonstances. (Muslim n°2655)"},
{id:262,ar:"الشَّقِيُّ مَنْ شَقِيَ فِي بَطْنِ أُمِّهِ وَالسَّعِيدُ مَنْ سَعِدَ فِي بَطْنِ أُمِّهِ",fr:"Le malheureux est celui qui est malheureux dans le ventre de sa mère, et le bienheureux est celui qui est bienheureux dans le ventre de sa mère.",en:"The wretched is the one who is wretched in his mother's womb and the fortunate is the one who is fortunate in his mother's womb.",n:"Ibn Masud ر",b:"Sahih Muslim",num:2645,a:"Sahih",ref:"Muslim n°2645",th:"Qadar",reward:""},
{id:263,ar:"إِنَّ أَحَدَكُمْ يُجْمَعُ خَلْقُهُ فِي بَطْنِ أُمِّهِ أَرْبَعِينَ يَوْمًا نُطْفَةً",fr:"Chacun de vous est formé dans le ventre de sa mère : 40 jours en goutte, puis 40 jours en caillot, puis 40 jours en morceau de chair. Ensuite, Allah envoie l'ange qui souffle l'âme et prescrit 4 choses : sa subsistance, sa durée de vie, ses actes et s'il sera heureux ou malheureux.",en:"Each of you is formed in his mother's womb for 40 days as a drop, then 40 days as a clot, then 40 days as a morsel. Then Allah sends an angel who breathes the soul and decrees four things.",n:"Ibn Masud ر",b:"Sahih Al-Bukhari",num:3208,a:"Sahih",ref:"Bukhari n°3208",th:"Qadar",reward:""},
// ── HAJJ ──
{id:264,ar:"الْحَجُّ الْمَبْرُورُ لَيْسَ لَهُ جَزَاءٌ إِلَّا الْجَنَّةُ",fr:"Le Hajj Mabrour n'a d'autre récompense que le Paradis.",en:"The accepted Hajj has no reward other than Paradise.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1773,a:"Sahih",ref:"Bukhari n°1773",th:"Hajj",reward:"Le Paradis"},
{id:265,ar:"مَنْ أَتَى هَذَا الْبَيْتَ فَلَمْ يَرْفُثْ وَلَمْ يَفْسُقْ رَجَعَ كَيَوْمَ وَلَدَتْهُ أُمُّهُ",fr:"Quiconque vient à cette Maison sans grossièreté ni acte pernicieux, repart comme au jour où sa mère l'a enfanté.",en:"Whoever comes to this House without committing obscenities returns like the day his mother gave birth to him.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1521,a:"Sahih",ref:"Bukhari n°1521",th:"Hajj",reward:"Purification totale"},
{id:266,ar:"تَابِعُوا بَيْنَ الْحَجِّ وَالْعُمْرَةِ فَإِنَّهُمَا يَنْفِيَانِ الْفَقْرَ",fr:"Enchaînez le Hajj et l'Umra, car ils chassent la pauvreté et les péchés comme le soufflet du forgeron chasse la rouille du fer.",en:"Alternate between Hajj and Umra, for they remove poverty and sins as the bellows removes rust from iron.",n:"Ibn Masud ر",b:"Tirmidhi",num:810,a:"Sahih",ref:"Silsilah n°1200",th:"Hajj",reward:"Élimination de la pauvreté et des péchés"},
// ── RAMADAN ──
{id:267,ar:"رَجَبٌ شَهْرُ اللهِ وَشَعْبَانُ شَهْرِي وَرَمَضَانُ شَهْرُ أُمَّتِي",fr:"Rajab est le mois d'Allah, Sha'ban est mon mois et Ramadan est le mois de ma communauté.",en:"Rajab is the month of Allah, Sha'ban is my month, and Ramadan is the month of my community.",n:"Anas ر",b:"Tabarani",num:3939,a:"Da'if",ref:"Da'if — Silsilah Da'ifa n°1898 (Al-Albani). Aucune vertu spéciale de Rajab n'est prouvée. Éviter toute ibada spéciale ce mois.",th:"Ramadan",reward:""},
{id:268,ar:"مَنْ أَفْطَرَ يَوْمًا مِنْ رَمَضَانَ مِنْ غَيْرِ عُذْرٍ لَمْ يَقْضِهِ صِيَامُ الدَّهْرِ",fr:"Quiconque rompt un jour du Ramadan sans excuse valable, le jeûne de toute une vie ne le compensera pas.",en:"Whoever breaks his fast for one day of Ramadan without an excuse, the fast of an entire lifetime will not make up for it.",n:"Abu Hureyra ر",b:"Abu Dawud",num:2396,a:"Sahih",ref:"Silsilah n°2050",th:"Ramadan",reward:""},
{id:269,ar:"إِذَا دَخَلَ الْعَشْرُ الْأَوَاخِرُ مِنْ رَمَضَانَ",fr:"Quand entrait la dernière décade de Ramadan, le Prophète ﷺ passait ses nuits à veiller, réveillait sa famille et serrait sa ceinture (s'intensifiait dans le culte).",en:"When the last ten days of Ramadan entered, the Prophet would revive the night, wake his family, and gird his loins.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:2024,a:"Sahih",ref:"Bukhari n°2024",th:"Ramadan",reward:""},
{id:270,ar:"الْتَمِسُوا لَيْلَةَ الْقَدْرِ فِي الْوِتْرِ مِنَ الْعَشْرِ الْأَوَاخِرِ مِنْ رَمَضَانَ",fr:"Cherchez Laylat Al-Qadr dans les nuits impaires de la dernière décade de Ramadan.",en:"Seek Laylat al-Qadr in the odd nights of the last ten nights of Ramadan.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:2017,a:"Sahih",ref:"Bukhari n°2017",th:"Ramadan",reward:""},
// ── WUDU & TAHARA ──
{id:271,ar:"إِذَا تَوَضَّأَ الْعَبْدُ الْمُسْلِمُ أَوِ الْمُؤْمِنُ فَغَسَلَ وَجْهَهُ خَرَجَتْ مِنْ وَجْهِهِ كُلُّ خَطِيئَةٍ",fr:"Quand le serviteur musulman fait ses ablutions et lave son visage, toute faute qu'il a commise par ses yeux sort avec l'eau. Quand il lave ses mains, toute faute commise par ses mains sort. Quand il lave ses pieds, toute faute sort — jusqu'à ce qu'il en sorte pur de tout péché.",en:"When the Muslim servant performs ablution and washes his face, every sin he committed with his eyes leaves with the water. When he washes his hands, every sin committed by his hands leaves.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:244,a:"Sahih",ref:"Muslim n°244",th:"Taharah",reward:"Expiation totale des péchés"},
{id:272,ar:"لَوْلَا أَنْ أَشُقَّ عَلَى أُمَّتِي لَأَمَرْتُهُمْ بِالسِّوَاكِ",fr:"Si je n'avais pas craint d'imposer une difficulté à ma communauté, je leur aurais ordonné d'utiliser le siwak avant chaque prière.",en:"If it were not difficult for my community, I would have ordered them to use the siwak before every prayer.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:887,a:"Sahih",ref:"Bukhari n°887",th:"Taharah",reward:""},
// ── MASJID ──
{id:273,ar:"أَحَبُّ الْبِلَادِ إِلَى اللهِ مَسَاجِدُهَا وَأَبْغَضُ الْبِلَادِ إِلَى اللهِ أَسْوَاقُهَا",fr:"Les endroits les plus aimés d'Allah sont les mosquées, et les endroits les plus détestés d'Allah sont les marchés.",en:"The most beloved places to Allah are the mosques, and the most hated places to Allah are the markets.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:671,a:"Sahih",ref:"Muslim n°671",th:"Salat",reward:"La mosquée = endroit le plus aimé d'Allah. (Muslim n°671)"},
{id:274,ar:"صَلَاةٌ فِي مَسْجِدِي هَذَا خَيْرٌ مِنْ أَلْفِ صَلَاةٍ فِيمَا سِوَاهُ",fr:"Une prière dans ma mosquée vaut mieux que mille prières ailleurs, excepté la Mosquée Sacrée.",en:"A prayer in my mosque is better than a thousand prayers elsewhere, except in the Sacred Mosque.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1190,a:"Sahih",ref:"Bukhari n°1190",th:"Salat",reward:"Récompense multipliée par 1000"},
{id:275,ar:"لَا تُشَدُّ الرِّحَالُ إِلَّا إِلَى ثَلَاثَةِ مَسَاجِدَ",fr:"On ne voyage pour une mosquée qu'à trois : la Mosquée Sacrée, ma mosquée ici et la Mosquée Al-Aqsa.",en:"Do not undertake a journey except to three mosques: Al-Masjid Al-Haram, my mosque and Al-Masjid Al-Aqsa.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1189,a:"Sahih",ref:"Bukhari n°1189",th:"Salat",reward:"Prière dans la mosquée du Prophète ﷺ = 1000 prières ailleurs. (Bukhari n°1190)"},
// ── MEN & WOMEN ──
{id:276,ar:"أَكْمَلُ الْمُؤْمِنِينَ إِيمَانًا أَحْسَنُهُمْ خُلُقًا وَخِيَارُكُمْ خِيَارُكُمْ لِنِسَائِهِمْ",fr:"Le croyant le plus parfait en foi est celui qui a le meilleur caractère. Et les meilleurs d'entre vous sont les meilleurs avec leurs femmes.",en:"The most complete of believers in faith is the best of them in character. And the best of you are the best to their wives.",n:"Abu Hureyra ر",b:"Tirmidhi",num:1162,a:"Sahih",ref:"Silsilah n°284",th:"Mariage",reward:"Le meilleur des croyants = le meilleur avec ses femmes. (Silsilah n°284)"},
{id:277,ar:"اسْتَوْصُوا بِالنِّسَاءِ خَيْرًا فَإِنَّ الْمَرْأَةَ خُلِقَتْ مِنْ ضِلَعٍ",fr:"Prenez soin des femmes, car la femme a été créée d'une côte. La côte la plus courbée est la partie supérieure. Si tu essaies de la redresser, tu la casseras. Et si tu la laisses, elle restera courbée.",en:"Take care of women, for woman was created from a rib. The most curved part is the top. If you try to straighten it you will break it.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:3331,a:"Sahih",ref:"Bukhari n°3331",th:"Mariage",reward:""},
{id:278,ar:"أَلَا وَاسْتَوْصُوا بِالنِّسَاءِ",fr:"Traitez bien les femmes — recommandation du Prophète ﷺ dans son discours de l'Adieu.",en:"Take care of women — this is the command of the Prophet ﷺ in his farewell sermon.",n:"Abu Sa'id ر",b:"Sahih Al-Bukhari",num:5185,a:"Sahih",ref:"Bukhari n°5185",th:"Famille",reward:""},
{id:279,ar:"إِنَّ لِزَوْجِكَ عَلَيْكَ حَقًّا",fr:"Ton corps a un droit sur toi, ton âme a un droit sur toi, et ta femme a un droit sur toi.",en:"Your body has a right over you, your soul has a right over you, and your wife has a right over you.",n:"Salman ر",b:"Sahih Al-Bukhari",num:1975,a:"Sahih",ref:"Bukhari n°1975",th:"Mariage",reward:""},
// ── BONNE ACTION ──
{id:280,ar:"كُلُّ مَعْرُوفٍ صَدَقَةٌ",fr:"Toute bonne action est une charité.",en:"Every act of kindness is charity.",n:"Jabir ر",b:"Sahih Al-Bukhari",num:6021,a:"Sahih",ref:"Bukhari n°6021",th:"Sadaqa",reward:"Chaque bonne action = charité = récompense quotidienne. (Bukhari n°6021)"},
{id:281,ar:"لَا تَحْقِرَنَّ مِنَ الْمَعْرُوفِ شَيْئًا وَلَوْ أَنْ تَلْقَى أَخَاكَ بِوَجْهٍ طَلِقٍ",fr:"Ne méprise aucune bonne action, fût-ce de rencontrer ton frère avec un visage souriant.",en:"Do not belittle any act of kindness, even meeting your brother with a cheerful face.",n:"Abu Dharr ر",b:"Sahih Muslim",num:2626,a:"Sahih",ref:"Muslim n°2626",th:"Akhlaq",reward:"Ne mépriser aucune bonne action = accumulation de récompenses. (Muslim n°2626)"},
{id:282,ar:"الدَّالُّ عَلَى الْخَيْرِ كَفَاعِلِهِ",fr:"Celui qui guide vers le bien est comme celui qui l'accomplit.",en:"The one who guides others to good deeds is like the one who performs them.",n:"Anas ر",b:"Tirmidhi",num:2670,a:"Sahih",ref:"Silsilah n°1660",th:"'Ilm",reward:"Même récompense que le faiseur du bien"},
{id:283,ar:"مَنْ دَلَّ عَلَى خَيْرٍ فَلَهُ مِثْلُ أَجْرِ فَاعِلِهِ",fr:"Quiconque guide vers un bien aura une récompense semblable à celle de son auteur.",en:"Whoever guides someone to good will have a reward similar to the one who does it.",n:"Abu Masud ر",b:"Sahih Muslim",num:1893,a:"Sahih",ref:"Muslim n°1893",th:"'Ilm",reward:"Même récompense que le faiseur"},
// ── MORT ET FUNERAILLES ──
{id:284,ar:"أَكْثِرُوا ذِكْرَ هَاذِمِ اللَّذَّاتِ",fr:"Évoquez souvent le destructeur des plaisirs — la mort.",en:"Remember often the destroyer of pleasures — death.",n:"Abu Hureyra ر",b:"Tirmidhi",num:2307,a:"Sahih",ref:"Silsilah n°1421",th:"Mort",reward:"Guider vers le bien = récompense similaire. (Muslim n°1893)"},
