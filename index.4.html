[data-theme="foret-claire"]{--bg:#f4faf0;--bg2:#ffffff;--bg3:#e8f5e0;--bg4:#d8edc8;--bdr:#b8d8a0;--bdr2:#90c070;--acc:#2d6a2d;--acc2:#3a8a3a;--acc3:#1a4a1a;--accd:#e0f4d0;--gr:#15803d;--grs:#166534;--tx:#0c2010;--tx2:#183018;--txm:#407040;--txd:#90b890;--card:#ffffff;--nav:#f4faf0;--shadow:0 4px 24px #00000018;--overlay:#00000060;--mo:.04}



/* ═══════════════════════════════
   ARABIC FONTS
═══════════════════════════════ */
[data-font-ar="scheherazade"] .ar { font-family:'Scheherazade New',serif }
[data-font-ar="amiri"] .ar { font-family:'Amiri',serif }

/* ═══════════════════════════════
   ARABIC FONT SIZE
═══════════════════════════════ */
.ar { font-size: var(--ar-size, 26px) }
.ar-xl { font-size: calc(var(--ar-size, 26px) + 8px) }
.ar-lg { font-size: var(--ar-size, 26px) }
.ar-md { font-size: calc(var(--ar-size, 26px) - 4px) }
.ar-sm { font-size: calc(var(--ar-size, 26px) - 8px) }

/* ═══════════════════════════════
   LINE SPACING
═══════════════════════════════ */
[data-spacing="compact"] .ar, [data-spacing="compact"] .verse-arabic { line-height: 1.5 !important }
[data-spacing="normal"] .ar, [data-spacing="normal"] .verse-arabic { line-height: 2.0 !important }
[data-spacing="airy"] .ar, [data-spacing="airy"] .verse-arabic { line-height: 2.6 !important }

/* ═══════════════════════════════
   RESET & BASE
═══════════════════════════════ */
*,*::before,*::after { box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent }
html { -webkit-text-size-adjust:100%;font-size:16px }
body {
  background:var(--bg);color:var(--tx);
  font-family:'Outfit',sans-serif;
  height:100dvh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
html {
  overflow:hidden;
  max-width:100vw;
}
button,input { font-family:'Outfit',sans-serif;cursor:pointer }

/* ═══════════════════════════════
   SVG ICONS SYSTEM
═══════════════════════════════ */
.icon { display:inline-flex;align-items:center;justify-content:center;flex-shrink:0 }
.icon svg { width:100%;height:100%;fill:currentColor }
.icon-20 { width:20px;height:20px }
.icon-22 { width:22px;height:22px }
.icon-24 { width:24px;height:24px }
.icon-28 { width:28px;height:28px }
.icon-32 { width:32px;height:32px }

/* ═══════════════════════════════
   APP LAYOUT
═══════════════════════════════ */
#app {
  max-width:480px;margin:0 auto;
  height:100dvh;display:flex;flex-direction:column;
  overflow:hidden;position:relative;
  width:100%;
}

/* ═══════════════════════════════
   GEOMETRIC BACKGROUND — subtle dots
═══════════════════════════════ */
#app::before {
  content:'';position:fixed;inset:0;
  background-image: radial-gradient(circle, var(--bdr) 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: 0.4;
  pointer-events:none;z-index:0;
}
#app > * { position:relative;z-index:1 }

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.hdr {
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px 10px;
  border-bottom:1px solid var(--bdr);
  background:var(--bg);
}
.hdr-left { min-width:56px }
.hdr-hijri { font-size:10px;color:var(--acc);font-weight:700;line-height:1.3 }
.hdr-greg { font-size:9px;color:var(--txd);margin-top:1px }
.hdr-center { text-align:center;flex:1 }
.hdr-basmala {
  font-family:'Scheherazade New',serif;
  color:var(--acc);font-size:14px;direction:rtl;
  display:block;margin-bottom:2px;
}
.hdr-title {
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:700;letter-spacing:.3px;
}
.hdr-sub { font-size:8px;color:var(--txd);letter-spacing:2.5px;text-transform:uppercase;margin-top:1px }
.hdr-right { min-width:56px;display:flex;justify-content:flex-end }
.hdr-settings-btn {
  background:var(--bg3);border:1px solid var(--bdr);
  border-radius:10px;padding:7px;color:var(--txm);
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;
}

/* ═══════════════════════════════
   CONTENT
═══════════════════════════════ */
.cnt {
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 14px 10px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scroll-behavior:smooth;
  width:100%;
}
.cnt::-webkit-scrollbar { display:none }

/* ═══════════════════════════════
   BOTTOM NAV — app native style
═══════════════════════════════ */
.nav {
  display:flex;
  background:var(--nav);
  border-top:1px solid var(--bdr);
  padding:4px 0 env(safe-area-inset-bottom,6px);
  flex-shrink:0;
}
.nb {
  flex:1;background:none;border:none;
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  padding:5px 2px 4px;
  position:relative;
  min-height:52px;justify-content:center;
  color:var(--txd);transition:color .2s;
}
.nb.on { color:var(--acc) }
.nb.on::before {
  content:'';position:absolute;top:0;left:25%;right:25%;
  height:2px;background:var(--acc);border-radius:0 0 3px 3px;
}
.nb-label { font-size:10px;font-weight:500;transition:font-weight .2s }
.nb.on .nb-label { font-weight:700 }

/* ═══════════════════════════════
   SCREENS
═══════════════════════════════ */
.scr { display:none }
.scr.on { display:block;animation:fadeUp .2s ease }
@keyframes fadeUp {
  from { opacity:0.3;transform:translateY(4px) }
  to { opacity:1;transform:translateY(0) }
}

/* ═══════════════════════════════
   SECTION LABEL
═══════════════════════════════ */
.slbl {
  font-size:9px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--acc2);margin-bottom:11px;
  display:flex;align-items:center;gap:8px;
}
.slbl::after { content:'';flex:1;height:1px;background:var(--bdr) }

/* ═══════════════════════════════
   CARDS
═══════════════════════════════ */
.card {
  background:var(--card);
  border:1px solid var(--bdr);
  border-radius:18px;
  padding:16px;
  margin-bottom:11px;
  box-shadow:var(--shadow2);
}
.card-grad {
  background:linear-gradient(145deg,var(--bg2),var(--bg4));
  border-color:var(--bdr2);
}
.card-tap {
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.card-tap:active { transform:scale(.97) }

/* ═══════════════════════════════
   BADGES
═══════════════════════════════ */
.badge {
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 9px;border-radius:99px;
  font-size:9px;font-weight:800;letter-spacing:.3px;
}
.badge-s { background:#052e16;color:#22c55e;border:1px solid #22c55e30 }
.badge-h { background:#1c1400;color:#fbbf24;border:1px solid #fbbf2430 }
.badge-acc { background:var(--accd);color:var(--acc2);border:1px solid var(--acc3) }

/* ═══════════════════════════════
   BUTTONS
═══════════════════════════════ */
.btn {
  border:none;border-radius:13px;
  padding:13px 20px;font-size:14px;font-weight:700;
  min-height:50px;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;
  transition:transform .12s,opacity .15s;
}
.btn:active { transform:scale(.95) }
.btn-primary { background:var(--acc);color:#000 }
.btn-secondary { background:var(--bg3);color:var(--tx);border:1.5px solid var(--bdr) }
.btn-ghost {
  background:none;color:var(--txm);
  border:1.5px solid var(--bdr);
  padding:9px 16px;font-size:12px;
  min-height:40px;border-radius:10px;
}
.btn-icon {
  background:none;border:none;
  color:var(--txm);padding:6px;
  min-height:38px;min-width:38px;
  display:flex;align-items:center;justify-content:center;
  border-radius:9px;
}
.btn-icon:active { background:var(--bg3) }
.btn-icon-filled {
  background:var(--bg3);border:1px solid var(--bdr);
  color:var(--txm);padding:8px;
  min-height:38px;min-width:38px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;
}

/* ═══════════════════════════════
   SEARCH BAR
═══════════════════════════════ */
.searchbar {
  display:flex;align-items:center;
  background:var(--bg2);
  border:1.5px solid var(--bdr);
  border-radius:14px;padding:0 14px;
  margin-bottom:13px;gap:9px;
  transition:border-color .2s;min-height:48px;
}
.searchbar:focus-within { border-color:var(--acc) }
.searchbar input {
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-size:14px;padding:12px 0;
}
.searchbar input::placeholder { color:var(--txd) }

/* ═══════════════════════════════
   CHIPS / FILTERS
═══════════════════════════════ */
.chips {
  display:flex;gap:6px;
  margin-bottom:12px;
  overflow-x:auto;padding-bottom:3px;
}
.chips::-webkit-scrollbar { display:none }
.chip {
  background:var(--bg2);color:var(--txm);
  border:1.5px solid var(--bdr);
  border-radius:99px;padding:8px 15px;
  font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;
  transition:all .15s;min-height:38px;
}
.chip.on { background:var(--acc);color:#000;border-color:var(--acc);font-weight:700 }

/* STICKY CHIPS */
.chips-sticky {
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  padding:8px 0 4px;margin:0 -14px 12px;
  padding-left:14px;padding-right:14px;
  border-bottom:1px solid var(--bdr);
}

/* ═══════════════════════════════
   PROGRESS BAR
═══════════════════════════════ */
.progress { height:5px;background:var(--bdr);border-radius:99px;overflow:hidden }
.progress-fill { height:100%;background:var(--acc);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1) }

/* ═══════════════════════════════
   DIVIDER
═══════════════════════════════ */
.divider { border:none;border-top:1px solid var(--bdr);margin:12px 0 }

/* ═══════════════════════════════
   BACK BUTTON
═══════════════════════════════ */
.back-btn {
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg2);border:1.5px solid var(--bdr);
  border-radius:11px;padding:9px 14px;
  color:var(--txm);font-size:13px;font-weight:600;
  margin-bottom:14px;min-height:42px;
}

/* ═══════════════════════════════
   ACCORDION
═══════════════════════════════ */
.accordion-item {
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:15px;margin-bottom:8px;
  overflow:hidden;transition:border-color .2s;
}
.accordion-item.open { border-color:var(--acc) }
.accordion-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 15px;cursor:pointer;
  user-select:none;
}
.accordion-body {
  display:none;padding:0 15px 15px;
  border-top:1px solid var(--bdr);
  padding-top:14px;
}
.accordion-item.open .accordion-body { display:block }
.accordion-arrow {
  width:20px;height:20px;color:var(--txd);
  transition:transform .25s;flex-shrink:0;
}
.accordion-item.open .accordion-arrow { transform:rotate(180deg);color:var(--acc) }

/* ═══════════════════════════════
   LOADING
═══════════════════════════════ */
.loader { text-align:center;padding:50px 16px;color:var(--txm) }
.spinner {
  display:inline-block;width:30px;height:30px;
  border:3px solid var(--bdr);border-top-color:var(--acc);
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;
}
@keyframes spin { to { transform:rotate(360deg) } }

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
#toast {
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--acc);color:#000;
  padding:11px 22px;border-radius:99px;
  font-size:13px;font-weight:700;
  z-index:1000;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 6px 24px #00000050;
}

/* ═══════════════════════════════
   MODAL SHEET
═══════════════════════════════ */
.modal-overlay {
  position:fixed;inset:0;background:var(--overlay);
  z-index:500;display:flex;align-items:flex-end;
}
.modal-sheet {
  background:var(--bg2);
  border-radius:22px 22px 0 0;
  padding:8px 18px env(safe-area-inset-bottom,24px);
  width:100%;max-height:90dvh;overflow-y:auto;
}
.modal-sheet::-webkit-scrollbar { display:none }
.modal-handle {
  width:38px;height:4px;background:var(--bdr2);
  border-radius:99px;margin:12px auto 16px;
}
.modal-title {
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;
  margin-bottom:18px;text-align:center;
}

/* ═══════════════════════════════
   CORAN — MUSHAF MODE
═══════════════════════════════ */
.mushaf-page {
  background:var(--parchment-bg, #fdf5e6);
  border:2px solid var(--parchment-border, #d4c09a);
  border-radius:12px;padding:24px 20px;
  margin-bottom:12px;
}
[data-theme="dark"] .mushaf-page,
[data-theme="midnight"] .mushaf-page,
[data-theme="bordeaux"] .mushaf-page,
[data-theme="violet"] .mushaf-page,
[data-theme="cuir"] .mushaf-page,
[data-theme="emerald"] .mushaf-page,
[data-theme="gold"] .mushaf-page {
  --parchment-bg:#1e1608;
  --parchment-border:#4a3800;
}
[data-theme="light"] .mushaf-page,
[data-theme="parchment"] .mushaf-page,
[data-theme="pearl"] .mushaf-page {
  --parchment-bg:#fdf5e6;
  --parchment-border:#d4c09a;
}
.mushaf-text {
  font-family:'Scheherazade New',serif;
  direction:rtl;text-align:justify;
  line-height:2.4;font-size:var(--ar-size,26px);
  color:var(--tx);
}
.mushaf-number {
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  background:var(--accd);border:1px solid var(--acc3);
  color:var(--acc2);font-size:11px;font-weight:700;
  font-family:'Scheherazade New',serif;
  vertical-align:middle;margin:0 4px;
}

/* ═══════════════════════════════
   VERSE DISPLAY
═══════════════════════════════ */
.verse-card {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:16px;padding:16px;margin-bottom:10px;
}
.verse-arabic {
  font-family:'Scheherazade New',serif;
  direction:rtl;text-align:right;
  line-height:2.1;
  font-size:var(--ar-size,26px);
  color:var(--tx);margin-bottom:12px;
}
.verse-transliteration {
  font-style:italic;color:var(--txm);
  font-size:12px;line-height:1.7;
  margin-bottom:10px;
  border-left:3px solid var(--bdr2);
  padding-left:10px;
}
.verse-translation {
  color:var(--tx2);font-size:13px;line-height:1.7;
}

/* ═══════════════════════════════
   PRAYER CARD — Mawaqit style
═══════════════════════════════ */
.prayer-card {
  background:linear-gradient(160deg,var(--bg3),var(--bg4));
  border:1.5px solid var(--bdr2);
  border-radius:22px;padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.prayer-card::after {
  content:'';position:absolute;
  right:-20px;top:-20px;
  width:120px;height:120px;
  border-radius:50%;
  background:radial-gradient(circle,var(--acc) 0%,transparent 70%);
  opacity:.05;pointer-events:none;
}
.prayer-grid {
  display:grid;grid-template-columns:repeat(5,1fr);gap:5px;
  margin-top:14px;
}
.prayer-item {
  text-align:center;padding:9px 3px;
  border-radius:12px;
  background:#ffffff06;
  border:1px solid #ffffff0a;
  transition:all .2s;
}
.prayer-item.active {
  background:var(--acc);
  border-color:var(--acc);
}
.prayer-item-name {
  font-size:9px;font-weight:600;color:var(--txm);
  margin-bottom:3px;
}
.prayer-item.active .prayer-item-name { color:#000 }
.prayer-item-time {
  font-size:12px;font-weight:700;color:var(--txd);
}
.prayer-item.active .prayer-item-time { color:#000 }

/* ═══════════════════════════════
   ASMA GRID
═══════════════════════════════ */
.asma-grid {
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.asma-item {
  background:var(--card);border:1.5px solid var(--bdr);
  border-radius:14px;padding:12px 8px;
  cursor:pointer;transition:all .2s;
  text-align:center;
  min-height:90px;
}
.asma-item:active { transform:scale(.95) }
.asma-item.active {
  border-color:var(--acc);
  background:linear-gradient(145deg,var(--bg3),var(--bg4));
  grid-column:span 3;
}
.asma-num { font-size:9px;color:var(--acc);font-weight:800;margin-bottom:5px }
.asma-arabic {
  font-family:'Scheherazade New',serif;
  direction:rtl;font-size:24px;
  color:var(--tx);text-align:center;
  line-height:1.5;margin-bottom:5px;
}
.asma-item.active .asma-arabic { font-size:30px;margin-bottom:8px }
.asma-name { font-size:10px;font-weight:600;color:var(--txm) }
.asma-item.active .asma-name { font-size:14px;font-weight:700;color:var(--tx);margin-bottom:10px }
.asma-detail {
  margin-top:12px;padding-top:12px;
  border-top:1px solid var(--bdr);
  display:none;text-align:left;
}
.asma-item.active .asma-detail { display:block }

/* ═══════════════════════════════
   TASBIH
═══════════════════════════════ */
.tasbih-circle {
  width:170px;height:170px;border-radius:50%;
  background:linear-gradient(145deg,var(--bg3),var(--bg4));
  border:3px solid var(--bdr2);
  margin:14px auto 10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  box-shadow:0 0 40px #00000030,inset 0 2px 4px #ffffff08;
  transition:transform .1s,border-color .3s;
}
.tasbih-circle:active { transform:scale(.93) }
.tasbih-circle.done { border-color:var(--gr);box-shadow:0 0 40px #22c55e15 }
.tasbih-count {
  font-size:68px;font-weight:900;
  color:var(--acc);line-height:1;
  font-variant-numeric:tabular-nums;
}
.tasbih-circle.done .tasbih-count { color:var(--gr) }

/* ═══════════════════════════════
   ONBOARDING
═══════════════════════════════ */
.onboard {
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;text-align:center;
  overflow:hidden;
}
.onboard-logo {
  width:80px;height:80px;margin-bottom:20px;
}
.onboard-title {
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;
  color:var(--acc);margin-bottom:8px;
}
.onboard-sub {
  font-size:13px;color:var(--txm);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:32px;
}

/* ═══════════════════════════════
   SETTINGS
═══════════════════════════════ */
.setting-row {
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--bdr);
}
.setting-row:last-child { border-bottom:none }
.setting-label { font-size:14px;font-weight:500 }
.setting-sub { font-size:11px;color:var(--txm);margin-top:2px }
.theme-grid {
  display:grid;grid-template-columns:repeat(5,1fr);gap:7px;
  margin-top:10px;margin-bottom:18px;
}
.theme-btn {
  aspect-ratio:1;border-radius:12px;
  border:2.5px solid transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:transform .15s;
}
.theme-btn:active { transform:scale(.9) }
.theme-btn.on { border-color:var(--acc) }

/* ═══════════════════════════════
   SLIDER
═══════════════════════════════ */
input[type="range"] {
  -webkit-appearance:none;appearance:none;
  width:100%;height:4px;background:var(--bdr);
  border-radius:99px;outline:none;cursor:pointer;
  touch-action:none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:26px;height:26px;border-radius:50%;
  background:var(--acc);
  box-shadow:0 2px 8px #00000040;
  cursor:grab;
}

/* ═══════════════════════════════
   INSTALL BUTTON
═══════════════════════════════ */
#install-btn {
  display:none;position:fixed;
  bottom:84px;left:50%;transform:translateX(-50%);
  background:var(--acc);color:#000;
  padding:11px 24px;border-radius:99px;
  font-weight:700;font-size:13px;z-index:200;border:none;
  box-shadow:0 6px 24px #00000050;white-space:nowrap;
}

/* ═══════════════════════════════
   STREAK BANNER
═══════════════════════════════ */
.streak-banner {
  background:linear-gradient(135deg,#1c1400,#2c2000);
  border:1.5px solid #fbbf2430;
  border-radius:16px;padding:14px 16px;
  margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
}

/* ═══════════════════════════════
   GLOBAL OVERFLOW FIX
═══════════════════════════════ */
* { max-width:100%; }
img, svg { max-width:100%;height:auto; }
.scr { overflow-x:hidden;width:100%; }
.card { overflow:hidden; }
.prayer-card { overflow:hidden; }

.icon-12 { width:12px !important;height:12px !important;flex-shrink:0 }
.icon-13 { width:13px !important;height:13px !important;flex-shrink:0 }
.icon-14 { width:14px !important;height:14px !important;flex-shrink:0 }
.icon-18 { width:18px !important;height:18px !important;flex-shrink:0 }
.icon-20 { width:20px !important;height:20px !important;flex-shrink:0 }
.icon-22 { width:22px !important;height:22px !important;flex-shrink:0 }
.icon-24 { width:24px !important;height:24px !important;flex-shrink:0 }
.icon-28 { width:28px !important;height:28px !important;flex-shrink:0 }
.icon-32 { width:32px !important;height:32px !important;flex-shrink:0 }
.icon svg { width:100% !important;height:100% !important;display:block }
/* ─────────────────────────────
   DRAG HANDLE & MODAL UPGRADES
───────────────────────────── */
.modal-overlay {
  position:fixed;inset:0;background:var(--overlay,#00000085);
  z-index:500;display:flex;align-items:flex-end;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet {
  background:var(--bg2);
  border-radius:22px 22px 0 0;
  padding:0 18px env(safe-area-inset-bottom,24px);
  width:100%;max-height:92dvh;
  overflow-y:auto;overflow-x:hidden;
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  user-select:none;
}
.modal-sheet::-webkit-scrollbar{display:none}
.drag-handle-wrap {
  position:sticky;top:0;background:var(--bg2);
  padding:10px 0 6px;z-index:10;
  display:flex;justify-content:center;
}
.modal-handle {
  width:40px;height:4px;background:var(--bdr2);
  border-radius:99px;cursor:grab;
}

/* Quick theme button */
.quick-theme-btn {
  position:fixed;bottom:80px;right:16px;
  width:44px;height:44px;border-radius:50%;
  background:var(--acc);color:#000;
  border:none;z-index:100;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px #00000050;
  cursor:pointer;transition:transform .15s;
}
.quick-theme-btn:active{transform:scale(.9)}

/* Theme panel */
.theme-panel {
  position:fixed;inset:0;z-index:600;
  background:var(--overlay,#00000085);
  display:flex;align-items:flex-end;
  animation:fadeIn .2s ease;
}
.theme-panel-sheet {
  background:var(--bg2);
  border-radius:22px 22px 0 0;
  padding:0 16px env(safe-area-inset-bottom,20px);
  width:100%;max-height:85dvh;
  overflow-y:auto;
}
.theme-panel-sheet::-webkit-scrollbar{display:none}
.theme-cat-label {
  font-size:9px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--txm);
  margin:16px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.theme-cat-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.themes-row {
  display:flex;gap:8px;margin-bottom:4px;overflow-x:auto;padding-bottom:4px;
}
.themes-row::-webkit-scrollbar{display:none}
.theme-swatch {
  flex-shrink:0;width:64px;cursor:pointer;
}
.theme-swatch-color {
  height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid transparent;
  transition:border-color .15s,transform .15s;
}
.theme-swatch-color:active{transform:scale(.93)}
.theme-swatch-color.on{border-color:var(--acc)}
.theme-swatch-dot {
  width:18px;height:18px;border-radius:50%;
  box-shadow:0 0 8px currentColor;
}
.theme-swatch-label {
  font-size:9px;text-align:center;
  margin-top:5px;font-weight:500;
  color:var(--txd);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.theme-swatch-label.on{color:var(--acc);font-weight:700}


/* ═══════════════════════════════
   SPLASH SCREEN
═══════════════════════════════ */
#splash {
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .5s ease;
}
#splash.hide { opacity:0;pointer-events:none }
.splash-logo {
  width:90px;height:90px;margin-bottom:24px;
  animation:splashPulse 1.5s ease infinite;
}
@keyframes splashPulse {
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.06);opacity:.85}
}
.splash-title {
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:700;color:var(--acc);
  margin-bottom:6px;
}
.splash-sub {
  font-size:10px;color:var(--txd);
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:32px;
}
.splash-bar {
  width:120px;height:3px;background:var(--bdr);
  border-radius:99px;overflow:hidden;
}
.splash-bar-fill {
  height:100%;background:var(--acc);
  border-radius:99px;width:0%;
  animation:splashLoad 1.8s ease forwards;
}
@keyframes splashLoad {
  0%{width:0%}
  40%{width:60%}
  80%{width:85%}
  100%{width:100%}
}

/* ═══════════════════════════════
   SHIMMER LOADING
═══════════════════════════════ */
.shimmer {
  background:linear-gradient(90deg,var(--bdr) 25%,var(--bdr2) 50%,var(--bdr) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:10px;
}
@keyframes shimmer {
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.shimmer-card {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:18px;padding:16px;margin-bottom:11px;
}
.shimmer-line { height:14px;margin-bottom:10px; }
.shimmer-line-sm { height:10px;width:60%;margin-bottom:8px; }
.shimmer-ar { height:32px;margin-bottom:14px; }

/* ═══════════════════════════════
   SWIPE BETWEEN TABS
═══════════════════════════════ */
#cnt {
  touch-action:pan-y;
}
.swipe-hint {
  position:fixed;bottom:64px;left:50%;
  transform:translateX(-50%);
  background:var(--bg4);border:1px solid var(--bdr);
  border-radius:99px;padding:6px 14px;
  font-size:11px;color:var(--txm);
  opacity:0;animation:hintFade 3s ease forwards;
  pointer-events:none;z-index:50;
  white-space:nowrap;
}
@keyframes hintFade {
  0%{opacity:0}10%{opacity:1}70%{opacity:1}100%{opacity:0}
}

/* ═══════════════════════════════
   GLOBAL SEARCH
═══════════════════════════════ */
.global-search-overlay {
  position:fixed;inset:0;z-index:800;
  background:var(--bg);
  display:flex;flex-direction:column;
  animation:slideDown .2s ease;
}
@keyframes slideDown {
  from{transform:translateY(-10px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.global-search-bar {
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--bdr);
}
.global-search-input {
  flex:1;background:var(--bg2);border:1.5px solid var(--bdr);
  border-radius:13px;padding:12px 16px;
  font-size:15px;color:var(--tx);outline:none;
  font-family:'Outfit',sans-serif;
}
.global-search-input:focus{border-color:var(--acc)}
.global-search-results {
  flex:1;overflow-y:auto;padding:12px 16px;
}
.global-search-results::-webkit-scrollbar{display:none}
.search-result-item {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:14px;padding:14px;margin-bottom:8px;
  cursor:pointer;transition:transform .12s;
}
.search-result-item:active{transform:scale(.98)}
.search-result-type {
  font-size:9px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--acc);margin-bottom:6px;
}
.search-result-text {
  font-size:13px;color:var(--tx2);line-height:1.6;
}
.search-result-sub {
  font-size:10px;color:var(--txd);margin-top:5px;
}
.search-highlight {
  background:var(--accd);color:var(--acc);
  border-radius:3px;padding:0 2px;font-weight:700;
}

/* ═══════════════════════════════
   BOOKMARK BUTTON
═══════════════════════════════ */
.bookmark-btn {
  background:none;border:none;
  font-size:20px;padding:4px;
  min-height:36px;min-width:36px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.bookmark-btn:active{transform:scale(1.3)}

/* ═══════════════════════════════
   READING PROGRESS BAR
═══════════════════════════════ */
.reading-progress {
  position:sticky;top:0;z-index:5;
  height:2px;background:var(--bdr);
  margin:-14px -14px 14px;
}
.reading-progress-fill {
  height:100%;background:var(--acc);
  transition:width .3s;
}

/* ═══════════════════════════════
   TAFSIR PANEL
═══════════════════════════════ */
.tafsir-panel {
  background:var(--bg3);border-radius:12px;
  padding:13px;margin-top:10px;
  border-left:3px solid var(--acc);
}
.tafsir-label {
  font-size:9px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--acc);margin-bottom:7px;
}
.tafsir-text {
  font-size:12px;color:var(--tx2);line-height:1.7;
}

/* ═══════════════════════════════
   JUZ BADGE
═══════════════════════════════ */
.juz-badge {
  display:inline-flex;align-items:center;gap:5px;
  background:var(--accd);border:1px solid var(--acc3);
  border-radius:8px;padding:4px 10px;
  font-size:10px;font-weight:700;color:var(--acc2);
  margin-bottom:12px;
}

/* ═══════════════════════════════
   REWARD BANNER (hadith/dua)
═══════════════════════════════ */
.reward-banner {
  background:linear-gradient(135deg,#052e16,#0a3d20);
  border:1px solid #22c55e25;
  border-radius:10px;padding:9px 12px;
  margin-top:9px;font-size:11px;
  color:var(--grs);line-height:1.5;
  display:flex;align-items:flex-start;gap:8px;
}
.reward-icon {
  width:16px;height:16px;flex-shrink:0;margin-top:1px;
}

/* ═══════════════════════════════
   SECTION TABS (Sunnah etc)
═══════════════════════════════ */
.section-tabs {
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:3px;margin-bottom:13px;
}
.section-tabs::-webkit-scrollbar{display:none}
.section-tab {
  background:var(--bg2);color:var(--txm);
  border:1.5px solid var(--bdr);border-radius:99px;
  padding:8px 15px;font-size:12px;font-weight:500;
  white-space:nowrap;cursor:pointer;min-height:38px;
  transition:all .15s;
}
.section-tab.on {
  background:var(--acc);color:#000;
  border-color:var(--acc);font-weight:700;
}

/* ═══════════════════════════════
   FIQH / SIRA CARDS
═══════════════════════════════ */
.step-card {
  background:var(--card);border:1px solid var(--bdr);
  border-radius:16px;padding:16px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.step-number {
  position:absolute;right:16px;top:14px;
  width:28px;height:28px;border-radius:50%;
  background:var(--accd);border:1.5px solid var(--acc3);
  display:flex;align-items:center;justify-content:center;
  color:var(--acc);font-size:11px;font-weight:800;
}
.step-title {
  font-size:14px;font-weight:700;color:var(--acc);
  margin-bottom:7px;padding-right:36px;
}
.step-content {
  font-size:13px;color:var(--tx2);line-height:1.7;
}
.step-arabic {
  font-family:'Scheherazade New',serif;
  direction:rtl;text-align:right;
  font-size:var(--ar-size,26px);
  color:var(--tx);margin:10px 0;
}
.sira-date {
  display:inline-block;background:var(--accd);
  border-radius:7px;padding:2px 9px;
  font-size:10px;font-weight:700;color:var(--acc2);
  margin-bottom:8px;
}

/* ═══════════════════════════════
   BETTER SHARE
═══════════════════════════════ */
.share-menu {
  position:fixed;inset:0;z-index:700;
  background:var(--overlay,#00000085);
  display:flex;align-items:flex-end;
}
.share-sheet {
  background:var(--bg2);border-radius:22px 22px 0 0;
  padding:16px 18px env(safe-area-inset-bottom,20px);
  width:100%;
}
.share-preview {
  background:var(--bg3);border-radius:14px;
  padding:16px;margin-bottom:16px;
  border:1px solid var(--bdr);
}
.share-option {
  display:flex;align-items:center;gap:12px;
  padding:14px 0;border-bottom:1px solid var(--bdr);
  cursor:pointer;
}
.share-option:last-child{border-bottom:none}
.share-option-icon {
  width:42px;height:42px;border-radius:12px;
  background:var(--bg4);border:1px solid var(--bdr2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.share-option-label {
  font-size:14px;font-weight:500;
}

/* ═══════════════════════════════
   AUTO DARK MODE INDICATOR
═══════════════════════════════ */
.auto-mode-badge {
  display:inline-flex;align-items:center;gap:4px;
  background:var(--accd);border-radius:99px;
  padding:3px 9px;font-size:10px;font-weight:600;
  color:var(--acc);
}

/* ═══════════════════════════════
   HISTORY / LAST READ
═══════════════════════════════ */
.history-item {
  display:flex;align-items:center;gap:11px;
  background:var(--card);border:1px solid var(--bdr);
  border-radius:13px;padding:12px 14px;
  margin-bottom:7px;cursor:pointer;
  transition:transform .12s;
}
.history-item:active{transform:scale(.98)}
.history-icon {
  width:38px;height:38px;border-radius:10px;
  background:var(--accd);border:1.5px solid var(--acc3);
  display:flex;align-items:center;justify-content:center;
  color:var(--acc);font-size:11px;font-weight:800;
  flex-shrink:0;
}

/* ═══════════════════════════════
   SEARCH BUTTON IN HEADER
═══════════════════════════════ */
.hdr-search-btn {
  background:var(--bg3);border:1px solid var(--bdr);
  border-radius:10px;padding:7px;color:var(--txm);
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;cursor:pointer;border:none;
}

/* ═══════════════════════════════
   GO TO VERSE
═══════════════════════════════ */
.goto-verse-bar {
  display:flex;align-items:center;gap:8px;
  background:var(--bg2);border:1.5px solid var(--bdr);
  border-radius:13px;padding:8px 12px;
  margin-bottom:13px;
}
.goto-verse-bar input {
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-size:13px;font-family:'Outfit',sans-serif;
}
.goto-verse-bar input::placeholder{color:var(--txd)}


.settings-section-label {
  font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--txm);text-transform:uppercase;
  margin-bottom:10px;margin-top:2px;
}

[data-font-ar="scheherazade"] .ar, [data-font-ar="scheherazade"] .verse-arabic, [data-font-ar="scheherazade"] .step-arabic { font-family:'Scheherazade New',serif !important }
[data-font-ar="amiri"] .ar, [data-font-ar="amiri"] .verse-arabic, [data-font-ar="amiri"] .step-arabic { font-family:'Amiri',serif !important }
[data-font-ar="naskh"] .ar, [data-font-ar="naskh"] .verse-arabic, [data-font-ar="naskh"] .step-arabic { font-family:'Noto Naskh Arabic',serif !important }
[data-font-ar="kufi"] .ar, [data-font-ar="kufi"] .verse-arabic, [data-font-ar="kufi"] .step-arabic { font-family:'Noto Kufi Arabic',sans-serif !important }
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-hijri" id="hijri-date"></div>
      <div class="hdr-greg" id="greg-date"></div>
    </div>
    <div class="hdr-center">
      <span class="hdr-basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>
      <div class="hdr-title">Islam Authentique</div>
      <div class="hdr-sub">Manhaj As-Salaf</div>
    </div>
    <div class="hdr-right">
      <button class="hdr-settings-btn" onclick="openSettings()" aria-label="Paramètres">
        <span class="icon icon-20">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.34.07-.68.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.82c-.13-.23-.44-.31-.67-.23l-2.74 1.1c-.57-.44-1.18-.8-1.85-1.08l-.41-2.92A.56.56 0 0014 2h-4c-.28 0-.51.21-.55.47l-.41 2.92c-.67.28-1.28.65-1.85 1.08l-2.74-1.1c-.23-.09-.54 0-.67.23L1.58 9.43c-.14.24-.08.54.13.7l2.32 1.82c-.04.34-.07.69-.07 1.05s.03.74.07 1.08L1.71 15.9c-.21.16-.27.46-.13.7l2.2 3.82c.13.23.44.31.67.23l2.74-1.1c.57.44 1.18.8 1.85 1.08l.41 2.92c.04.26.27.47.55.47h4c.28 0 .51-.21.55-.47l.41-2.92c.67-.28 1.28-.65 1.85-1.08l2.74 1.1c.23.09.54 0 .67-.23l2.2-3.82c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
          </svg>
        </span>
      </button>
    </div>
  </header>

  <!-- SCREENS -->
  <div class="cnt" id="cnt">
    <div class="scr on" id="s-home"></div>
    <div class="scr" id="s-quran"></div>
    <div class="scr" id="s-hadith"></div>
    <div class="scr" id="s-adhkar"></div>
    <div class="scr" id="s-more"></div>
  </div>

  <!-- BOTTOM NAV — SVG icons -->
  <nav class="nav">
    <button class="nb on" id="nb-home" onclick="go('home')">
      <span style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </span>
      <span class="nb-label" id="nl-home">Accueil</span>
    </button>
    <button class="nb" id="nb-quran" onclick="go('quran')">
      <span class="icon icon-22">
        <svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>
      </span>
      <span class="nb-label" id="nl-quran">Coran</span>
    </button>

<script>
// ═══════════════════════════════════════════
// DONNÉES COMPLÈTES — Islam Authentique v4
// ═══════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// HADITHS COMPLETS — 120+ tous authentiques
// Sources : Bukhari, Muslim, Abu Dawud, Tirmidhi, Ibn Majah, Nasa'i
// Vérification : Al-Albani رحمه الله
// ═══════════════════════════════════════════════════════
const HADITHS = [
// ── TAWHID & AQIDAH ──
{id:1,ar:"إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ",fr:"Les actes ne valent que par les intentions, et chaque homme n'obtiendra que ce qu'il a eu l'intention de faire.",n:"Umar Ibn Al-Khattab ر",b:"Sahih Al-Bukhari",num:1,a:"Sahih",ref:"Bukhari n°1",th:"Niyyah",reward:""},
{id:2,ar:"أَعْظَمُ الذُّنُوبِ أَنْ تَجْعَلَ لِلَّهِ نِدًّا وَهُوَ خَلَقَكَ",fr:"Le plus grand des péchés est que tu fasses un rival à Allah alors qu'Il t'a créé.",n:"Abdullah Ibn Masud ر",b:"Sahih Al-Bukhari",num:6001,a:"Sahih",ref:"Bukhari n°6001",th:"Tawhid",reward:""},
{id:3,ar:"مَنْ مَاتَ وَهُوَ يَعْلَمُ أَنَّهُ لَا إِلَٰهَ إِلَّا اللهُ دَخَلَ الْجَنَّةَ",fr:"Quiconque meurt en sachant qu'il n'y a de divinité qu'Allah entrera au Paradis.",n:"Abu Dharr Al-Ghifari ر",b:"Sahih Muslim",num:26,a:"Sahih",ref:"Muslim n°26",th:"Tawhid",reward:"Entrée au Paradis"},
{id:4,ar:"مَنْ قَالَ لَا إِلَٰهَ إِلَّا اللهُ مُخْلِصًا دَخَلَ الْجَنَّةَ",fr:"Quiconque dit 'Lâ ilâha illallâh' avec sincérité entrera au Paradis.",n:"Abu Hureyra ر",b:"Musnad Ahmad",num:9312,a:"Sahih",ref:"Silsilah n°3355",th:"Tawhid",reward:"Entrée au Paradis"},
{id:5,ar:"لَعَنَ اللهُ مَنِ اتَّخَذَ قَبْرَ نَبِيِّهِ مَسْجِدًا",fr:"Allah a maudit quiconque prend la tombe de son prophète comme lieu de prière.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:435,a:"Sahih",ref:"Bukhari n°435",th:"Tawhid",reward:""},
// ── BID'AH & SUNNAH ──
{id:6,ar:"مَنْ أَحْدَثَ فِي أَمْرِنَا هَذَا مَا لَيْسَ مِنْهُ فَهُوَ رَدٌّ",fr:"Quiconque introduit dans notre religion quelque chose qui n'en fait pas partie, cela sera rejeté.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:2697,a:"Sahih",ref:"Bukhari n°2697",th:"Bid'ah",reward:""},
{id:7,ar:"عَلَيْكُمْ بِسُنَّتِي وَسُنَّةِ الْخُلَفَاءِ الرَّاشِدِينَ الْمَهْدِيِّينَ مِنْ بَعْدِي",fr:"Tenez-vous à ma Sunnah et à la Sunnah des califes bien guidés après moi. Mordez-y avec les molaires.",n:"Al-Irbad Ibn Sariya ر",b:"Sunan Abu Dawud",num:4607,a:"Sahih",ref:"Silsilah n°2735",th:"Sunnah",reward:""},
{id:8,ar:"خَيْرُ الْقُرُونِ قَرْنِي ثُمَّ الَّذِينَ يَلُونَهُمْ ثُمَّ الَّذِينَ يَلُونَهُمْ",fr:"La meilleure génération est la mienne, puis celle qui suit, puis celle qui suit.",n:"Abdullah Ibn Masud ر",b:"Sahih Al-Bukhari",num:3651,a:"Sahih",ref:"Bukhari n°3651",th:"Salaf",reward:""},
{id:9,ar:"كُلُّ بِدْعَةٍ ضَلَالَةٌ وَكُلُّ ضَلَالَةٍ فِي النَّارِ",fr:"Toute innovation est un égarement et tout égarement conduit au Feu.",n:"Jabir Ibn Abdillah ر",b:"Sahih Muslim",num:867,a:"Sahih",ref:"Muslim n°867",th:"Bid'ah",reward:""},
{id:10,ar:"مَنْ رَغِبَ عَنْ سُنَّتِي فَلَيْسَ مِنِّي",fr:"Quiconque se détourne de ma Sunnah n'est pas des miens.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:5063,a:"Sahih",ref:"Bukhari n°5063",th:"Sunnah",reward:""},
// ── IMAN & PILLIERS ──
{id:11,ar:"الدِّينُ النَّصِيحَةُ",fr:"La religion, c'est la sincérité (An-Nasiha). Pour Allah, pour Son Livre, pour Son Messager, pour les imams des musulmans et pour l'ensemble des musulmans.",n:"Tamim Ad-Dari ر",b:"Sahih Muslim",num:55,a:"Sahih",ref:"Muslim n°55",th:"Nasiha",reward:""},
{id:12,ar:"بُنِيَ الإِسْلَامُ عَلَى خَمْسٍ شَهَادَةِ أَنْ لَا إِلَهَ إِلَّا اللهُ",fr:"L'Islam est bâti sur cinq piliers : le témoignage qu'il n'y a de divinité qu'Allah et que Muhammad est Son messager, l'accomplissement de la prière, l'acquittement de la zakat, le pèlerinage et le jeûne du Ramadan.",n:"Ibn Umar ر",b:"Sahih Al-Bukhari",num:8,a:"Sahih",ref:"Bukhari n°8",th:"Pilliers",reward:""},
{id:13,ar:"لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ",fr:"Aucun de vous n'est (pleinement) croyant tant qu'il n'aime pas pour son frère ce qu'il aime pour lui-même.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:13,a:"Sahih",ref:"Bukhari n°13",th:"Fraternité",reward:""},
{id:14,ar:"الطَّهُورُ شَطْرُ الإِيمَانِ",fr:"La pureté est la moitié de la foi. Al-Hamdulillah remplit la balance. Subhan Allah et Al-Hamdulillah remplissent ensemble — ou l'un d'eux remplit — ce qui est entre les cieux et la terre.",n:"Abu Malik Al-Ash'ari ر",b:"Sahih Muslim",num:223,a:"Sahih",ref:"Muslim n°223",th:"Taharah",reward:"Récompense équivalant à remplir l'espace entre les cieux et la terre"},
{id:15,ar:"أَكْمَلُ الْمُؤْمِنِينَ إِيمَانًا أَحْسَنُهُمْ خُلُقًا",fr:"Parmi les croyants, celui qui a la foi la plus parfaite est celui qui a le meilleur caractère.",n:"Abu Hureyra ر",b:"Sunan Abu Dawud",num:4682,a:"Sahih",ref:"Silsilah n°284",th:"Akhlaq",reward:""},
{id:16,ar:"مَنْ يُرِدِ اللهُ بِهِ خَيْرًا يُفَقِّهْهُ فِي الدِّينِ",fr:"Quand Allah veut du bien à quelqu'un, Il lui donne la compréhension de la religion.",n:"Mu'awiya Ibn Abi Sufyan ر",b:"Sahih Al-Bukhari",num:71,a:"Sahih",ref:"Bukhari n°71",th:"'Ilm",reward:"Signe de la bienveillance d'Allah"},
// ── SCIENCE & CONNAISSANCE ──
{id:17,ar:"خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ",fr:"Le meilleur d'entre vous est celui qui apprend le Coran et l'enseigne.",n:"Uthman Ibn Affan ر",b:"Sahih Al-Bukhari",num:5027,a:"Sahih",ref:"Bukhari n°5027",th:"Coran",reward:"Être le meilleur"},
{id:18,ar:"مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ",fr:"Quiconque emprunte un chemin pour y chercher de la connaissance, Allah lui facilite un chemin vers le Paradis.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2699,a:"Sahih",ref:"Muslim n°2699",th:"'Ilm",reward:"Facilitation du chemin vers le Paradis"},
{id:19,ar:"طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ",fr:"La recherche de la connaissance (religieuse) est une obligation pour tout musulman.",n:"Anas Ibn Malik ر",b:"Sunan Ibn Majah",num:224,a:"Sahih",ref:"Silsilah n°342",th:"'Ilm",reward:"Obligation dont on sera interrogé"},
{id:20,ar:"إِذَا مَاتَ الإِنْسَانُ انْقَطَعَ عَنْهُ عَمَلُهُ إِلَّا مِنْ ثَلَاثَةٍ",fr:"Quand l'être humain meurt, ses actes s'interrompent sauf trois : une aumône continue (Sadaqa Jariya), une connaissance dont on bénéficie, ou un enfant pieux qui fait du du'a pour lui.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1631,a:"Sahih",ref:"Muslim n°1631",th:"'Ilm",reward:"Récompense qui continue après la mort"},
{id:21,ar:"فَضْلُ الْعِلْمِ خَيْرٌ مِنْ فَضْلِ الْعِبَادَةِ",fr:"L'excellence de la connaissance est meilleure que l'excellence du culte voluntaire.",n:"Hudhayfah ر",b:"Sunan Al-Darimi",num:322,a:"Sahih",ref:"Silsilah n°1196",th:"'Ilm",reward:""},
// ── SALAT ──
{id:22,ar:"صَلُّوا كَمَا رَأَيْتُمُونِي أُصَلِّي",fr:"Priez comme vous m'avez vu prier.",n:"Malik Ibn Al-Huwayrit ر",b:"Sahih Al-Bukhari",num:631,a:"Sahih",ref:"Bukhari n°631",th:"Salat",reward:""},
{id:23,ar:"أَوَّلُ مَا يُحَاسَبُ بِهِ الْعَبْدُ يَوْمَ الْقِيَامَةِ الصَّلَاةُ",fr:"La première chose dont le serviteur sera rendu compte au Jour du Jugement, c'est la prière. Si elle est bonne, tout le reste de ses actes sera bon. Si elle est mauvaise, tout le reste sera mauvais.",n:"Abu Hureyra ر",b:"Sunan At-Tirmidhi",num:413,a:"Sahih",ref:"Silsilah n°1358",th:"Salat",reward:""},
{id:24,ar:"الصَّلَاةُ عِمَادُ الدِّينِ مَنْ أَقَامَهَا فَقَدْ أَقَامَ الدِّينَ",fr:"La prière est le pilier de la religion. Quiconque l'établit a établi la religion, quiconque la détruit a détruit la religion.",n:"Mu'adh Ibn Jabal ر",b:"Shu'ab Al-Iman (Bayhaqi)",num:2549,a:"Sahih",ref:"Silsilah n°1574",th:"Salat",reward:""},
{id:25,ar:"مَنْ حَافَظَ عَلَى الصَّلَوَاتِ الْخَمْسِ كَانَتْ لَهُ نُورًا وَبُرْهَانًا وَنَجَاةً",fr:"Quiconque est assidu aux cinq prières, elles seront pour lui une lumière, une preuve et un salut au Jour du Jugement.",n:"Abdullah Ibn Amr ر",b:"Musnad Ahmad",num:6576,a:"Sahih",ref:"Silsilah n°2939",th:"Salat",reward:"Lumière, preuve et salut au Jour du Jugement"},
{id:26,ar:"صَلَاةٌ فِي الْمَسْجِدِ الْحَرَامِ أَفْضَلُ مِنْ مِائَةِ أَلْفِ صَلَاةٍ",fr:"Une prière dans la Mosquée Sacrée vaut mieux que cent mille prières ailleurs.",n:"Jabir ر",b:"Sunan Ibn Majah",num:1406,a:"Sahih",ref:"Silsilah n°1648",th:"Salat",reward:"100 000 fois la récompense"},
{id:27,ar:"أَفْضَلُ الصَّلَاةِ بَعْدَ الْفَرِيضَةِ صَلَاةُ اللَّيْلِ",fr:"La meilleure prière après la prière obligatoire est la prière de nuit (Qiyam Al-Layl).",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1163,a:"Sahih",ref:"Muslim n°1163",th:"Salat",reward:""},
// ── AKHLAQ ──
{id:28,ar:"إِنَّمَا بُعِثْتُ لِأُتَمِّمَ مَكَارِمَ الأَخْلَاقِ",fr:"Je n'ai été envoyé que pour parfaire les nobles caractères.",n:"Abu Hureyra ر",b:"Muwatta' Malik",num:1614,a:"Sahih",ref:"Silsilah n°45",th:"Akhlaq",reward:""},
{id:29,ar:"مَنْ كَانَ يُؤْمِنُ بِاللهِ وَالْيَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ",fr:"Que celui qui croit en Allah et au Jour Dernier dise quelque chose de bien ou qu'il se taise.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6018,a:"Sahih",ref:"Bukhari n°6018",th:"Akhlaq",reward:""},
{id:30,ar:"إِنَّ اللهَ لَا يَنْظُرُ إِلَى صُوَرِكُمْ وَأَمْوَالِكُمْ وَلَكِنْ يَنْظُرُ إِلَى قُلُوبِكُمْ وَأَعْمَالِكُمْ",fr:"Allah ne regarde pas vos apparences ni vos richesses, mais Il regarde vos cœurs et vos actes.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2564,a:"Sahih",ref:"Muslim n°2564",th:"Akhlaq",reward:""},
{id:31,ar:"الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ",fr:"Le musulman est celui dont les musulmans sont préservés de sa langue et de sa main. Le muhajir (émigrant) est celui qui abandonne ce qu'Allah a interdit.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:10,a:"Sahih",ref:"Bukhari n°10",th:"Akhlaq",reward:""},
{id:32,ar:"لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ إِنَّمَا الشَّدِيدُ الَّذِي يَمْلِكُ نَفْسَهُ عِنْدَ الْغَضَبِ",fr:"Le fort n'est pas celui qui met les autres à terre. Le fort est celui qui se maîtrise quand il est en colère.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6114,a:"Sahih",ref:"Bukhari n°6114",th:"Akhlaq",reward:""},
{id:33,ar:"لَا تَغْضَبْ وَلَكَ الْجَنَّةُ",fr:"Ne te mets pas en colère, et tu auras le Paradis.",n:"Jabir Ibn Sulaym ر",b:"Sahih Al-Targhib",num:2749,a:"Sahih",ref:"Silsilah n°1724",th:"Akhlaq",reward:"Le Paradis"},
{id:34,ar:"مَنْ حَسُنَ إِسْلَامُ الْمَرْءِ تَرْكُهُ مَا لَا يَعْنِيهِ",fr:"Parmi la beauté de l'Islam d'une personne : délaisser ce qui ne la concerne pas.",n:"Abu Hureyra ر",b:"Sunan At-Tirmidhi",num:2317,a:"Hasan Sahih",ref:"Silsilah n°1228",th:"Akhlaq",reward:""},
{id:35,ar:"إِنَّ مِنْ أَحَبِّكُمْ إِلَيَّ وَأَقْرَبِكُمْ مِنِّي مَجْلِسًا أَحَاسِنَكُمْ أَخْلَاقًا",fr:"Parmi vous, les plus aimés de moi et les plus proches de moi le Jour du Jugement sont ceux qui ont le meilleur caractère.",n:"Jabir ر",b:"Sunan At-Tirmidhi",num:2018,a:"Sahih",ref:"Silsilah n°791",th:"Akhlaq",reward:"Être le plus proche du Prophète ﷺ au Jour du Jugement"},
// ── DHIKR ──
{id:36,ar:"سُبْحَانَ اللهِ وَبِحَمْدِهِ سُبْحَانَ اللهِ الْعَظِيمِ",fr:"Deux paroles légères sur la langue, lourdes dans la balance, chères au Miséricordieux : Subhan Allahi wa bihamdihi, Subhan Allahil Azim.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6682,a:"Sahih",ref:"Bukhari n°6682",th:"Dhikr",reward:"Légères sur la langue, lourdes dans la balance"},
{id:37,ar:"أَفْضَلُ الذِّكْرِ لَا إِلَٰهَ إِلَّا اللهُ وَأَفْضَلُ الدُّعَاءِ الْحَمْدُ لِلَّهِ",fr:"Le meilleur des dhikr est : Lâ ilâha illallâh. Et la meilleure supplication est : Al-Hamdulillah.",n:"Jabir Ibn Abdillah ر",b:"Sunan At-Tirmidhi",num:3383,a:"Sahih",ref:"Silsilah n°1498",th:"Dhikr",reward:""},
{id:38,ar:"مَنْ قَالَ سُبْحَانَ اللهِ وَبِحَمْدِهِ مِئَةَ مَرَّةٍ غُفِرَتْ خَطَايَاهُ",fr:"Quiconque dit 'Subhan Allahi wa bihamdihi' cent fois dans la journée, ses péchés seront effacés, même s'ils étaient aussi nombreux que l'écume de la mer.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6405,a:"Sahih",ref:"Bukhari n°6405",th:"Dhikr",reward:"Effacement des péchés même aussi nombreux que l'écume de la mer"},
{id:39,ar:"مَنْ قَالَ لَا إِلَٰهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ مِئَةَ مَرَّةٍ",fr:"Quiconque dit 'Lâ ilâha illallâhu wahdahu lâ sharîka lahu, lahul-mulku wa lahul-hamdu wa huwa alâ kulli shay'in qadîr' cent fois dans la journée, cela équivaut à libérer dix esclaves, on lui inscrit cent bonnes actions, on efface cent de ses mauvaises actions, et c'est une protection contre le Shaytan toute la journée.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:3293,a:"Sahih",ref:"Bukhari n°3293",th:"Dhikr",reward:"Équivaut à libérer 10 esclaves, 100 bonnes actions, protection contre le Shaytan"},
{id:40,ar:"كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ ثَقِيلَتَانِ فِي الْمِيزَانِ",fr:"Deux paroles légères sur la langue, lourdes dans la balance, chères au Miséricordieux : Subhan Allahi wa bihamdihi, Subhan Allahil Azim.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6682,a:"Sahih",ref:"Bukhari n°6682",th:"Dhikr",reward:"Lourdes dans la balance divine"},
// ── SABR & TAWAKKUL ──
{id:41,ar:"عَجَبًا لِأَمْرِ الْمُؤْمِنِ إِنَّ أَمْرَهُ كُلَّهُ خَيْرٌ",fr:"Étonnante est la situation du croyant ! Tout ce qui lui arrive est bon pour lui — et cela n'appartient qu'au croyant : s'il lui arrive quelque chose d'agréable il remercie Allah et c'est bon pour lui ; s'il lui arrive une épreuve il endure et c'est bon pour lui.",n:"Suhaib Ibn Sinan ر",b:"Sahih Muslim",num:2999,a:"Sahih",ref:"Muslim n°2999",th:"Sabr",reward:""},
{id:42,ar:"مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ وَلَا هَمٍّ",fr:"Aucune fatigue, maladie, souci, tristesse, préjudice ni peine ne touche le musulman — même une épine qui le pique — sans qu'Allah n'expie par cela ses péchés.",n:"Abu Sa'id et Abu Hureyra ر",b:"Sahih Al-Bukhari",num:5641,a:"Sahih",ref:"Bukhari n°5641",th:"Sabr",reward:"Expiation des péchés pour toute affliction"},
{id:43,ar:"احْرِصْ عَلَى مَا يَنْفَعُكَ وَاسْتَعِنْ بِاللهِ وَلَا تَعْجَزْ",fr:"Sois avide de ce qui te profite, cherche l'aide d'Allah et ne sois pas impuissant. Si quelque chose te touche, ne dis pas : 'Si j'avais fait ceci...' mais dis : 'Allah a décrété et ce qu'Il a voulu Il l'a fait.'",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2664,a:"Sahih",ref:"Muslim n°2664",th:"Tawakkul",reward:""},
{id:44,ar:"إِنَّمَا الصَّبْرُ عِنْدَ الصَّدْمَةِ الأُولَى",fr:"La vraie patience n'est qu'au premier choc.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:1283,a:"Sahih",ref:"Bukhari n°1283",th:"Sabr",reward:""},
{id:45,ar:"مَا أُعْطِيَ أَحَدٌ عَطَاءً خَيْرًا وَأَوْسَعَ مِنَ الصَّبْرِ",fr:"Personne n'a reçu un don meilleur et plus vaste que la patience.",n:"Abu Sa'id Al-Khudri ر",b:"Sahih Al-Bukhari",num:1469,a:"Sahih",ref:"Bukhari n°1469",th:"Sabr",reward:"Le meilleur et le plus vaste des dons"},
// ── FAMILLE ──
{id:46,ar:"كُلُّكُمْ رَاعٍ وَكُلُّكُمْ مَسْؤُولٌ عَنْ رَعِيَّتِهِ",fr:"Vous êtes tous des bergers et chacun de vous est responsable de son troupeau. L'imam est un berger et il est responsable. L'homme est un berger pour sa famille et il est responsable. La femme est une bergère pour la maison de son mari et elle est responsable.",n:"Abdullah Ibn Umar ر",b:"Sahih Al-Bukhari",num:893,a:"Sahih",ref:"Bukhari n°893",th:"Famille",reward:""},
{id:47,ar:"الْجَنَّةُ تَحْتَ أَقْدَامِ الأُمَّهَاتِ",fr:"Le Paradis est sous les pieds des mères.",n:"Mu'awiyah Ibn Jahima ر",b:"Sunan An-Nasa'i",num:3104,a:"Sahih",ref:"Silsilah n°593",th:"Famille",reward:"Le Paradis pour celui qui honore sa mère"},
{id:48,ar:"خَيْرُكُمْ خَيْرُكُمْ لِأَهْلِهِ وَأَنَا خَيْرُكُمْ لِأَهْلِي",fr:"Le meilleur d'entre vous est celui qui est le meilleur avec sa famille, et je suis le meilleur d'entre vous avec ma famille.",n:"Aïcha ر",b:"Sunan At-Tirmidhi",num:3895,a:"Sahih",ref:"Silsilah n°285",th:"Famille",reward:""},
{id:49,ar:"لَا يَجْزِي وَلَدٌ وَالِدَهُ إِلَّا أَنْ يَجِدَهُ مَمْلُوكًا فَيَشْتَرِيَهُ فَيُعْتِقَهُ",fr:"Un fils ne peut pas pleinement rendre à son père ce qu'il lui doit, sauf s'il le trouve esclave et l'achète pour l'affranchir.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:1510,a:"Sahih",ref:"Muslim n°1510",th:"Famille",reward:""},
{id:50,ar:"رِضَا الرَّبِّ فِي رِضَا الْوَالِدِ وَسَخَطُ الرَّبِّ فِي سَخَطِ الْوَالِدِ",fr:"La satisfaction du Seigneur est dans la satisfaction du père, et la colère du Seigneur est dans la colère du père.",n:"Abdullah Ibn Amr ر",b:"Sunan At-Tirmidhi",num:1899,a:"Sahih",ref:"Silsilah n°516",th:"Famille",reward:"La satisfaction d'Allah"},
// ── RAMADAN & SIYAM ──
{id:51,ar:"مَنْ صَامَ رَمَضَانَ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque jeûne le Ramadan avec foi et en espérant la récompense d'Allah, ses péchés passés lui seront pardonnés.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:38,a:"Sahih",ref:"Bukhari n°38",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:52,ar:"الصَّوْمُ جُنَّةٌ فَإِذَا كَانَ يَوْمُ صَوْمِ أَحَدِكُمْ فَلَا يَرْفُثْ وَلَا يَصْخَبْ",fr:"Le jeûne est un bouclier. Lorsque l'un de vous jeûne, qu'il n'ait pas de propos obscènes et qu'il ne fasse pas de bruit. Si quelqu'un l'insulte ou l'attaque, qu'il dise : 'Je jeûne.'",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1894,a:"Sahih",ref:"Bukhari n°1894",th:"Siyam",reward:"Bouclier contre le Feu"},
{id:53,ar:"مَنْ قَامَ رَمَضَانَ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque effectue la prière de nuit durant le Ramadan avec foi et en espérant la récompense, ses péchés passés lui seront pardonnés.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:37,a:"Sahih",ref:"Bukhari n°37",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:54,ar:"مَنْ فَطَّرَ صَائِمًا كَانَ لَهُ مِثْلُ أَجْرِهِ",fr:"Quiconque offre l'iftar à un jeûneur recevra la même récompense que lui, sans que cela ne diminue en rien la récompense du jeûneur.",n:"Zayd Ibn Khalid ر",b:"Sunan At-Tirmidhi",num:807,a:"Sahih",ref:"Silsilah n°1541",th:"Ramadan",reward:"Même récompense que le jeûneur"},
// ── SADAQA ──
{id:55,ar:"الصَّدَقَةُ تُطْفِئُ الْخَطِيئَةَ كَمَا يُطْفِئُ الْمَاءُ النَّارَ",fr:"L'aumône éteint le péché comme l'eau éteint le feu.",n:"Mu'adh Ibn Jabal ر",b:"Sunan At-Tirmidhi",num:2616,a:"Sahih",ref:"Silsilah n°928",th:"Sadaqa",reward:"Expiation des péchés"},
{id:56,ar:"مَا نَقَصَتْ صَدَقَةٌ مِنْ مَالٍ وَمَا زَادَ اللهُ عَبْدًا بِعَفْوٍ إِلَّا عِزًّا",fr:"Une aumône ne diminue jamais un patrimoine. Allah n'augmente le serviteur qui pardonne qu'en honneur. Et quiconque s'humilie pour Allah, Allah l'élève.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2588,a:"Sahih",ref:"Muslim n°2588",th:"Sadaqa",reward:"Accroissement de la richesse, de l'honneur et du rang"},
{id:57,ar:"اتَّقُوا النَّارَ وَلَوْ بِشِقِّ تَمْرَةٍ",fr:"Protégez-vous du Feu même en donnant la moitié d'une datte.",n:"Adi Ibn Hatim ر",b:"Sahih Al-Bukhari",num:1413,a:"Sahih",ref:"Bukhari n°1413",th:"Sadaqa",reward:"Protection contre le Feu"},
// ── MORT & AKHIRA ──
{id:58,ar:"أَكْثِرُوا ذِكْرَ هَاذِمِ اللَّذَّاتِ الْمَوْتِ",fr:"Évoquez souvent le destructeur des plaisirs : la mort.",n:"Abu Hureyra ر",b:"Sunan At-Tirmidhi",num:2307,a:"Sahih",ref:"Silsilah n°1421",th:"Mort",reward:""},
{id:59,ar:"الْكَيِّسُ مَنْ دَانَ نَفْسَهُ وَعَمِلَ لِمَا بَعْدَ الْمَوْتِ",fr:"L'intelligent est celui qui soumet son âme (à Allah) et œuvre pour ce qui vient après la mort. Le faible est celui qui suit ses passions et espère qu'Allah lui accordera ses vœux.",n:"Shaddad Ibn Aws ر",b:"Sunan At-Tirmidhi",num:2459,a:"Sahih",ref:"Silsilah n°1368",th:"Akhira",reward:""},
{id:60,ar:"يُؤْتَى بِالْمَوْتِ يَوْمَ الْقِيَامَةِ كَأَنَّهُ كَبْشٌ أَمْلَحُ",fr:"Le Jour du Jugement, la mort sera amenée sous la forme d'un bélier de couleur mêlée, puis il sera dit : 'Ô gens du Paradis !' Ils regarderont craintivement. On dira : 'Connaissez-vous ceci ?' Ils diront : 'Oui, c'est la mort.' Puis on l'égorgera. Puis on dira : 'Ô gens du Paradis ! Éternité sans mort.'",n:"Abu Sa'id ر",b:"Sahih Al-Bukhari",num:6548,a:"Sahih",ref:"Bukhari n°6548",th:"Akhira",reward:""},
// ── FRATERNITÉ ISLAMIQUE ──
{id:61,ar:"لَا تَحَاسَدُوا وَلَا تَنَاجَشُوا وَلَا تَبَاغَضُوا وَلَا تَدَابَرُوا",fr:"Ne vous jalousez pas, ne vous faites pas concurrence malhonnête, ne vous haïssez pas, ne vous tournez pas le dos, et ne vendez pas par-dessus la vente de votre frère. Soyez serviteurs d'Allah, frères.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:6064,a:"Sahih",ref:"Bukhari n°6064",th:"Fraternité",reward:""},
{id:62,ar:"الْمُؤْمِنُ لِلْمُؤْمِنِ كَالْبُنْيَانِ يَشُدُّ بَعْضُهُ بَعْضًا",fr:"Le croyant est au croyant comme un édifice dont chaque partie renforce les autres.",n:"Abu Musa Al-Ash'ari ر",b:"Sahih Al-Bukhari",num:481,a:"Sahih",ref:"Bukhari n°481",th:"Fraternité",reward:""},
{id:63,ar:"مَثَلُ الْمُؤْمِنِينَ فِي تَوَادِّهِمْ وَتَرَاحُمِهِمْ وَتَعَاطُفِهِمْ كَمَثَلِ الْجَسَدِ",fr:"Les croyants dans leur amour mutuel, leur miséricorde mutuelle et leur compassion mutuelle ressemblent à un seul corps : si un organe souffre, tous les autres organes sont atteints d'insomnie et de fièvre.",n:"An-Nu'man Ibn Bashir ر",b:"Sahih Muslim",num:2586,a:"Sahih",ref:"Muslim n°2586",th:"Fraternité",reward:""},
// ── SCIENCES DU HADITH ──
{id:64,ar:"نَضَّرَ اللهُ امْرَأً سَمِعَ مِنَّا حَدِيثًا فَحَفِظَهُ حَتَّى يُبَلِّغَهُ غَيْرَهُ",fr:"Qu'Allah illumine celui qui a entendu un hadith de nous, l'a mémorisé et l'a transmis. Car il se peut que celui qui porte la connaissance la transmette à quelqu'un qui la comprend mieux que lui.",n:"Ibn Masud ر",b:"Sunan At-Tirmidhi",num:2656,a:"Sahih",ref:"Silsilah n°404",th:"Hadith",reward:"Illumination du visage par Allah"},
{id:65,ar:"مَنْ كَذَبَ عَلَيَّ مُتَعَمِّدًا فَلْيَتَبَوَّأْ مَقْعَدَهُ مِنَ النَّارِ",fr:"Quiconque ment sur moi intentionnellement, qu'il prépare sa place dans le Feu.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:110,a:"Sahih",ref:"Bukhari n°110",th:"Hadith",reward:""},
// ── DIVERS ──
{id:66,ar:"إِنَّ اللهَ رَفِيقٌ يُحِبُّ الرِّفْقَ فِي الأَمْرِ كُلِّهِ",fr:"Allah est doux et Il aime la douceur en toute chose. Il donne pour la douceur ce qu'Il ne donne pas pour la dureté.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:6927,a:"Sahih",ref:"Bukhari n°6927",th:"Rifq",reward:""},
{id:67,ar:"إِنَّ اللهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ",fr:"Allah aime que lorsque l'un d'entre vous accomplit une œuvre, il l'accomplisse parfaitement (avec ihsan).",n:"Aïcha ر",b:"Mu'jam Al-Awsat",num:897,a:"Sahih",ref:"Silsilah n°1113",th:"Ihsan",reward:"L'amour d'Allah"},
{id:68,ar:"الْمُؤْمِنُ الْقَوِيُّ خَيْرٌ وَأَحَبُّ إِلَى اللهِ مِنَ الْمُؤْمِنِ الضَّعِيفِ",fr:"Le croyant fort est meilleur et plus aimé d'Allah que le croyant faible, mais en chacun d'eux il y a du bien. Sois avide de ce qui te profite, cherche l'aide d'Allah et ne sois pas impuissant.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:2664,a:"Sahih",ref:"Muslim n°2664",th:"Force",reward:""},
{id:69,ar:"يَسِّرُوا وَلَا تُعَسِّرُوا وَبَشِّرُوا وَلَا تُنَفِّرُوا",fr:"Facilitez et ne rendez pas difficile, annoncez une bonne nouvelle et ne faites pas fuir.",n:"Anas Ibn Malik ر",b:"Sahih Al-Bukhari",num:69,a:"Sahih",ref:"Bukhari n°69",th:"Yusr",reward:""},
{id:70,ar:"الْحَلَالُ بَيِّنٌ وَالْحَرَامُ بَيِّنٌ وَبَيْنَهُمَا أُمُورٌ مُشْتَبِهَاتٌ",fr:"Le licite est clair et l'illicite est clair, et entre les deux il y a des choses douteuses que beaucoup de gens ne connaissent pas. Quiconque se préserve des choses douteuses protège sa religion et son honneur.",n:"An-Nu'man Ibn Bashir ر",b:"Sahih Al-Bukhari",num:52,a:"Sahih",ref:"Bukhari n°52",th:"Halal/Haram",reward:"Protection de la religion et de l'honneur"},
{id:71,ar:"مَنْ صَلَّى عَلَيَّ صَلَاةً وَاحِدَةً صَلَّى اللهُ عَلَيْهِ عَشْرًا",fr:"Quiconque prie sur moi une fois, Allah prie sur lui dix fois.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:408,a:"Sahih",ref:"Muslim n°408",th:"Sunnah",reward:"10 bénédictions d'Allah en retour"},
{id:72,ar:"أَحَبُّ الأَعْمَالِ إِلَى اللهِ أَدْوَمُهَا وَإِنْ قَلَّ",fr:"Les actes les plus aimés d'Allah sont les plus constants, même s'ils sont peu nombreux.",n:"Aïcha ر",b:"Sahih Al-Bukhari",num:6464,a:"Sahih",ref:"Bukhari n°6464",th:"Istiqama",reward:"L'amour d'Allah"},
{id:73,ar:"بَدَأَ الإِسْلَامُ غَرِيبًا وَسَيَعُودُ غَرِيبًا كَمَا بَدَأَ فَطُوبَى لِلْغُرَبَاءِ",fr:"L'Islam a commencé étranger et il redeviendra étranger comme il a commencé. Bienheureux les étrangers ! Ce sont ceux qui se réforment quand les gens se corrompent.",n:"Abu Hureyra ر",b:"Sahih Muslim",num:145,a:"Sahih",ref:"Muslim n°145",th:"Ghuraba",reward:"Tuba — un arbre au Paradis"},
{id:74,ar:"مَنْ قَامَ لَيْلَةَ الْقَدْرِ إِيمَانًا وَاحْتِسَابًا غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ",fr:"Quiconque effectue la prière de nuit lors de Laylat Al-Qadr avec foi et en espérant la récompense, ses péchés passés lui seront pardonnés.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:35,a:"Sahih",ref:"Bukhari n°35",th:"Ramadan",reward:"Pardon de tous les péchés passés"},
{id:75,ar:"مَنْ حَجَّ لِلهِ فَلَمْ يَرْفُثْ وَلَمْ يَفْسُقْ رَجَعَ كَيَوْمِ وَلَدَتْهُ أُمُّهُ",fr:"Quiconque fait le hajj pour Allah, sans grossièreté ni acte pernicieux, revient comme au jour où sa mère l'a enfanté.",n:"Abu Hureyra ر",b:"Sahih Al-Bukhari",num:1521,a:"Sahih",ref:"Bukhari n°1521",th:"Hajj",reward:"Purification totale des péchés"},
{id:76,ar:"مَنْ بَنَى لِلهِ مَسْجِدًا بَنَى اللهُ لَهُ بَيْتًا فِي الْجَنَّةِ",fr:"Quiconque construit une mosquée pour Allah — même aussi petite que le nid d'un qata — Allah lui construit une maison au Paradis.",n:"Uthman Ibn Affan ر",b:"Sahih Al-Bukhari",num:450,a:"Sahih",ref:"Bukhari n°450",th:"Sadaqa",reward:"Une maison au Paradis"},
{id:77,ar:"مَنْ صَلَّى الْبَرْدَيْنِ دَخَلَ الْجَنَّةَ",fr:"Quiconque prie les deux prières fraîches (Fajr et Asr) entrera au Paradis.",n:"Abu Musa ر",b:"Sahih Al-Bukhari",num:574,a:"Sahih",ref:"Bukhari n°574",th:"Salat",reward:"Entrée au Paradis"},
{id:78,ar:"مَنْ تَوَضَّأَ فَأَحْسَنَ الْوُضُوءَ خَرَجَتْ خَطَايَاهُ مِنْ جَسَدِهِ",fr:"Quiconque fait bien ses ablutions, ses péchés sortent de son corps, même de sous ses ongles.",n:"Uthman Ibn Affan ر",b:"Sahih Muslim",num:245,a:"Sahih",ref:"Muslim n°245",th:"Taharah",reward:"Expiation des péchés"},
{id:79,ar:"السِّوَاكُ مَطْهَرَةٌ لِلْفَمِ مَرْضَاةٌ لِلرَّبِّ",fr:"Le siwak est une purification pour la bouche et un motif de satisfaction du Seigneur.",n:"Aïcha ر",b:"Sunan An-Nasa'i",num:5,a:"Sahih",ref:"Silsilah n°1213",th:"Sunnah",reward:"Satisfaction du Seigneur"},
{id:80,ar:"إِنَّ اللهَ يَرْفَعُ بِهَذَا الْكِتَابِ أَقْوَامًا وَيَضَعُ بِهِ آخَرِينَ",fr:"Allah élève par ce Livre (le Coran) des peuples et en abaisse d'autres.",n:"Umar Ibn Al-Khattab ر",b:"Sahih Muslim",num:817,a:"Sahih",ref:"Muslim n°817",th:"Coran",reward:"Élévation par le Coran"},
// ── ARBA'IN AN-NAWAWI ──
{id:81,ar:"إِنَّ اللهَ كَتَبَ الإِحْسَانَ عَلَى كُلِّ شَيْءٍ",fr:"Allah a prescrit l'excellence (ihsan) en toute chose. Lorsque vous tuez, tuez avec ihsan ; lorsque vous égorgez, égorgez avec ihsan. Que l'un de vous aiguise son couteau et soulage sa bête.",n:"Shaddad Ibn Aws ر",b:"Sahih Muslim",num:1955,a:"Sahih",ref:"Muslim n°1955 — Arba'in n°17",th:"Ihsan",reward:""},
{id:82,ar:"لَا ضَرَرَ وَلَا ضِرَارَ",fr:"Pas de préjudice et pas de nuisance (réciproque) en Islam.",n:"Ibn Abbas ر",b:"Sunan Ibn Majah",num:2341,a:"Sahih",ref:"Silsilah n°250 — Arba'in n°32",th:"Fiqh",reward:""},
{id:83,ar:"مَنْ رَأَى مِنْكُمْ مُنْكَرًا فَلْيُغَيِّرْهُ بِيَدِهِ",fr:"Quiconque parmi vous voit un acte répréhensible, qu'il le change de sa main ; s'il ne peut pas, qu'il le change de sa langue ; s'il ne peut pas, qu'il le désapprouve dans son cœur — et c'est le plus faible de la foi.",n:"Abu Sa'id Al-Khudri ر",b:"Sahih Muslim",num:49,a:"Sahih",ref:"Muslim n°49 — Arba'in n°34",th:"Amr bil Ma'ruf",reward:""},

// ── MARIAGE ──

// ── TRAVAIL ──
{id:'d43',cat:'Travail',t:'Pour la subsistance licite',ar:'اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا وَرِزْقًا طَيِّبًا وَعَمَلًا مُتَقَبَّلًا',fr:"Ô Allah, je Te demande une connaissance utile, une subsistance bonne et pure, et une œuvre acceptée.",ref:'Ibn Majah n°925 — Sahih',reward:''},
// ── PROTECTION ──

{id:'d45',cat:'Protection',t:'Mu\'awwidhatayn 3×',ar:'قُلْ هُوَ اللَّهُ أَحَدٌ / قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ / قُلْ أَعُوذُ بِرَبِّ النَّاسِ',fr:"Réciter Al-Ikhlas, Al-Falaq et An-Nas 3 fois le matin et le soir.",ref:'Abu Dawud n°5082 — Sahih',reward:"Suffit contre tout"},
{id:'d46',cat:'Protection',t:'Contre le mauvais œil',ar:'بِسْمِ اللهِ أَرْقِيكَ مِنْ كُلِّ شَيْءٍ يُؤْذِيكَ',fr:"Au nom d'Allah je fais ta ruqyah contre tout ce qui te nuit.",ref:'Muslim n°2186',reward:''},

// ── VENDREDI ──

// ── DU'A GÉNÉRAL ──
{id:'d50',cat:'Général',t:'La du\'a la plus complète',ar:'رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ',fr:"Notre Seigneur, accorde-nous le bien dans ce monde et le bien dans l'au-delà, et préserve-nous du châtiment du Feu.",ref:'Al-Baqara 2:201 — Bukhari n°4522',reward:"Le Prophète ﷺ y revenait souvent"},

  }

}

  {t:"Mutawatir",ar:"المتواتر",cat:"Hadith",def:"Hadith transmis par un si grand nombre de transmetteurs à chaque génération qu'une fabrication collective est impossible. Donne une certitude absolue. Exemple : le Coran entier."},
  {t:"Jarh wa Ta'dil",ar:"الجرح والتعديل",cat:"Hadith",def:"La science d'évaluation des transmetteurs de hadiths — critiquer (jarh) ou approuver (ta'dil) leur fiabilité. Science fondamentale pour authentifier les hadiths."},
  // CORAN
  {t:"Tafsir",ar:"التفسير",cat:"Coran",def:"L'explication du Coran. La meilleure méthode : expliquer le Coran par le Coran, puis par la Sunnah, puis par les explications des Compagnons. Œuvres majeures : Ibn Kathir, At-Tabari, As-Sa'di."},
  {t:"Tajwid",ar:"التجويد",cat:"Coran",def:"Les règles de récitation correcte du Coran. Obligatoire de l'apprendre pour réciter correctement. Comprend : la prononciation des lettres (makhraj), les règles de prolongation (madd), etc."},
  {t:"Hifz",ar:"الحفظ",cat:"Coran",def:"La mémorisation du Coran. Celui qui mémorise le Coran est appelé Hafiz. Le Prophète ﷺ : 'Quiconque récite le Coran et mémorise ... sera avec les nobles scribes obéissants.'"},
  {t:"Juz",ar:"الجزء",cat:"Coran",def:"Une des 30 parties égales du Coran. Division pratique pour mémoriser ou réciter le Coran en un mois (un juz par jour). Le 30e juz (Juz Amma) est le plus connu."},
  {t:"Ayah",ar:"الآية",cat:"Coran",def:"Un verset du Coran. Le Coran contient 6236 versets selon un comptage, répartis en 114 sourates. Certains versets sont longs (ex: Al-Baqara 2:282), d'autres très courts."},
  {t:"Surah",ar:"السورة",cat:"Coran",def:"Un chapitre du Coran. Il y en a 114. Divisées entre Mecquoises (révélées avant l'Hégire, portant sur la croyance) et Médinoises (révélées après l'Hégire, portant sur les lois)."},
  {t:"Basmala",ar:"البسملة",cat:"Coran",def:"بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ — Au nom d'Allah le Tout Miséricordieux le Très Miséricordieux. Débute 113 sourates sur 114 (sauf At-Tawbah). Recommandé de la dire avant tout acte."},
  // SIRA
  {t:"Sahaba",ar:"الصحابة",cat:"Sira",def:"Les Compagnons du Prophète ﷺ — tout musulman qui l'a vu, cru en lui et est mort dans l'Islam. Environ 100 000 Compagnons. Leur génération est la meilleure selon le Prophète ﷺ."},
  {t:"Tabi'in",ar:"التابعون",cat:"Sira",def:"Les Successeurs — ceux qui ont rencontré les Compagnons mais pas le Prophète ﷺ. Deuxième meilleure génération. Parmi eux : Sa'id Ibn Al-Musayyib, Al-Hassan Al-Basri."},
  {t:"Hijra",ar:"الهجرة",cat:"Sira",def:"L'émigration du Prophète ﷺ de La Mecque vers Médine en 622 ap. J.-C. Marque le début du calendrier islamique (calendrier hijri). Événement fondateur de la communauté musulmane."},
  {t:"Sirah",ar:"السيرة",cat:"Sira",def:"La biographie du Prophète ﷺ. Connue en détail grâce aux travaux de Ibn Hisham, At-Tabari et d'autres. Modèle de vie pour tout musulman : 'Vous avez dans le Messager d'Allah un excellent modèle.'"},
  {t:"Khulafa Rashidun",ar:"الخلفاء الراشدون",cat:"Sira",def:"Les quatre califes bien guidés : Abu Bakr As-Siddiq, Umar Ibn Al-Khattab, Uthman Ibn Affan et Ali Ibn Abi Talib. Le Prophète ﷺ : 'Suivez ma Sunnah et celle des califes bien guidés.'"},
  // AKHLAQ
  {t:"Tawadu'",ar:"التواضع",cat:"Akhlaq",def:"L'humilité. Allah élève celui qui s'humilie pour Lui. L'orgueil (kibr) est son contraire et peut exclure du Paradis même si on en a 'l'équivalent d'un atome' dans le cœur."},
  {t:"Tawakkul",ar:"التوكل",cat:"Akhlaq",def:"La confiance en Allah. Ne pas négliger les causes tout en sachant que le résultat vient d'Allah seul. Le Prophète ﷺ : 'Si vous vous en remettiez vraiment à Allah, Il vous nourrirait comme Il nourrit les oiseaux.'"},
  {t:"Sabr",ar:"الصبر",cat:"Akhlaq",def:"La patience face aux épreuves, à l'obéissance et à l'abstention des interdits. 'Certes Allah est avec les patients.' Trois types : patience dans l'obéissance, face aux épreuves, et contre la désobéissance."},
  {t:"Shukr",ar:"الشكر",cat:"Akhlaq",def:"La gratitude envers Allah. 'Si vous êtes reconnaissants, J'augmenterai Mes bienfaits pour vous.' La vraie gratitude passe par le cœur (reconnaître le bienfait), la langue (Al-Hamdulillah) et les membres (l'utiliser pour obéir à Allah)."},
  {t:"Ikhlas",ar:"الإخلاص",cat:"Akhlaq",def:"La sincérité — accomplir les actes uniquement pour Allah sans chercher la reconnaissance des gens. Condition d'acceptation de toute adoration avec l'ittiba' (suivi du Prophète ﷺ)."},
  {t:"Haya",ar:"الحياء",cat:"Akhlaq",def:"La pudeur et la honte. 'La haya ne produit que du bien.' L'une des branches de la foi. Protect contre les péchés visibles et cachés. 'Si tu n'as pas honte, fais ce que tu veux.'"},
  {t:"Wafa",ar:"الوفاء",cat:"Akhlaq",def:"La fidélité aux engagements, promesses et pactes. 'Ô vous qui croyez, respectez vos engagements.' Une des qualités essentielles du croyant."},
];

function updateDates() {
  const now = new Date();
  // Gregorian
  const greg = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const gregShort = now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
  // Hijri
  let hijriText = '';
  try {
    const hDay = new Intl.DateTimeFormat('fr-TN-u-ca-islamic-umalqura',{day:'numeric'}).format(now);
    const hMonth = new Intl.DateTimeFormat('fr-TN-u-ca-islamic-umalqura',{month:'long'}).format(now);
    const hYear = new Intl.DateTimeFormat('fr-TN-u-ca-islamic-umalqura',{year:'numeric'}).format(now);
    hijriText = hDay + ' ' + hMonth + ' ' + hYear.replace(' AH','') + ' H';
  } catch(e) { hijriText = ''; }
  
  const hijriEl = document.getElementById('hijri-date');
  const gregEl = document.getElementById('greg-date');
  if (hijriEl) hijriEl.textContent = hijriText;
  if (gregEl) gregEl.textContent = gregShort;
  
  // Update full date in home if visible
  const homeDate = document.getElementById('home-full-date');
  if (homeDate) homeDate.textContent = greg;
}

let _clockInt;
function startClock() {
  clearInterval(_clockInt);
  _clockInt = setInterval(() => {
    const n = new Date();
    const clk = document.getElementById('clk');
    const cd = document.getElementById('cd');
    if (clk) clk.textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    if (cd) cd.textContent = getCountdown();
  }, 1000);
}

function getCountdown() {
  if (!ST.prayerTimes) return '--';
  const prayers = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const now = new Date();
  const nm = now.getHours()*60+now.getMinutes();
  for (const p of prayers) {
    const [h,m] = ST.prayerTimes[p].split(':').map(Number);
    let diff = h*60+m - nm;
    if (diff > 0) {
      return diff >= 60 ? `${Math.floor(diff/60)}h ${diff%60}min` : `${diff} min`;
    }
  }
  const [h,m] = ST.prayerTimes['Fajr'].split(':').map(Number);
  const diff = (24*60 - nm) + h*60+m;
  return diff >= 60 ? `${Math.floor(diff/60)}h ${diff%60}min` : `${diff} min`;
}

};
function pName(k) { return PNAMES[ST.lang]?.[k] || k; }

async function loadPrayer() {
  try {
    let url;
    if (ST.city) {
      const parts = ST.city.split(',');
      url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(parts[0]?.trim())}&country=${encodeURIComponent(parts[1]?.trim()||'')}&method=${ST.calcMethod}`;
    } else {
      const pos = await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j,{timeout:7000}));
      url = `https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=${ST.calcMethod}`;
    }
    const d = await (await fetch(url)).json();
    if (d.code===200) {
      ST.prayerTimes = d.data.timings;
      ST.prayerCity = d.data.meta?.timezone || ST.city;
      if (ST.tab==='home') renderHome();
    }
  } catch(e) {
    try {
      const d = await (await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Paris&country=France&method=${ST.calcMethod}`)).json();
      if (d.code===200) { ST.prayerTimes=d.data.timings; ST.prayerCity='Paris (défaut)'; if(ST.tab==='home')renderHome(); }
    } catch(e2) {}
  }
}

function getNextPrayer() {
  if (!ST.prayerTimes) return {key:'Fajr',time:'--:--',idx:0};
  const ps = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const nm = new Date().getHours()*60+new Date().getMinutes();
  for (let i=0;i<ps.length;i++) {
    const [h,m] = ST.prayerTimes[ps[i]].split(':').map(Number);
    if (h*60+m > nm) return {key:ps[i],time:ST.prayerTimes[ps[i]],idx:i};
  }
  return {key:'Fajr',time:ST.prayerTimes['Fajr'],idx:0};
}

  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  document.getElementById('nb-'+tab).classList.add('on');
  document.getElementById('cnt').scrollTop = 0;
  ST.tab = tab;
  if (tab==='home') renderHome();
  else if (tab==='quran' && ST.qView==='list') renderQuranList();
  else if (tab==='quran' && ST.qView==='surah') renderSurah();
  else if (tab==='hadith') renderHadith();
  else if (tab==='adhkar') renderAdhkar();
  else if (tab==='more') renderMore();
}

  document.querySelectorAll('.theme-swatch-color').forEach(el=>{
    const id = el.id?.replace('tsw-','');
    if (id) el.classList.toggle('on', ST.theme===id);
  });
  document.querySelectorAll('.theme-swatch-label').forEach(el=>{
    const id = el.id?.replace('tsl-','');
    if (id) el.classList.toggle('on', ST.theme===id);
  });
}

// ═══════════════════════════════
// DRAG TO CLOSE
// ═══════════════════════════════
function setupDragClose(handleId, wrapId, onClose) {
  const handle = document.getElementById(handleId);
  const wrap = document.getElementById(wrapId);
  if (!handle) return;
  let startY = 0, currentY = 0, isDragging = false;
  const sheet = handle.closest('.modal-sheet, .theme-panel-sheet');
  if (!sheet) return;

  handle.addEventListener('touchstart', e=>{
    startY = e.touches[0].clientY;
    isDragging = true;
    sheet.style.transition = 'none';
  }, {passive:true});

  document.addEventListener('touchmove', e=>{
    if (!isDragging) return;
    currentY = e.touches[0].clientY - startY;
    if (currentY > 0) sheet.style.transform = `translateY(${currentY}px)`;
  }, {passive:true});

  document.addEventListener('touchend', ()=>{
    if (!isDragging) return;
    isDragging = false;
    sheet.style.transition = 'transform .3s cubic-bezier(.32,.72,0,1)';
    if (currentY > 60) {
      sheet.style.transform = 'translateY(100%)';
      setTimeout(onClose, 280);
    } else {
      sheet.style.transform = 'translateY(0)';
    }
    currentY = 0;
  });
}

}

// ─── NO-CLOSE SETTERS (update in-place without closing modal) ───
function setLangNoClose(l) {
  ST.lang=l; savePref(); updateNav(); updateDates();
  const _tab=ST.tab; if(_tab==='home')renderHome(); else if(_tab==='hadith')renderHadith(); else if(_tab==='adhkar')renderAdhkar(); else if(_tab==='more')renderMore(); else if(_tab==='quran'&&ST.qView==='list')renderQuranList();
  // Update button styles
  ['fr','en','ar'].forEach(lg=>{
    const b=document.getElementById('lang-btn-'+lg);
    if(!b)return;
    b.style.borderColor = lg===l?'var(--acc)':'var(--bdr)';
    b.style.background = lg===l?'var(--accd)':'var(--bg3)';
    b.style.color = lg===l?'var(--acc)':'var(--txm)';
    b.style.fontWeight = lg===l?'700':'500';
  });
  // Re-render current tab with new language
  const tab = ST.tab;
  if(tab==='home') renderHome();
  else if(tab==='hadith') renderHadith();
  else if(tab==='adhkar') renderAdhkar();
  else if(tab==='more') renderMore();
  else if(tab==='quran' && ST.qView==='list') renderQuranList();
}

function setFontArNoClose(f) {
  ST.fontAr=f; savePref(); applyPrefs();
  ['scheherazade','amiri','naskh','kufi'].forEach(ff=>{
    const b=document.getElementById('font-btn-'+ff);
    if(!b)return;
    b.style.borderColor = ff===f?'var(--acc)':'var(--bdr)';

}

}

function setFontSizeArSave(v) {

}
function setFontSizeUILive(v) {

}
function setPrayerDisplayMode(m) {

function setFontSizeUISave(v) {

}

function setSpacingNoClose(s) {
  ST.spacing=s; savePref(); applyPrefs();
  ['compact','normal','airy'].forEach(sp=>{

    if(!b)return;

}

function setQuranModeNoClose(m) {

    const b=document.getElementById('qm-btn-'+mm);
    if(!b)return;
    b.style.borderColor = mm===m?'var(--acc)':'var(--bdr)';

function toggleTranslitNoClose() {
  ST.showTranslit=!ST.showTranslit; savePref();

  if(btn){
    btn.style.background = ST.showTranslit?'var(--acc)':'var(--bdr2)';

}

function toggleTranslationNoClose() {

  if(btn){

    btn.querySelector('div').style.left = ST.showTranslation?'25px':'3px';
  }
}

function setCalcMethodNoClose(m) {
  ST.calcMethod=m; savePref(); ST.prayerTimes=null; loadPrayer();
  ['2','1','5','4'].forEach(id=>{
    const b=document.getElementById('cm-btn-'+id);
    if(!b)return;
    b.style.borderColor = id===m?'var(--acc)':'var(--bdr)';

<script>

// TRANSLITERATIONS (Al-Fatiha + common)
