const TRANSLIT = {
  '1:1':'Bismi Allahi alrrahmani alrraheemi',
  '1:2':'Alhamdu lillahi rabbi al-AAalameena',
  '1:3':'Alrrahmani alrraheemi',
  '1:4':'Maliki yawmi alddeeni',
  '1:5':"Iyyaka naAAbudu wa-iyyaka nastaAAeenu",
  '1:6':"Ihdina alssirata almustaqeema",
  '1:7':"Sirata allatheena anAAamta AAalayhim ghayri almaghdoobi AAalayhim wala alddalleena",
  '2:255':"Allahu la ilaha illa huwa alhayyu alqayyoomu la ta'khuthuhu sinatun wala nawmun...",
  '112:1':"Qul huwa Allahu ahadun",
  '112:2':"Allahu alssamadu",
  '112:3':"Lam yalid walam yooladu",
  '112:4':"Walam yakun lahu kufuwan ahadun",
};
function getTranslit(sid, vnum) {
  return TRANSLIT[`${sid}:${vnum}`] || '';
}

// ═══════════════════════════════
// QURAN
// ═══════════════════════════════
async function loadSurahs() {
  if (ST.surahs.length) return;
  try {
    const d = await (await fetch('https://api.quran.com/api/v4/chapters?language=fr')).json();
    ST.surahs = d.chapters;
  } catch(e) { ST.surahs = SURAHS_LOCAL; }
}

function renderQuranList() {
  const el = document.getElementById('s-quran');
  if (!ST.surahs.length) {
    el.innerHTML = `<div class="loader"><div class="spinner"></div><br>${t('loading')}</div>`;
    loadSurahs().then(()=>renderQuranList());
    return;
  }
  const q = ST.qSearch.toLowerCase();
  const fl = q ? ST.surahs.filter(s=>
    s.name_simple.toLowerCase().includes(q) ||
    s.translated_name?.name?.toLowerCase().includes(q) ||
    String(s.id).includes(q)
  ) : ST.surahs;

  el.innerHTML = `
    <div class="searchbar">
      <span style="width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--txd)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </span>
      <input placeholder="${t('search')}" value="${ST.qSearch}"
        oninput="ST.qSearch=this.value;renderQuranList()"/>
    </div>
    <div class="slbl">${t('surahList')}</div>
    ${fl.map(s=>`
      <div onclick="openSurah(${s.id})" style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:transform .12s;box-shadow:var(--shadow2)" ontouchstart="this.style.transform='scale(.98)'" ontouchend="this.style.transform=''">
        <div style="display:flex;align-items:center;gap:13px">
          <div style="width:38px;height:38px;border-radius:10px;background:var(--accd);border:1.5px solid var(--acc3);display:flex;align-items:center;justify-content:center;color:var(--acc);font-weight:800;font-size:12px;flex-shrink:0">${s.id}</div>
          <div>
            <div style="font-size:15px;font-weight:600;margin-bottom:2px">${s.name_simple}</div>
            <div style="font-size:11px;color:var(--txd)">${s.translated_name?.name||''} · ${s.verses_count} ${t('verses')} · ${s.revelation_place==='makkah'?t('meccan'):t('medinan')}</div>
          </div>
        </div>
        <div style="font-family:'Scheherazade New',serif;direction:rtl;font-size:21px;color:var(--acc)">${s.name_arabic}</div>
      </div>`).join('')}
  `;
  setTimeout(()=>{ document.getElementById('cnt').scrollTop = ST.qScrollPos; }, 50);
}

async function openSurah(id) {
  ST.currentSurah = ST.surahs.find(s=>s.id===id);
  ST.qView = 'surah';
  const el = document.getElementById('s-quran');
  el.innerHTML = `<div class="loader"><div class="spinner"></div><br>${t('loading')}</div>`;
  document.getElementById('cnt').scrollTop = 0;
  try {
    const d = await (await fetch(
      `https://api.quran.com/api/v4/verses/by_chapter/${id}?language=fr&words=false&translations=136&per_page=300&page=1`
    )).json();
    ST.verses = d.verses;
    renderSurah();
  } catch(e) {
    el.innerHTML = `
      <button class="back-btn" onclick="backQ()">
        <span class="icon icon-18"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></span>
        ${t('back')}
      </button>
      <div class="loader" style="color:var(--acc)">⚠️ ${t('noInternet')}</div>`;
  }
}

function renderMushafMode(s) {
  return `
    <div class="mushaf-page">
      <div class="mushaf-text">
        ${s.id!==1&&s.id!==9?`<div style="text-align:center;margin-bottom:16px;font-size:20px;color:var(--txm)">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`:''}

          ${v.text_uthmani||v.text_indopak||''}
          <span class="mushaf-number">${v.verse_number}</span>
        `).join(' ')}
      </div>
    </div>`;
}

  return ST.verses.map(v => {
    const isFav = ST.favs.some(f=>f.type==='verse'&&f.id===`${s.id}:${v.verse_number}`);

    const tr = v.translations?.[0]?.text?.replace(/<[^>]*>/g,'')||'';
    return `
      <div class="verse-card" id="v${v.verse_number}">
        <!-- Verse header -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:30px;height:30px;border-radius:8px;background:var(--accd);border:1.5px solid var(--acc3);display:flex;align-items:center;justify-content:center;color:var(--acc);font-weight:800;font-size:11px">${v.verse_number}</div>
            <span style="font-size:10px;color:var(--txd)">${s.id}:${v.verse_number}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center">

function toggleFavVerse(sid, vnum, sname, e) {
  e.stopPropagation();
  const key = `${sid}:${vnum}`;

  if (idx>=0) { ST.favs.splice(idx,1); toast(t('removedFav')); }

  saveState();
  // UPDATE IN PLACE — no full re-render
  const btn = e.currentTarget;

function shareVerse(sid, vnum, sname) {
  const v = ST.verses.find(x=>x.verse_number===vnum);
  if (!v) return;
  const tr = v.translations?.[0]?.text?.replace(/<[^>]*>/g,'')||'';
  const txt = `${v.text_uthmani||''}\n\n« ${tr} »\n\n— ${sname} (${sid}:${vnum})\n\nIslam Authentique — Manhaj As-Salaf`;
  if (navigator.share) navigator.share({text:txt});
  else { navigator.clipboard?.writeText(txt); toast(t('copied')); }
}

function renderHadith() {
  const q = ST.hSearch.toLowerCase();
  const fl = HADITHS.filter(h=>{
    if (ST.hTheme!=='all' && h.th!==ST.hTheme) return false;
    if (q && !h.fr.toLowerCase().includes(q) && !h.th.toLowerCase().includes(q) && !h.n.toLowerCase().includes(q)) return false;
    return true;
  });
  const themes = ['all',...new Set(HADITHS.map(h=>h.th))].sort();

  document.getElementById('s-hadith').innerHTML = `
    <div class="searchbar">
      <span style="width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--txd)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </span>
      <input placeholder="${t('search')}" value="${ST.hSearch}"
        id="hadith-search-input" oninput="onHadithSearch(this.value)"/>
    </div>

    <!-- FILTERS — wrap grid, active style, scroll-to on click -->
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;padding:10px 0 8px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--bdr)">
      ${themes.map(th=>`
        <button id="chip-${th.replace(/'/g,'')}"
          onclick="selectHadithTheme('${th.replace(/'/g,"\\'")}' )"
          style="background:${ST.hTheme===th?'var(--acc)':'var(--bg3)'};
            color:${ST.hTheme===th?'#000':'var(--txm)'};
            border:2px solid ${ST.hTheme===th?'var(--acc)':'var(--bdr)'};
            border-radius:99px;padding:7px 14px;font-size:12px;
            font-weight:${ST.hTheme===th?'800':'500'};
            cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif">
          ${th==='all'?t('all'):th}
        </button>`).join('')}
    </div>>

    <div style="font-size:11px;color:var(--txd);margin-bottom:13px" id="hadith-count">
      ${fl.length} hadith(s) — ${t('verified')}
    </div>
    <div id="hadith-list">
      ${renderHadithCards(fl)}
    </div>
  `;
}

function selectHadithTheme(th) {
  ST.hTheme = th;
  const themes = ['all',...new Set(HADITHS.map(h=>h.th))].sort();
  themes.forEach(t2=>{
    const btn = document.getElementById('chip-'+t2.replace(/'/g,''));
    if(!btn) return;
    const on = t2===th;
    btn.style.background = on?'var(--acc)':'var(--bg3)';
    btn.style.color = on?'#000':'var(--txm)';
    btn.style.border = '2px solid '+(on?'var(--acc)':'var(--bdr)');
    btn.style.fontWeight = on?'800':'500';
  });
  const q = ST.hSearch.toLowerCase();
  const fl = HADITHS.filter(h=>{
    if(th!=='all'&&h.th!==th)return false;
    if(q&&!h.fr.toLowerCase().includes(q))return false;
    return true;
  });
  const el=document.getElementById('hadith-list');
  const ct=document.getElementById('hadith-count');
  if(el)el.innerHTML=renderHadithCards(fl);
  if(ct)ct.textContent=fl.length+' hadith(s) — '+t('verified');
  if(th!=='all'&&fl.length>0){
    setTimeout(()=>{
      const first=document.getElementById('h'+fl[0].id);
      if(first)first.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  }
}
function onHadithSearch(val) {
  ST.hSearch = val;
  const q = val.toLowerCase();
  const fl = HADITHS.filter(h=>{
    if (ST.hTheme!=='all' && h.th!==ST.hTheme) return false;
    if (q && !h.fr.toLowerCase().includes(q) && !h.th.toLowerCase().includes(q) && !h.n.toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('hadith-list');
  const ct = document.getElementById('hadith-count');
  if (el) el.innerHTML = renderHadithCards(fl);
  if (ct) ct.textContent = fl.length + ' hadith(s) — ' + t('verified');
}
function updateHadithList() {
  const q = ST.hSearch.toLowerCase();
  const fl = HADITHS.filter(h=>{
    if (ST.hTheme!=='all' && h.th!==ST.hTheme) return false;
    if (q && !h.fr.toLowerCase().includes(q) && !h.th.toLowerCase().includes(q) && !h.n.toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('hadith-list');
  const ct = document.getElementById('hadith-count');
  if (el) el.innerHTML = renderHadithCards(fl);
  if (ct) ct.textContent = `${fl.length} hadith(s) — ${t('verified')}`;
  // Update chip styles
  document.querySelectorAll('.chips .chip').forEach(btn=>{
    const isActive = btn.onclick?.toString().includes(`'${ST.hTheme}'`) ||
      (ST.hTheme==='all' && btn.textContent.trim()===t('all'));
    btn.classList.toggle('on', btn.textContent.trim()===(ST.hTheme==='all'?t('all'):ST.hTheme));
  });
}

function toggleFavH(id, e, btn) {

function shareHadith(id) {
  const h = HADITHS.find(x=>x.id===id);

  const txt = `${h.ar}\n\n« ${h.fr} »\n\n— ${h.n}\n${h.b} n°${h.num} | ${h.ref}\n\nIslam Authentique — Manhaj As-Salaf`;
  if (navigator.share) navigator.share({text:txt});
  else { navigator.clipboard?.writeText(txt); toast(t('copied')); }
}

// ADHKAR RENDER
// ═══════════════════════════════
function renderAdhkar() {
  if (ST.adhkarTab==='tasbih') { renderTasbih(); return; }
  const list = ADHKAR_DATA[ST.adhkarTab]||[];
  const done = list.filter(d=>(ST.counts[d.id]||0)>=d.r).length;
  const pct = Math.round(done/list.length*100);

  const tabBtn = (k,label,icon) => `
    <button onclick="swAdhkar('${k}')"
      style="flex:1;min-width:0;padding:10px 4px;border-radius:13px;
        border:2px solid ${ST.adhkarTab===k?'var(--acc)':'var(--bdr)'};
        background:${ST.adhkarTab===k?'var(--accd)':'var(--bg2)'};
        color:${ST.adhkarTab===k?'var(--acc)':'var(--txm)'};
        font-size:11px;font-weight:${ST.adhkarTab===k?'700':'500'};
        cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span class="icon icon-18"><svg viewBox="0 0 24 24" fill="currentColor">${icon}</svg></span>
      <span style="font-size:10px">${label}</span>
    </button>`;

  document.getElementById('s-adhkar').innerHTML = `
    <div style="display:flex;gap:7px;margin-bottom:14px">
      ${tabBtn('matin',t('matin'),'<path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/>')}
      ${tabBtn('soir',t('soir'),'<path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/>')}
      ${tabBtn('salat',t('salat'),'<path d="M6.5 10h-2v5h2v-5zm4 0h-2v5h2v-5zm8.5 7H2v2h17v-2zm-4.5-7h-2v5h2v-5zM10.5 1L2 6v2h17V6l-8.5-5z"/>')}
      ${tabBtn('tasbih',t('tasbih'),'<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>')}
    </div>

    <!-- Progress -->
    <div class="card" style="padding:13px 16px;margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">${t('progress')}</span>
        <span style="font-size:13px;font-weight:800;color:${pct===100?'var(--gr)':'var(--acc)'}">${done}/${list.length}</span>
      </div>
      <div class="progress" id="adhkar-progress">
        <div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--gr)':'var(--acc)'}"></div>
      </div>
    </div>

    <!-- List -->
    <div id="adhkar-list">
      ${list.map(d => renderAdhkarCard(d)).join('')}
    </div>
  `;
}

function renderAdhkarCard(d) {
  const c = ST.counts[d.id]||0, dn = c>=d.r;
  return `
    <div id="ac${d.id}" style="background:${dn?'#052e1680':'var(--card)'};border:1.5px solid ${dn?'var(--gr)':'var(--bdr)'};border-radius:17px;padding:17px;margin-bottom:11px;transition:all .3s">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
        <span style="font-size:13px;font-weight:700;color:${dn?'var(--gr)':'var(--acc)'}">${dn?'✓ ':''}${d.t}</span>
        <span style="font-size:11px;color:var(--txd);background:var(--bg3);padding:3px 10px;border-radius:99px;font-weight:600">${d.r}×</span>
      </div>
      <div class="ar ar-lg" style="direction:rtl;text-align:right;margin-bottom:12px">${d.ar}</div>
      <div style="font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:8px">${d.fr}</div>
      <div style="font-size:10px;color:var(--txd);margin-bottom:${d.r>1?'13px':'0'}">${d.ref}</div>
      ${d.r>1?`
        <div style="display:flex;align-items:center;gap:13px">
          <button ${dn?'disabled':''} onclick="incAdhkar('${d.id}',${d.r})"
            style="background:${dn?'var(--grd)':'var(--acc)'};color:${dn?'var(--grs)':'#000'};border:none;border-radius:13px;padding:12px 26px;font-size:17px;font-weight:900;min-height:50px;cursor:${dn?'not-allowed':'pointer'};transition:all .2s">
            ${dn?'✓':'+1'}
          </button>
          <div>
            <div id="ac-count-${d.id}" style="font-size:22px;font-weight:800;line-height:1">${c}<span style="color:var(--txd);font-size:13px;font-weight:400"> / ${d.r}</span></div>
          </div>
          <button onclick="rstAdhkar('${d.id}')"
            style="background:none;border:1.5px solid var(--bdr);border-radius:10px;color:var(--txm);font-size:12px;padding:9px 14px;cursor:pointer;margin-left:auto">
            ${t('reset')}
          </button>
        </div>`:``}
    </div>`;
}

function swAdhkar(tab) { ST.adhkarTab=tab; renderAdhkar(); }

function incAdhkar(id, max) {
  const prev = ST.counts[id]||0;
  if (prev>=max) return;
  ST.counts[id] = prev+1;
  if (navigator.vibrate) navigator.vibrate(12);
  saveState(); updateStreak();
  // IN-PLACE UPDATE
  const countEl = document.getElementById('ac-count-'+id);
  if (countEl) countEl.innerHTML = `${ST.counts[id]}<span style="color:var(--txd);font-size:13px;font-weight:400"> / ${max}</span>`;
  if (ST.counts[id]>=max) {
    const card = document.getElementById('ac'+id);
    if (card) {
      card.style.background='#052e1680';
      card.style.borderColor='var(--gr)';
      card.querySelector('span').style.color='var(--gr)';
      card.querySelector('span').textContent='✓ '+card.querySelector('span').textContent;
      const btn = card.querySelector('button');
      if (btn) { btn.textContent='✓'; btn.style.background='var(--grd)'; btn.style.color='var(--grs)'; btn.disabled=true; }
    }
    toast('✓ '+t('done'));
  }
  // Update progress bar
  const list = ADHKAR_DATA[ST.adhkarTab]||[];
  const done = list.filter(d=>(ST.counts[d.id]||0)>=d.r).length;
  const pct = Math.round(done/list.length*100);
  const pf = document.querySelector('#adhkar-progress .progress-fill');
  if (pf) { pf.style.width=pct+'%'; pf.style.background=pct===100?'var(--gr)':'var(--acc)'; }
}

function rstAdhkar(id) {
  ST.counts[id]=0; saveState();
  const card = document.getElementById('ac'+id);
  if (card) {
    const d = Object.values(ADHKAR_DATA).flat().find(x=>x.id===id);
    if (d) card.outerHTML = renderAdhkarCard(d);
  }
}

// TASBIH
// ═══════════════════════════════
function renderTasbih() {
  const p = TASBIH_PRESETS.find(x=>x.id===ST.tasbihId)||TASBIH_PRESETS[0];
  const c = ST.counts['tb_'+p.id]||0;
  const done = c>=p.max;
  const pct = Math.min(c/p.max*100,100);

  document.getElementById('s-adhkar').innerHTML = `
    <div style="display:flex;gap:7px;margin-bottom:14px">
      ${[['matin',t('matin')],['soir',t('soir')],['salat',t('salat')],['tasbih',t('tasbih')]].map(([k,l])=>`
        <button onclick="swAdhkar('${k}')" style="flex:1;padding:10px 4px;border-radius:13px;border:2px solid ${ST.adhkarTab===k?'var(--acc)':'var(--bdr)'};background:${ST.adhkarTab===k?'var(--accd)':'var(--bg2)'};color:${ST.adhkarTab===k?'var(--acc)':'var(--txm)'};font-size:10px;font-weight:${ST.adhkarTab===k?'700':'500'};cursor:pointer">${l}</button>`).join('')}
    </div>

    <!-- Preset chips -->
    <div class="chips" style="margin-bottom:16px">
      ${TASBIH_PRESETS.map(tp=>`
        <button class="chip ${ST.tasbihId===tp.id?'on':''}" onclick="ST.tasbihId='${tp.id}';renderTasbih()">${tp.fr}</button>`).join('')}
    </div>

    <div style="text-align:center;padding:8px 0 6px">
      <div class="ar ar-xl" style="direction:rtl;color:var(--acc);margin-bottom:6px">${p.ar}</div>
      <div style="font-size:15px;font-weight:600;color:var(--txm)">${p.fr}</div>
    </div>

    <!-- Big circle -->
    <div class="tasbih-circle ${done?'done':''}" id="tasbih-btn"
      onclick="incTasbih('${p.id}',${p.max})"
      ontouchstart="this.style.transform='scale(.92)'"
      ontouchend="this.style.transform=''">
      <div style="text-align:center">
        <div class="tasbih-count" id="tasbih-count">${c}</div>
        <div style="font-size:13px;color:var(--txd);margin-top:4px">/ ${p.max}</div>
      </div>
    </div>

    <div class="progress" style="max-width:180px;margin:0 auto 20px;height:5px" id="tasbih-pb">
      <div class="progress-fill" style="width:${pct}%;background:${done?'var(--gr)':'var(--acc)'}"></div>
    </div>

    <div style="text-align:center">
      <button onclick="rstTasbih('${p.id}')"
        style="background:none;border:1.5px solid var(--bdr);border-radius:12px;color:var(--txm);font-size:13px;padding:11px 28px;cursor:pointer">
        ${t('reset')}
      </button>
    </div>
  `;
}

function incTasbih(id, max) {
  const key='tb_'+id;
  if ((ST.counts[key]||0)>=max) return;
  ST.counts[key]=(ST.counts[key]||0)+1;
  if (navigator.vibrate) navigator.vibrate(12);
  saveState(); updateStreak();
  const c = ST.counts[key];
  const done = c>=max;
  // IN-PLACE
  const el = document.getElementById('tasbih-count');
  const btn = document.getElementById('tasbih-btn');
  const pb = document.querySelector('#tasbih-pb .progress-fill');
  if (el) el.textContent = c;
  if (done) {
    if (btn) { btn.classList.add('done'); }
    toast('✓ '+max+' — '+t('done'));
  }
  if (pb) { pb.style.width=Math.min(c/max*100,100)+'%'; pb.style.background=done?'var(--gr)':'var(--acc)'; }
}

function rstTasbih(id) { ST.counts['tb_'+id]=0; saveState(); renderTasbih(); }

function updateStreak() {
  const today = new Date().toDateString();
  if (ST.streak.last===today) return;
  const yesterday = new Date(Date.now()-86400000).toDateString();
  ST.streak.days = ST.streak.last===yesterday ? ST.streak.days+1 : 1;
  ST.streak.last = today;
  saveState();
}

function renderAsma(el) {

    <div class="searchbar">

      <input placeholder="${t('search')}" value="${ST.asmaSearch}" oninput="ST.asmaSearch=this.value;renderMoreContent()"/>

    <div class="asma-grid" id="asma-grid">
      ${fl.map(a=>`
        <div class="asma-item ${ST.asmaOpen===a.n?'active':''}" id="asma${a.n}" onclick="toggleAsma(${a.n})">
          <div class="asma-num">${a.n}</div>
          <div class="asma-arabic">${a.ar}</div>
          <div class="asma-name">${a.fr}</div>
          <div class="asma-detail">
            <div style="font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:8px">${a.d}</div>

              <button onclick="event.stopPropagation();goAsma(${a.n-1>0?a.n-1:1})"
                style="background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;color:var(--txm);font-size:11px;padding:6px 11px;cursor:pointer">← ${t('navPrev')}</button>
              <span style="font-size:10px;color:var(--txd)">${a.n}/99</span>
              <button onclick="event.stopPropagation();goAsma(${a.n+1<=99?a.n+1:99})"
                style="background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;color:var(--txm);font-size:11px;padding:6px 11px;cursor:pointer">${t('navNext')} →</button>
            </div>
          </div>
        </div>`).join('')}
    </div>
  `;
}

function toggleAsma(n) {
  if (ST.asmaOpen === n) {
    // Close current
    ST.asmaOpen = null;
    const el = document.getElementById('asma'+n);
    if (el) {
      el.classList.remove('active');
      el.style.gridColumn = '';
    }
    return;
  }
  // Close previous
  if (ST.asmaOpen) {
    const prev = document.getElementById('asma'+ST.asmaOpen);
    if (prev) { prev.classList.remove('active'); prev.style.gridColumn = ''; }
  }
  ST.asmaOpen = n;
  const a = ASMA_HUSNA[n-1];
  if (!a) return;
  const el = document.getElementById('asma'+n);
  if (el) {
    el.classList.add('active');
    el.style.gridColumn = 'span 3';
    // Update inner content
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="asma-num" style="background:var(--accd);border-radius:99px;padding:2px 10px;font-size:10px">${n}/99</div>
        <button onclick="event.stopPropagation();toggleAsma(${n})" style="background:none;border:none;color:var(--txd);font-size:18px;cursor:pointer;padding:2px 6px">✕</button>
      </div>
      <div class="asma-arabic" style="font-size:28px;margin-bottom:6px">${a.ar}</div>
      <div class="asma-name" style="font-size:15px;font-weight:700;color:var(--tx);margin-bottom:12px">${a.fr}</div>
      <div class="asma-detail" style="display:block">
        <div style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:14px">${a.d}</div>
        <div style="display:flex;justify-content:space-between;gap:8px">
          <button onclick="event.stopPropagation();goAsma(${n>1?n-1:1})"
            style="flex:1;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:10px;color:var(--txm);font-size:12px;font-weight:600;padding:10px 8px;cursor:pointer;min-height:42px">
            ← ${n>1?'Précédent':'—'}
          </button>
          <button onclick="event.stopPropagation();goAsma(${n<99?n+1:99})"
            style="flex:1;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:10px;color:var(--txm);font-size:12px;font-weight:600;padding:10px 8px;cursor:pointer;min-height:42px">
            ${n<99?'Suivant →':'—'}
          </button>
        </div>
      </div>`;
    setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}), 60);
  }
}

function goAsma(n) {
  if (n < 1 || n > 99) return;
  ST.asmaOpen = n;
  // Update only the expanded card content in-place without re-rendering whole grid
  const a = ASMA_HUSNA[n-1];
  if (!a) return;
  // Find current open card and close it
  document.querySelectorAll('.asma-item.active').forEach(el => {
    const num = parseInt(el.id.replace('asma',''));
    if (num !== n) el.classList.remove('active');
  });
  // Open new card
  const target = document.getElementById('asma'+n);
  if (target) {
    target.classList.add('active');
    // Update content inside
    const detail = target.querySelector('.asma-detail');
    if (detail) {
      detail.innerHTML = `
        <div style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:14px">${a.d}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <button onclick="event.stopPropagation();goAsma(${n>1?n-1:1})"
            style="flex:1;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:10px;color:var(--txm);font-size:12px;font-weight:600;padding:9px 8px;cursor:pointer;min-height:40px">
            ← ${n>1?'Précédent':'—'}
          </button>
          <span style="font-size:10px;color:var(--txd);white-space:nowrap">${n}/99</span>

// SWIPE BETWEEN TABS
// ═══════════════════════════════
const TABS_ORDER = ['home','quran','hadith','adhkar','more'];
let _swipeStartX = 0, _swipeStartY = 0, _swipeActive = false;

function initSwipe() {
  const cnt = document.getElementById('cnt');
  if (!cnt) return;
  cnt.addEventListener('touchstart', e => {
    _swipeStartX = e.touches[0].clientX;
    _swipeStartY = e.touches[0].clientY;
    _swipeActive = true;
  }, {passive:true});

  cnt.addEventListener('touchend', e => {
    if (!_swipeActive) return;
    _swipeActive = false;
    const dx = e.changedTouches[0].clientX - _swipeStartX;
    const dy = e.changedTouches[0].clientY - _swipeStartY;
    if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)*0.7) return;
    const idx = TABS_ORDER.indexOf(ST.tab);
    if (dx < 0 && idx < TABS_ORDER.length-1) go(TABS_ORDER[idx+1]);
    if (dx > 0 && idx > 0) go(TABS_ORDER[idx-1]);
  }, {passive:true});
}

function openGlobalSearch() {
  document.getElementById('modal-root').innerHTML = `
    <div class="global-search-overlay">
      <div class="global-search-bar">
        <button onclick="closeModal()" style="background:none;border:none;color:var(--txm);font-size:15px;padding:4px 8px;cursor:pointer;font-weight:600">✕</button>
        <input class="global-search-input" id="gs-input" placeholder="Rechercher partout..." autofocus
          oninput="runGlobalSearch(this.value)"/>
      </div>
      <div class="global-search-results" id="gs-results">
        <div style="text-align:center;color:var(--txd);padding:40px 16px">
          <div style="font-size:32px;margin-bottom:10px">🔍</div>
          <div style="font-size:14px">Rechercher dans le Coran, les Hadiths, les Du'a...</div>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('gs-input')?.focus(), 100);
}

function runGlobalSearch(q) {
  if (!q || q.length < 2) {
    document.getElementById('gs-results').innerHTML = '';
    return;
  }
  const ql = q.toLowerCase();
  const results = [];

  // Search hadiths
  HADITHS.forEach(h => {
    if (h.fr.toLowerCase().includes(ql) || h.th.toLowerCase().includes(ql) || h.n.toLowerCase().includes(ql)) {
      results.push({
        type:'Hadith', typeKey:'hadith', icon:'📜',
        title: h.th + ' — ' + h.a,
        text: highlight(h.fr, q),
        sub: h.b + ' n°' + h.num,
        action: `closeModal();go('hadith');ST.hSearch='${q.replace(/'/g,"\\'")}';renderHadith()`
      });
    }
  });

  // Search duas
  DUA.forEach(d => {
    if (d.t.toLowerCase().includes(ql) || d.fr.toLowerCase().includes(ql) || d.cat.toLowerCase().includes(ql)) {
      results.push({
        type:"Du'a", typeKey:'dua', icon:'🤲',
        title: d.t + ' — ' + d.cat,
        text: highlight(d.fr, q),
        sub: d.ref,
        action: `closeModal();go('more');ST.moreTab='dua';ST.duaCat='${d.cat}';renderMore()`
      });
    }
  });

  // Search surahs
  if (ST.surahs.length) {
    ST.surahs.filter(s =>
      s.name_simple.toLowerCase().includes(ql) ||
      s.translated_name?.name?.toLowerCase().includes(ql) ||
      String(s.id) === ql
    ).slice(0,5).forEach(s => {
      results.push({
        type:'Coran', typeKey:'quran', icon:'📖',
        title: s.name_simple + ' — ' + (s.translated_name?.name||''),
        text: s.verses_count + ' versets · ' + (s.revelation_place==='makkah'?'Mecquoise':'Médinoise'),
        sub: 'Sourate n°' + s.id,
        action: `closeModal();go('quran');openSurah(${s.id})`
      });
    });
  }

  // Search 99 names
  ASMA_HUSNA.filter(a => a.fr.toLowerCase().includes(ql) || a.d.toLowerCase().includes(ql)).slice(0,5).forEach(a => {
    results.push({
      type:'Noms d\'Allah', typeKey:'asma', icon:'☪️',
      title: a.fr + ' — Nom n°' + a.n,
      text: highlight(a.d, q),
      sub: a.ar,
      action: `closeModal();go('more');ST.moreTab='asma';ST.asmaOpen=${a.n};renderMore()`
    });
  });

  const el = document.getElementById('gs-results');
  if (!el) return;
  if (!results.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--txd);padding:40px 16px;font-size:14px">Aucun résultat pour "${q}"</div>`;
    return;
  }
  el.innerHTML = `
    <div style="font-size:11px;color:var(--txd);margin-bottom:12px">${results.length} résultat(s)</div>
    ${results.slice(0,30).map(r=>`
      <div class="search-result-item" onclick="${r.action}">
        <div class="search-result-type">${r.icon} ${r.type}</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">${r.title}</div>
        <div class="search-result-text">${r.text}</div>
        <div class="search-result-sub">${r.sub}</div>
      </div>`).join('')}`;
}

function highlight(text, q) {
  if (!q) return text;
  const max = 120;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  let excerpt = idx > 30 ? '...' + text.substring(idx-20, idx+80) + '...' : text.substring(0, max) + (text.length>max?'...':'');
  return excerpt.replace(new RegExp(q, 'gi'), m=>`<span class="search-highlight">${m}</span>`);
}

    preview = `${data.ar}\n\n« ${data.fr} »\n\n— ${data.n}\n${data.b} n°${data.num}\n\n✓ Al-Albani : ${data.ref}`;
  } else if (type === 'verse') {
    preview = `${data.arabic}\n\n« ${data.translation} »\n\n— ${data.surah} (${data.ref})\n\nIslam Authentique — Manhaj As-Salaf`;
  } else if (type === 'dua') {
    preview = `${data.ar}\n\n« ${data.fr} »\n\n📚 ${data.ref}\n\nIslam Authentique`;
  }
  const shareText = preview + '\n\nIslam Authentique — Manhaj As-Salaf';

  document.getElementById('modal-root').innerHTML = `
    <div class="share-menu" onclick="if(event.target.classList.contains('share-menu'))closeModal()">
      <div class="share-sheet">
        <div class="drag-handle-wrap"><div class="modal-handle"></div></div>
        <div style="font-size:16px;font-weight:700;margin-bottom:13px">Partager</div>
        <div class="share-preview">
          <pre style="font-size:12px;color:var(--tx2);white-space:pre-wrap;font-family:'DM Sans',sans-serif;line-height:1.6">${shareText}</pre>
        </div>
        <div>
          <div class="share-option" onclick="shareNative('${encodeURIComponent(shareText)}')">
            <div class="share-option-icon">📤</div>
            <div>
              <div class="share-option-label">Partager via...</div>
              <div style="font-size:11px;color:var(--txd)">WhatsApp, Telegram, etc.</div>
            </div>
          </div>
          <div class="share-option" onclick="copyText('${encodeURIComponent(shareText)}')">
            <div class="share-option-icon">📋</div>
            <div>
              <div class="share-option-label">Copier le texte</div>
              <div style="font-size:11px;color:var(--txd)">Coller dans n'importe quelle app</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function shareNative(encoded) {
  const text = decodeURIComponent(encoded);
  if (navigator.share) navigator.share({text});
  else { navigator.clipboard?.writeText(text); toast('📋 Copié !'); }
  closeModal();
}
function copyText(encoded) {
  const text = decodeURIComponent(encoded);
  navigator.clipboard?.writeText(text);
  toast('📋 Copié !');
  closeModal();
}

    ${_bookmark ? `
      <div class="slbl" style="margin-top:16px">Marque-page Coran</div>

function closeHistory() { closeModal(); }

function timeAgo(ts) {
  const diff = (Date.now()-ts)/1000;
  if (diff < 60) return 'À l\'instant';
  if (diff < 3600) return Math.floor(diff/60)+'min';
  if (diff < 86400) return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'j';
}

function updateReadingProgress() {
  const cnt = document.getElementById('cnt');
  const fill = document.getElementById('rp-fill');
  if (!cnt || !fill) return;
  const pct = cnt.scrollTop / (cnt.scrollHeight - cnt.clientHeight) * 100;
  fill.style.width = Math.min(pct, 100) + '%';
}

  ];
  document.getElementById('s-more').innerHTML = `
    <div class="chips chips-sticky" id="more-tabs">
      ${tabs.map(([k,l])=>`
        <button class="chip ${ST.moreTab===k?'on':''}" onclick="switchMoreTab('${k}')">${l}</button>`).join('')}
    </div>
    <div id="more-content"></div>
  `;
  renderMoreContent();
}

function switchMoreTab(tab) {
  ST.moreTab = tab;
  document.querySelectorAll('#more-tabs .chip').forEach(btn=>{
    const tabs=[['asma',t('asma')],['dua',t('dua')],['arbain','Arba\'in'],['fiqh','Fiqh'],['sira','Sira'],['aqidah',t('aqidah')],['favs',t('favs')],['history','Historique'],['library',t('library')]];
    const match = tabs.find(([k])=>k===tab);
    if (match) btn.classList.toggle('on', btn.textContent.trim()===match[1]);
  });
  renderMoreContent();
  document.getElementById('cnt').scrollTop = 0;
}

function renderMoreContent() {
  const el = document.getElementById('more-content');
  if (!el) return;
  if (ST.moreTab==='asma') renderAsma(el);
  else if (ST.moreTab==='dua') renderDua(el);
  else if (ST.moreTab==='arbain') renderArbain(el);
  else if (ST.moreTab==='fiqh') renderFiqh(el);
  else if (ST.moreTab==='sira') renderSira(el);
  else if (ST.moreTab==='calendar') renderCalendar(el);
  else if (ST.moreTab==='lexique') renderLexique(el);
  else if (ST.moreTab==='quiz') renderQuiz(el);
  else if (ST.moreTab==='aqidah') renderAqidah(el);
  else if (ST.moreTab==='favs') renderFavs(el);
  else if (ST.moreTab==='history') renderHistory(el);
  else renderLibrary(el);
}

// AUDIO CORAN — API everyayah.com (gratuite)
// ═══════════════════════════════════════════════
const RECITERS = [
  {id:'Alafasy',name:'Mishary Al-Afasy',ar:'مشاري العفاسي'},
  {id:'Husary',name:'Mahmoud Khalil Al-Husary',ar:'محمود خليل الحصري'},
  {id:'Minshawi',name:'Muhammad Siddiq Al-Minshawi',ar:'محمد صديق المنشاوي'},
  {id:'AbdulBaset',name:'Abd Al-Basit Abd As-Samad',ar:'عبد الباسط عبد الصمد'},
  {id:'Ajamy',name:'Ahmad Al-Ajamy',ar:'أحمد العجمي'},
];

let _audio = null;
let _currentReciter = localStorage.getItem('reciter') || 'Alafasy';
let _isPlaying = false;
let _currentVerseAudio = null;

function getAudioUrl(surahId, verseNum, reciterId) {
  const s = String(surahId).padStart(3,'0');
  const v = String(verseNum).padStart(3,'0');
  return `https://everyayah.com/data/${reciterId}_128kbps/${s}${v}.mp3`;
}

function playVerse(surahId, verseNum, btnEl) {
  const url = getAudioUrl(surahId, verseNum, _currentReciter);
  
  // If same verse playing, pause it
  if (_audio && _currentVerseAudio === `${surahId}:${verseNum}` && _isPlaying) {
    _audio.pause();
    _isPlaying = false;
    if (btnEl) updateAudioBtn(btnEl, false);
    return;
  }
  
  // Stop previous
  if (_audio) { _audio.pause(); _audio = null; }
  
  // Reset all play buttons
  document.querySelectorAll('.audio-play-btn').forEach(b => updateAudioBtn(b, false));
  
  _audio = new Audio(url);
  _currentVerseAudio = `${surahId}:${verseNum}`;
  _isPlaying = true;
  if (btnEl) updateAudioBtn(btnEl, true);
  
  _audio.play().catch(e => {
    console.warn('Audio error:', e);
    toast('⚠️ Audio indisponible pour ce verset');
    if (btnEl) updateAudioBtn(btnEl, false);
    _isPlaying = false;
  });
  
  _audio.onended = () => {
    _isPlaying = false;
    if (btnEl) updateAudioBtn(btnEl, false);
    // Auto-play next verse
    const nextBtn = document.getElementById(`audio-btn-${surahId}-${verseNum+1}`);
    if (nextBtn) playVerse(surahId, verseNum+1, nextBtn);
  };
}

function updateAudioBtn(btn, playing) {
  if (!btn) return;
  btn.innerHTML = playing
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  btn.style.color = playing ? 'var(--acc)' : 'var(--txm)';
}

function stopAudio() {
  if (_audio) { _audio.pause(); _audio = null; }
  _isPlaying = false;
  document.querySelectorAll('.audio-play-btn').forEach(b => updateAudioBtn(b, false));
}

let _quizState = {

};

function renderQuiz(el) {
  if (!_quizState.active) {
    el.innerHTML = `

      <div class="slbl">Choisir la catégorie</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
        ${[
          ['all','🎯 Toutes les questions',`${QUIZ_QUESTIONS.length} questions`],
          ['hadith','📜 Hadiths',`${QUIZ_QUESTIONS.filter(q=>q.type==='hadith').length} questions`],
          ['asma','☪️ 99 Noms d\'Allah',`${QUIZ_QUESTIONS.filter(q=>q.type==='asma').length} questions`],
          ['quran','📖 Coran',`${QUIZ_QUESTIONS.filter(q=>q.type==='quran').length} questions`],
        ].map(([type,label,count])=>`
          <button onclick="startQuiz('${type}')"
            style="background:var(--card);border:2px solid var(--bdr);border-radius:14px;padding:16px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:14px;font-weight:700;margin-bottom:2px">${label}</div>
              <div style="font-size:11px;color:var(--txd)">${count}</div>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--txd)"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
          </button>`).join('')}
      </div>`;
    return;
  }

  const q = _quizState.questions[_quizState.current];
  if (!q) { renderQuizResults(el); return; }
  const progress = (_quizState.current / _quizState.questions.length * 100).toFixed(0);

  el.innerHTML = `
    <!-- Progress -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;color:var(--txm)">Question ${_quizState.current+1}/${_quizState.questions.length}</span>
      <span style="font-size:12px;font-weight:700;color:var(--acc)">Score: ${_quizState.score}</span>
    </div>
    <div class="progress" style="margin-bottom:18px">
      <div class="progress-fill" style="width:${progress}%"></div>
    </div>

    <!-- Question -->
    <div class="card card-grad" style="margin-bottom:16px;padding:20px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:10px">
        ${q.type==='hadith'?'📜 Hadith':q.type==='asma'?'☪️ Nom d\'Allah':'📖 Coran'}
      </div>
      <div style="font-size:15px;font-weight:600;line-height:1.6">${q.q}</div>
    </div>

    <!-- Options -->
    <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:16px">
      ${q.opts.map((opt,i)=>{
        let style = `background:var(--bg3);border:2px solid var(--bdr);`;
        let icon = '';
        if (_quizState.answered !== null) {
          if (i === q.correct) { style=`background:#052e16;border:2px solid var(--gr);`; icon='✓ '; }
          else if (i === _quizState.answered && i !== q.correct) { style=`background:#1c0000;border:2px solid #ef4444;`; icon='✗ '; }
        }
        return `<button onclick="${_quizState.answered===null?`answerQuiz(${i})`:'void(0)'}"
          style="${style}border-radius:13px;padding:14px 16px;text-align:left;cursor:${_quizState.answered===null?'pointer':'default'};font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;width:100%;display:flex;align-items:center;gap:8px">
          <span style="width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${String.fromCharCode(65+i)}</span>
          ${icon}${opt}
        </button>`;
      }).join('')}
    </div>

    ${_quizState.answered !== null ? `
      <button onclick="nextQuizQuestion()"
        style="width:100%;background:var(--acc);color:#000;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:700;cursor:pointer">
        ${_quizState.current < _quizState.questions.length-1 ? 'Question suivante →' : 'Voir les résultats 🏆'}
      </button>` : ''}
  `;
}

function startQuiz(type) {
  let qs = type === 'all' ? [...QUIZ_QUESTIONS] : QUIZ_QUESTIONS.filter(q=>q.type===type);
  // Shuffle
  for (let i=qs.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [qs[i],qs[j]]=[qs[j],qs[i]]; }
  _quizState = {active:true, questions:qs, current:0, score:0, answered:null, type, results:[]};
  renderMoreContent();
}

function answerQuiz(idx) {
  const q = _quizState.questions[_quizState.current];
  _quizState.answered = idx;
  if (idx === q.correct) _quizState.score++;
  _quizState.results.push({q, chosen:idx});
  renderMoreContent();
}

function nextQuizQuestion() {
  _quizState.current++;
  _quizState.answered = null;
  renderMoreContent();
}

function renderQuizResults(el) {
  const total = _quizState.questions.length;
  const score = _quizState.score;
  const pct = Math.round(score/total*100);
  const emoji = pct >= 80?'🏆':pct>=60?'👍':pct>=40?'📚':'🔄';
  
  el.innerHTML = `
    <div class="card card-grad" style="text-align:center;padding:28px 16px;margin-bottom:16px">
      <div style="font-size:56px;margin-bottom:14px">${emoji}</div>
      <div style="font-size:24px;font-weight:900;color:var(--acc);margin-bottom:6px">${score} / ${total}</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:10px">${pct}% de bonnes réponses</div>
      <div class="progress" style="margin:0 auto;max-width:200px">
        <div class="progress-fill" style="width:${pct}%;background:${pct>=80?'var(--gr)':'var(--acc)'}"></div>
      </div>
      <div style="font-size:12px;color:var(--txm);margin-top:12px">
        ${pct>=80?'Excellent ! Mashallah !':pct>=60?'Bien ! Continuez à apprendre.':pct>=40?'Pas mal, mais il y a encore à apprendre !':'Révisez vos cours et réessayez !'}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button onclick="startQuiz('${_quizState.type}')"
        style="flex:1;background:var(--acc);color:#000;border:none;border-radius:13px;padding:13px;font-size:13px;font-weight:700;cursor:pointer">🔄 Recommencer</button>
      <button onclick="_quizState.active=false;renderMoreContent()"
        style="flex:1;background:var(--bg3);color:var(--tx);border:1.5px solid var(--bdr);border-radius:13px;padding:13px;font-size:13px;font-weight:600;cursor:pointer">Menu</button>
    </div>
    <div class="slbl">Détail des réponses</div>
    ${_quizState.results.map((r,i)=>`
      <div style="background:${r.chosen===r.q.correct?'#052e16':'#1c0000'};border:1px solid ${r.chosen===r.q.correct?'var(--gr)':'#ef444425'};border-radius:13px;padding:13px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:600;margin-bottom:6px">${i+1}. ${r.q.q}</div>
        <div style="font-size:12px;color:${r.chosen===r.q.correct?'var(--grs)':'#fca5a5'}">
          ${r.chosen===r.q.correct?'✓ Correct':'✗ '+ r.q.opts[r.chosen]+' → '+r.q.opts[r.q.correct]}
        </div>
      </div>`).join('')}
  `;
}

// CALENDRIER ISLAMIQUE SCREEN
// ═══════════════════════════════════════════════
function renderCalendar(el) {
  const now = new Date();
  
  // Get hijri date
  let hijriMonth = 0, hijriDay = 0, hijriYear = 1447;
  try {
    hijriMonth = parseInt(new Intl.DateTimeFormat('en-TN-u-ca-islamic-umalqura',{month:'numeric'}).format(now));
    hijriDay = parseInt(new Intl.DateTimeFormat('en-TN-u-ca-islamic-umalqura',{day:'numeric'}).format(now));
    hijriYear = parseInt(new Intl.DateTimeFormat('en-TN-u-ca-islamic-umalqura',{year:'numeric'}).format(now));
  } catch(e) {}

  const MONTHS_AR = ['','محرم','صفر','ربيع الأول','ربيع الثاني','جمادى الأولى','جمادى الثانية','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
  const MONTHS_FR = ['','Muharram','Safar','Rabi\' Al-Awwal','Rabi\' Ath-Thani','Jumada Al-Ula','Jumada Al-Akhirah','Rajab','Sha\'ban','Ramadan','Shawwal','Dhul Qi\'dah','Dhul Hijjah'];

  // Find next events
  function daysUntilEvent(evMonth, evDay) {
    if (evMonth === 0) return null; // weekly
    let dDiff = (evMonth - hijriMonth) * 29 + (evDay - hijriDay);
    if (dDiff < 0) dDiff += 354; // next year
    return dDiff;
  }

  const upcomingEvents = CALENDAR_EVENTS
    .filter(e => e.month > 0)
    .map(e => ({...e, days: daysUntilEvent(e.month, e.day)}))
    .sort((a,b) => a.days - b.days);

  el.innerHTML = `
    <!-- Current hijri date -->
    <div class="card card-grad" style="text-align:center;padding:20px;margin-bottom:16px">
      <div style="font-size:10px;color:var(--txm);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px">Date Islamique Actuelle</div>
      <div class="ar" style="font-size:28px;color:var(--acc);margin-bottom:6px;direction:rtl">
        ${hijriDay} ${MONTHS_AR[hijriMonth] || ''} ${hijriYear} هـ
      </div>
      <div style="font-size:14px;color:var(--txm)">${hijriDay} ${MONTHS_FR[hijriMonth] || ''} ${hijriYear} H</div>
      <div style="font-size:12px;color:var(--txd);margin-top:4px">${now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>

    <!-- Weekly event -->
    <div class="card" style="background:linear-gradient(135deg,#0a1a0e,#0e2514);border-color:var(--bdr2);margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:22px">🕌</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--acc)">Vendredi — Jour béni</div>
          <div style="font-size:10px;color:var(--txd)">Chaque semaine</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.6">${CALENDAR_EVENTS.find(e=>e.type==='weekly').amal}</div>
    </div>

    <div class="slbl">Événements à venir</div>
    ${upcomingEvents.map(e => {
      const typeColors = {
        'pilier':'var(--acc)',
        'nuit':'#a78bfa',
        'eid':'#34d399',
        'special':'#f59e0b',
        'mois':'var(--txm)',
      };
      const color = typeColors[e.type] || 'var(--acc)';
      const daysText = e.days === 0 ? "Aujourd'hui !" : e.days === 1 ? "Demain" : `Dans ${e.days} jours`;
      
      return `
      <div class="accordion-item" id="cal-${e.month}-${e.day}">
        <div class="accordion-header" onclick="toggleAccordion('cal-${e.month}-${e.day}')">
          <div style="flex:1;padding-right:10px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
              <div style="font-size:14px;font-weight:700">${e.name}</div>
              <span style="font-size:9px;font-weight:700;background:${color}20;color:${color};border-radius:5px;padding:2px 7px">${daysText}</span>
            </div>
            <div class="ar" style="font-size:16px;color:var(--acc);direction:rtl">${e.ar}</div>
            <div style="font-size:10px;color:var(--txd);margin-top:2px">${MONTHS_FR[e.month] || ''} ${e.day > 0 ? e.day+' —' : ''} ${hijriYear + (e.month < hijriMonth ? 1 : 0)} H</div>
          </div>
          <svg class="accordion-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
        <div class="accordion-body">
          <div style="font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:12px">${e.desc}</div>
          <div style="background:var(--bg3);border-radius:10px;padding:11px 13px;margin-bottom:8px">
            <div style="font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:7px">Actes recommandés</div>
            <div style="font-size:12px;color:var(--tx2);line-height:1.65">${e.amal}</div>
          </div>
          <div style="font-size:10px;color:var(--txd)">📚 ${e.ref}</div>
        </div>
      </div>`;
    }).join('')}
  `;
}

let _lexCat = 'all', _lexSearch = '';

function renderLexique(el) {
  const cats = ['all', ...new Set(LEXIQUE.map(l=>l.cat))];

          <div style="font-size:13px;color:var(--tx2);line-height:1.7">${l.def}</div>
        </div>
      </div>`).join('')}
  `;
}

function onLexSearch(val) {
  _lexSearch = val;
  const q = val.toLowerCase();
  const fl = LEXIQUE.filter(l => {
    if (_lexCat !== 'all' && l.cat !== _lexCat) return false;
    if (q && !l.t.toLowerCase().includes(q) && !l.def.toLowerCase().includes(q)) return false;
    return true;
  });
  const mc = document.getElementById('more-content');
  if (mc) renderLexique(mc);
}

function setLexCat(cat) {
  _lexCat = cat;
  const mc = document.getElementById('more-content');
  if (mc) renderLexique(mc);
}

const ACCENT_COLORS = [
  {id:'gold',label:'Or',color:'#c9a84c',dark:'#7a5e1a',light:'#e8c97a'},
  {id:'green',label:'Vert',color:'#22c55e',dark:'#166534',light:'#86efac'},
  {id:'blue',label:'Bleu',color:'#3b82f6',dark:'#1d4ed8',light:'#93c5fd'},
  {id:'purple',label:'Violet',color:'#a78bfa',dark:'#5b21b6',light:'#c4b5fd'},
  {id:'teal',label:'Turquoise',color:'#2dd4bf',dark:'#0f766e',light:'#5eead4'},
  {id:'rose',label:'Rose',color:'#f43f5e',dark:'#be123c',light:'#fda4af'},
  {id:'orange',label:'Orange',color:'#f97316',dark:'#c2410c',light:'#fdba74'},
  {id:'white',label:'Blanc',color:'#f1f5f9',dark:'#94a3b8',light:'#ffffff'},
];

let _accentId = localStorage.getItem('accentId') || 'gold';

function applyAccent(id) {
  const a = ACCENT_COLORS.find(x=>x.id===id) || ACCENT_COLORS[0];
  document.documentElement.style.setProperty('--acc', a.color);
  document.documentElement.style.setProperty('--acc2', a.light);
  document.documentElement.style.setProperty('--acc3', a.dark);
  document.documentElement.style.setProperty('--accd', a.color+'18');
}

function setAccent(id) {
  _accentId = id;
  localStorage.setItem('accentId', id);
  applyAccent(id);
  // Update accent buttons
  ACCENT_COLORS.forEach(a => {
    const btn = document.getElementById('accent-'+a.id);
    if (btn) btn.style.borderColor = a.id===id?'var(--acc)':'transparent';
  });
}

// ═══════════════════════════════════════════════
// MODE LECTURE IMMERSIF
// ═══════════════════════════════════════════════
let _immersiveMode = false;

function enterImmersiveMode() {
  _immersiveMode = true;
  const app = document.getElementById('app');
  const hdr = document.querySelector('.hdr');
  const nav = document.querySelector('.nav');
  if (hdr) hdr.style.display = 'none';
  if (nav) nav.style.display = 'none';
  
  // Show exit button
  const exitBtn = document.createElement('button');
  exitBtn.id = 'immersive-exit';
  exitBtn.innerHTML = `
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H19v-2z"/></svg>
    Quitter lecture immersive`;
  exitBtn.style.cssText = `
    position:fixed;top:12px;right:12px;z-index:999;
    background:var(--bg4);border:1px solid var(--bdr);color:var(--txm);
    border-radius:99px;padding:8px 14px;font-size:12px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:6px;
    font-family:'Outfit',sans-serif;box-shadow:var(--shadow);`;
  exitBtn.onclick = exitImmersiveMode;
  document.body.appendChild(exitBtn);
  
  if (app) { app.style.maxWidth = '100%'; app.style.height = '100dvh'; }
}

function exitImmersiveMode() {
  _immersiveMode = false;
  const hdr = document.querySelector('.hdr');
  const nav = document.querySelector('.nav');
  const exitBtn = document.getElementById('immersive-exit');
  if (hdr) hdr.style.display = '';
  if (nav) nav.style.display = '';
  if (exitBtn) exitBtn.remove();
  const app = document.getElementById('app');
  if (app) { app.style.maxWidth = ''; }
}

applyAccent(_accentId);
showSplash();
updateDates();
updateNav();
checkAutoDarkMode();
// Apply saved UI font size
if(ST.fontSizeUI) document.body.style.fontSize = ST.fontSizeUI + "px";
if (ST.firstOpen) showOnboarding();
else renderHome();
loadPrayer();
loadSurahs();
initSwipe();
setTimeout(()=>{
  const btn = document.getElementById('theme-quick-btn');
  if(btn) btn.style.display='flex';
  renderHomeHeader();
}, 500);

</script>
